  test_design:
    description: 'Grid search over initial-gap bucket count [3, 5, 10] and exit percentile
      threshold [0.50, 0.60, 0.70, 0.80, 0.90]. All buckets use equal-frequency binning
      on historical entry gaps. Forward-direction sort (descending value_gap_amount,
      >0 filter unchanged). Entry uses existing top-N ranking logic without modification.
      Exit: for each open position, compute current holding days; look up the historical
      close-time distribution for its initial-gap bucket (computed from all historical
      completed trades); exit when holding_days >= P-th percentile of that bucket''s
      distribution, subject to min_hold_days=5 and max_hold_days=180 fallback. Compare
      best candidate against the accepted duration-adaptive exit baseline (cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22).
