  risk: 'Low-medium. The exit rule is a non-parametric overlay on the existing forward-direction
    strategy; it changes neither entry, ranking, nor position sizing. Worst case:
    the empirical percentile exit performs similarly to or marginally worse than the
    fixed-decay baseline, wasting one compute cycle. The evaluate_cb_arb_exit_gap_closing_percentile
    executor is registered and available (family=exit_gap_closing_percentile, not
    blocked for C007). Data requirements are identical to the duration-adaptive exit
    run.

    '
  why_not_repeated_failure: 'This is not a repeat of any failed or closed direction.
    The duration-adaptive exit was accepted, not failed — this proposal refines that
    success with a non-parametric exit rule. Unlike the rejected IV-percentile exit
    v1_1 (which exited on IV spikes, a fundamentally different market signal that
    produced negative train excess), this proposal uses the empirical distribution
    of gap close times — a property derived from the strategy''s own trade history,
    not an external signal. Unlike the failed entry filters (moneyness, bond floor,
    both failed_mechanical_thresholds) which culled the candidate pool and killed
    the signal, this proposal preserves all candidates and only changes when to exit.
    Unlike all reverse-direction variants (closed by value_gap_rank_is_anti_alpha_2026_05_24),
    this proposal operates in the forward direction. The exit_gap_closing_percentile
    family has zero prior runs, is not in closed_families_from_insights, and is not
    in any forbidden or cooldown list.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
  implementation_assumption: The executor pre-computes historical gap-close-time distributions
    by scanning the strategy's trade history (or simulated trades from the baseline
    run), bucketing by initial gap magnitude using equal-frequency binning, and storing
    the empirical CDF of holding days per bucket. During backtest, each open position
    is assigned to its initial-gap bucket, current holding days are computed, and
    the exit signal fires when holding_days >= the configured percentile threshold
    of that bucket's CDF. A hard max_hold_days=180 cap prevents infinite holding if
    the percentile threshold is never reached. The min_hold_days=5 constraint prevents
    immediate exits on bucket percentiles that fall below 5 days.
