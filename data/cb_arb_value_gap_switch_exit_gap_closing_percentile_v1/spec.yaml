hypothesis: 'Using the historical empirical distribution of days-to-close for gaps
  of similar initial magnitude as a dynamic, non-parametric exit rule will improve
  risk-adjusted returns over the fixed-decay duration-adaptive exit. The accepted
  duration-adaptive exit (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5)
  applies a single linear decay schedule to all positions regardless of gap magnitude.
  In reality, larger initial value gaps may close on systematically different timescales
  than smaller ones. An empirical percentile exit — exiting when a position''s holding
  days exceeds the P-th percentile of historical close-times for gaps in the same
  initial-magnitude bucket — tailors exit patience to the actual observed distribution
  per gap magnitude, without requiring explicit regime classification or parametric
  assumptions.

  '
source_insight: 'The duration-adaptive exit (accepted 2026-05-22) proved that time-decaying
  exit thresholds can improve forward-direction strategy performance even when the
  baseline forward signal is anti-alpha. However, its fixed linear decay schedule
  assumes uniform gap-closing behavior across all gap magnitudes. The gap-closing-percentile
  approach replaces this parametric assumption with a non-parametric rule derived
  from the strategy''s own trade history — empirically observed distributions of how
  long gaps of different sizes actually take to close. This is a refinement of a proven
  direction, not a new bet on an untested hypothesis.

  '
