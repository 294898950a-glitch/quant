    why: Two drawdown-gate runs in a row failed; the duration-adaptive exit succeeded
      by working at the individual bond level, not macro timing
    priority_code: 1
    priority: high
  - direction: Contrarian entry on value gap widening rather than index drawdown
    why: The core insight of durability-adaptive exit is patience; on the entry side,
      wider gaps (absolute deviation from intrinsic) may be a better stress signal
      than CSI 300 drawdown
    priority_code: 2
    priority: medium
  - direction: Re-test drawdown entry with longer buffer_days to avoid entering too
      early in a selloff
    why: buffer_days=0 may have captured entries too soon; the stress failure was
