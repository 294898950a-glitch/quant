  - load base value-gap ranks and CB price data
  - compute rolling standard deviation of CB price returns (lookback_days)
  - derive volatility ratio (current vol / median vol) for each day
  - compute adaptive sell gap = base_sell_gap * clamp(volatility_ratio * chosen_multiplier,
    floor_factor, ceiling_factor)
  - apply dynamic exit rule, simulate trades, and run backtest on train (2019-2024),
    2020 repair, sealed test (2025-202605)
  - produce summary, report, l4_ack, and diagnostic artifacts
