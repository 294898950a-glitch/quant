why_existing_tools_insufficient: option_position_sizing can test only static candidate
  position scaling (C001, C002, C003) and explicitly cannot test new_exit_rule (C007);
  option_source_pnl_feedback_scaler can test rolling_pnl_feedback (C004) and static
  scaling (C001) but also cannot test new_exit_rule (C007). Both lack the capability
  to implement an adaptive sell gap based on volatility, which is the core of this
  proposal. The proposal requires a new executor that replaces the fixed sell gap
  with a volatility-adjusted rule, which neither existing executor can perform.
