l0_source: autonomous strategy ideator from recent_results_digest
hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on) is the only
  proven alpha direction. Entry filters (moneyness, bond floor) failed because they
  cull candidates and destroy the signal''s diversification — fewer trades, concentrated
  exposure. Position scaling via inverse ATR is a fundamentally different overlay:
  it preserves ALL candidates (value_gap_amount > 0, sorted ascending), and only adjusts
  allocation weights. Less-volatile CBs get higher weight, reducing portfolio-level
  drawdowns without removing any entries. This should improve risk-adjusted returns
  where entry filters could not, because it attacks noise (volatility-driven weight
  distortion) rather than signal (candidate selection).

  Repeated-reject-family check for moneyness_stock_to_conv_threshold (3 rejections):
  (1) Is the underlying signal invalid? No — the reverse-sort signal is proven (+30.3%
  test excess cost-on). (2) Is the direction reversed? The reverse direction itself
  is correct; the failure is in the entry-filter overlay, not the sort direction.
  (3) Is only the execution condition wrong? The execution condition (entry filter
  culling) is the problem. Entry filters shrink the candidate pool to a handful of
  names, concentrating risk and destroying the cross-sectional diversification that
  makes the reverse signal work. Position scaling preserves all candidates so the
  diversification benefit remains intact.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: The reverse-rank probe proved
  that within the value_gap_amount>0 candidate set, sorting ASCENDING (least-positive
  first) produces +30.3% test excess cost-on while DESCENDING (most-positive first,
  the production rule) produces -10.5%. A 41pp swing from sort direction alone. The
  critical insight mandates biasing new variants toward reverse-direction tests. Additionally,
  entry filters (moneyness v1_1, v1_5, reverse v1_1; bond floor v1, reverse v2) all
  failed mechanical thresholds — the common failure mode is candidate pool culling.
  A position-scaling overlay that preserves all candidates is the logical next reverse-direction
  test that avoids the known failure mode.

  '
