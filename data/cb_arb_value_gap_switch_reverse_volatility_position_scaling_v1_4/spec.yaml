  test_design:
    description: 'Entry: value_gap_amount > 0, sorted ASCENDING (least-positive first),
      top N selected. Position scaling: compute ATR from stk_daily_qfq close per CB
      per day (true range of daily closes, rolling mean). position_weight = baseline_weight
      * (scaling_beta / ATR_rank_percentile). Grid search: ATR lookback [10, 20, 40,
      60], scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit: reverse-probe grid (max_hold_days
      [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct 0.0, switch_hurdle_pct
      [0.0, 0.01]). Cost-on: slippage 0.0015, market impact 0.001. Train: 2018-2022,
      Test: 2023-2026. Compare best grid result against reverse-probe-coston baseline
      (+30.3% test excess cost-on). No candidate removal — all value_gap_amount >
      0 entries are eligible; only allocation weights differ.

      '
  success_criteria:
    criteria:
    - test_excess_return >= 0.24 (at least 80% of baseline +0.303 preserved)
    - test_max_drawdown <= -0.113 (no worse than baseline, ideally improved)
    - test_sharpe >= baseline_sharpe (risk-adjusted return not degraded)
    - train_excess_return positive (no overfitting to grid search)
  falsifiers:
    train:
    - test_excess_return < 0.15 (scaling destroyed more than half the alpha)
    - test_max_drawdown > 0.15 in magnitude (worse than baseline despite scaling)
    - train_excess_return negative (grid search overfit, no real signal)
    - best_params at grid edge for both ATR lookback and scaling_beta (unstable optimum)
    validate:
    - test_excess_return < 0.15 (scaling destroyed more than half the alpha)
    - test_max_drawdown > 0.15 in magnitude (worse than baseline despite scaling)
    - train_excess_return negative (grid search overfit, no real signal)
    - best_params at grid edge for both ATR lookback and scaling_beta (unstable optimum)
    test:
    - test_excess_return < 0.15 (scaling destroyed more than half the alpha)
    - test_max_drawdown > 0.15 in magnitude (worse than baseline despite scaling)
    - train_excess_return negative (grid search overfit, no real signal)
    - best_params at grid edge for both ATR lookback and scaling_beta (unstable optimum)
  risk: 'Low-to-medium. The overlay is non-destructive — worst case it degrades to
    equal-weight (scaling_beta near 0 or ATR rank near uniform), producing results
    close to the reverse-probe-coston baseline which we already know is strongly positive.
    Unlike entry filters that can accidentally cull the entire candidate pool on some
    days, position scaling always produces valid weights. The main risk is that ATR-based
    scaling adds no benefit and wastes compute on a grid search that converges to
    uniform weights.

    '
  why_not_repeated_failure: 'The repeated_reject_families entry is moneyness_stock_to_conv_threshold
    (3 rejections), which covers C003 (moneyness entry filters). This proposal uses
    C001 (static candidate position scale), a different capability family. More importantly,
    the failure mechanism in the moneyness family was candidate pool culling — filtering
    entries by moneyness threshold shrinks the pool, concentrates risk, and destroys
    the cross-sectional diversification that the reverse signal depends on. This proposal
    explicitly preserves ALL candidates and only adjusts allocation weights. It is
    a noise-reduction overlay, not a signal-selection overlay. Even if it fails, the
    failure mode is different (weight distortion vs pool destruction), and the worst
    case is equal-weight baseline performance which is already proven positive.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_reverse-probe-coston_20260524 (baseline: +30.3% test excess
