implementation_assumption: The executor computes ATR from stk_daily_qfq close prices.
  True range for daily data without high/low is proxied as |close_t - close_t-1| or
  uses a simpler rolling standard deviation of returns as the volatility measure.
  The scaling formula preserves the sum of weights across candidates (softmax or proportional
  normalization) so total capital allocation per day is unchanged from the baseline.
  The grid search is 4 × 5 × 3 × 2 × 2 = 240 exit combinations × 20 ATR/beta combinations
  = 4,800 total parameter tuples, which is tractable for a single executor run.
