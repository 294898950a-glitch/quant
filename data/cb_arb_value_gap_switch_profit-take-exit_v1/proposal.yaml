test_design:
  method: grid_search
  parameters:
    target_fraction:
      range:
      - 0.3
      - 0.9
      steps: 7
      description: Exit when current_gap <= (1 - target_fraction) * entry_gap. Lower
        values = tighter profit target.
    min_hold_days:
      range:
      - 1
      - 10
      steps: 10
      description: Minimum holding days before profit-take exit is allowed.
  evaluation:
  - cost_on cumulative excess compound
  - cost_off cumulative excess compound
  - cost_on max drawdown
  - cost_on Sharpe
  - average holding period
  comparison:
  - baseline (cost-on row from current.yaml)
  - best duration-adaptive-exit candidate
success_criteria:
  criteria:
  - adoption_pass is true (at least 1 candidate meets mechanical thresholds)
  - best candidate cost_on cumulative excess improves over baseline by >= 2pp
falsifiers:
  train: &id001
  - adoption_pass remains false after full grid search
  - all candidates have cost_on cumulative excess <= baseline
  - all candidates have cost_on Sharpe <= baseline Sharpe
  validate: *id001
  test: *id001
risk: low
why_not_repeated_failure: 'The gap-trailing exit (C007 / dynamic_exit_gap_decay_executor,
  run_id gap-trailing-exit) exited when the current gap widened beyond a decayed fraction
  of the entry gap — a stop-loss concept that held until deterioration.  The profit-take
  exit is the mechanical inverse: it exits when the gap has contracted toward zero
  — a take-profit concept that captures closure.  Duration-adaptive exit used time
  decay, not gap level.  IV-percentile exit used volatility regime, not gap level.  PnL
  feedback scaling (C004) adjusted position size, not exit timing.  This is a genuinely
  untested exit mechanic within the C007 family.

  '
related_prior_runs:
- cb_arb_value_gap_switch_gap-trailing-exit
- cb_arb_value_gap_switch_duration-exit_2026-05-22
- cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
- cb_arb_value_gap_switch_iv_percentile_exit_v1_1
implementation_assumption: The profit_take_exit_executor tracks entry_gap for each
  open position at fill time, computes current_gap from daily value-gap data, and
  triggers exit when current_gap <= (1 - target_fraction) * entry_gap, subject to
  min_hold_days. It does not modify entry eligibility, scoring, or position sizing.
