    - delist_date
    data/cb_warehouse/stk_daily_qfq.parquet:
    - ts_code
    - stk_code
    - trade_date
    - close
  test_design:
    method: grid_search
    parameters:
      target_fraction:
        range:
        - 0.3
        - 0.9
        steps: 7
        description: Exit when current_gap <= (1 - target_fraction) * entry_gap. Lower
          values = tighter profit target.
      min_hold_days:
        range:
        - 1
        - 10
        steps: 10
        description: Minimum holding days before profit-take exit is allowed.
    evaluation:
    - cost_on cumulative excess compound
    - cost_off cumulative excess compound
    - cost_on max drawdown
    - cost_on Sharpe
    - average holding period
    comparison:
