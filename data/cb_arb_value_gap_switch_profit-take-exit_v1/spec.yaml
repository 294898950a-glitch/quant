proposal:
  proposal_id: cb_arb_value_gap_switch_profit-take-exit_v1
  strategy_id: cb_arb_value_gap_switch
  family: exit_rule
  hypothesis: 'A partial profit-taking exit triggered when the current value gap contracts
    to a fixed fraction of the entry gap will lock in gains earlier and reduce the
    cost-on degradation, compared to the baseline hold-to-signal-exit. Unlike gap-trailing
    exit (which exits on gap widening — a stop-loss idea), this exits on gap contraction
    — a pure take-profit idea.  Earlier exit at a defined profit target should reduce
    round-trip costs and holding-period drag, the two biggest contributors to the
    -7.47pp cost-on degradation.

    '
  source_insight: 'The duration-adaptive exit was accepted (best params: min_hold_days=5,
    initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45),
    proving that disciplined exit rules improve the strategy.  The gap-trailing exit
    failed because it was a widening/stop-loss concept — it held positions waiting
    for gap deterioration.  The profit-take exit is the inverse: it exits precisely
    when the gap has closed enough to capture profit, without waiting for full convergence
    or time decay.  This is mechanically distinct from all prior exit experiments.

    '
  expected_improvement: 'Cost-on cumulative excess improves by at least 2pp over baseline
    through shorter average holding periods, captured gap-closure profits before reversal,
    and reduced per-trade cost drag.

    '
  capability_ids:
  - C007
  required_executor: profit_take_exit_executor
  required_data:
