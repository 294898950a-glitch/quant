    - all candidates have cost_on Sharpe <= baseline Sharpe
    validate:
    - adoption_pass remains false after full grid search
    - all candidates have cost_on cumulative excess <= baseline
    - all candidates have cost_on Sharpe <= baseline Sharpe
    test:
    - adoption_pass remains false after full grid search
    - all candidates have cost_on cumulative excess <= baseline
    - all candidates have cost_on Sharpe <= baseline Sharpe
  risk: low
  why_not_repeated_failure: 'The gap-trailing exit (C007 / dynamic_exit_gap_decay_executor,
    run_id gap-trailing-exit) exited when the current gap widened beyond a decayed
    fraction of the entry gap — a stop-loss concept that held until deterioration.  The
    profit-take exit is the mechanical inverse: it exits when the gap has contracted
    toward zero — a take-profit concept that captures closure.  Duration-adaptive
    exit used time decay, not gap level.  IV-percentile exit used volatility regime,
    not gap level.  PnL feedback scaling (C004) adjusted position size, not exit timing.  This
    is a genuinely untested exit mechanic within the C007 family.

    '
