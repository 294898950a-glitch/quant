- cb_arb_value_gap_switch_reverse_moneyness_entry_filter_v1_1
- cb_arb_value_gap_switch_reverse_bond_floor_entry_filter_v2
- cb_arb_value_gap_switch_exit_duration_adaptive_reverse_20260525
implementation_assumption: 'ATR computed as rolling mean of true range (high-low)
  from stk_daily_qfq close prices. Inverse scaling applied multiplicatively: each
  candidate''s baseline weight is multiplied by (scaling_beta / normalized_ATR_rank),
  where ATR_rank is the percentile rank of that CB''s ATR among all candidates on
  that day. Buy amount scales proportionally. No candidate removal — the value_gap_amount
  > 0 filter and ascending sort are the only entry logic, unchanged from reverse-probe-coston.'
