proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_5
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: '(1) Underlying signal: the reverse-sort value_gap signal is valid — +30.3%
  test excess cost-on is not a statistical fluke, it represents a real tradable edge.
  (2) Direction: confirmed reverse (ascending sort) is the correct direction; forward
  is anti-alpha. (3) Execution condition: the problem is NOT with the signal but with
  equal-weight allocation treating noisy high-vol candidates the same as stable ones.
  Inverse-ATR position scaling addresses this by reducing allocation to high-volatility
  CBs without removing any candidates from the pool — unlike entry filters (moneyness,
  bond floor) that culled candidates and destroyed the reverse signal. This is strictly
  less destructive and should reduce drawdowns while preserving most of the alpha.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 — reverse-probe-coston confirmed
  +30.3% test excess cost-on. All entry-filter overlays in reverse direction failed
  (moneyness v1_1, bond floor v2) because they culled the already-thin candidate pool.
  Position scaling is the next logical overlay: it preserves every candidate and only
  redistributes weights. The insight''s priority-4 directive ("reverse-direction variants
  applied to families that previously failed in forward") supports this — position
  scaling in forward direction (C001 forward executor) was never tested, but the pattern
  of "overlay that doesn''t remove candidates" is the right next step in the reverse
  direction.

  '
expected_improvement: 'Reduce max drawdown from -11.3% (reverse-probe-coston test)
  to below -9%, while preserving at least 80% of the +30.3% test excess (target: test
  excess > +24%). Net result: higher Sharpe ratio and lower max drawdown than the
  reverse-probe-coston baseline, without sacrificing candidate count or trade frequency.

  '
