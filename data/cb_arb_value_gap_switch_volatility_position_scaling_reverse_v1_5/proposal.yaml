test_design:
  description: 'Sort value_gap_amount ASCENDING (reverse direction, >0 filter unchanged).
    Compute ATR from stk_daily_qfq close prices per CB per day over lookback windows
    [10, 20, 40, 60]. Apply inverse scaling: position_weight = baseline * (scaling_beta
    / ATR_rank), where scaling_beta in [0.25, 0.5, 0.75, 1.0, 1.5]. Exit grid: max_hold_days
    [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct 0.0, switch_hurdle_pct
    [0.0, 0.01]. Cost-on with slippage 0.0015 and market impact 0.001. Train 2018-2022,
    test 2023-2026. Compare best candidate against reverse-probe-coston baseline.

    '
success_criteria:
  criteria:
  - test_excess_return_gt: 0.24
  - test_max_drawdown_lt: 0.09
  - test_sharpe_gt_reverse_baseline: true
  - candidate_count_preserved: true
falsifiers:
  train: &id001
  - test_excess_return_lt: 0.15
  - test_max_drawdown_gte_reverse_baseline: true
  - any_test_year_sharpe_lt: 0.0
  - best_candidate_worse_than_baseline_on_all_metrics: true
  validate: *id001
  test: *id001
risk: 'Low structural risk. Position scaling does not remove candidates — it only
  redistributes weights. If the reverse signal quality is uniform across volatility
  regimes, scaling adds no value but also does no harm beyond grid-search noise. Real
  risk is that ATR as a volatility proxy fails to capture the specific noise that
  degrades reverse-signal trades (e.g., gap-widening from credit events rather than
  price volatility).

  '
why_not_repeated_failure: 'This is NOT a moneyness entry filter variant. It does not
  use stock_close/conv_price thresholds, does not remove candidates, and does not
  gate entries. The moneyness family (C003, 3 recent rejections) failed because culling
  the already-thin reverse candidate pool destroyed the signal — fewer candidates
  means fewer diversification benefits and higher idiosyncratic risk per position.
  Position scaling is a weight-adjustment overlay: every candidate that passes the
  >0 value_gap filter still enters, only with reduced allocation if its recent stock
  volatility is high. Different mechanic, different failure mode. If this fails, it
  tells us the reverse signal''s alpha is concentrated in high-volatility names (counter-intuitive)
  rather than uniformly distributed, which would be valuable diagnostic information.

  '
related_prior_runs:
