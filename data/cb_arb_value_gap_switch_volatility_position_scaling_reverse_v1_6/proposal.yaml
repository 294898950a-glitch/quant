proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_6
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: "The reverse-direction value-gap base (+30.3% test excess cost-on) has\
  \ a wide candidate pool with heterogeneous volatility profiles. Inverse-ATR position\
  \ scaling reduces allocation to high-volatility CBs and increases allocation to\
  \ stable ones, without removing any candidates from the pool. This preserves the\
  \ full reverse-alpha signal while reducing drawdowns and improving risk-adjusted\
  \ returns. Unlike the failed entry-filter approaches (moneyness, bond floor) that\
  \ culled candidates and destroyed the signal, position scaling is strictly less\
  \ destructive — every candidate still participates, only with adjusted weight.\n\
  Repeated-reject-family analysis for moneyness_stock_to_conv_threshold (3 rejections):\
  \ (1) Is the underlying signal invalid? No. The reverse-direction signal is validated:\n\
  \    +30.3% test excess cost-on, +96.6% train excess cost-on, +53.8% win rate.\n\
  (2) Is the direction reversed (rank order is anti-alpha)? Yes, the forward\n   \
  \ direction is anti-alpha; the reverse direction is the proven alpha direction.\n\
  \    The active_critical_insight value_gap_rank_is_anti_alpha_2026_05_24 confirms\n\
  \    the value-gap formula is anti-informative under its monotonicity assumption.\n\
  (3) Is only the execution condition wrong? Yes. Both moneyness and bond-floor\n\
  \    entry filters removed candidates from the pool, which was too destructive\n\
  \    for the reverse signal. Position scaling preserves all candidates and only\n\
  \    adjusts allocation weights — it is the least destructive overlay available.\n"
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 establishes that the reverse
  direction (+30.3% test excess cost-on, +96.6% train excess cost-on) dominates the
  forward direction (-10.5% cost-on). All three entry-filter variants (forward moneyness
  v1.5/v1.1, reverse moneyness v1.1, reverse bond floor v2, forward bond floor v1)
  failed because removing candidates from the proven reverse base destroys the signal.
  Position scaling is the only untested C001 variant that operates in the reverse
  direction without candidate removal, matching priority item 4 of the insight''s
  decision_use: "reverse-direction variants applied to families that previously failed
  in forward."

  '
expected_improvement: 'Reduced max drawdown below the reverse-probe-coston baseline
  of -11.3% test MDD while preserving at least 80% of the +30.3% test excess (i.e.,
  ≥ +24.2% test excess cost-on). Inverse-ATR weighting should dampen noise from high-volatility
  positions without eliminating any signal-bearing candidates. Expected Sharpe improvement
  over the baseline.

  '
