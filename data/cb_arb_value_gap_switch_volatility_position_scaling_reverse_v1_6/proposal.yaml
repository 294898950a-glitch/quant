test_design:
  description: 'Base: Reverse-direction value-gap ranking (value_gap_amount > 0 filter,
    ASCENDING sort — least-positive gap first). Overlay: Inverse-ATR position scaling.
    For each CB on each day, compute ATR from stk_daily_qfq close prices (lookback
    in [10, 20, 40, 60]). Rank candidates by ATR (descending, highest-volatility =
    rank 1), then scale position weight = baseline_weight * (scaling_beta / ATR_rank).
    Grid search: ATR lookback [10, 20, 40, 60] × scaling_beta [0.25, 0.5, 0.75, 1.0,
    1.5]. Exit: Reverse-probe grid (max_hold_days [120, 150, 180], min_gap_pct [0.005,
    0.01], sell_gap_pct 0.0, switch_hurdle_pct [0.0, 0.01]). Cost-on: slippage 0.0015,
    market_impact 0.001. Train 2018-2022, test 2023-2026. All candidates passing value_gap_amount
    > 0 are eligible; no candidate removal.

    '
success_criteria:
  test_cumulative_excess_return: '>= 0.242'
  test_max_drawdown: < 0.113
  test_sharpe: '> 1.0'
  adoption_pass: true
falsifiers:
  train: &id001
  - test_cumulative_excess_return < 0.15
  - test_max_drawdown >= 0.113
  - adoption_pass is false
  - any_single_test_year_excess < 0
  validate: *id001
  test: *id001
risk: 'Low mechanistic risk — position scaling does not remove candidates, only reweights
  them. The worst case is that ATR-based weighting adds noise and degrades returns
  slightly, but it cannot kill the signal the way entry filters did. The main risk
  is that stock ATR may not capture CB-specific risk (CBs have bond-floor dampening),
  but the grid search over lookback and scaling_beta provides reasonable robustness.

  '
why_not_repeated_failure: 'This is NOT an entry filter. All three moneyness_stock_to_conv_threshold
  failures (forward moneyness v1.5, forward moneyness v1.1, reverse moneyness v1.1)
  used stock_close/conv_price thresholds to remove candidates. The bond floor entry
  filters (forward v1, reverse v2) similarly culled candidates via cb_close/bond_floor
  distance thresholds. These removals were too destructive for the reverse-direction
  signal — they shrank the candidate pool below viable size.

  This proposal uses inverse-ATR position SCALING — every candidate with value_gap_amount
  > 0 remains eligible. Only the allocation weight changes. This is a fundamentally
  different mechanic: noise reduction via sizing, not signal selection via filtering.
  It is the only C001 capability with a reverse-direction executor that does not remove
  candidates.

  '
