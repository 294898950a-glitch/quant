implementation_assumption: The executor volatility_based_position_scaling_executor_reverse
  is registered under C001. It sorts value_gap_amount ASCENDING, computes ATR from
  stk_daily_qfq close, applies inverse scaling weight = baseline * (beta / ATR_rank),
  and runs the reverse-probe exit grid with cost-on. All candidates with value_gap_amount
  > 0 participate. No new code is needed.
