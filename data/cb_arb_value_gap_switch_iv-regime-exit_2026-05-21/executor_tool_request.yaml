implementation_outline:
  script_path: scripts/evaluate_cb_arb_iv_percentile_exit.py
  main_inputs:
  - data_root
  - output_dir
  - iv_percentile_threshold
  - min_hold_days
  core_steps:
  - load daily CB prices (cb_daily.parquet), stock prices (stk_daily_qfq.parquet),
    and CB static data (cb_basic.parquet)
  - for each CB and date, compute implied volatility using a simplified convertible
    bond pricing model; invert for IV given market price, conversion terms, and a
    stock volatility proxy (e.g., historical stock vol)
  - build a rolling 252‑day expanding window of IVs for each CB and compute current
    IV’s percentile rank
  - reconstruct daily positions from the base value‑gap ranks (required additional data: daily_value_gap_amounts.parquet)
  - apply exit rule: if current IV > iv_percentile_threshold percentile (after min_hold_days),
      exit the position
  - perform grid search over iv_percentile_threshold values (80,85,90,95) and min_hold_days
    (0,1) across train / validation / test splits
  - produce summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml
  code_constraints:
  - do not overwrite raw warehouse data
  - do not modify current strategy truth
  - use only project‑provided data files; if cb_daily.parquet is missing, abort with
    a clear error
validation_plan:
- python3 -m py_compile scripts/evaluate_cb_arb_iv_percentile_exit.py
- run a small‑data smoke test (e.g., 2019 only) to verify IV computation and exit
  logic
- verify that all required artifacts (summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml)
  are produced and contain valid content
