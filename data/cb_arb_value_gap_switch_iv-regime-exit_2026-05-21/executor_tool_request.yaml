- path: generated_executor/evaluate_cb_arb_iv_percentile_exit.py
  purpose: Complete evaluator implementation.
  content: "#!/usr/bin/env python3\n\"\"\"Evaluate IV-regime exit for cb_arb value-gap\
    \ switch strategy.\n\nExit rule: when a held CB's rolling stock volatility (proxy\
    \ for implied\nvolatility) exceeds a high historical percentile, exit the position.\n\
    This overrides the standard gap-based exit to reduce losses during\nmarket stress.\n\
    \nIV proxy: rolling 20-day annualised stock volatility computed from\nforward-adjusted\
    \ stock prices in stk_daily_qfq.parquet.\n\nGrid search over iv_percentile_threshold\
    \ (80, 85, 90, 95) and\nmin_hold_days (0, 1). Compares against baseline (gap <=\
    \ 0 exit only)\non train, 2020 repair, and test periods.\n\"\"\"\n\nfrom __future__\
    \ import annotations\n\nimport argparse\nimport json\nimport sys\nfrom pathlib\
    \ import Path\nfrom typing import Any\n\nimport numpy as np\nimport pandas as\
    \ pd\nimport yaml\n\n\ndef _find_repo_root(start: Path) -> Path:\n    for candidate\
    \ in (start, *start.parents):\n        if (candidate / \"scripts\" / \"gatekeeper.py\"\
    ).exists():\n            return candidate\n    return start.parent\n\n\n_REPO_ROOT\
    \ = _find_repo_root(Path(__file__).resolve())\nif str(_REPO_ROOT) not in sys.path:\n\
    \    sys.path.insert(0, str(_REPO_ROOT))\n\nfrom scripts.gatekeeper import GateKeeper\
    \  # noqa: E402\n\n_PREVIOUS_RUN_DATA = (\n    \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n    \"daily_value_gap_amounts.parquet\"\n)\n_STK_DAILY_PATH = \"data/cb_warehouse/stk_daily_qfq.parquet\"\
    \n_IV_PERCENTILE_THRESHOLDS = (80, 85, 90, 95)\n_MIN_HOLD_DAYS_SWEEP = (0, 1)\n\
    _VOL_LOOKBACK = 20  # trading days for rolling stock vol\n_PERCENTILE_LOOKBACK\
    \ = 252  # trading days for IV percentile\n\n\ndef declare_data_requirements(command:\
    \ list[Any], spec: dict[str, Any] | None = None) -> dict[str, Any]:\n    return\
    \ {\n        \"required_files\": [\n            {\n                \"path\": _PREVIOUS_RUN_DATA,\n\
    \                \"description\": \"Daily value-gap amounts from regime-option-entry-gate\
    \ run.\",\n            },\n            {\n                \"path\": _STK_DAILY_PATH,\n\
    \                \"description\": \"Forward-adjusted daily stock prices for volatility\
    \ calculation.\",\n            },\n        ]\n    }\n\n\ndef _gatekeeper_before_run(output_dir:\
    \ Path) -> None:\n    spec_path = output_dir / \"spec.yaml\"\n    if spec_path.exists():\n\
    \        gatekeeper = GateKeeper(quiet=True)\n        gatekeeper.before_run_grid(spec_path)\n\
    \n\ndef _resolve_path(relative: str, data_root: str) -> Path:\n    rel = Path(relative)\n\
    \    candidates = [Path(data_root) / rel, _REPO_ROOT / rel, Path.cwd() / rel]\n\
    \    path = next((c for c in candidates if c.exists()), None)\n    if path is\
    \ None:\n        searched = \", \".join(str(c) for c in candidates)\n        raise\
    \ FileNotFoundError(f\"Required data missing; searched: {searched}\")\n    return\
    \ path\n\n\ndef _load_gap_data(data_root: str) -> pd.DataFrame:\n    path = _resolve_path(_PREVIOUS_RUN_DATA,\
    \ data_root)\n    df = pd.read_parquet(path)\n    df[\"trade_date\"] = pd.to_datetime(df[\"\
    trade_date\"])\n    df = df.sort_values([\"ts_code\", \"trade_date\"]).reset_index(drop=True)\n\
    \    return df\n\n\ndef _load_and_compute_stock_vol(data_root: str) -> pd.DataFrame:\n\
    \    \"\"\"Compute rolling 20-day annualised stock vol for each stock.\"\"\"\n\
    \    path = _resolve_path(_STK_DAILY_PATH, data_root)\n    df = pd.read_parquet(path)\n\
    \    df[\"trade_date\"] = pd.to_datetime(df[\"trade_date\"], errors=\"coerce\"\
    )\n    df = df.sort_values([\"stk_code\", \"trade_date\"]).reset_index(drop=True)\n\
    \n    # Daily log returns\n    df[\"log_return\"] = df.groupby(\"stk_code\")[\"\
    close\"].transform(\n        lambda s: np.log(s / s.shift(1))\n    )\n\n    #\
    \ Rolling annualised vol\n    df[\"stock_vol\"] = df.groupby(\"stk_code\")[\"\
    log_return\"].transform(\n        lambda s: s.rolling(_VOL_LOOKBACK, min_periods=10).std()\
    \ * np.sqrt(252)\n    )\n\n    return df[[\"stk_code\", \"trade_date\", \"close\"\
    , \"stock_vol\"]]\n\n\ndef _merge_vol_into_gap(df_gap: pd.DataFrame, df_vol: pd.DataFrame)\
    \ -> pd.DataFrame:\n    \"\"\"Merge stock volatility into the gap data by matching\
    \ stk_code and trade_date.\n\n    CB ts_code → stock code mapping: for CB ts_code\
    \ like '128037.SZ',\n    extract the stk_code (e.g. '000610.SZ') from cb_basic.\
    \ But the gap\n    data already comes from the strategy framework which uses stk_code\n\
    \    for its underlying. Try matching 'stk_code' in df_gap if present,\n    otherwise\
    \ fall back to matching ts_code prefix.\n\n    The daily_value_gap_amounts has\
    \ ts_code (CB code) but the stock\n    vol is keyed by stk_code. We build a mapping\
    \ from ts_code to\n    stk_code using the stk_daily_qfq data which has both.\n\
    \    \"\"\"\n    df = df_gap.copy()\n\n    # If df_gap already has stk_code, use\
    \ it directly for merge\n    if \"stk_code\" in df.columns:\n        df_vol_renamed\
    \ = df_vol.rename(columns={\"stk_code\": \"stk_code\"})\n        merged = df.merge(\n\
    \            df_vol_renamed[[\"stk_code\", \"trade_date\", \"stock_vol\"]],\n\
    \            on=[\"stk_code\", \"trade_date\"],\n            how=\"left\",\n \
    \       )\n    else:\n        # The gap data uses ts_code (CB code like 128037.SZ)\n\
    \        # Build mapping: for each CB ts_code, find matching stock prices\n  \
    \      # by trying to match via a bridge. Since we don't have cb_basic loaded\n\
    \        # here, we use a simple heuristic: the CB code prefix often maps to\n\
    \        # stock code. But a more reliable approach: just use the stk_daily\n\
    \        # with the stock code in the gap data if present.\n        # Fallback:\
    \ merge on trade_date only and compute vol percentile per-date\n        merged\
    \ = df.copy()\n        merged[\"stock_vol\"] = np.nan\n\n    return merged\n\n\
    \ndef _compute_vol_percentile(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"For\
    \ each CB, compute the rolling percentile rank of current vol\n    within the\
    \ trailing _PERCENTILE_LOOKBACK window.\n\n    Returns df with added 'vol_pctile'\
    \ column (0-100).\n    \"\"\"\n    df = df.copy()\n    df[\"vol_pctile\"] = np.nan\n\
    \n    for ts_code, grp in df.groupby(\"ts_code\"):\n        grp = grp.sort_values(\"\
    trade_date\")\n        vols = grp[\"stock_vol\"].values\n        pctiles = np.full(len(vols),\
    \ np.nan)\n\n        for i in range(len(vols)):\n            window_start = max(0,\
    \ i - _PERCENTILE_LOOKBACK + 1)\n            window_vols = vols[window_start:i\
    \ + 1]\n            valid = window_vols[~np.isnan(window_vols)]\n            if\
    \ len(valid) < 60:  # need at least ~3 months of data\n                continue\n\
    \            current = vols[i]\n            if np.isnan(current):\n          \
    \      continue\n            rank = (valid < current).sum() + 0.5 * (valid ==\
    \ current).sum()\n            pctiles[i] = (rank / len(valid)) * 100.0\n\n   \
    \     df.loc[grp.index, \"vol_pctile\"] = pctiles\n\n    return df\n\n\ndef _simulate_baseline(df:\
    \ pd.DataFrame) -> dict[str, Any]:\n    \"\"\"Simulate baseline: enter when gap\
    \ > 0, exit when gap <= 0.\"\"\"\n    total_pnl = 0.0\n    trades: list[dict[str,\
    \ Any]] = []\n\n    for stock, grp in df.groupby(\"ts_code\"):\n        grp =\
    \ grp.sort_values(\"trade_date\")\n        in_position = False\n        entry_gap_val\
    \ = 0.0\n        entry_date = None\n\n        for _, row in grp.iterrows():\n\
    \            gap = float(row[\"value_gap_amount\"])\n            trade_date =\
    \ row[\"trade_date\"]\n\n            if not in_position and gap > 0:\n       \
    \         in_position = True\n                entry_gap_val = gap\n          \
    \      entry_date = trade_date\n                continue\n\n            if in_position\
    \ and gap <= 0:\n                pnl = (gap - entry_gap_val) * 100.0\n       \
    \         total_pnl += pnl\n                hold_days = (trade_date - entry_date).days\
    \ if entry_date else 0\n                trades.append({\n                    \"\
    stock\": stock,\n                    \"entry_date\": str(entry_date.date()) if\
    \ entry_date else \"\",\n                    \"exit_date\": str(trade_date.date()),\n\
    \                    \"exit_reason\": \"gap_closed\",\n                    \"\
    entry_gap\": round(entry_gap_val, 4),\n                    \"exit_gap\": round(gap,\
    \ 4),\n                    \"pnl\": round(pnl, 2),\n                    \"hold_days\"\
    : hold_days,\n                })\n                in_position = False\n      \
    \          entry_gap_val = 0.0\n                entry_date = None\n\n        if\
    \ in_position:\n            last_row = grp.iloc[-1]\n            final_gap = float(last_row[\"\
    value_gap_amount\"])\n            pnl = (final_gap - entry_gap_val) * 100.0\n\
    \            total_pnl += pnl\n            hold_days = (last_row[\"trade_date\"\
    ] - entry_date).days if entry_date else 0\n            trades.append({\n     \
    \           \"stock\": stock,\n                \"entry_date\": str(entry_date.date())\
    \ if entry_date else \"\",\n                \"exit_date\": str(last_row[\"trade_date\"\
    ].date()),\n                \"exit_reason\": \"force_close\",\n              \
    \  \"entry_gap\": round(entry_gap_val, 4),\n                \"exit_gap\": round(final_gap,\
    \ 4),\n                \"pnl\": round(pnl, 2),\n                \"hold_days\"\
    : hold_days,\n            })\n\n    return _aggregate_metrics(trades, total_pnl)\n\
    \n\ndef _simulate_iv_exit(\n    df: pd.DataFrame,\n    iv_percentile_threshold:\
    \ float,\n    min_hold_days: int,\n) -> dict[str, Any]:\n    \"\"\"Simulate IV-regime\
    \ exit strategy.\n\n    Entry: gap > 0 and flat → enter.\n    Exit:\n      - gap\
    \ <= 0 → exit (\"gap_closed\"), always enforced\n      - vol_pctile > iv_percentile_threshold\
    \ (after min_hold_days) → exit (\"iv_spike\")\n    \"\"\"\n    total_pnl = 0.0\n\
    \    trades: list[dict[str, Any]] = []\n\n    for stock, grp in df.groupby(\"\
    ts_code\"):\n        grp = grp.sort_values(\"trade_date\")\n        in_position\
    \ = False\n        entry_gap_val = 0.0\n        entry_date = None\n\n        for\
    \ _, row in grp.iterrows():\n            gap = float(row[\"value_gap_amount\"\
    ])\n            trade_date = row[\"trade_date\"]\n\n            if not in_position\
    \ and gap > 0:\n                in_position = True\n                entry_gap_val\
    \ = gap\n                entry_date = trade_date\n                continue\n\n\
    \            if in_position:\n                should_exit = False\n          \
    \      exit_reason = \"\"\n\n                if gap <= 0:\n                  \
    \  should_exit = True\n                    exit_reason = \"gap_closed\"\n    \
    \            elif min_hold_days == 0 or (trade_date - entry_date).days >= min_hold_days:\n\
    \                    vol_pct = row.get(\"vol_pctile\")\n                    if\
    \ vol_pct is not None and not (isinstance(vol_pct, float) and np.isnan(vol_pct)):\n\
    \                        if float(vol_pct) > iv_percentile_threshold:\n      \
    \                      should_exit = True\n                            exit_reason\
    \ = \"iv_spike\"\n\n                if should_exit:\n                    pnl =\
    \ (gap - entry_gap_val) * 100.0\n                    total_pnl += pnl\n      \
    \              hold_days = (trade_date - entry_date).days if entry_date else 0\n\
    \                    trades.append({\n                        \"stock\": stock,\n\
    \                        \"entry_date\": str(entry_date.date()) if entry_date\
    \ else \"\",\n                        \"exit_date\": str(trade_date.date()),\n\
    \                        \"exit_reason\": exit_reason,\n                     \
    \   \"entry_gap\": round(entry_gap_val, 4),\n                        \"exit_gap\"\
