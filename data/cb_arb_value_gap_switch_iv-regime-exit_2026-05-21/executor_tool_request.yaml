tool_request_id: cb_arb_iv_percentile_exit_executor_v1
why_existing_tools_insufficient: Option_position_sizing and option_source_pnl_feedback_scaler
  cannot test new_exit_rule (C007). Dynamic_exit_gap_decay_executor, profit_take_exit_executor,
  exit_rule_duration_adaptive_executor, and pnl_adaptive_exit_executor can test new_exit_rule
  but their implementations are strictly gap-based; none compute implied volatility
  or historical percentile ranks. The proposal requires a new data source (CB implied
  volatility) and a new calculation (IV percentile) that none of the existing executors
  support. A fresh executor is needed to calculate daily IV from CB prices (or an
  approximation), build rolling 252-day distributions, and trigger exits when IV exceeds
  a configurable threshold.
