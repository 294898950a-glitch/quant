proposal_id: cb_arb_value_gap_switch_iv-regime-exit_2026-05-21
strategy_id: cb_arb_value_gap_switch
family: exit_rule
hypothesis: Exiting positions when CB implied volatility exceeds a high historical
  percentile reduces losses during market stress and improves overall risk-adjusted
  returns.
source_insight: Baseline exits fail in volatile markets like 2020, where win rate
  is only 29.3%; implied volatility spikes may signal dislocation not genuine arbitrage
  closure.
expected_improvement: Improved Sharpe and lower max drawdown, especially in 2020 stress
  period, with more robust exit timing.
capability_ids: []
missing_capability_request: 'A new executor that: 1) calculates daily implied volatility
  for each held CB (from option model or market data), 2) computes a rolling 1-year
  (252d) percentile rank of current IV relative to its own history, 3) exits the position
  if current IV > 90th percentile, overriding the existing gap-based exit. Needs data
  on option prices or approximation.'
required_executor: null
required_data:
- data/cb_warehouse/cb_basic.parquet
- data/cb_warehouse/stk_daily_qfq.parquet
- CB daily prices and underlying option implied vol (or Black-Scholes approximation
  using stock vol)
test_design:
  description: Train on 2019-2024, validated on 2020 repair period, test on 2025 onwards;
    grid-search IV percentiles (80,85,90,95) and min hold days (0,1); compare to baseline
    gap-based exit.
success_criteria:
  criteria:
  - Test period Sharpe > baseline Sharpe
  - 2020 max drawdown reduced vs baseline
  - 2020 overall return improved (less negative)
falsifiers:
  train: &id001
  - No tested IV threshold significantly improves 2020 excess return or reduces drawdown
  - Test period excess return lower than baseline
  validate: *id001
  test: *id001
risk: May exit prematurely in temporary vol spikes, missing subsequent gap closure;
  could underperform in low-vol environments.
why_not_repeated_failure: Previous exit rule attempts (profit-taking, dynamic trail,
  duration-adaptive, PnL-adaptive) focused on entry gap contraction dynamics; none
  used market-wide implied volatility as a regime filter independent of gap size.
  This introduces a new conditioning variable, not a rephrasing of gap-based exit
  thresholds.
related_prior_runs:
- cb_arb_value_gap_switch_profit-taking-exit_2026-05-19
- cb_arb_value_gap_switch_exit_dynamic_trail_20260519
- cb_arb_value_gap_switch_dynamic_exit_2026-05-19
- cb_arb_value_gap_switch_adaptive_sell_gap_2026-05-19
implementation_assumption: Daily CB implied volatility can be estimated from the CB
  price using a convertible bond valuation model (e.g., Tsiveriotis-Fernandes) or
  proxied by the underlying stock’s at-the-money implied volatility.
