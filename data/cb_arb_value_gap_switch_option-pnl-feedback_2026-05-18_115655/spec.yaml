- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: pnl_feedback_ultra_long_lookback_high_volume
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: '不禁买（executor 含义明确：不设 entry gate，非 global_option_entry_gate
    家族）； 不改理论价格（非 global_option_value_haircut）；不依赖市场状态分类（非 regime_conditioned_option_entry_gate）；不重跑
    panic 家族。 pure pnl_feedback 路线已被 confirmed_invalid_directions 记录为 "rolling_option_source_pnl_feedback"，但
    forbidden_families 中未列出该 family， 且本轮参数组合（240d / 8–12 笔 / scale 0.60–0.70）在现有所有失败记录中均未出现，
    构成真实意义上的新参数区域探索。

    '
  risk: 【主要风险】测试期（2025-2026，约 17 个月）内期权来源成交笔数可能不足 8 笔 × 240 天窗口要求， 导致该变体在测试期同样静默、与
    baseline 完全等价，无法区分优劣； 若此方向静默确认，意味着 option_source_pnl_feedback 家族的参数空间已全面耗尽， 需上升至架构层决策（切换机制或关闭该修复线）。
    【次要风险】l4_ack q4 反复提示"categorical_feedback_variants；无单调推导"， 即使某变体在测试期领先也不满足 adoption
    条件，除非同时通过 train/2020/test 三段检验。 本轮不预期通过全部三段，主要价值是确认参数边界并为关闭该修复方向提供最终证据。
  fallback_reason: null
