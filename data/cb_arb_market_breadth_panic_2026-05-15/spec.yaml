strategy_id: cb_arb
l0_entry_id: 2
l0_source: 'experience_ledger open-thread "exogenous panic signal" (高优, 子方向 B: market
  breadth)'
hypothesis: 用转债池当日跌停 / 大跌转债比例作 exogenous panic signal, 触发风险态后短 recovery + 紧 hurdle,
  避免 regime switch 那种'自身 PnL 滞后 30 日'的固有缺陷, 让 medium signal 在 2020/2022/2023/2024
  同时过主底线.
source_insight: '`reports/cb_arb_regime_switch_retro_2026-05-15.md` 证明: 自身 PnL rolling
  累计 excess 作 regime classifier 必然滞后真实 panic ≥ 30 日 (2020-02-03 panic 起点 → 2020-04-03
  第一次 risk 触发). 这是 lookback-based 方法的 fundamental 缺陷, 任何 lookback (10/20/60) 都无法解决.


  Codex 在 L5 推荐: "Do not run another same-family grid unless the spec changes signal
  family, e.g. immediate exogenous panic/vol-surge/market-breadth signal".


  **为什么用 market breadth (cross-sectional, 不用 vol surge)**:

  1. 数据已有: 转债池每日涨跌幅是 cb_arb 现有 baseline 必备数据

  2. 实施快: 不需要 IV 计算 (CB 混合证券 IV 计算复杂)

  3. 即时反应: 当日截面统计, 不靠 lookback, 没有滞后

  4. 易解释: "今天 N% 转债跌幅 < X% → panic 态" 直接可视化


  跟 vol surge / credit spread 比, market breadth 是最近 cb_arb 本身的 cross-sectional signal.'
