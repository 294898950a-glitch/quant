proposal_id: cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
strategy_id: cb_arb_value_gap_switch
family: exit_rule_duration_adaptive
hypothesis: 'A time-decaying gap exit threshold — that starts lenient after a minimum
  hold period and linearly tightens to zero over a maximum hold window — will outperform
  both the baseline (no time constraint) and the simple duration-exit (fixed time
  limit) by distinguishing between positions where the gap is actively closing (deserves
  more time) and positions where the gap is stagnant (should exit sooner).

  '
source_insight: 'The duration-exit run (cb_arb_value_gap_switch_duration-exit_2026-05-22)
  achieved adoption_pass=True, proving that time-constrained exits add value over
  the baseline''s indefinite hold. However, a fixed time limit is crude: it treats
  a position where the gap narrowed from 5% to 1% in 3 days the same as one where
  the gap stayed at 5% for 3 days. The time-decaying threshold approach from exit_rule_duration_adaptive_executor
  introduces gap-awareness into the time constraint — the exit bar lowers as time
  passes, so positions must show progressively more gap closure to justify staying
  in the portfolio.

  '
expected_improvement: 'Higher win rate and lower drawdown vs. simple duration-exit,
  especially in periods where gap-closing speed varies widely across positions (e.g.,
  2020 stress). Expected to improve capital efficiency by releasing stagnant positions
  sooner while preserving upside from positions where the gap is genuinely closing.

  '
