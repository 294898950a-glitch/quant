test_design:
  description: 'Grid search over two parameters: initial_threshold_fraction (the gap
    ratio that triggers exit on the first day after min_hold_days, e.g., [0.5, 0.6,
    0.7, 0.8, 0.9, 1.0]) and max_hold_days (the window over which the threshold linearly
    decays to zero, e.g., [5, 10, 15, 20, 30, 45, 60]). For each combination, the
    exit rule: after min_hold_days (fixed at 1), compute ratio = current_gap / entry_gap,
    compute threshold = initial_threshold_fraction * (1 - (days_since_min_hold / max_hold_days)),
    clamped to [0, initial_threshold_fraction], and exit if ratio >= threshold. Evaluate
    on train (2019-2024) with 2020 repair check, select best by train score, validate
    on sealed test (2025-2026). Compare against baseline and simple duration-exit.

    '
success_criteria:
  criteria:
  - best_candidate_train_score_gt_baseline_train_score
  - best_candidate_2020_score_gt_baseline_2020_score
  - best_candidate_test_score_gt_baseline_test_score
  - best_candidate_test_excess_return_gt_0
falsifiers:
  train: &id001
  - No parameter combination beats baseline simultaneously on train, 2020, and test
  - Best candidate test excess return <= 0
  - Parameter grid collapses to effective fixed-duration behavior (initial_threshold_fraction
    near 1.0), meaning the adaptive component adds no value
  validate: *id001
  test: *id001
risk: 'Medium. Two-parameter grid search on exit rules has moderate overfitting risk,
  mitigated by the 2020 repair check and sealed test period. The executor is untested
  on this strategy; there may be integration issues similar to the dynamic_exit bugs.

  '
why_not_repeated_failure: 'This is not a rehash of prior failed exit experiments.
  The dynamic_exit and exit_dynamic_trail runs failed due to data bugs (total returns
  in millions), not conceptual invalidity — those bugs need fixing, not the idea.
  The profit-taking-exit run used a fixed gap-contraction fraction, not a time-decaying
  threshold. The simple duration-exit just passed, and this proposal extends it with
  gap-awareness rather than replacing the mechanism. No prior run has tested the time-decaying
  threshold approach on this strategy.

  '
related_prior_runs:
