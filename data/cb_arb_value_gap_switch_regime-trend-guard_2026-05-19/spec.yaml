hypothesis: 将当前 score_4state 市场状态分类器替换为 trend_guard，后者使用趋势动量+ 回撤+广度信号而非打分制来判断强/弱/中性市场。不同的市场分类会导致不同时段使用不同
  recovery/hurdle/持仓参数组合，可能改善2020年错配和2024年过度保守的问题。这不是在现有 策略上加过滤或门槛，而是改变策略内部的市场状态感知逻辑。
source_insight: 'research_insights id=all_autonomous_directions_exhausted: 9个家族全部拒绝，
  但 regime classifier 变体未被测试过。research_insights id=option_source_value_gap_structural_tradeoff:
  2020年弱市和2025年强市的结构性矛盾可能源自 score_4state 在不同市场状态下的参数切换逻辑。 trend_guard 的重心在趋势确认（ret_20d/ret_60d斜率+drawdown），可能对2020年急跌和2024年假恐慌
  有不同反应。research_insights id=panic_detector_dead_end: trend_guard 不是恐慌检测器， 不涉及同日截面指标，而是使用先行趋势信息。这是一个全新的测试方向。'
