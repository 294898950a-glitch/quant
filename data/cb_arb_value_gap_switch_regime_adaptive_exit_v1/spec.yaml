  test_design:
    description: 'Baseline: duration-adaptive exit with accepted params (min_hold_days=5,
      initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45).
      Regime classifier: CSI 300 rolling 60-day realized volatility (log returns),
      split into tercile bins (calm / normal / stressed). For each regime, grid-search
      independent (initial_threshold_fraction, decay_period_factor) within the original
      parameter ranges. Exit logic reuses the existing formula — after min_hold_days,
      compare current_gap / entry_gap against a threshold that decays from initial_threshold_fraction
      to 0 over max_hold_days — but applies the regime-specific parameters locked
      at entry time. Entry and candidate selection unchanged from baseline. Train
      2018-2022, test 2023-2026. Cost-on with slippage 0.0015 and market impact 0.001.
      Compare best regime-adaptive params against baseline on cumulative excess, drawdown,
      and Sharpe.

      '
