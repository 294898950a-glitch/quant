  review_status_code: 1
  result_summary: Regime-adaptive exit with 252-day lookback and asymmetric decay
    (high_vol=0.3, low_vol=0.9) passes adoption with positive excess return across
    train, test, and holdout-2020 periods versus a negative-PnL baseline.
  main_reason: All 81 grid candidates produce positive excess in every evaluation
    period while the baseline duration-adaptive exit loses money in all three periods;
    the best candidate (regime_lookback=252, high_vol_decay_factor=0.3, low_vol_decay_factor=0.9)
    is selected and l6_exit_decision is adopt.
  failure_causes: []
  next_research_directions:
  - direction: regime-conditioned entry logic
    why: Regime conditioning succeeded on the exit side without shrinking the candidate
      pool; extending it to entry (e.g. regime-dependent value-gap threshold) could
      further improve timing without the culling problem that killed entry-filter
      variants
    priority_code: 2
    priority: medium
  - direction: cross-asset regime validation
    why: The regime classifier uses CSI 300 realized volatility terciles; testing
      whether the same regime splits hold for other convertible-bond universes or
      indexes would strengthen generalizability
    priority_code: 3
    priority: low
  - direction: decay-schedule sensitivity analysis
    why: The best high-vol decay factor is 0.3 (aggressive) and low-vol is 0.9 (patient);
      understanding how sensitive cumulative excess is to small perturbations around
      these values would inform robustness before promotion
    priority_code: 3
    priority: low
