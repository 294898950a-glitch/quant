test_design:
  description: 'Baseline: duration-adaptive exit with accepted params (min_hold_days=5,
    initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45).
    Regime classifier: CSI 300 rolling 60-day realized volatility (log returns), split
    into tercile bins (calm / normal / stressed). For each regime, grid-search independent
    (initial_threshold_fraction, decay_period_factor) within the original parameter
    ranges. Exit logic reuses the existing formula — after min_hold_days, compare
    current_gap / entry_gap against a threshold that decays from initial_threshold_fraction
    to 0 over max_hold_days — but applies the regime-specific parameters locked at
    entry time. Entry and candidate selection unchanged from baseline. Train 2018-2022,
    test 2023-2026. Cost-on with slippage 0.0015 and market impact 0.001. Compare
    best regime-adaptive params against baseline on cumulative excess, drawdown, and
    Sharpe.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound test period > baseline test period cumulative excess
  - any_single_year_drawdown_vs_benchmark <= 0.15
  - any_holdout_year_sharpe >= 0.5
falsifiers:
  train: &id001
  - cumulative_excess_compound test period <= baseline
  - regime-adaptive exits increase turnover vs baseline by >20pct
  - all_holdout_years_sharpe < 0.5
  validate: *id001
  test: *id001
risk: 'Regime classification adds complexity and a lookback parameter that may overfit.
  If regimes are too coarsely defined or the 60-day window is misspecified, the adaptation
  may add noise rather than signal. The forward direction remains deeply unprofitable
  in absolute terms; this exit-only improvement cannot make it deployable if the entry
  signal itself is broken — it can only reduce losses.

  '
why_not_repeated_failure: 'This is NOT a variant of the five-times-failed moneyness_entry_filter
  or the failed bond_floor_entry_filter. Those were binary entry filters that excluded
  candidates from the pool, culling an already-weak forward signal. This proposal
  modifies only exit timing — all candidates that pass the existing value_gap > 0
  filter remain eligible for entry. The five moneyness rejections belong to family
  moneyness_stock_to_conv_threshold; this proposal belongs to a different mechanic
  family (dynamic_regime_switch / regime_adaptive_exit) that has not been tested.

  '
