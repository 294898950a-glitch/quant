proposal_id: cb_arb_value_gap_switch_regime_adaptive_exit_v1
strategy_id: cb_arb_value_gap_switch
family: regime_adaptive_exit
hypothesis: 'The duration-adaptive exit accepted on 2026-05-22 uses a single fixed
  decay schedule (initial_threshold_fraction=0.7, decay_period_factor=0.5) regardless
  of market conditions. In high-volatility regimes, option-pricing gaps close faster
  and a single decay schedule may exit too early (leaving money on the table) or too
  late (allowing gaps to re-widen). Conditioning the decay parameters on a daily market
  regime classifier — CSI 300 rolling 60-day realized volatility split into terciles
  (calm / normal / stressed) — tailors exit patience to the prevailing environment:
  longer patience in calm regimes where gaps close slowly, shorter patience in stressed
  regimes where gaps close rapidly but risk re-widening. This should improve cumulative
  excess by reducing mistimed exits without changing entry logic, candidate pool,
  or position sizing.

  '
source_insight: 'The duration-adaptive exit was the only forward-direction modification
  that survived review. Its fixed decay schedule is its weakest link — real market
  environments vary, and a single exit-timing rule cannot be simultaneously optimal
  in calm and turbulent conditions. Five entry-filter variants (moneyness x5, bond
  floor x1) all failed mechanical thresholds because they culled the already-thin
  forward candidate pool; regime conditioning avoids this by operating purely on exit
  timing and leaving the candidate pool intact.

  '
expected_improvement: 'Improve cumulative excess over the accepted duration-adaptive
  baseline by at least 2 percentage points in the test period (2023-2026), primarily
  by reducing drawdowns in stress years where the fixed schedule exits positions during
  temporary panic rather than holding through gap closure.

  '
