  purpose: Complete evaluator implementation.
  content: "\"\"\"Evaluate market drawdown entry gate for cb_arb value-gap switch.\n\
    \nComputes CSI 300 rolling N-day return, builds a boolean entry gate mask\n(drawdown\
    \ = rolling_return < -threshold, optionally extended by buffer_days),\nfilters\
    \ the daily value gap ranks to suppress entries during drawdowns,\nand runs the\
    \ existing backtester without modifying scoring, sizing, or exit logic.\n\nCalled\
    \ once per variant (N, threshold, buffer_days). Each call runs baseline\n(no gate)\
    \ and the gated variant across train, stress_2020, and validate periods,\nthen\
    \ writes summary.json, report.yaml, l4_ack.yaml, and diagnostic.yaml.\n\"\"\"\n\
    \nfrom __future__ import annotations\n\nimport argparse\nimport json\nimport sys\n\
    from datetime import datetime\nfrom pathlib import Path\nfrom typing import Any\n\
    \n# ── Path resolution (must be before any third-party or project import) ──\n\
    \n\ndef _find_repo_root(start: Path) -> Path:\n    for candidate in (start, *start.parents):\n\
    \        if (candidate / \"scripts\" / \"gatekeeper.py\").exists():\n        \
    \    return candidate\n    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \n# GateKeeper import: lightweight, required by compliance probe at import time.\n\
    from scripts.gatekeeper import GateKeeper  # noqa: E402\n\n# ── Heavy imports\
    \ (pandas, yaml, backtester) are DEFERRED to main() ──\n# so the compliance import-reachability\
    \ probe completes in < 1 second\n# instead of timing out after 20 seconds during\
    \ the cascade import of\n# evaluate_cb_arb_value_gap_switch -> verifier -> analyzer\
    \ -> regime switch.\n\n\n# ── gatekeeper ────────────────────────────────────────────────────────\n\
    \n\ndef _gatekeeper_before_run(output_dir: Path) -> None:\n    spec_path = output_dir\
    \ / \"spec.yaml\"\n    if spec_path.exists():\n        gatekeeper = GateKeeper(quiet=True)\n\
    \        gatekeeper.before_run_grid(spec_path)\n\n\n# ── fixed backtest params\
    \ (do not vary across gate variants) ──────────\n\nBASE_PARAMS: dict[str, Any]\
    \ = {\n    \"min_gap_pct\": 0.0,\n    \"sell_gap_pct\": 0.0,\n    \"switch_hurdle_pct\"\
    : 0.03,\n    \"max_hold_days\": 180.0,\n    \"stop_gap_ratio_floor\": 0.30,\n\
    \    \"stop_signal_threshold\": 999.0,\n}\n\nFIXED_SOURCE = 2\nRULE = \"score_4state\"\
    \n\n# ── period definitions ─────────────────────────────────────────────────\n\
    \nPERIODS: list[dict[str, str]] = [\n    {\"label\": \"train\", \"start\": \"\
    20190101\", \"end\": \"20241231\"},\n    {\"label\": \"stress_2020\", \"start\"\
    : \"20200101\", \"end\": \"20201231\"},\n    {\"label\": \"validate\", \"start\"\
    : \"20250101\", \"end\": \"20260508\"},\n]\n\n# ── data requirement declaration\
    \ ───────────────────────────────────────\n\n\ndef declare_data_requirements(\n\
    \    command: list[str], spec: dict[str, Any]\n) -> dict[str, Any]:\n    return\
    \ {\n        \"schema_version\": 1,\n        \"executor\": \"generated_executor/evaluate_cb_arb_market_drawdown_entry_gate.py\"\
    ,\n        \"required_files\": [\n            {\n                \"path\": \"\
    data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet\"\
    ,\n                \"description\": (\n                    \"Daily value-gap ranks\
    \ with theoretical value, bond floor, \"\n                    \"option value,\
    \ position cash, and tradable gap amount.\"\n                ),\n            },\n\
    \            {\n                \"path\": \"data/cb_warehouse/csi300_daily.parquet\"\
    ,\n                \"description\": \"CSI 300 daily close prices for rolling return\
    \ calculation.\",\n            },\n        ],\n    }\n\n\n# ── helpers ────────────────────────────────────────────────────────────\n\
    \n\ndef _load_gap_ranks(rank_path: str) -> \"pd.DataFrame\":\n    import pandas\
    \ as pd  # lazy - called from main() after heavy imports are resolved\n\n    ranks\
    \ = pd.read_parquet(rank_path)\n    ranks[\"trade_date\"] = ranks[\"trade_date\"\
    ].astype(str)\n    return ranks\n\n\ndef _build_drawdown_mask(\n    csi300_path:\
    \ str,\n    N: int,\n    threshold: float,\n    buffer_days: int,\n    start_date:\
    \ str,\n    end_date: str,\n) -> dict[str, bool]:\n    \"\"\"Return a dict {trade_date:\
    \ is_drawdown} for the given window.\n\n    is_drawdown = True when the CSI 300\
    \ rolling N-day return falls\n    below -threshold (i.e. the market has dropped\
    \ more than threshold%).\n    When buffer_days > 0, the mask stays True for buffer_days\
    \ after the\n    last drawdown signal.\n    \"\"\"\n    import pandas as pd  #\
    \ lazy\n\n    csi = pd.read_parquet(csi300_path)\n    csi[\"trade_date\"] = csi[\"\
    trade_date\"].astype(str)\n    csi = csi.sort_values(\"trade_date\").reset_index(drop=True)\n\
    \n    # rolling N-day return: (close[t] - close[t-N]) / close[t-N]\n    csi[\"\
    rolling_return\"] = csi[\"close\"].pct_change(periods=N)\n\n    # drawdown when\
    \ rolling return is below -threshold\n    csi[\"drawdown\"] = csi[\"rolling_return\"\
    ] < -threshold\n\n    if buffer_days > 0:\n        # extend the mask forward by\
    \ buffer_days\n        csi[\"drawdown\"] = (\n            csi[\"drawdown\"]\n\
    \            .rolling(window=buffer_days + 1, min_periods=1)\n            .max()\n\
    \            > 0\n        )\n\n    mask = dict(zip(csi[\"trade_date\"], csi[\"\
    drawdown\"]))\n    return {d: mask.get(d, False) for d in csi[\"trade_date\"]}\n\
    \n\ndef _apply_gate(\n    ranks: \"pd.DataFrame\", drawdown_mask: dict[str, bool]\n\
    ) -> \"pd.DataFrame\":\n    \"\"\"Return ranks with drawdown-date rows suppressed.\"\
    \"\"\n    import pandas as pd  # lazy\n\n    ranks = ranks.copy()\n    ranks[\"\
    _drawdown\"] = ranks[\"trade_date\"].map(drawdown_mask).fillna(False)\n    filtered\
    \ = ranks[~ranks[\"_drawdown\"]].drop(columns=[\"_drawdown\"])\n    return filtered\n\
    \n\ndef _run_period(\n    ranks: \"pd.DataFrame\",\n    period: dict[str, str],\n\
    \    data_root: Path,\n    params: dict[str, Any],\n) -> dict[str, Any]:\n   \
    \ \"\"\"Run backtest on a single period slice of ranks.\"\"\"\n    period_ranks\
    \ = ranks[\n        (ranks[\"trade_date\"] >= period[\"start\"])\n        & (ranks[\"\
    trade_date\"] <= period[\"end\"])\n    ]\n    if period_ranks.empty:\n       \
    \ return {\n            \"metrics\": {\n                \"total_return\": 0.0,\n\
    \                \"excess_return\": 0.0,\n                \"max_drawdown\": 0.0,\n\
    \                \"win_rate\": 0.0,\n                \"sharpe_ratio\": 0.0,\n\
    \                \"total_trades\": 0,\n            },\n            \"trades\"\
    : [],\n        }\n    # _run_value_gap_backtest is resolved by main() via globals\n\
    \    result = _run_value_gap_backtest(\n        period_ranks,\n        period[\"\
    start\"],\n        period[\"end\"],\n        data_root,\n        FIXED_SOURCE,\n\
    \        RULE,\n        params,\n    )\n    return result\n\n\n# ── artifact writers\
    \ ───────────────────────────────────────────────────\n\n\ndef _write_summary(\n\
    \    output_dir: Path,\n    variant_name: str,\n    N: int,\n    threshold: float,\n\
    \    buffer_days: int,\n    baseline_results: dict[str, dict[str, Any]],\n   \
    \ gated_results: dict[str, dict[str, Any]],\n) -> dict[str, Any]:\n    rows: list[dict[str,\
    \ Any]] = []\n    for period in PERIODS:\n        label = period[\"label\"]\n\
    \        bl = baseline_results[label]\n        gt = gated_results[label]\n\n \
    \       bl_m = bl[\"metrics\"]\n        gt_m = gt[\"metrics\"]\n\n        rows.append(\n\
    \            {\n                \"variant\": \"baseline\",\n                \"\
    period\": label,\n                \"start\": period[\"start\"],\n            \
    \    \"end\": period[\"end\"],\n                \"total_return\": float(bl_m.get(\"\
    total_return\", 0.0) or 0.0),\n                \"excess_return\": float(bl_m.get(\"\
    excess_return\", 0.0) or 0.0),\n                \"max_drawdown\": float(bl_m.get(\"\
    max_drawdown\", 0.0) or 0.0),\n                \"win_rate\": float(bl_m.get(\"\
    win_rate\", 0.0) or 0.0),\n                \"sharpe_ratio\": float(bl_m.get(\"\
    sharpe_ratio\", 0.0) or 0.0),\n                \"total_trades\": int(bl_m.get(\"\
    total_trades\", 0) or 0),\n                \"score\": _score(bl_m),\n        \
    \    }\n        )\n        rows.append(\n            {\n                \"variant\"\
    : variant_name,\n                \"period\": label,\n                \"start\"\
    : period[\"start\"],\n                \"end\": period[\"end\"],\n            \
    \    \"total_return\": float(gt_m.get(\"total_return\", 0.0) or 0.0),\n      \
    \          \"excess_return\": float(gt_m.get(\"excess_return\", 0.0) or 0.0),\n\
    \                \"max_drawdown\": float(gt_m.get(\"max_drawdown\", 0.0) or 0.0),\n\
    \                \"win_rate\": float(gt_m.get(\"win_rate\", 0.0) or 0.0),\n  \
    \              \"sharpe_ratio\": float(gt_m.get(\"sharpe_ratio\", 0.0) or 0.0),\n\
    \                \"total_trades\": int(gt_m.get(\"total_trades\", 0) or 0),\n\
    \                \"score\": _score(gt_m),\n            }\n        )\n\n    # Compute\
    \ adoption_pass: all three period criteria\n    gt_train_score = _score(gated_results[\"\
    train\"][\"metrics\"])\n    gt_stress_score = _score(gated_results[\"stress_2020\"\
    ][\"metrics\"])\n    gt_validate_score = _score(gated_results[\"validate\"][\"\
    metrics\"])\n\n    adoption_pass = (\n        gt_stress_score > -0.10\n      \
    \  and gt_train_score > 0.10\n        and gt_validate_score >= 0.28\n    )\n\n\
    \    summary = {\n        \"variant\": variant_name,\n        \"N\": N,\n    \
    \    \"threshold\": threshold,\n        \"buffer_days\": buffer_days,\n      \
    \  \"adoption_pass\": adoption_pass,\n        \"baseline_params\": BASE_PARAMS,\n\
    \        \"rows\": rows,\n        \"generated_at\": datetime.now().isoformat(),\n\
    \    }\n\n    (output_dir / \"summary.json\").write_text(\n        json.dumps(summary,\
    \ ensure_ascii=False, indent=2) + \"\\n\",\n        encoding=\"utf-8\",\n    )\n\
    \    return summary\n\n\ndef _write_report(\n    output_dir: Path,\n    variant_name:\
