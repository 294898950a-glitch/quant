implementation_outline:
  script_path: scripts/evaluate_cb_arb_market_drawdown_entry_gate.py
  main_inputs:
  - data_root
  - output_dir
  - N
  - threshold
  - buffer_days
  core_steps:
  - load base daily value gap ranks and CSI 300 daily close from warehouse
  - compute rolling N-day return series from CSI 300 closes
  - build entry gate mask: True if the most recent rolling return is below threshold;
      optionally extend the mask forward by buffer_days
  - align mask with base ranks by date and suppress entries on masked days
  - run the existing backtester on the filtered entry schedule without changing scoring,
    sizing, or exit logic
  - compute performance statistics for train, stress_2020, and validate periods
  - produce summary.json, report.yaml, l4_ack.yaml, and diagnostic.yaml
  code_constraints:
  - use only existing project data files; never overwrite raw warehouse data
  - do not modify current strategy truth or alter core backtester components
  - define main() and declare all data requirements as required by the artifact contract
