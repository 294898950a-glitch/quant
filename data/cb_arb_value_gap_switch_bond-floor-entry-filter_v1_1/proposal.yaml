proposal_id: cb_arb_value_gap_switch_bond-floor-entry-filter_v1_1
strategy_id: cb_arb_value_gap_switch
family: bond_floor_entry_filter
hypothesis: 'Constraining value-gap entries to CBs trading near their bond floor reduces
  drawdowns and noise trades without destroying the alpha signal. When the CB price
  trades far above the bond floor, the value-gap signal is more likely to reflect
  speculative premium or model noise rather than genuine mispricing. Filtering to
  near-floor entries focuses the strategy on the high-conviction subset where the
  bond floor provides a hard valuation anchor and intrinsic downside protection, improving
  risk-adjusted returns.

  '
source_insight: 'Cost-on cumulative excess compound is -10.47% with max drawdown -35.16%.
  The accepted duration-adaptive exit (2026-05-22) improved exit timing but did not
  address entry quality. Moneyness entry filtering (5 rejected variants, C003) failed
  because stock-to-conversion-price filtering removed alpha-rich candidates; bond
  floor filtering is orthogonal — it anchors to the CB''s credit floor rather than
  equity distance. A CB trading at 105 when its bond floor is 100 has 5% downside
  cushion from the floor; a CB trading at 130 when its floor is 100 carries 30% speculative
  premium that can distort the value-gap calculation.

  '
expected_improvement: 'Reduced max drawdown (targeting <30% cost-on vs current 35.16%),
  improved risk-adjusted returns (higher Sharpe), fewer negative-excess years, without
  destroying the positive-alpha signal in the core value-gap ranking.

  '
