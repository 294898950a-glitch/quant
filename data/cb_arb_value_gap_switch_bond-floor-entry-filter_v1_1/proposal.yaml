test_design:
  description: 'Grid search over bond_floor_proximity_threshold (1.00, 1.02, 1.05,
    1.08, 1.10, 1.15, 1.20, no_filter) — the maximum ratio of CB close to bond floor
    that still permits entry. Bond floor estimated as discounted cash flows of remaining
    coupon payments plus par at maturity, discounted at a configurable credit spread
    over risk-free rate proxy. Entry filter applied before ranking: only candidates
    with CB_close / bond_floor <= threshold are eligible. All other parameters (ranking,
    sizing, duration-adaptive exit with accepted best params: min_hold_days=5, initial_threshold_fraction=0.7,
    decay_period_factor=0.5) held constant. Run with baseline cost model. Compare
    against the accepted duration-adaptive exit baseline.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound_cross_year_gt_0
  - any_single_year_drawdown_vs_benchmark_lte_15pct
  - any_holdout_year_sharpe_gte_0_5
falsifiers:
  train: &id001
  - 'cumulative_excess_compound worsens (more negative) vs no-filter baseline, suggesting
    the filter removes alpha-rich trades rather than noise

    '
  - 'trade count drops below 20% of baseline, making the strategy economically unviable
    regardless of per-trade quality

    '
  - 'no single holdout year meets the Sharpe threshold, indicating the benefit does
    not generalize out-of-sample

    '
  validate: *id001
  test: *id001
risk: 'Low-medium. Bond floor estimation requires assumptions about credit spread
  (risk-free + issuer spread). If the spread assumption is too crude, the filter may
  misclassify CBs. However, this is a relative filter (near-floor vs far-from-floor),
  not an absolute valuation, so it should be robust to moderate spread errors. The
  deeper risk is that the value-gap signal works precisely because speculative premium
  is being mispriced, and filtering to near-floor CBs removes the alpha source itself.

  '
why_not_repeated_failure: 'The moneyness entry filter family (C003, tag moneyness_stock_to_conv_threshold,
  5 rejects) filtered by stock price relative to conversion price — an equity-side
  constraint. Bond floor filtering (C002) is fundamentally different: it filters by
  the CB''s own debt floor, a credit-side anchor. The moneyness filter removed deep-OTM
  CBs where the option value is dominated by time premium; the bond floor filter removes
  CBs trading at large premiums to their debt floor where speculative sentiment may
  dominate the CB price. Different mechanism, different data inputs, different expected
  failure mode. Not in closed_tags and not in suggested_closed_families.

  '
related_prior_runs:
- cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
- cb_arb_value_gap_switch_moneyness_entry_filter_v1_5
implementation_assumption: The executor computes bond floor per CB per day as the
  discounted present value of remaining coupon payments and par value at maturity.
  Discount rate is risk-free proxy plus configurable credit spread. For CBs with complex
  step-up coupon structures (interest_rate_explain), the executor uses the base coupon_rate
  as a reasonable approximation for the DCF floor estimate. The filter threshold (CB_close
  / bond_floor) is the primary grid-search parameter. cb_call data handles called/delisted
  bonds to avoid stale floor calculations post-delist.
