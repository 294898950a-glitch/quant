proposal_id: cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_7
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on) is the only
  proven alpha direction.  Entry filters (moneyness, bond floor) culled the reverse
  candidate pool and killed the signal because they removed too many entries.  Position
  scaling via inverse ATR is a noise-reduction overlay that does NOT remove candidates
  — it only adjusts allocation weights.  All entries passing the >0 value_gap_amount
  filter remain eligible. Inverse-ATR weighting applied to the ASCENDING-sort base
  should reduce drawdowns while preserving at least 80% of the +30.3% test excess.

  Repeated-reject-family check (moneyness_stock_to_conv_threshold): the three failed
  moneyness entry-filter runs all used an entry gate — candidates below a stock/conv_price
  threshold were EXCLUDED entirely.  That is an execution-condition problem, not a
  signal problem.  The reverse-direction value_gap_amount signal is real (+30.3% cost-on);
  entry filters destroy it by shrinking the candidate pool until the strategy has
  too few trades to compound.  Position scaling preserves the full candidate set and
  is therefore the correct next overlay to test.

  '
source_insight: 'Reverse-sort probe (cb_arb_value_gap_switch_reverse-probe-coston_20260524)
  produced +30.3% test excess cost-on.  Forward-sort probes failed.  The value-gap
  rank order is anti-alpha — smaller (less positive) gaps outperform larger ones.  Entry
  filters in the reverse direction all failed mechanical thresholds (moneyness v1_1,
  v1_5, bond_floor v1, v2), likely from candidate starvation.  Position scaling avoids
  this failure mode.

  '
expected_improvement: 'Reduce max drawdown by 20-30% relative to the reverse-probe-coston
  baseline while retaining at least 80% of the +30.3% test excess, producing a positive
  cost-on cumulative excess that passes adoption thresholds.

  '
