test_design:
  description: 'Sort daily value_gap_amount ASCENDING (>0 filter unchanged).  For
    each candidate on each day, compute ATR from stk_daily_qfq close over the lookback
    window.  Rank candidates by ATR and apply inverse scaling: position_weight = baseline
    * (scaling_beta / ATR_rank). Run grid search over ATR lookback in [10, 20, 40,
    60] and scaling_beta in [0.25, 0.5, 0.75, 1.0, 1.5].  Exit uses the reverse-probe
    grid: max_hold_days in [120, 150, 180], min_gap_pct in [0.005, 0.01], sell_gap_pct=0.0,
    switch_hurdle_pct in [0.0, 0.01].  Cost-on evaluation with slippage 0.0015 and
    market impact 0.001. Train 2018-2022, test 2023-2026.  Compare best candidate
    against the reverse-probe-coston baseline.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound_test > 0.0
  - any_single_year_drawdown_vs_benchmark <= 0.15
  - best_candidate_test_excess >= 0.80 * reverse_probe_coston_test_excess (retain
    80%+ of +30.3%)
falsifiers:
  train: &id001
  - best_candidate_cumulative_excess_compound_test <= 0.0
  - any_single_year_drawdown_vs_benchmark > 0.15
  - position_scaling_best_vs_unscaled_reverse_total_excess_ratio < 0.60 (scaling destroys
    >40% of raw reverse excess)
  validate: *id001
  test: *id001
risk: 'Medium-low.  Position scaling preserves all candidates so there is no starvation
  risk. The main risk is that inverse-ATR weighting accidentally concentrates allocation
  into higher-volatility names, increasing idiosyncratic drawdown.  Mitigation: the
  grid search covers conservative scaling_beta values (0.25, 0.5) that reduce rather
  than amplify high-vol weight.  If the best result is worse than unscaled reverse,
  we learn that ATR carries no useful allocation signal in this universe.

  '
why_not_repeated_failure: 'This proposal belongs to the reverse_volatility_position_scaling
  family, not the repeated-reject moneyness_stock_to_conv_threshold family.  The three
  failed moneyness runs all filtered candidates out of the pool (entry gate), starving
  the strategy of trades.  Position scaling preserves the full candidate set — no
  entry is removed, only allocation weights are adjusted.  The failure mode is therefore
  structurally different and cannot repeat the moneyness starvation pattern.

  '
related_prior_runs:
- cb_arb_value_gap_switch_reverse-probe-coston_20260524
- cb_arb_value_gap_switch_reverse_moneyness_entry_filter_v1_1
- cb_arb_value_gap_switch_reverse_bond_floor_entry_filter_v2
- cb_arb_value_gap_switch_exit_duration_adaptive_reverse_20260525
implementation_assumption: The executor reads daily_value_gap_amounts, joins stk_daily_qfq
  to compute ATR per CB per day, applies inverse scaling to baseline position weights,
  and delegates the modified weight vector to the standard backtest engine.  No new
  data is required. The ATR computation uses rolling standard deviation of daily log
  returns (volatility proxy) scaled by sqrt(252) to annualized, consistent with the
  executor description.
