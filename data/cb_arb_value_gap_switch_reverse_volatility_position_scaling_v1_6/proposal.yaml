test_design:
  description: 'Sort daily value_gap_amount ASCENDING (least-positive gap first, >0
    filter unchanged). Compute ATR from stk_daily_qfq close prices per CB per day
    (TR = max(high-low, |high-prev_close|, |low-prev_close|), ATR = rolling mean of
    TR over lookback window). Apply inverse scaling: position_weight = baseline_weight
    * (scaling_beta / ATR_rank) where ATR_rank is the daily cross-sectional rank (highest
    ATR = rank 1). Grid search: ATR lookback [10, 20, 40, 60] × scaling_beta [0.25,
    0.5, 0.75, 1.0, 1.5] (20 combinations). Exit: reverse-probe grid (max_hold_days
    [120, 150, 180] × min_gap_pct [0.005, 0.01] × switch_hurdle_pct [0.0, 0.01]) with
    sell_gap_pct fixed at 0.0. Cost-on evaluation: slippage 0.0015, market_impact
    0.001. Train 2018-2022, test 2023-2026. Compare best grid result against reverse-probe-coston
    baseline.

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound_cost_on_gte: 0.243
  - test_excess_retention_pct_gte: 0.8
  - test_max_drawdown_lt: 0.3
  - annual_excess_not_all_negative: true
falsifiers:
  train: &id001
  - test_cumulative_excess_compound_cost_on_lt: 0.15
  - test_max_drawdown_gt: 0.35
  - any_test_year_sharpe_lt_0.0
  - position_scaling_adds_no_improvement_over_raw_reverse_baseline
  validate: *id001
  test: *id001
risk: 'Low. Position scaling is non-destructive — all candidates passing the >0 value_gap
  filter remain eligible; only allocation weights adjust. Unlike entry filters that
  removed candidates and destroyed the signal, this overlay preserves the full candidate
  pool. Worst case: scaling adds no benefit and results match the raw reverse baseline.

  '
why_not_repeated_failure: 'This proposal is NOT a variant of moneyness_stock_to_conv_threshold
  (the only repeated-reject family with 3 recent failures). Moneyness entry filters
  are binary gates — they remove candidates from the pool entirely, which shrinks
  diversification and can kill the signal (as happened in all 3 reverse-direction
  moneyness runs and both reverse bond-floor runs). Volatility position scaling is
  a continuous weight adjustment — zero candidates are removed, the full pool is preserved,
  and only allocation magnitudes change. The failure mode is structurally different:
  entry filters fail by culling too many candidates; position scaling cannot fail
  that way. This is also not a closed or forbidden family; reverse_volatility_position_scaling
  has no prior rejections.

  '
