implementation_assumption: ATR computed from stk_daily_qfq close prices using standard
  true-range formula. ATR_rank is daily cross-sectional (1 = highest ATR, receives
  lowest weight). Position weight = baseline_weight * (scaling_beta / ATR_rank) capped
  at 1.0. All candidates with value_gap_amount > 0 are eligible; no removal. Exit
  logic uses the reverse-probe grid from the executor description. Benchmark is cb_equal
  index. Cost model matches reverse-probe-coston baseline.
