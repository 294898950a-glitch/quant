proposal_id: cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_6
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on, from reverse-probe-coston
  20260524) is the only proven alpha direction. Its raw equal-weight allocation suffers
  from noise — volatile CBs dominate drawdowns while contributing less to alpha. Applying
  inverse-ATR position scaling to the ascending-sort base reduces concentration in
  high-volatility names, which should reduce drawdowns while preserving at least 80%
  of the +30.3% test excess. This is strictly less destructive than the failed entry
  filters (moneyness, bond floor) because it preserves all candidates — only allocation
  weights adjust, no candidates are removed.

  Repeated-reject-family check (moneyness_stock_to_conv_threshold, 3 recent rejections):
  (1) Is the underlying signal invalid? No — the reverse probe proved the signal is
  real at +30.3% test excess cost-on. The forward-direction signal is anti-alpha but
  the reverse direction is genuine alpha. (2) Is the direction reversed? Yes — this
  proposal uses ascending sort (reverse direction), matching the proven alpha orientation.
  (3) Is only the execution condition wrong? The failed moneyness and bond-floor entry
  filters were wrong execution conditions because they culled the candidate pool and
  destroyed the signal''s diversification. Position scaling is a fundamentally different
  execution condition — it preserves all candidates and only adjusts weights. The
  failure mode of entry filters does not apply here.

  '
source_insight: 'Reverse-probe-coston (run_id: cb_arb_value_gap_switch_reverse-probe-coston_20260524)
  demonstrated +30.3% test excess cost-on from flipping sort direction alone — a 41pp
  swing from the forward anti-alpha base. The raw reverse allocation is unoptimized
  for risk. Position scaling via inverse ATR is a noise-reduction overlay that does
  not remove candidates, unlike the entry filters that were previously tried and failed
  on the reverse base. No active_critical_insights to reference.

  '
expected_improvement: 'Reduce max drawdown by 5-10pp relative to the raw reverse baseline
  while preserving at least 80% of the +30.3% test excess (~+24.3% cumulative excess
  compound cost-on). The inverse-ATR mechanism down-weights volatile names that contribute
  disproportionately to drawdown without proportional alpha contribution.

  '
