    the full pool. Main risk: ATR may not be the right noise measure for gap signals
    —

    high-volatility names might carry the strongest signal, and down-weighting them
    could

    reduce returns without reducing drawdowns. The grid search over lookback and beta

    provides fallback configurations. If all configurations degrade performance, the

    family closes quickly with clear evidence.

    '
  why_not_repeated_failure: 'This is not a moneyness_stock_to_conv_threshold family
    proposal. It targets C001

