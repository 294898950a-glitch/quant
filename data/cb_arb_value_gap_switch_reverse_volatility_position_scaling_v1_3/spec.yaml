hypothesis: 'Entry filters (moneyness, bond floor) killed the reverse-direction signal
  because

  they culled a candidate pool that was already thin — the ASCENDING sort picks

  nearest-to-zero positive gaps, so adding a filter removed most entries and destroyed

  the statistical edge. Position scaling via inverse ATR is a non-destructive overlay:

  it keeps all candidates but reduces allocation to high-volatility names where gap

  signals are noisier. Applied to the reverse-sorted base (+30.3% test excess cost-on),

  this should reduce drawdowns while preserving at least 80% of the excess.


  Repeated-reject-family check (moneyness_stock_to_conv_threshold): this proposal
  is

  NOT a moneyness-family variant. It targets C001 (static position scaling) not C003

  (moneyness threshold). The executor family is volatility_position_scaling_reverse.

  For the moneyness family, the three-question analysis: (1) the underlying

  reverse-direction signal is valid (+30.3% test excess, confirmed); (2) the signal

  direction is correct (reverse/ascending); (3) the execution condition was wrong
  —

  entry filters that remove candidates from an already-thin pool are the wrong tool.

  Position scaling preserves all candidates while reducing noise and should work where

  filters failed.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: reverse-direction sort produces
  +30.3% test

  excess cost-on, confirming the value_gap formula is anti-informative under its current

  monotonicity assumption. The insight directs priority toward reverse-direction variants

  of families that previously failed in forward — specifically "position sizing" is

  listed. Entry-filter reverse variants (moneyness v1_1, bond floor v2) both failed

  because they removed too many candidates from the already-thin reverse pool. Position

  scaling is strictly less destructive (no candidate removal) and should be tried
  next.

  '
