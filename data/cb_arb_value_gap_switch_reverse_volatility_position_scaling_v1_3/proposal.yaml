test_design:
  description: 'Base: reverse-probe-coston baseline (ASCENDING sort, value_gap_amount
    > 0 filter

    unchanged, max_hold_days=180, min_gap_pct=0.01, sell_gap_pct=0.0, switch_hurdle_pct=0.0).

    Overlay: compute ATR per CB from stk_daily_qfq close, rank by ATR each day, apply

    inverse scaling: position_weight = baseline_weight * (scaling_beta / ATR_rank).

    Grid search: ATR lookback [10, 20, 40, 60], scaling_beta [0.25, 0.5, 0.75, 1.0,
    1.5].

    Exit grid: max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct
    0.0,

    switch_hurdle_pct [0.0, 0.01]. Cost-on (slippage=0.0015, market_impact=0.001).

    Train 2018-2022, test 2023-2026. Best params selected by train excess return.

    '
