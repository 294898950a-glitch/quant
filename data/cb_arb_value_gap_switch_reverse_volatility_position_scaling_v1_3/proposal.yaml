risk: 'Low-moderate. Unlike entry filters that culled candidates, position scaling
  preserves

  the full pool. Main risk: ATR may not be the right noise measure for gap signals
  —

  high-volatility names might carry the strongest signal, and down-weighting them
  could

  reduce returns without reducing drawdowns. The grid search over lookback and beta

  provides fallback configurations. If all configurations degrade performance, the

  family closes quickly with clear evidence.

  '
why_not_repeated_failure: 'This is not a moneyness_stock_to_conv_threshold family
  proposal. It targets C001

  (static position scaling) with executor family volatility_position_scaling_reverse.

  Prior position-sizing failures (pnl-feedback-scaling_v1, adoption_pass=False) were

  in the FORWARD direction on an anti-alpha base — testing whether scaling could rescue

  a broken signal. This proposal applies scaling to the CONFIRMED reverse-direction

  signal where the base already works. Entry-filter reverse failures (moneyness v1_1,

  bond floor v2) failed because they removed candidates from an already-thin pool;

  position scaling preserves all candidates. The exit-duration-adaptive-reverse failure

  (adoption_pass=False) tested exit logic, not position sizing. This is a distinct

  mechanic that has not been tested in the reverse direction.

  '
