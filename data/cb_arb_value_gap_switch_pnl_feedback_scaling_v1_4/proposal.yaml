test_design:
  description: 'Grid search over two parameters: rolling PnL lookback window in [10,
    20, 40, 60] trading days and scaling aggressiveness in [0.25, 0.5, 0.75, 1.0].
    For each candidate on each rebalance day, compute rolling strategy-level realized
    return over the lookback window. Position weight = baseline_weight * (1 + aggressiveness
    * rolling_return), clamped to [0.2 * baseline_weight, 2.0 * baseline_weight].
    Exit uses the accepted duration-adaptive logic (min_hold_days=5, initial_threshold_fraction=0.7,
    decay_period_factor=0.5, effective_max_hold_days=45). Top N=20 candidates per
    day by descending value_gap_amount. Train 2018-2022, test 2023-2026. Standard
    cost model: slippage 0.0015, market_impact 0.001.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound_test_cost_on improvement vs baseline by >= 3pp
  - any_single_year_drawdown_vs_benchmark_test <= 0.15
  - adoption_pass is true
falsifiers:
  train: &id001
  - cumulative_excess_compound_test_cost_on does not improve vs baseline by at least
    1pp
  - any_holdout_year_sharpe < 0.5
  - cost_degradation_pp does not decrease by at least 1pp from the -7.47pp baseline
  validate: *id001
  test: *id001
risk: 'Low structural risk. PnL feedback scaling is a position-sizing overlay that
  never removes candidates. Worst case: scaling parameters add noise, the strategy
  degrades to baseline performance, and the idea is rejected without breaking anything.
  Unlike entry filters, it cannot cause mechanical threshold failures since all entries
  are preserved. The only risk is a wasted compute slot for the grid search.

  '
why_not_repeated_failure: 'This is not a variant of the repeatedly-failed moneyness_stock_to_conv_threshold
  family (5 rejects). Those runs all failed mechanical thresholds because entry filters
  suppressed candidates below minimum trade count. This proposal adds a position-sizing
  layer that preserves all candidates — it changes how much is allocated to each position,
  not which positions are eligible. It is also not a reverse-direction variant: all
  reverse families (reverse_moneyness_entry_filter, reverse_bond_floor_entry_filter,
  volatility_position_scaling_reverse, etc.) are closed by value_gap_rank_is_anti_alpha_2026_05_24,
  and this proposal operates in the standard forward descending sort direction. This
  direction has not been tested — no PnL feedback scaling run exists in the recent
  digest.

  '
related_prior_runs:
- cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
- cb_arb_value_gap_switch_moneyness-entry-filter_v1
- cb_arb_value_gap_switch_bond-floor-entry-filter_v1
implementation_assumption: 'The executor must compute daily rolling realized PnL for
  the strategy (not per-CB), then adjust position weight as: weight = baseline * (1
  + aggressiveness * clip(rolling_return, -1.0, 1.0)), clamped to [0.2 * baseline,
  2.0 * baseline]. The baseline exit logic (duration-adaptive, accepted 2026-05-22)
  is unchanged. The executor must report mechanical threshold results (adoption_pass,
  min_trades, etc.) in addition to standard backtest metrics.'
