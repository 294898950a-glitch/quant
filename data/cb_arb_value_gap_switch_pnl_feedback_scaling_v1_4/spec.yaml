      1pp
    - any_holdout_year_sharpe < 0.5
    - cost_degradation_pp does not decrease by at least 1pp from the -7.47pp baseline
  risk: 'Low structural risk. PnL feedback scaling is a position-sizing overlay that
    never removes candidates. Worst case: scaling parameters add noise, the strategy
    degrades to baseline performance, and the idea is rejected without breaking anything.
    Unlike entry filters, it cannot cause mechanical threshold failures since all
    entries are preserved. The only risk is a wasted compute slot for the grid search.

    '
  why_not_repeated_failure: 'This is not a variant of the repeatedly-failed moneyness_stock_to_conv_threshold
    family (5 rejects). Those runs all failed mechanical thresholds because entry
    filters suppressed candidates below minimum trade count. This proposal adds a
    position-sizing layer that preserves all candidates — it changes how much is allocated
    to each position, not which positions are eligible. It is also not a reverse-direction
    variant: all reverse families (reverse_moneyness_entry_filter, reverse_bond_floor_entry_filter,
    volatility_position_scaling_reverse, etc.) are closed by value_gap_rank_is_anti_alpha_2026_05_24,
    and this proposal operates in the standard forward descending sort direction.
    This direction has not been tested — no PnL feedback scaling run exists in the
    recent digest.

    '
