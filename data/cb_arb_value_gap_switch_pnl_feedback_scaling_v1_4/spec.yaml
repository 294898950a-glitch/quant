  required_executor: evaluate_cb_arb_pnl_feedback_scaling_grid
  required_data: []
  required_data_fields: {}
  test_design:
    description: 'Grid search over two parameters: rolling PnL lookback window in
      [10, 20, 40, 60] trading days and scaling aggressiveness in [0.25, 0.5, 0.75,
      1.0]. For each candidate on each rebalance day, compute rolling strategy-level
      realized return over the lookback window. Position weight = baseline_weight
      * (1 + aggressiveness * rolling_return), clamped to [0.2 * baseline_weight,
      2.0 * baseline_weight]. Exit uses the accepted duration-adaptive logic (min_hold_days=5,
      initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45).
      Top N=20 candidates per day by descending value_gap_amount. Train 2018-2022,
      test 2023-2026. Standard cost model: slippage 0.0015, market_impact 0.001.

      '
  success_criteria:
    criteria:
    - cumulative_excess_compound_test_cost_on improvement vs baseline by >= 3pp
    - any_single_year_drawdown_vs_benchmark_test <= 0.15
    - adoption_pass is true
  falsifiers:
