hypothesis: 'The value-gap signal in the forward descending direction produces intermittent
  alpha with extended cold streaks. During cold streaks, trading at full position
  size incurs cost drag without compensating excess return — the observed -7.47pp
  cost degradation is concentrated in periods where the signal has no edge. Scaling
  position size inversely with rolling realized PnL reduces total cost drag by shrinking
  exposure during losing streaks while preserving full exposure during winning streaks.
  This is a pure position-sizing overlay that does not alter entry eligibility, exit
  logic, or the value-gap ranking signal. Unlike entry filters (moneyness, bond floor)
  that culled candidates and fell below mechanical thresholds, PnL feedback preserves
  all candidates and cannot cause adoption_pass failure from insufficient trades.
  Repeated-reject check for moneyness_stock_to_conv_threshold: (1) Is the underlying
  signal invalid? No — the signal has intermittent alpha; the problem is cost drag
  during cold streaks, not zero signal. (2) Is the direction reversed? This proposal
  operates in the standard descending sort, not the reverse direction. It does not
  change sort orientation. (3) Is only the execution condition wrong? This proposal
  targets execution condition — position sizing during cold streaks — rather than
  signal quality, entry timing, or exit timing. The hypothesis is execution-side (cost
  management), not signal-side or direction-side.

  '
source_insight: 'The cost-realism wall for cb_arb_value_gap_switch shows cumulative
  excess dropping from -0.030 (cost-off) to -0.105 (cost-on), a -7.47pp degradation.
  Five moneyness entry filter runs and one bond floor entry filter run all returned
  failed_mechanical_thresholds (adoption_pass: false) because they suppressed too
  many entries. A position scaling approach that never removes candidates addresses
  the cost problem without risking mechanical threshold failure. The accepted duration-adaptive
  exit shows that execution-layer improvements can produce review-passing results
  even when the forward direction signal remains weak.

  '
