proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1
strategy_id: cb_arb_value_gap_switch
family: static_volatility_position_scaling_reverse
hypothesis: 'The reverse-direction value-gap base (ASCENDING sort, +30.3% test excess
  cost-on) enters candidates regardless of their recent price volatility. High-volatility
  periods inject noise into the value-gap signal because wider daily price swings
  create larger apparent gaps that mean-revert randomly. Applying inverse ATR-based
  position scaling to the reverse base — reducing position weight when recent volatility
  is elevated, increasing when it is calm — should preserve the alpha signal while
  cutting tail-risk drawdowns. This is orthogonal to entry eligibility: no candidates
  are excluded, only position sizes are adjusted continuously.

  '
source_insight: 'active_critical_insights::value_gap_rank_is_anti_alpha_2026_05_24:
  the reverse-direction sort produces +30.3% test excess cost-on (41pp swing from
  sort direction alone). But train max drawdown of -23.6% and test max drawdown of
  -11.3% suggest volatile periods degrade performance even in the winning direction.
  Volatility-based position scaling addresses this without touching the signal, consistent
  with the insight''s decision_use directive to pursue reverse-direction variants
  after cost-on confirmation.

  '
expected_improvement: 'Reduce test max drawdown from -11.3% toward -8%. Preserve or
  slightly improve the +30.3% test excess by avoiding oversized bets in noisy regimes.
  Net effect: higher Sharpe ratio.

  '
capability_ids:
- C001
required_executor: volatility_based_position_scaling_executor
