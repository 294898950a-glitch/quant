  - trade_date
  - close
  data/cb_warehouse/cb_daily.parquet:
  - ts_code
  - trade_date
  - close
test_design:
  description: 'Base: reverse-probe-coston (ASCENDING sort, value_gap_amount > 0,
    top N, exit: max_hold_days=180, min_gap_pct=0.01, sell_gap_pct=0.0, switch_hurdle_pct=0.0).
    Add: for each candidate-day, compute ATR from CB daily close over lookback W.
    Scale position weight by factor = 1 / (1 + ATR / M). Grid: W in [20, 40, 60],
    M in [0.01, 0.02, 0.05], top N in [3, 5, 8]. Cost-on evaluation. Compare best
    candidate against reverse-probe-coston baseline.

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound >= 0.25
  - test_max_drawdown <= 0.10
  - test_Sharpe > reverse_probe_coston test_Sharpe
falsifiers:
  train: &id001
  - test_cumulative_excess_compound < 0.303 (reverse_probe_coston baseline)
  - test_max_drawdown >= 0.113 (reverse_probe_coston baseline)
  - all grid candidates underperform the unscaled reverse baseline
  validate: *id001
  test: *id001
risk: 'Low. The reverse base signal is proven tradeable. Position scaling cannot destroy
  the signal — it can only dilute it by over-smoothing or fail to help. Worst case:
  scaling adds no value and results converge to the reverse-probe-coston baseline.
  The executor exists in C001 but was written for forward direction; if it cannot
  accept reverse-sort input, the proposal gate will mark DRAFT.

  '
why_not_repeated_failure: 'Not an entry filter (bond floor, moneyness — all failed
  mechanical thresholds in both forward and reverse directions). Not exit logic tuning
  (duration-adaptive-reverse failed adoption). This is position scaling, which does
  not constrain candidate eligibility. The forward PnL feedback scaling (adoption_pass=False)
  failed on the forward base where the signal itself was anti-alpha; applying volatility
  scaling to the reverse base where the signal is strongly positive is a different
  proposition. The scaling mechanic is continuous and reversible — it cannot destroy
  alpha, only modulate it.

  '
related_prior_runs:
- cb_arb_value_gap_switch_reverse-probe-coston_20260524
- cb_arb_value_gap_switch_pnl-feedback-scaling_v1
- cb_arb_value_gap_switch_exit_duration_adaptive_reverse_20260525
implementation_assumption: The volatility_based_position_scaling_executor was written
  for forward-direction (DESCENDING sort). Adapting to reverse requires changing sort
  order to ASCENDING while keeping value_gap_amount > 0 unchanged. The core mechanic
  (ATR, scaling factor, weight adjustment) is direction-agnostic. If the executor
  cannot accept a sort_direction parameter, a reverse variant is needed — DRAFT is
  acceptable per capability_executor_policy.
