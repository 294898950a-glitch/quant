    - data/cb_warehouse/stk_daily_qfq.parquet
    - data/cb_warehouse/cb_daily.parquet
    - data/cb_warehouse/credit_spreads.parquet
    test_design:
      description: 1. Implement the refined theoretical value model (e.g., Tsiveriotis-Fernandes
        with time‑varying credit spread derived from CDS curves or bond yields, and
        volatility surface interpolation). 2. Compute new value gaps = market price
        – refined theoretical value. 3. Re‑run the existing value‑gap switch strategy
        (entry when gap > threshold, exit when gap shrinks) using the new gaps, keeping
        all other parameters (position sizing, exit rules) identical to baseline.
        4. Compare cost‑on and cost‑off cumulative excess returns, max drawdown, and
        Sharpe ratio on the same train (2019–2024), 2020 repair, and sealed test (2025–2026)
        periods used in prior evaluations.
    success_criteria:
      criteria:
      - cost_on cumulative excess compound > -0.07 (improvement from -0.1047)
      - cost_on max drawdown > -0.30 (improvement from -0.3516)
      - test period (2025–2026) total return exceeds baseline (0.732) by at least
        0.05
    falsifiers:
      train:
      - cost_on excess return does not improve by at least 0.02 over baseline
      - max drawdown in any single year (cost‑on) worsens relative to baseline
      - out‑of‑sample (2025–) ranking Sharpe ratio < 0.5
      validate:
      - cost_on excess return does not improve by at least 0.02 over baseline
      - max drawdown in any single year (cost‑on) worsens relative to baseline
      - out‑of‑sample (2025–) ranking Sharpe ratio < 0.5
      test:
      - cost_on excess return does not improve by at least 0.02 over baseline
      - max drawdown in any single year (cost‑on) worsens relative to baseline
      - out‑of‑sample (2025–) ranking Sharpe ratio < 0.5
    risk: Medium. Data mining risk due to additional parameters in credit spread modeling;
      the new model may overfit in‑sample. Requires careful walk‑forward validation
      and out‑of‑sample test. Also risk that credit spread data is unavailable or
      noisy.
    why_not_repeated_failure: This direction has not been tested in any prior run.
      Recent rejections focused on position sizing (option_position_sizing family),
      regime‑based entry guards, and various exit rules. None attempted to improve
      the core valuation signal. The current valuation remains simplistic and may
      be a key source of the strategy's underperformance, especially in stress periods
      like 2020. This proposal is a new family, not a re‑phrasing of closed or exhausted
      directions.
