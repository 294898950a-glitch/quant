      decay schedule (initial_threshold_fraction=0.7, decay_period_factor=0.5) regardless
      of market conditions. In high-volatility regimes, gaps close faster and a single
      decay schedule may exit too early (leaving money on the table) or too late (allowing
      gaps to re-widen). Conditioning the decay parameters on a daily market regime
      classifier can improve cumulative excess by tailoring exit patience to the prevailing
      environment.

      '
    source_insight: 'Duration-adaptive exit (run_id cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22)
      was accepted with best params min_hold_days=5, initial_threshold_fraction=0.7,
      decay_period_factor=0.5, effective_max_hold_days=45. However, the exit logic
      is static across all time periods. Market regimes vary dramatically over the
      2007-2026 sample — the same decay schedule applied in 2015''s volatility spike
      and 2019''s low-vol grind is suboptimal. Dynamic regime switching (C005) has
      not been tested at all on this strategy.

      '
    expected_improvement: 'Cumulative excess compound improvement of 3-5pp over the
      static duration-adaptive exit baseline by allowing regime-specific decay parameters
