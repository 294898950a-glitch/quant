  proposal:
    proposal_id: cb_arb_value_gap_switch_moneyness_entry_filter_v2
    strategy_id: cb_arb_value_gap_switch
    family: entry_filter
    hypothesis: 'Restricting entries to convertible bonds where the underlying stock
      price is at or above a threshold fraction of the conversion price (stock_close
      / conv_price >= threshold) will improve risk-adjusted returns by screening out
      deep OTM CBs whose theoretical-value gaps are dominated by model noise (IV assumptions,
      time premium) rather than genuine mispricing. This should reduce tail-event
      drawdowns without destroying the alpha signal, because the remaining candidates
      have more reliable theoretical values.

      '
    source_insight: 'The duration-adaptive exit (accepted 2026-05-22) improved the
      exit side but the strategy remains deeply unprofitable with cost-on (cumulative
      excess -10.47%, max drawdown -35.16%). Both the bond-floor entry filter and
      the market drawdown entry filter failed mechanical thresholds. However, neither
      addresses the core problem that deep OTM CB theoretical values are dominated
      by option-pricing model assumptions rather than bond-floor anchoring. By filtering
      on moneyness (stock_close / conv_price), we target signal quality at the source:
      only CBs with meaningful equity optionality enter the candidate pool. This is
      distinct from the bond-floor filter (which anchors to fixed-income value) and
      the market drawdown filter (which gates on macro conditions).

      '
    expected_improvement: 'Reduced max drawdown (especially in stress years like 2020)
      while preserving or modestly improving cumulative excess compound. The filter
      should reduce the number of low-quality entries that generate noise trades and
      transaction costs without contributing alpha.

      '
