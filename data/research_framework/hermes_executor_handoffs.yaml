    family: entry_quality_filter
    hypothesis: Filtering candidate entries by a minimum absolute value gap (yuan
      per bond) removes low-signal noise trades, reduces turnover and transaction
      costs, and improves net-of-cost cumulative excess return.
    source_insight: 'The accepted duration-adaptive-exit (best: min_hold_days=5, initial_threshold_fraction=0.7,
      effective_max_hold_days=45) shows real mispricings persist over weeks. If genuine
      gaps persist, very small gaps are likely transient noise that generate costs
      without alpha. Six exit-rule variants and three position-scaling variants have
      been tested. The unresolved problem is entry quality: the strategy enters on
      every signal without filtering by gap magnitude. The cost-on wall (-7.47pp degradation)
      makes this the highest-leverage remaining lever.'
    expected_improvement: Reduce turnover and transaction cost drag by filtering noise
      entries, improving net-of-cost cumulative excess compound and win rate without
      eliminating real alpha signals.
