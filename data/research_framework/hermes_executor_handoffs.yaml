      data/cb_warehouse/cb_basic.parquet:
      - ts_code
      - conv_price
      data/cb_warehouse/stk_daily_qfq.parquet:
      - ts_code
      - trade_date
      - close
    test_design:
      grid:
        moneyness_threshold:
        - 0.7
        - 0.8
        - 0.9
        - 1.0
        - 1.1
        description: 'Daily moneyness = stk_daily_qfq.close / cb_basic.conv_price.
          Entry allowed only when moneyness >= threshold. threshold=0 means no filter
          (reproduces baseline). Use the accepted duration-adaptive exit parameters
          (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5,
          effective_max_hold_days=45) as the exit rule for all candidates.

