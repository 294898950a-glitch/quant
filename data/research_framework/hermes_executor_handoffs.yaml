      both failed mechanical thresholds because they suppress ALL entries indiscriminately
      during adverse conditions. Post-entry position scaling (volatility, PnL feedback)
      failed adoption. This points to candidate-level entry quality as the unresolved
      lever: filter individual CBs before entry based on fundamental characteristics
      that predict signal reliability, rather than suppressing all entries based on
      market conditions or adjusting sizing after the fact.

      '
    expected_improvement: 'Fewer noise-driven entries should increase win rate and
      cumulative excess return. Effect expected to be strongest in high-volatility
      regimes where OTM CB value gaps are least reliable. Risk of over-filtering is
      testable via the threshold grid.

