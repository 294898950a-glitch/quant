    strategy_id: cb_arb_value_gap_switch
    family: valuation_refinement
    hypothesis: Refining the theoretical value model for convertible bonds to incorporate
      dynamic credit spread and option‑adjusted spread (OAS) will produce more accurate
      value gaps, improving signal quality and leading to higher risk‑adjusted excess
      returns.
    source_insight: The current absolute value‑gap switch relies on a simple theoretical
      value (likely B‑S with constant credit spread). In reality, CB pricing errors
      are often driven by mis‑estimated credit risk and volatility surfaces. A more
      sophisticated model could reduce noise, especially during stress periods when
      credit and equity diverge, thereby enhancing the signal‑to‑noise ratio of the
      gap metric.
    expected_improvement: Cumulative excess return (cost‑on) increase by ≥3 percentage
      points over baseline, and max drawdown reduction by ≥5 percentage points, driven
      by fewer false signals and improved entry timing.
    capability_ids:
    - C006
    required_executor:
      missing_capability_request:
        new_executor_id: new_valuation_executor
        description: Executor to compute refined CB theoretical values using a convertible
          bond pricing model that incorporates dynamic credit spread estimation, option‑adjusted
          spread calibration, and stock–credit correlation adjustments. Must produce
          daily theoretical values for all CBs in the universe and recalculate the
          value gap (market_price - theoretical_value).
        required_inputs:
        - data/cb_warehouse/cb_daily.parquet
        - data/cb_warehouse/cb_basic.parquet
        - data/cb_warehouse/stk_daily_qfq.parquet
        - data/cb_warehouse/credit_spreads.parquet
