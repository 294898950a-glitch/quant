    implementation_assumption: Assume that a convertible bond pricing library (e.g.,
      QuantLib with Python bindings) can be used, and that credit spread data (e.g.,
      synthetic spreads from CB yields) can be constructed from existing cb_daily
      and bond data. If external CDS or OAS data is unavailable, a rolling credit
      spread proxy will be derived from the difference between CB yield and risk‑free
      rate.
