  proposal:
    proposal_id: cb_arb_value_gap_switch_pnl_feedback_scaling_v1
    strategy_id: cb_arb_value_gap_switch
    family: pnl_feedback_position_scaling
    hypothesis: 'Rolling realized PnL carries predictive signal about near-term strategy
      edge quality. Scaling position size inversely with recent losses reduces cost
      drag during cold periods — fewer contracts traded when the strategy is losing,
      full exposure when it is winning — without abandoning the value-gap ranking
      signal or changing exit logic.

      '
    source_insight: 'Recent runs show adoption_pass for duration-based exits, but
      the 7.47pp cost-on degradation wall remains. Every trade incurs cost regardless
      of outcome. If recent PnL is negative, the marginal trade has lower expected
      net return, so reducing exposure during losing streaks is a direct lever on
      cost-adjusted performance. Static volatility scaling (volatility_scaling_001,
      v2) failed because volatility is not the right conditioning variable — realized
      PnL is.

      '
    expected_improvement: 'Reduce cost-on cumulative excess by at least 2pp versus
      the baseline -10.47% (i.e., improve to -8.47% or better), while maintaining
      or improving the win rate and not worsening any single-year drawdown beyond
      40%.

      '
