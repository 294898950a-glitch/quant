    required_executor: gap_trend_entry_filter_executor
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    - data/cb_warehouse/cb_basic.parquet
    - data/cb_warehouse/stk_daily_qfq.parquet
    test_design:
      approach: 'For each candidate on each day, compute gap_t = theoretical_value
        - market_price_mid from the daily_value_gap_amounts dataset. Use a rolling
        window of W days to compute the relative change: gap_trend = (gap_t / gap_{t-W}
        - 1). Only allow entry if gap_trend < 0 (i.e., gap has declined over the window).
        Perform a grid search over window sizes W ∈ {5, 10, 15, 20}. Run the standard
        backtest with train (2019-2024), 2020 repair, and sealed test (2025-01-01
        to 2026-05-08) split. Compare filtered portfolio performance to the baseline
        without filter.

        '
    success_criteria:
      criteria:
      - test_cumulative_excess_return > baseline_cumulative_excess_return + 0.05
      - test_win_rate > baseline_win_rate + 0.03
      - 2020_max_drawdown > baseline_2020_max_drawdown + 0.02
    falsifiers:
      train:
      - test_cumulative_excess_return ≤ baseline_cumulative_excess_return + 0.04
      - 2020_max_drawdown ≤ baseline_2020_max_drawdown
      - any_holdout_year_sharpe < 0.5
      validate:
      - test_cumulative_excess_return ≤ baseline_cumulative_excess_return + 0.04
      - 2020_max_drawdown ≤ baseline_2020_max_drawdown
      - any_holdout_year_sharpe < 0.5
      test:
      - test_cumulative_excess_return ≤ baseline_cumulative_excess_return + 0.04
      - 2020_max_drawdown ≤ baseline_2020_max_drawdown
      - any_holdout_year_sharpe < 0.5
    risk: 'Moderate risk of overfitting the exact window length. Gaps can be noisy
      intra-month; the filter may occasionally block entries that later recover strongly.
      Requires careful inspection of trade timing relative to gap reversals.

      '
    why_not_repeated_failure: 'This is not a rehash of closed directions: it is not
      a static position sizing (closed), not a market drawdown gate (which failed
      mechanical thresholds but differs in being a global market filter), not a volatility-based
