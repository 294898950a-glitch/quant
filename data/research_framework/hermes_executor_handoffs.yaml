  proposal:
    proposal_id: cb_arb_value_gap_switch_momentum_extended_valuation_v1
    strategy_id: cb_arb_value_gap_switch
    family: extended_valuation_momentum
    hypothesis: 'Extending the credit-adjusted valuation formula from new_valuation_v1
      with a downward-momentum penalty on the underlying stock will separate the two
      populations conflated in value_gap_amount — transiently-discounted bonds (A,
      64% small winners) from fundamentally-discounted bonds (B, 36% catastrophic
      losers).  The credit adjustment alone caught credit-distressed issuers (reducing
      max_drawdown from -250M to -12), but momentum-driven distress was not captured,
      leaving the payoff distribution still negative. Adding a momentum penalty (e.g.
      stock 20d-60d return rank, or 60d cumulative return) to the theoretical value
      computation will push population (B) below the entry threshold, eliminating
      or substantially reducing the catastrophic tail.  Target: test_sharpe ≥ 0.05
      while keeping max_drawdown ≤ -50M, compared against the duration-adaptive-exit
      baseline.

      '
    source_insight: asymmetric_payoff_mechanism_2026_05_27
    expected_improvement: 'new_valuation_v1 reduced max_drawdown ~20,000x (-250M →
      -12) but test_sharpe remained -0.0128 (missing the 0 hard floor by ~0.013).  The
      remaining negative tail is attributed to momentum-driven distress not captured
      by credit adjustment alone.  Adding a momentum penalty should eliminate enough
      of population (B) to flip test_sharpe positive while preserving at least 50%
      of the win-rate advantage.  This is the first direction with mechanistic evidence
      that it can actually change the payoff distribution — unlike all filters, exit
      rules, and scaling overlays that uniformly failed.

      '
    capability_ids:
    - C006
    required_executor: evaluate_cb_arb_valuation_formula_momentum
    required_data:
    - data/cb_warehouse/cb_daily.parquet
    - data/cb_warehouse/cb_basic.parquet
    - data/cb_warehouse/stk_daily_qfq.parquet
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    required_data_fields:
      data/cb_warehouse/cb_daily.parquet:
      - ts_code
      - trade_date
      - close
      data/cb_warehouse/cb_basic.parquet:
      - ts_code
