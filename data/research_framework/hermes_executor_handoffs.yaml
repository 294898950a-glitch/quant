    - data/cb_warehouse/cb_basic.parquet
    - data/cb_warehouse/stk_daily_qfq.parquet
    - data/cb_warehouse/cb_daily.parquet
    test_design:
      train_period: 2019-01-01 to 2024-12-31
      repair_period: 2020-01-01 to 2020-12-31
      sealed_test: 2025-01-01 to 2026-05-08
      grid_search: λ in [0.0, 0.5, 1.0, 1.5, 2.0, 3.0]; also test λ=0 as baseline
        equivalence check
      evaluation: Compare each λ variant against the current baseline (cost‑on metrics)
        on total return, excess return, max drawdown, win rate, and Sharpe for train,
        2020 repair, and sealed test. Pick best variant that satisfies success criteria
        across all three partitions.
    success_criteria:
      criteria:
