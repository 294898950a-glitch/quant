    family: exit_rule
    hypothesis: 'Using the historical empirical distribution of days-to-close for
      gaps of similar initial magnitude will produce a dynamic, non‑parametric exit
      that avoids premature exits and holds winners longer, improving risk-adjusted
      returns.

      '
    source_insight: 'Current exit rules use fixed thresholds, trailing fractions,
      or simple time‑decay. The market’s gap mean‑reversion speed varies over time;
      a data‑driven exit based on the rolling percentile of days‑to‑close can adapt
      to changing conditions.

      '
    expected_improvement: 'Higher Sharpe ratio and lower drawdowns by reducing whipsaw
      exits during slow mean‑reversion periods and exiting timely when closing probabilities
      drop.

      '
    capability_ids:
    - C007
    required_executor: exit_gap_closing_percentile_executor
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    - data/cb_warehouse/cb_basic.parquet
    - data/cb_warehouse/stk_daily_qfq.parquet
    - data/cb_warehouse/cb_daily.parquet
    test_design:
      description: 'Build a rolling empirical distribution of days‑to‑close for gaps
        binned by initial gap percentage. For each open position, after a minimum
        hold period, compute the holding days percentile within the matching bin.
        Exit if holding days > targeted percentile (e.g., 75th). Grid‑search over
        min_hold_days, percentile threshold, and gap bin size.

        '
      periods:
        train:
          start: '2019-01-01'
          end: '2024-12-31'
        test:
          start: '2025-01-01'
          end: '2026-05-08'
        stress: 2020-01-01 to 2020-12-31
