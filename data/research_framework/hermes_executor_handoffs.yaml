    risk: 'Medium. Short lookback windows risk whipsaw — scaling down after one bad
      trade that reverts. Long windows may lag and keep exposure high through extended
      drawdowns. The floor parameter controls the trade-off: too high a floor (0.7)
      barely reduces exposure; too low (0.3) risks missing the recovery.

      '
