    family: entry_filter
    hypothesis: 'Entry filtering based on the short-term trend of the individual convertible
      bond''s absolute value gap (gap widening/contracting) will reduce trades during
      deteriorating mispricing, thereby improving risk-adjusted returns and reducing
      drawdowns compared to the baseline strategy.

      '
    source_insight: 'The baseline enters whenever the absolute value ratio exceeds
      a static threshold, but some wide gaps are widening (i.e., the CB is falling
      further below its intrinsic value), while others are contracting. Entering during
      widening gaps often leads to continued mark-to-market losses, especially in
      stress periods. We hypothesize that favouring contracts where the gap is already
      narrowing will improve entry timing.

      '
    expected_improvement: 'Test-set excess return improved by at least 5 ppt vs baseline;
      2020 repair year max drawdown improved by >2 ppt; overall win rate increased
      by at least 3 percentage points.

      '
