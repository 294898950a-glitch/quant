  proposal:
    proposal_id: cb_arb_value_gap_switch_reverse_moneyness_entry_filter_v1_1
    strategy_id: cb_arb_value_gap_switch
    family: reverse_moneyness_entry_filter
    hypothesis: "The moneyness entry filter (stock_close / conv_price >= threshold)\
      \ failed 4 times on the forward-sorted (descending value_gap_amount) base, but\
      \ the active critical insight value_gap_rank_is_anti_alpha_2026_05_24 demonstrates\
      \ the forward sort is anti-alpha (+41pp swing from sort direction alone, forward\
      \ -10.5% vs reverse +30.3% test excess cost-on). Applying the identical moneyness\
      \ filter to the reverse-sorted (ascending value_gap_amount) base tests whether\
      \ the filter itself is invalid or whether its prior failures were entirely caused\
      \ by the anti-alpha forward base.\nThree-answer for repeated_reject_families\
      \ moneyness_stock_to_conv_threshold: (1) Underlying signal: NOT proven invalid.\
      \ The filter hypothesis — deep OTM CB value\n    gaps are dominated by time\
      \ premium noise rather than genuine mispricing, so screening\n    them out should\
      \ improve signal quality — is theoretically sound and has not been\n    directly\
      \ falsified. The filter simply reduces the candidate pool; the test failures\n\
      \    could be entirely attributable to the pool already containing no alpha.\n\
      (2) Direction reversed: YES, the base sort was anti-alpha. The critical insight\
      \ shows\n    descending sort (most-positive first) is anti-informative; ascending\
      \ sort (least-positive\n    first) is strongly positive. The moneyness filter\
      \ was tested exclusively on the\n    anti-alpha base, so its rejections are\
      \ confounded by base-sort contamination.\n(3) Execution condition: The execution\
      \ condition (base sort direction) was wrong. Running\n    the same filter on\
      \ the reverse-sorted base isolates whether the filter adds value or\n    was\
      \ merely a victim of being stacked on an anti-alpha base. If it fails here too,\
      \ the\n    moneyness hypothesis is dead. If it succeeds, the filter was wrongly\
      \ rejected.\n"
    source_insight: value_gap_rank_is_anti_alpha_2026_05_24
    expected_improvement: 'If the moneyness filter genuinely screens noise (deep OTM
      CBs where the option Greeks are unreliable and theoretical-value gaps are least
      informative), it should improve reverse-sort profitability beyond the +30.3%
      reverse-probe-coston test excess baseline. Expected: higher win rate (+2-5pp
      from eliminating noise trades), reduced max drawdown (-2-4pp from avoiding deep-OTM
      tail events), preserved or improved cumulative excess.

      '
