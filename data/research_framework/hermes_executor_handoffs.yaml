    risk: 'Medium.  The new_valuation_v1 partial success provides strong mechanistic
      evidence that formula-side changes work where all overlays failed.  But the
      path from -0.0128 sharpe to positive sharpe may require more than momentum alone
      — liquidity terms or bid-ask spread adjustments may also be needed. Two risks:
      (1) momentum and credit distress are correlated enough that momentum adds no
      incremental discrimination over credit alone; (2) the remaining losers after
      credit adjustment are driven by factors momentum doesn''t capture (e.g. forced
      selling by institutions, regulatory events).

      '
    why_not_repeated_failure: 'This is NOT a repeated failure.  The active critical
      insight asymmetric_payoff_mechanism_2026_05_27 explicitly identifies that all
      overlay attempts (entry filters, exit rules, position scaling) uniformly fail
      because they do not change the underlying 64/36 asymmetric payoff distribution
      — they only select subsets or adjust timing within the same distribution.  new_valuation_v1
      is the ONLY direction that materially changed the payoff (max_drawdown -250M
      → -12), proving formula-side intervention works.  This proposal extends that
      proven direction with the one missing ingredient identified by the insight:
      momentum.  It does not repeat any closed family (reverse variants are closed,
      single-attribute entry filters are forbidden).  It is not a renamed bond-floor
      or moneyness filter.  It is a direct follow-up to the only partial-success result
      in the entire run history.

