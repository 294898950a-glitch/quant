      method: Grid search over IV percentile threshold (80, 85, 90, 95) and minimum
        hold days (0, 3, 5, 10).
      metric: Compare Sharpe ratio, max drawdown, and excess return in train (2019‑2024),
        2020 repair, and sealed test (2025‑2026) against baseline.
