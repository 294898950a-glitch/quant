      a sustained market drawdown, when the arbitrage mechanism breaks down because
      forced selling compresses both the bond and equity components simultaneously.
      A market-level entry gate that suspends new entries when the CSI 300 rolling
      N-day return falls below a threshold should cut bad-entry frequency during crash
      regimes, repairing 2020 and train drawdown without materially reducing trade
      count during normal periods.

      '
