      for entry removes low-signal trades where round-trip transaction costs dominate
      the edge. This filters noise entries and concentrates capital on high-conviction
      mispricings, directly attacking the -7.47pp cost degradation.

      '
    source_insight: 'Cost-on degrades cumulative excess by -7.47pp. The accepted adaptive
      duration exit (duration-adaptive-exit) improves the exit side, but entry quality
      remains the largest unresolved leverage point. Many entries likely occur at
      gap sizes of 1-3 yuan where costs consume most or all of the edge. A minimum
      gap threshold is the simplest, most direct attack on this problem — it doesn''t
      change valuation, ranking, or exit logic, only the entry bar.

      '
    expected_improvement: 'Reduce cost-on degradation from -7.47pp toward -5pp or
      better, while preserving or improving the exit-side signal from the accepted
      duration-adaptive exit. Expect lower turnover and higher average profit per
      trade as low-signal entries are suppressed.

      '
