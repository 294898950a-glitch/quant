  proposal:
    proposal_id: cb_arb_value_gap_switch_moneyness_entry_filter_1
    strategy_id: cb_arb_value_gap_switch
    family: moneyness_entry_filter
    hypothesis: 'Restricting entries to candidates where the underlying stock price
      is at or above a threshold fraction of the conversion price (stock_close / conv_price
      >= threshold) will improve signal quality by screening out deep out-of-the-money
      CBs. Deep OTM CB option values are dominated by time premium and IV assumptions,
      making their theoretical-value gaps least reliable and most likely to represent
      model noise rather than tradable mispricing. Filtering to at-least-near-the-money
      candidates should reduce noise trades and improve risk-adjusted excess returns
      without destroying the alpha signal.

      '
    source_insight: 'The accepted duration-adaptive exit (2026-05-22) addressed exit
      timing, but entry-side signal quality remains a key unresolved problem. Bond-floor
      entry filter failed mechanical thresholds (run bond-floor-entry-filter_1), and
      market drawdown entry filters failed (contrarian_drawdown_entry_20260522, market_drawdown_entry_filter).
      Both filter on dimensions external to the option itself — bond-floor is a fixed-income
      anchor, market drawdown is macro timing. Moneyness filters directly on the reliability
      of the theoretical value computation: deep OTM options have the largest model
      error because their value is almost entirely driven by volatility and credit
      spread assumptions, not intrinsic value. This is an option-specific signal-quality
      filter, not a repeat of prior entry filters.

      '
    expected_improvement: 'Improved Sharpe ratio and reduced max drawdown by filtering
      out the noisiest value-gap signals. Cumulative excess should improve if deep
      OTM candidates generate more cost drag (slippage on illiquid deep OTM CBs) than
      alpha. Even a modest improvement in signal-to-noise at entry compounds through
      the accepted duration-adaptive exit.

      '
    capability_ids:
    - C003
    required_executor: evaluate_cb_arb_moneyness_entry_filter
