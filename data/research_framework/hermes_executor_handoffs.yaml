      - theoretical_value
    test_design:
      description: 'Extend new_valuation_v1''s credit-adjusted theoretical value by
        applying a multiplicative momentum penalty: theoretical_value_momentum = credit_adjusted_TV
        × (1 - momentum_penalty_weight × max(0, -stock_momentum_zscore)).  The momentum_zscore
        is computed from the stock''s 60d cumulative return relative to the cross-sectional
        distribution on each day.  Grid search over momentum_penalty_weight in {0.1,
        0.2, 0.3, 0.5} and momentum_lookback_days in {20, 40, 60}.  Backtest uses
        reverse-probe exit logic (max_hold_days ∈ {120, 150, 180}, min_gap_pct ∈ {0.005,
        0.01}, sell_gap_pct=0.0, switch_hurdle_pct ∈ {0.0, 0.01}) with cost-on evaluation
        (slippage=0.0015, market_impact=0.001).  Train 2018-2022, test 2023-2026.  Compare
        best candidate against both new_valuation_v1 (baseline for formula improvement)
        and duration-adaptive-exit (baseline for exit quality).

        '
    success_criteria:
      criteria:
      - test_cumulative_excess_compound_gt: 0.0
      - test_sharpe_gt: 0.0
      - test_max_drawdown_gt: -50.0
      - test_win_rate_gt: 0.5
    falsifiers:
      train:
      - test_sharpe_lte: -0.05
      - test_max_drawdown_lte: -100.0
