    hypothesis: 'The reverse-rank probe (value_gap ascending sort) produces a tradeable
      base (+30.3% test excess cost-on). However, sorting ascending selects candidates
      with the smallest positive gaps — some of these may be near-distress CBs where
      the gap is small due to credit deterioration rather than genuine fair value.
      Volatility-based inverse position scaling should reduce exposure to the most
      volatile names in the ascending-sort universe, improving risk-adjusted metrics
      (drawdown, Sharpe) without destroying the alpha signal. This tests whether the
      reverse base +30.3% excess can be made safer.

      '
    source_insight: value_gap_rank_is_anti_alpha_2026_05_24
    expected_improvement: 'Sharpe ratio improvement over reverse-rank cost-on baseline.
      Max drawdown reduction below the reverse base -11.3% test drawdown. Test excess
      should retain >= 80% of the reverse base +30.3% (i.e. >= +24.2%).

      '
    capability_ids:
    - C001
    required_executor: evaluate_cb_arb_reverse_volatility_scaling
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
