    why_not_repeated_failure: 'This is not a repeat of the bond-floor entry filter
      (failed_mechanical_thresholds) or market drawdown entry filter (failed_mechanical_thresholds).
      The bond-floor filter constrains entries by CB price relative to fixed-income
      value — a different anchor. The market drawdown filter gates on macro conditions.
      The moneyness filter targets signal quality at the option-valuation level: deep
      OTM CBs have theoretical values almost entirely driven by model assumptions
      (volatility, time decay) rather than intrinsic equity value. This is a distinct
      filtering dimension that neither prior entry filter addressed. It is also not
