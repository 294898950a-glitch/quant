      a high rolling percentile (e.g., 90th) will trim tail events, reduce max drawdown,
      and improve risk-adjusted returns without sacrificing excess return in normal
      periods.
    source_insight: CB arbitrage gains come from gap compression; when IV spikes to
      extreme levels, the bond is likely overpriced relative to its option value,
      making subsequent gap closure less likely and downside risk higher. Exiting
      at elevated IV can lock in profits or avoid losses.
    expected_improvement: Reduce baseline 2020 max drawdown (-17.9%) and improve overall
      Sharpe by avoiding crowded, high‑IV positions that often reverse.
