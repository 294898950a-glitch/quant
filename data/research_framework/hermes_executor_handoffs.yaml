  proposal:
    proposal_id: cb_arb_value_gap_switch_profit-taking-exit_2026-05-19
    strategy_id: cb_arb_value_gap_switch
    family: exit_rule_enhancement
    hypothesis: 'Adding a partial profit-taking rule that exits a position when the
      value gap contracts by X% from the entry gap will improve trade‑level risk‑reward
      by reducing drawdowns from gap re‑expansion, leading to higher risk‑adjusted
      returns without materially degrading test‑period performance.

      '
    source_insight: 'Baseline train max drawdown is -0.32 despite a positive test
      environment. Many winning trades likely see the gap narrow partially before
      reversing; capturing those partial moves could lower drawdowns and improve Sharpe.

      '
    expected_improvement: 'Test excess return within 0.05 of baseline (≥0.33 vs 0.38),
      with max drawdown no worse than baseline on test and at least 10% lower max
      drawdown on train.

      '
    capability_ids: []
    missing_capability_request:
      mechanic: new_exit_rule
      description: 'Partial profit‑taking exit based on value gap contraction from
        entry. The exit is triggered when the current gap falls to (1 - target_fraction)
        * entry_gap. Target fractions to test: 0.25, 0.50, 0.75.

        '
      needed_executor: profit_take_exit
    required_executor: profit_take_exit
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    test_design:
      description: 'Sweep three target‑fraction thresholds (0.25, 0.50, 0.75) on train
        (2019‑2024), validate on the 2020 repair period, and test on the sealed 2025‑forward
        period. Compare against the current baseline with no profit‑taking exit.

        '
    success_criteria:
      criteria:
      - test excess_return >= (baseline_test_excess_return - 0.05)
      - test max_drawdown <= baseline_test_max_drawdown
      - train max_drawdown reduced by at least 10% relative to baseline train drawdown
        (-0.32)
    falsifiers:
      train:
      - test excess_return < (baseline_test_excess_return - 0.05)
      - test max_drawdown worse than baseline_test_max_drawdown
      validate:
      - test excess_return < (baseline_test_excess_return - 0.05)
      - test max_drawdown worse than baseline_test_max_drawdown
      test:
      - test excess_return < (baseline_test_excess_return - 0.05)
      - test max_drawdown worse than baseline_test_max_drawdown
    risk: 'Profit‑taking may exit too early, capping upside on trades that would have
      fully closed the gap. Implementation complexity is moderate; requires tracking
      entry gap per position.

      '
    why_not_repeated_failure: 'This is not a position‑sizing variant, regime classifier,
      option entry gate, or stop‑loss rule. It addresses exits – a dimension untouched
      by the two recent rejected experiments and not listed in the closed families.

      '
    related_prior_runs:
    - cb_arb_value_gap_switch_option-position-sizing_2026-05-17_151411
    - cb_arb_value_gap_switch_regime-trend-guard_2026-05-19
