      - any threshold introduces look-ahead bias (stock_close dated same-day or later
        than trade_date)
    risk: 'Low implementation risk — the executor is registered and the filter is
      a simple boolean mask applied before ranking, without changing any downstream
      logic. Moderate research risk — if deep OTM value gaps are actually profitable
      (contrarian to the hypothesis), the filter will degrade returns. The grid search
