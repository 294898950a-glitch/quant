  proposal:
    proposal_id: cb_arb_value_gap_switch_signal_persistence_entry_20260523
    strategy_id: cb_arb_value_gap_switch
    family: entry_signal_quality
    hypothesis: 'Many value-gap entry signals are transient noise that reverse within
      1-2 days, causing premature entries that never close profitably and drag down
      absolute PnL. Requiring the gap to persist above the entry threshold for N consecutive
      trading days before entering filters out fleeting signals and improves the quality
      of held positions.

      '
    source_insight: 'The duration-adaptive exit (accepted 2026-05-22) showed that
      holding positions longer with a decaying exit threshold improves results directionally,
      suggesting the core signal has merit but entry timing is poor. Multiple exit-rule
      experiments (profit-take, gap-trailing, IV-percentile) all failed adoption,
      while entry-gate experiments (market drawdown, contrarian drawdown) failed mechanical
      thresholds — pointing to entry signal quality, not exit rules or market timing,
      as the unresolved bottleneck.

      '
    expected_improvement: 'Higher win rate and fewer noise entries, measured as improved
      cumulative excess and reduced max drawdown relative to the current baseline
      with duration-adaptive exit.

      '
    capability_ids: []
    missing_capability_request:
      mechanic: consecutive_day_signal_persistence_gate
      label: Require value gap above threshold for N consecutive days before entry
      rationale: 'No existing capability covers per-symbol signal persistence filtering.
        C009 is market-level only; C001-C003 executors are blocked by closed families;
        C005/C010 are blocked by closed regime tags; C004/C007 cover feedback and
        exits, not entry.

