  proposal:
    proposal_id: cb_arb_value_gap_switch_moneyness_entry_filter
    strategy_id: cb_arb_value_gap_switch
    family: entry_quality_filter
    hypothesis: 'Restricting entries to candidates where the underlying stock price
      is at or above a threshold fraction of the conversion price (stock_close / conv_price
      >= threshold) will improve signal quality by screening out deep out-of-the-money
      CBs. Deep OTM CB option values are dominated by time premium and IV assumptions,
      making their theoretical-value gaps least reliable and most likely to represent
      model noise rather than tradable mispricing.

      '
    source_insight: 'The duration-adaptive exit was accepted and improved exit timing,
      but the overall strategy remains unprofitable (cost-on cumulative excess -10.47%).
      Market-level entry filters (market_drawdown_entry_filter, contrarian_drawdown_entry)
      both failed mechanical thresholds because they suppress ALL entries indiscriminately
      during adverse conditions. Post-entry position scaling (volatility, PnL feedback)
      failed adoption. This points to candidate-level entry quality as the unresolved
      lever: filter individual CBs before entry based on fundamental characteristics
      that predict signal reliability, rather than suppressing all entries based on
      market conditions or adjusting sizing after the fact.

      '
    expected_improvement: 'Fewer noise-driven entries should increase win rate and
      cumulative excess return. Effect expected to be strongest in high-volatility
      regimes where OTM CB value gaps are least reliable. Risk of over-filtering is
      testable via the threshold grid.

      '
    capability_ids:
    - C003
    required_executor: moneyness_entry_filter_executor
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    - data/cb_warehouse/cb_basic.parquet
    - data/cb_warehouse/stk_daily_qfq.parquet
    required_data_fields:
