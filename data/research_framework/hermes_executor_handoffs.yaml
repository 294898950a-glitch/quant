      first appears today is more likely to close profitably than one persisting for
      weeks (already priced in). By restricting entries to "fresh" gaps — first observed
      within N calendar days — we improve signal-to-noise ratio and reduce low-quality
      trades that bleed to costs.

      '
    source_insight: 'The accepted duration-adaptive exit (2026-05-22) proved time-decay
      dynamics matter on the exit side. The same principle should apply on entry:
      gap age carries information. Prior entry-side experiments (contrarian_drawdown_entry,
      market_drawdown_entry_filter) all failed because they targeted market-level
      timing instead of signal-level timing. This addresses signal quality directly
      — filtering stale gaps before ranking — rather than market timing.

      '
    expected_improvement: 'Reduce trade count by 20-40% by dropping stale-gap entries,
      while maintaining or improving per-trade profitability. Target: cut cost drag
      from -7.47pp toward -4pp without destroying the signal alpha that produces the
      pre-cost excess.

      '
