  proposal:
    proposal_id: cb_arb_value_gap_switch_bond_floor_entry_filter_20260522
    strategy_id: cb_arb_value_gap_switch
    family: entry_filter
    hypothesis: 'Constraining entries to periods when the CB price is near its bond
      floor provides intrinsic downside protection. The bond floor acts as a hard
      valuation anchor — when the CB trades far above it, the value-gap signal may
      reflect noise or speculative premium rather than genuine mispricing. Filtering
      to near-floor entries should reduce drawdowns and improve risk-adjusted returns
      without destroying the alpha signal.

      '
    source_insight: 'Exit-side optimizations (duration-adaptive) have passed adoption
      review but the strategy remains deeply unprofitable (cost-on cumulative excess
      -10.47pp). Market-level entry filters (drawdown gate, contrarian drawdown) failed
      mechanical thresholds. Individual-CB-level entry filtering based on intrinsic
      value characteristics has not been tested. The bond floor is the most natural
      intrinsic anchor for a CB strategy focused on value gaps.

      '
    expected_improvement: 'Cumulative excess compound improvement of at least 5pp
      (from -10.47pp toward -5pp or better) by reducing participation in overpriced
      CBs where the value gap is unreliable. Expected reduction in max single-year
      drawdown and improvement in Sharpe from fewer high-downside exposures.

      '
    capability_ids:
    - C002
    required_executor: 'A bond-floor entry filter executor. The only executor currently
      listed for C002 (option_position_sizing) belongs to a family in closed_tags.
      A new executor is needed that computes bond floor from cb_basic (par_value,
      coupon_rate, maturity_date), compares daily CB close to bond floor, and suppresses
      entries when CB close / bond floor exceeds a configurable threshold. Until registered,
      this proposal is DRAFT.

      '
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    - data/cb_warehouse/cb_basic.parquet
    - data/cb_warehouse/stk_daily_qfq.parquet
    - data/cb_warehouse/cb_daily.parquet
    required_data_fields:
      data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet:
      - all columns as produced by the value-gap pipeline
      data/cb_warehouse/cb_basic.parquet:
      - ts_code
      - par_value
      - coupon_rate
      - maturity_date
      - list_date
      data/cb_warehouse/stk_daily_qfq.parquet:
      - ts_code
      - trade_date
      - close
      data/cb_warehouse/cb_daily.parquet:
      - ts_code
      - trade_date
      - close
    test_design:
      description: 'Grid search over bond-floor proximity thresholds (CB close / bond_floor
        < 1.00, 1.05, 1.10, 1.15, 1.20) and optional minimum-consecutive-days-below-threshold
        (1, 3, 5). Bond floor computed as present value of remaining coupon payments
        plus par at maturity, discounted at a fixed risk-free rate (e.g., 3% constant
        or LPR proxy). Baseline scoring, sizing, and exit logic unchanged. Compare
        cumulative excess, max drawdown, Sharpe, and trade count against baseline.

        '
    success_criteria:
      criteria:
      - cumulative_excess_compound_improvement >= 5pp vs baseline
      - max_single_year_drawdown < 15%
      - any_holdout_year_sharpe > 0.5
      - trade_count remains above 50% of baseline (avoid over-filtering)
    falsifiers:
      train:
      - no threshold produces cumulative excess better than baseline
      - all viable thresholds reduce trade count below 50% of baseline
      - max drawdown worsens vs baseline for all thresholds
      - best-threshold cumulative excess compound still < -5pp (improvement exists
        but strategy remains uninvestable)
      validate:
      - no threshold produces cumulative excess better than baseline
      - all viable thresholds reduce trade count below 50% of baseline
      - max drawdown worsens vs baseline for all thresholds
      - best-threshold cumulative excess compound still < -5pp (improvement exists
        but strategy remains uninvestable)
      test:
      - no threshold produces cumulative excess better than baseline
      - all viable thresholds reduce trade count below 50% of baseline
      - max drawdown worsens vs baseline for all thresholds
      - best-threshold cumulative excess compound still < -5pp (improvement exists
        but strategy remains uninvestable)
    risk: 'Bond floor is a simplified PV calculation and may not reflect actual recovery
      value for distressed CBs. Filtering too aggressively may eliminate genuine alpha
      opportunities since value-gap signals may be strongest when CBs temporarily
      dislocate from fundamentals. If the bond floor itself is noisy or poorly estimated,
      the filter adds randomness rather than signal.

      '
    why_not_repeated_failure: 'Previous entry-side failures (market_drawdown_entry_filter,
      contrarian_drawdown_entry) were market-level regime/drawdown filters. This proposal
      uses individual-CB-level intrinsic valuation (bond floor proximity), an entirely
      different filtering dimension. No prior run has tested bond-floor-based entry
      gating. Not a rephrase of any failed or closed direction.

      '
    related_prior_runs:
    - cb_arb_value_gap_switch_market_drawdown_entry_filter
    - cb_arb_value_gap_switch_contrarian_drawdown_entry_20260522
    - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
    implementation_assumption: 'Bond floor = sum of discounted future coupon payments
      + discounted par value, using a constant discount rate. The entry filter is
      a boolean mask applied before scoring: if CB close / bond_floor > threshold,
      suppress entry for that CB on that day. Grid search over threshold and min-days-below.
      The duration-adaptive exit (best accepted result to date) should be used as
      the exit baseline for this test to measure marginal improvement from the entry
      filter.'
