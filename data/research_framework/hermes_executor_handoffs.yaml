      max_drawdown=-0.179, score=-0.240. Baseline train max_drawdown -0.324 vs test
      -0.098. All 11 position-sizing variants also failed 2020 (best: score -0.185);
      the progressive stocklike variant that won on train still scored -0.185 in 2020.
      This confirms the problem is not HOW MUCH to buy but WHEN to stop entering.
      A market-regime gate is orthogonal to every closed direction, all of which were
      bond-level or option-level position-size signals.

      '
    expected_improvement: '2020 score from -0.240 to >= -0.10; train score from 0.050
