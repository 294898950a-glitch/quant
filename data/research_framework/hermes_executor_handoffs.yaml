  proposal:
    proposal_id: cb_arb_value_gap_switch_gap_freshness_entry_filter
    strategy_id: cb_arb_value_gap_switch
    family: entry_signal_quality
    hypothesis: 'Value gap signals decay in predictive power with age. A gap that
      first appears today is more likely to close profitably than one persisting for
      weeks (already priced in). By restricting entries to "fresh" gaps — first observed
      within N calendar days — we improve signal-to-noise ratio and reduce low-quality
      trades that bleed to costs.

      '
    source_insight: 'The accepted duration-adaptive exit (2026-05-22) proved time-decay
      dynamics matter on the exit side. The same principle should apply on entry:
      gap age carries information. Prior entry-side experiments (contrarian_drawdown_entry,
      market_drawdown_entry_filter) all failed because they targeted market-level
      timing instead of signal-level timing. This addresses signal quality directly
      — filtering stale gaps before ranking — rather than market timing.

      '
    expected_improvement: 'Reduce trade count by 20-40% by dropping stale-gap entries,
      while maintaining or improving per-trade profitability. Target: cut cost drag
      from -7.47pp toward -4pp without destroying the signal alpha that produces the
      pre-cost excess.

      '
    capability_ids: []
    missing_capability_request:
      mechanic: gap_freshness_entry_filter
      label: 'Filter entries by gap persistence — only allow entry when the current
        value gap first appeared within the last K calendar days. Compute gap_age
        per CB per day as days since the gap first opened (reset to zero when gap
        closes). Apply boolean entry mask before signal ranking.

        '
      required_executor_description: 'For each trade_date in the daily gap snapshot,
        compute gap_age for every CB with a non-zero gap by tracking the most recent
        gap-open date. Apply a boolean mask: allow entry only when gap_age <= max_age_days
        (tunable). The remaining candidates pass through the existing signal ranking,
        position sizing, and exit logic unchanged. Grid-search max_age_days over [1,
        3, 5, 10, 20, 40, 60, inf]. The inf case (no filter) serves as the within-run
        baseline.

        '
      required_data:
      - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
      - data/cb_warehouse/cb_basic.parquet
    required_executor: gap_freshness_entry_filter_executor
    required_data:
    - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
    - data/cb_warehouse/cb_basic.parquet
    required_data_fields:
      data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet:
      - trade_date
      - ts_code
      - value_gap
      data/cb_warehouse/cb_basic.parquet:
      - ts_code
      - list_date
      - delist_date
    test_design:
      method: grid_search
      param: max_age_days
      values:
      - 1
      - 3
      - 5
      - 10
      - 20
      - 40
      - 60
      - inf
      baseline: max_age_days=inf (no filter, equivalent to current backtest)
      train_period: 2018-2022
      test_period: 2023-2025
      metrics:
      - cumulative_excess_compound_cost_on
      - annual_sharpe_cost_on
      - max_drawdown_cost_on
      - trade_count
      - win_rate
      - avg_holding_days
    success_criteria:
      criteria:
      - cumulative_excess_compound_cost_on > -0.05
      - max_drawdown_cost_on < 0.30
      - trade_count_reduction_pct > 15
      - best_param_test_period_sharpe > 0
    falsifiers:
      train:
      - cumulative_excess_compound_cost_on <= -0.1047
      - no param produces positive cost-on excess
      - best_param_win_rate < baseline_win_rate - 0.05
      validate:
      - cumulative_excess_compound_cost_on <= -0.1047
      - no param produces positive cost-on excess
      - best_param_win_rate < baseline_win_rate - 0.05
      test:
      - cumulative_excess_compound_cost_on <= -0.1047
      - no param produces positive cost-on excess
      - best_param_win_rate < baseline_win_rate - 0.05
    risk: 'Low structural risk. This is an additive pre-filter that layers on existing
      logic without modifying signal ranking, position sizing, or exit rules. Main
      risk: aggressive freshness thresholds (small max_age_days) may eliminate too
      many trades and create concentration or idle-cash drag. Mitigated by grid-searching
      up to inf and evaluating trade count decline alongside PnL.

      '
    why_not_repeated_failure: 'Not a repeat of contrarian_drawdown_entry or market_drawdown_entry_filter
      — those were market-level timing filters that both failed mechanical thresholds.
      This targets individual signal quality (gap persistence) rather than market
      regime. Not an exit rule variant. Not related to any closed family: the closed
      tags cover option-related mechanics, regime classifiers, panic reruns, and universe
      filters — none address per-signal temporal freshness. No prior run has tested
      gap age as an entry criterion.

      '
    related_prior_runs:
    - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
    - cb_arb_value_gap_switch_contrarian_drawdown_entry_20260522
    - cb_arb_value_gap_switch_market_drawdown_entry_filter
    implementation_assumption: 'The daily_value_gap_amounts.parquet provides daily
      gap values per CB. Gap freshness is computed by forward-filling each CB''s gap-open
      date: when value_gap transitions from zero/NaN to positive, record that trade_date
      as gap_open_date. gap_age = trade_date - gap_open_date (calendar days). Reset
      gap_open_date to null when value_gap returns to zero/NaN. The entry mask excludes
      CBs with gap_age > max_age_days before the existing signal ranking step. All
      other backtest logic remains identical to the current evaluate_cb_arb_value_gap_switch.py
      path.'
