    test_design:
      description: 'Grid search over two parameters: rolling PnL lookback window (20,
        40, 60 days) and scaling floor (0.3, 0.5, 0.7). For each candidate on each
        day, compute rolling average realized PnL over the lookback. If average PnL
        >= 0, scale = 1.0. If average PnL < 0, scale linearly from 1.0 down to the
        floor proportional to the negative PnL magnitude. Apply the scale factor to
        the baseline position weight and buy amount. Entry eligibility and exit rules
        remain unchanged from baseline.

        '
