      absolute value gap entry threshold. C002 (close_to_bond_floor_threshold) is
      the closest existing mechanic — it triggers on CB price relative to bond floor
      — but the proposed mechanic triggers on the value gap itself (theoretical -
      market). C001 (static_candidate_position_scale) is about position weighting,
      not entry eligibility. C009 (global_entry_filter) is market-level, not bond-level.
