  proposal:
    proposal_id: ideation_2026-05-21_gap_decay_bond_floor_exit
    strategy_id: cb_arb_value_gap_switch
    family: exit_rule
    hypothesis: A time‑decaying gap exit that tightens the gap‑closing threshold as
      the convertible bond approaches its bond floor (from above) will reduce drawdown
      during credit stress without materially cutting upside in normal periods.
    source_insight: Baseline win rate dropped to 29.3% in 2020 with excess return
      -19.5% and max drawdown -17.9%, driven by bonds widening gaps while approaching
      bond floor. Pure gap‑decay exits lacked floor context. Adding bond‑floor proximity
      as a dynamic multiplicator to the decay threshold can force earlier exits when
      downside risk is highest.
    expected_improvement: Improve 2020 excess return and max drawdown relative to
      baseline, while maintaining positive excess return in test period.
    capability_ids: []
    missing_capability_request:
      label: gap_decay_exit_with_bond_floor_awareness
      description: An exit rule that tracks entry gap, min_hold_days, and a decaying
        threshold (linearly from initial_threshold_fraction to 0 over max_hold_days).
        Additionally, it calculates a bond‑floor proximity metric (e.g., CB price
        / bond floor – 1) each day; as that metric declines below a configurable threshold,
        the decay threshold is multiplied by a factor < 1, accelerating exits when
