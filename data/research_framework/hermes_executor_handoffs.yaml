    family: signal_enhancement
    hypothesis: Penalizing the raw value gap by recent realized volatility when ranking
      CB candidates will produce a steadier spread capture, reducing drawdowns in
      volatile markets (e.g., 2020) without sacrificing performance in calm markets,
      because high-volatility names often mean-revert less predictably and carry greater
      downside risk.
    source_insight: The baseline value-gap strategy suffered a -0.179 max drawdown
      and -0.195 excess return in 2020, while later calm-test periods showed strong
      positive performance. Prior attempts to scale positions by volatility or market
      drawdown failed because they only adjusted sizing or entry gating, not the core
      ranking signal. Blending volatility into the signal itself may encourage selection
      of cheaper, lower-risk candidates during turbulent regimes.
    expected_improvement: Reduce 2020 repair test max drawdown by at least 0.05 (e.g.,
      from -0.179 to better than -0.13) and improve 2025‑2026 sealed test Sharpe ratio
      by ≥0.1 versus the cost‑on baseline, while maintaining positive excess return
      in train and test.
    capability_ids: []
    missing_capability_request: 'A new executor that computes a composite ranking
      score for each candidate: rank_score = raw_value_gap / (1 + λ * σ_realized,20d),
      where σ_realized,20d is the annualized 20‑day realized volatility of the underlying
      stock, and λ is a grid‑searched scalar. This requires no new data beyond existing
      cb/stk daily prices but needs a new ranking pipeline. The mechanic does not
      match any existing capability (C001‑C010) because it changes how candidates
      are ranked before position sizing or entry gating, not just a static scale on
