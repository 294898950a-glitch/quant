schema_version: 1
updated_at: "2026-05-17T23:20:00+08:00"
purpose: "Machine-readable registry for EvidenceToolkit tools. AI agents may write new evidence tools, but the tool must be registered here before use."

registration_rules:
  existing_tools_must_be_injected_before_new_tool: true
  prohibit_unregistered_tool_calls: true
  required_new_tool_fields:
    - id
    - status
    - owner
    - module_path
    - callable
    - description
    - allowed_roles
    - max_budget_yuan
    - registration_reason
    - why_existing_tools_insufficient
    - reviewed_existing_tool_ids
    - existing_tools_manifest_sha256
    - created_at
  allowed_statuses:
    - implemented
    - draft
    - disabled
  allowed_roles:
    - ideator
    - reviewer
    - compiler
    - orchestrator

tools:
  artifact_consistency_check:
    status: implemented
    owner: codex
    module_path: framework/autonomous/verification_tool.py
    callable: _execute_request
    request_type: artifact_consistency_check
    description: "Check review.yaml source artifact paths and sha256 hashes against current files."
    allowed_roles: [ideator, reviewer]
    max_budget_yuan: 0
    registration_reason: "Built-in evidence guard for fact integrity."
    why_existing_tools_insufficient: "Initial built-in tool."
    reviewed_existing_tool_ids: []
    created_at: "2026-05-17T23:20:00+08:00"

