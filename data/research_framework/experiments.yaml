research_insights:
- id: cb_arb_2020_fundamental_dead_zone_20260517
  summary: '2020 is a fundamental dead zone for cb_arb: weakness was broad across
    trades, not a tail event that a single filter can remove.'
  implications:
  - Do not relaunch single-filter fixes for 2020.
  - Any future cb_arb work must explain broad cross-trade weakness.
- id: cb_arb_panic_detector_family_dead_20260517
  summary: The panic-detector family is rejected because same-day cross-sectional
    metrics cannot separate true and false panic, and post-panic action did not restore
    alpha.
  implications:
  - Do not rerun panic detector variants without a new, non-equivalent mechanism.
- id: cb_arb_2024_overlay_false_positive_20260517
  summary: Naked 2024 baseline was roughly OK; rejected panic overlays created the
    large 2024 path damage.
  implications:
  - Do not use 2024 overlay damage as evidence that naked baseline needed the same
    overlay.
- id: cb_arb_hdrf_beats_self_loop_20260517
  summary: Leave-one-year-out HDRF plus user domain insight beat the sealed-pool self-loop
    tuning route; 2019 showed about a 26pp gap.
  implications:
  - Prefer leave-one-year-out evidence over sealed-pool tuning when the two conflict.
- id: cb_arb_cost_realism_wall_20260517
  summary: Cost realism degraded main cb_arb by -6.76pp and value-gap switch by -7.47pp,
    above the 5pp fatal threshold.
  implications:
  - Cost-off results are not deployment-valid for cb_arb.
- id: cb_arb_main_vs_value_gap_amendment_20260517
  summary: Main relative-ranking cb_arb is distinct from the absolute value-gap variant;
    2019 main was -9.85% while value-gap was +16.1%, a roughly 26pp signal.
  implications:
  - Do not treat main-strategy failure as proof the absolute value-gap ranking idea
    is rejected.
  - Promoting absolute value-gap into current strategy truth still requires explicit
    user approval and proper validation.
