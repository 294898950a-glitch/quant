schema_version: 1
updated_at: '2026-05-17T22:00:00+08:00'
purpose: Machine-readable registry of implemented research executors. Spec Compiler
  must use this file for hard executor matching; AI proposals cannot self-certify
  executability.
matching_rules:
  require_all_mechanics_in_can_test: true
  reject_if_any_mechanic_in_cannot_test: true
  reject_closest_executor_fallback: true
  require_required_data_exists: true
  require_vm_for_cb_arb: true
  require_local_minutes_zero_for_cb_arb: true
mechanic_tags:
  static_candidate_position_scale: Static candidate ranking/cash scaling before buy,
    based on contemporaneous candidate attributes.
  close_to_bond_floor_threshold: Use CB close / bond_floor threshold as a static trigger.
  moneyness_stock_to_conv_threshold: Use stock close / conversion price threshold
    as a static trigger.
  rolling_pnl_feedback: Use realized recent PnL feedback to adjust exposure.
  dynamic_regime_switch: Switch behavior by a dynamic learned or rule-based market
    state.
  new_valuation_formula: Change the theoretical valuation formula.
  new_exit_rule: Change sell/exit logic.
  new_data_source: Require a data source not already registered for the executor.
capabilities:
  C001:
    mechanic: static_candidate_position_scale
    label: Static candidate position/ranking scaling
  C002:
    mechanic: close_to_bond_floor_threshold
    label: Trigger by CB close relative to bond floor
  C003:
    mechanic: moneyness_stock_to_conv_threshold
    label: Trigger by stock close relative to conversion price
  C004:
    mechanic: rolling_pnl_feedback
    label: Use realized recent PnL feedback to adjust exposure
  C005:
    mechanic: dynamic_regime_switch
    label: Switch behavior by dynamic market regime
  C006:
    mechanic: new_valuation_formula
    label: Change theoretical valuation formula
  C007:
    mechanic: new_exit_rule
    label: Change sell/exit logic
  C008:
    mechanic: new_data_source
    label: Require a new data source
executors:
  option_position_sizing:
    id: option_position_sizing
    version: 1
    status: implemented
    strategy_id: cb_arb_value_gap_switch
    family: option_position_sizing
    script_path: scripts/evaluate_cb_arb_option_position_sizing.py
    owner: codex
    description: Evaluate static position/ranking scaling for option-sourced value-gap
      candidates without changing theoretical value or entry eligibility.
    can_test:
    - static_candidate_position_scale
    - close_to_bond_floor_threshold
    - moneyness_stock_to_conv_threshold
    can_test_capability_ids:
    - C001
    - C002
    - C003
    cannot_test:
    - rolling_pnl_feedback
    - dynamic_regime_switch
    - new_valuation_formula
    - new_exit_rule
    - new_data_source
    cannot_test_capability_ids:
    - C004
    - C005
    - C006
    - C007
    - C008
    required_data:
    - path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
      description: Base value-gap ranks with theoretical value, bond floor, option
        value, position cash, and tradable gap amount.
      schema_hash: null
    - path: data/cb_warehouse/cb_basic.parquet
      description: CB basic table with stock code and conversion price.
      schema_hash: null
    - path: data/cb_warehouse/stk_daily_qfq.parquet
      description: Forward-adjusted stock prices for moneyness calculation.
      schema_hash: null
    required_config_fields:
    - data_root
    - train_start
    - train_end
    - test_start
    - test_end
    - fixed_source
    - rule
    - output_dir
    - base_ranks_path
    - cost_model_enabled
    command_template:
    - .venv/bin/python
    - scripts/evaluate_cb_arb_option_position_sizing.py
    - --data-root
    - '{data_root}'
    - --train-start
    - '{train_start}'
    - --train-end
    - '{train_end}'
    - --test-start
    - '{test_start}'
    - --test-end
    - '{test_end}'
    - --fixed-source
    - '{fixed_source}'
    - --rule
    - '{rule}'
    - --output-dir
    - '{output_dir}'
    - --base-ranks-path
    - '{base_ranks_path}'
    - --reuse-ranks
    - --cost-model-enabled
    default_config:
      data_root: data/cb_arb_concurrent_supervised_20260511_094500
      train_start: '20190101'
      train_end: '20241231'
      test_start: '20250101'
      test_end: '20260508'
      fixed_source: '2'
      rule: score_4state
      base_ranks_path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
      cost_model_enabled: true
    artifacts_produced:
    - summary_option_position_sizing.csv
    - yearly_option_position_sizing.csv
    - entry_source_2020_option_position_sizing.csv
    - entry_source_test_option_position_sizing.csv
    - adjustment_option_position_sizing.csv
    - summary.json
    - report.yaml
    - l4_ack.yaml
    - diagnostic.yaml
    budget_estimate:
      sig_minutes: 0
      spot_minutes: 60
      local_minutes: 0
      estimated_cost_yuan: 0.0
    vm_local_limits:
      vm_required: true
      local_allowed: false
    obsolescence_date: null
