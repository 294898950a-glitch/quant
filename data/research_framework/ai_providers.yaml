schema_version: 1
active_provider: hermes
policy:
  allowed_entrypoint: scripts/run_strategy_ideation_once.py
  allowed_entrypoints:
    - scripts/run_strategy_ideation_once.py
    - scripts/review_result.py
    - scripts/validate_data_quality.py
    - scripts/repair_data_quality.py
  background_call_allowed: false
  provider_must_be_registered: true
providers:
  hermes:
    enabled: true
    kind: command_adapter
    model: hermes
    allowed_entrypoint: scripts/run_strategy_ideation_once.py
    allowed_entrypoints:
      - scripts/run_strategy_ideation_once.py
      - scripts/review_result.py
      - scripts/validate_data_quality.py
      - scripts/repair_data_quality.py
    prompt_mode: stdin
    timeout_seconds: 600
    command:
      - python3
      - scripts/hermes_provider_adapter.py
      - --timeout-seconds
      - "600"
    note: "Active registered provider. Uses Hermes command adapter; no direct OpenAI-compatible API key is configured."
