schema_version: 1
version: "1.6-machine"
updated_at: "2026-05-19T11:58:00+08:00"
authority: machine

rules:
  - id: R1
    name: runtime_context
    summary: "AI runtime context is loaded from data/research_framework/runtime_entrypoints.yaml; Markdown maps are not runtime sources."
    required_files:
      - data/research_framework/runtime_entrypoints.yaml
      - data/research_framework/current.yaml
      - data/research_framework/strategies.yaml
      - data/research_framework/baseline_registry.yaml
      - data/research_framework/experiments.yaml
      - data/research_framework/research_insights.yaml
      - data/research_framework/protocol_rules.yaml
    forbid_markdown_runtime_sources: true

  - id: R2
    name: evidence
    summary: "Claims must point to data, reports, run manifests, records, git facts, or outbox/state messages."
    allowed_evidence_types:
      - data_file
      - report
      - run_manifest
      - ledger_record
      - git_fact
      - outbox_state

  - id: R3
    name: research_design_gate
    summary: "New research batches must be created through scripts/new_research.py; filled specs can run through scripts/auto_research_pipeline.py."
    required_launcher: scripts/new_research.py
    automatic_pipeline: scripts/auto_research_pipeline.py
    automatic_steps:
      - load_spec
      - require_data_quality_decision
      - repair_candidate_data_quality
      - revalidate_after_data_repair
      - gatekeeper_before_run
      - execute_spec_command
      - verify_artifacts
      - derive_verdict
      - write_run_manifest
      - update_experiments_yaml
    pre_run_gates:
      - validate_spec.py
      - validate_data_quality.py
      - validate_data_schema.py
      - research_sanity_checker.py
      - validate_gatekeeper_compliance.py

  - id: R5
    name: protected_decisions
    summary: "AI cannot archive current strategy, promote to live, change protocol, or revive rejected directions without user approval."
    user_required_actions:
      - archive_current_strategy
      - promote_to_live
      - change_protocol_rules
      - revive_rejected_direction
      - promote_prototype_to_current_truth

  - id: R6
    name: truth_sync
    summary: "Truth-affecting changes require CURRENT/baseline sync or a machine-readable waiver, and are automatically appended to the protected-action audit log."
    validator: scripts/validate_truth_sync.py
    truth_paths:
      - data/research_framework/current.yaml
      - data/research_framework/baseline_registry.yaml
    waiver_dir: data/research_framework/truth_sync_waivers
    audit_log: data/research_framework/protected_action_audit.jsonl
    audit_rule: "Trace records are automatic and do not grant approval; they preserve evidence even when a protected action is unauthorized."

  - id: R7
    name: experiment_registry_sync
    summary: "Completed, abandoned, rejected, or promoted experiments must update data/research_framework/experiments.yaml."
    registry: data/research_framework/experiments.yaml
    affects_current_strategy_default: false

  - id: R8
    name: external_message_bridge
    summary: "External outbox files are notification evidence only; they are not runtime entrypoints and cannot advance quant workflow state."
    root: /mnt/c/Users/陈教授/Desktop/ai/projects/quant
    codex_status_outbox: codex/outbox.md
    claude_status_outbox: claude/outbox.md
    runtime_source: false
    may_trigger_workflow_step: false

  - id: R9
    name: no_reply_default
    summary: "If user does not answer within 30 minutes, keep current strategy but choose another research direction."
    timeout_minutes: 30
    default_actions:
      - keep_current_strategy
      - choose_another_research_direction
      - do_not_archive
      - do_not_promote_to_live

  - id: R10
    name: compute_placement
    summary: "Heavy backtests, cb_arb run/evaluate/search jobs, and any run with spot_minutes > 0 must execute on an allowed VM/spot host, not on the local workstation."
    enforced_by:
      - scripts/auto_research_pipeline.py
      - scripts/research_sanity_checker.py
    allowed_hostnames:
      - VM-0-9-opencloudos
      - VM-0-4-ubuntu
    local_workstation_allowed_for:
      - dry_run
      - no_execute_classification
      - lightweight_validation
    wait_for_user_when:
      - required_spot_host_unavailable
