schema_version: 2
updated_at: "2026-05-20T03:10:00+08:00"
authority: machine
purpose: "Machine-readable acceptance criteria for the pruned 5-node quant autonomous research framework."

active_components:
  - id: state_and_rules
    owns:
      - current strategy state
      - protocol rules
      - allowed AI providers
      - executor and evidence registries
    files:
      - data/research_framework/current.yaml
      - data/research_framework/protocol_rules.yaml
      - data/research_framework/ai_providers.yaml
      - data/research_framework/executor_registry.yaml
      - data/research_framework/evidence_tool_registry.yaml
    must:
      - "Be the only source for current truth, limits, allowed providers, allowed executors, and allowed evidence tools."
      - "Reject unregistered providers, unregistered executors, and unregistered evidence tools."
    must_not:
      - "Run research."
      - "Generate proposals."
      - "Review results."

  - id: ideation
    owns:
      - reading current research context
      - asking a registered AI for one proposal
      - asking the same registered AI for draft executor design when no executor matches
      - writing executor-code handoffs for Hermes after design validation passes
      - provenance for all AI responses
    files:
      - framework/autonomous/ideation_cycle.py
      - framework/autonomous/queue_ideation.py
      - framework/autonomous/strategy_ideator.py
      - framework/autonomous/ai_provider_adapter.py
      - framework/autonomous/hermes_executor_handoff.py
      - scripts/run_strategy_ideation_once.py
      - scripts/hermes_executor_handoff_tick.py
    must:
      - "First AI call produces exactly one proposal."
      - "If the proposal compiles READY, do not make tool-design or tool-code AI calls."
      - "If the proposal compiles DRAFT because no executor/tool matches, make one tool-design AI call for registry metadata and implementation outline."
      - "If tool design passes hard validation, create a Hermes executor-code handoff instead of asking a background AI for code."
      - "Hermes may only write the generated executor package and descriptor for the handoff it claimed."
      - "Use only registered AI providers."
    must_not:
      - "Run VM jobs."
      - "Write current strategy truth."
      - "Start the research queue runner."

  - id: proposal_gate
    owns:
      - proposal validation
      - executor matching
      - spec compilation
      - DRAFT versus READY decision
      - closed-direction enforcement
    files:
      - framework/autonomous/proposal_schema.py
      - framework/autonomous/executor_registry.py
      - framework/autonomous/spec_compiler.py
    must:
      - "READY only when proposal, executor, data, and closed-direction checks pass."
      - "DRAFT when executor or implementation is missing."
      - "REJECT when proposal repeats a closed direction."
    must_not:
      - "Ask an AI for a new idea."
      - "Run backtests."
      - "Promote a result."

  - id: runner
    owns:
      - project-owned wakeup
      - queue state
      - VM launch
      - remote status checks
      - result sync
      - marking synced results review_pending
    files:
      - scripts/quant_internal_tick.py
      - scripts/run_quant_internal_tick.sh
      - scripts/research_queue_runner.py
      - framework/autonomous/queue_remote_execution.py
      - framework/autonomous/workflow_state.py
      - scripts/quant_access_guard.py
      - scripts/auto_research_pipeline.py
    must:
      - "Advance only the one currently allowed mechanical step."
      - "Run heavy cb_arb work on VM or spot host, not local workstation."
      - "Stop on system error before requesting a new direction."
    must_not:
      - "Call an AI."
      - "Invent a strategy."
      - "Review a result."

  - id: review_memory
    owns:
      - result review
      - evidence checks
      - recent result digest
      - experiment and insight updates
    files:
      - framework/autonomous/result_reviewer.py
      - framework/autonomous/recent_results_digest.py
      - framework/autonomous/queue_review_memory.py
      - framework/autonomous/verification_tool.py
      - framework/autonomous/evidence_tool_registry.py
      - scripts/build_recent_results_digest.py
    must:
      - "Separate mechanically extracted facts from AI interpretation."
      - "Record why a direction was accepted, rejected, blocked, or needs follow-up."
      - "Feed only compact recent results back into ideation."
    must_not:
      - "Start VM jobs."
      - "Change current strategy truth."
      - "Generate the next proposal directly."

compatibility_modules_not_architecture_nodes:
  artifacts: framework/autonomous/artifacts.py
  paths: framework/autonomous/paths.py
  framework_change_recorder: framework/autonomous/framework_change_recorder.py

old_to_new_component_map:
  executor_registry: proposal_gate
  proposal_schema: proposal_gate
  spec_compiler: proposal_gate
  ai_provider_adapter: ideation
  strategy_ideator: ideation
  result_reviewer: review_memory
  recent_results_digest: review_memory
  verification_tool: review_memory

closed_directions_tags:
  panic_filter:
    insight_id: panic_detector_dead_end
    reject_count: 4
  global_entry_filter:
    insight_id: single_filter_dead_end
    reject_count: 1
  regime_conditioned_entry_filter:
    insight_id: regime_option_entry_gate_reject_2026_05_17
    reject_count: 1
  valuation_haircut_global:
    insight_id: option_source_value_gap_structural_tradeoff_2026_05_17
    reject_count: 1
  universe_subset_filter:
    insight_id: universe_filter_retest_reject_2026_05_17
    reject_count: 1
  cross_sectional_option_value_ranking:
    insight_id: option_source_value_gap_structural_tradeoff_2026_05_17
    reject_count: 7
    note: "All cb_arb_value_gap_switch family. Fundamental, not fixable by simple mechanism."

acceptance:
  max_active_components: 5
  required_active_components:
    - state_and_rules
    - ideation
    - proposal_gate
    - runner
    - review_memory
  no_default_background_ai: true
  runner_cannot_call_ai: true
  ideation_cannot_run_jobs: true
  proposal_gate_cannot_run_jobs: true
  review_memory_cannot_start_next_proposal: true
  compute_budget_is_not_active_gate: true

test_files:
  - framework/tests/test_autonomous_research_executor_registry.py
  - framework/tests/test_autonomous_research_proposal_and_compiler.py
  - framework/tests/test_autonomous_research_reviewer_and_digest.py
  - framework/tests/test_autonomous_research_runner_and_adapters.py
