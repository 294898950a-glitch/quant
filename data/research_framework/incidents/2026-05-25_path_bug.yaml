        `should_rerun_after_infra_fix: true`.

archaeology:
  data_directories_preserved: yes  # all `data/<run_id>/` directories with
    # spec/proposal/auto_pipeline.log retained on disk for postmortem
    # access; they are simply no longer referenced from the live queue.
  retrieval: |
    `ls data/cb_arb_value_gap_switch_*volatility_position_scaling*` to
    enumerate the path-bug attempts. Each has its own auto_pipeline.log
