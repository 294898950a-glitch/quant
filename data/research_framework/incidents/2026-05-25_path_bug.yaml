    - cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_2
    - cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_3
    - cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_4
    - cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_5  # the one v1_5 that ran when pause-flag race-condition'd
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_1
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_2
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_3
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_4
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_5
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_6
    - cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_7
  retained_in_live_queue:
