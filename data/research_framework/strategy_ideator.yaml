schema_version: 1
enabled: true
provider: claude
command: claude
model: sonnet
max_budget_usd: 0.5
timeout_seconds: 240
allow_fallback: false
block_on_unimplemented_draft: true
log_dir: logs/strategy_ideator

context:
  runtime_entrypoints: data/research_framework/runtime_entrypoints.yaml
  max_file_chars: 12000
  recent_runs: 10
  recent_file_chars: 6000
  result_files:
    - summary.json
    - report.yaml
    - diagnostic.yaml
    - l4_ack.yaml
    - summary_option_position_sizing.csv
    - summary_option_value_haircut.csv
    - summary_option_entry_gate.csv
    - summary_regime_option_entry_gate.csv
    - summary_universe_filter.csv

defaults:
  strategy_id: cb_arb_value_gap_switch
  l0_entry_id: 1
  cv_design: single-window
  cv_holdout_years: [2025, 2026]
  budget_cap_yuan: 100
  max_auto_budget_yuan: 100
  local_minutes: 0
  spot_minutes: 60
  run_prefix: auto_strategy
  data_root: data/cb_arb_concurrent_supervised_20260511_094500
  train_start: "20190101"
  train_end: "20241231"
  test_start: "20250101"
  test_end: "20260508"
  fixed_source: 2
  rule: score_4state
  base_ranks_path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet

hard_limits:
  - "不能要求本地跑 cb_arb 回测；READY spec 必须交给 VM/spot host。"
  - "不能修改 current.yaml 或 baseline_registry.yaml。"
  - "必须保留 2025-2026 作为测试段。"
  - "如果想法没有现成执行器，只能生成 DRAFT spec，不能生成 READY spec。"
  - "输出必须是 YAML 对象，不能有 Markdown 解释。"

forbidden_families:
  - global_option_entry_gate
  - regime_conditioned_option_entry_gate
  - global_option_value_haircut
  - panic_family_reruns

executors:
  option_position_sizing:
    status: implemented
    family: option_position_sizing
    script: scripts/evaluate_cb_arb_option_position_sizing.py
    meaning: "不改理论价格，不禁买；只对可疑期权型候选降低排序金额和实际买入金额。"
    ready_if_mechanics_include:
      - static_candidate_position_scale
      - close_to_bond_floor_threshold
      - moneyness_stock_to_conv_threshold
    unsupported_tokens:
      - rolling
      - trailing
      - pnl
      - 盈亏
      - 反馈
      - 动态
      - lookback
      - recent n
    sync_paths:
      - scripts/evaluate_cb_arb_option_position_sizing.py
      - scripts/evaluate_cb_arb_value_gap_switch.py
      - data/research_framework/runtime_entrypoints.yaml
      - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
      - data/cb_warehouse/cb_basic.parquet
      - data/cb_warehouse/stk_daily_qfq.parquet
    command:
      - .venv/bin/python
      - scripts/evaluate_cb_arb_option_position_sizing.py
      - --data-root
      - "{data_root}"
      - --train-start
      - "{train_start}"
      - --train-end
      - "{train_end}"
      - --test-start
      - "{test_start}"
      - --test-end
      - "{test_end}"
      - --fixed-source
      - "{fixed_source}"
      - --rule
      - "{rule}"
      - --output-dir
      - "{output_dir}"
      - --base-ranks-path
      - "{base_ranks_path}"
      - --reuse-ranks
      - --cost-model-enabled
    artifacts_required:
      - summary_option_position_sizing.csv
      - yearly_option_position_sizing.csv
      - entry_source_2020_option_position_sizing.csv
      - entry_source_test_option_position_sizing.csv
      - adjustment_option_position_sizing.csv
      - summary.json
      - report.yaml
      - l4_ack.yaml
      - diagnostic.yaml

draft_artifacts_required:
  - implementation_plan.yaml
  - spec.yaml
