# 按 Codex framework holistic review Q2-D: baseline_registry 从 markdown 升 yaml,
# 加 transition validator 防"偷偷换 baseline 充作 stress test 已过".
#
# baseline_registry.md 保留为人类可读 mirror, 但 commit/audit 看这个 yaml.
#
# 规则:
# - pk 全局唯一 (regex: <strategy>-<variant>-YYYYMMDD)
# - 历史行 immutable (改了等于撒谎)
# - baseline 切换必须 supersede 旧 pk, 写 supersede_reason + supersede_audit
# - 同 strategy_id 只能有一个 status=adopted (当前活跃 baseline)
# - 任何 RESPONSE 跑出新 baseline 必须同 handoff 加一行
#
# strategy_id 必须在 data/research_framework/strategies.yaml 中

