  - id: option_source_value_gap_structural_tradeoff_2026_05_17
    summary: "Option-source value gap is structurally inseparable under the current cb_arb_value_gap_switch universe and cost-on setup: simple filters and global valuation haircuts repair 2020-style losses only by sacrificing later option-source upside."
