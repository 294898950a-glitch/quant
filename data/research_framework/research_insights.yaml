      option_entry_gate_pattern: "Global option-source entry gates can improve 2020 but remove 2025-2026 upside; best test remains baseline_no_entry_gate."
      regime_entry_gate_pattern: "Regime-conditioned gates do not materially improve test, degrade train metrics, and do not repair 2020."
