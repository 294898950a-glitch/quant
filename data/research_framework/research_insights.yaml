key_insights:
  - id: main_vs_value_gap_distinction
    summary: "Main cb_arb and value-gap switch are distinct; rejection of panic-detector internals does not reject absolute value-gap ranking."
    facts:
      main_strategy_logic: "market price / theoretical value percentage deviation ranking"
      value_gap_logic: "absolute theoretical-minus-market value gap ranking, plus optional panic detector"
      main_2019_excess: -0.0985
      value_gap_2019_excess: 0.161
      gap_pp: 25.95
      main_6y_excess_compound: -0.127
      value_gap_6y_excess_compound: -0.030
    decision_use: "Value-gap ranking remains a legitimate research direction even though full value-gap switch is not deployable."

  - id: cost_realism_wall
    summary: "Cost-on tests materially worsen both main cb_arb and value-gap switch."
    facts:
      main_cost_degradation_pp: -0.0676
      value_gap_cost_degradation_pp: -0.0747
      fatal_threshold_pp: -0.0500
    decision_use: "Any future cb_arb variant must be checked cost-on before promotion."

  - id: panic_detector_dead_end
    summary: "Panic detector overlay is rejected as a family under current action mapping."
    facts:
      true_panic_post_30d_baseline_excess_vs_benchmark: -0.038
      false_panic_cross_section_can_be_more_extreme_than_true_panic: true
      overlay_hurts_false_panic_paths: true
    decision_use: "Do not restart panic overlay without a new action family and explicit evidence that action adds alpha."

  - id: single_filter_dead_end
    summary: "2020 weakness was broad across trades; single trade filters do not address the failure mode."
    facts:
      negative_trade_share_2020: 0.74
      median_excess_2020_pp: -4.32
      worst10_loss_share: 0.23
    decision_use: "Avoid one-dimensional entry/exit/holding filters as a rescue path."

  - id: hdrf_beats_self_loop_for_cb_arb
    summary: "HDRF/value-gap route beat self-loop LLM tuning in cross-route validation."
    facts:
      hdrf_2019_excess: 0.161
      self_loop_2019_excess: -0.101
      gap_pp: 26.2
    decision_use: "Do not restart sealed-pool LLM tuning over the same 13-dimension yaml space."

