  - id: value_gap_rank_is_anti_alpha_2026_05_24
    priority: deprecated
    status: weakened_by_follow_up_rejects_2026_05_25
    do_not_use_as_default_direction: true
    summary: "Reverse-rank probe shows that within the value_gap_amount>0 candidate set, sorting ASCENDING (least-positive first) wins large where DESCENDING (most-positive first, the production rule) loses. Same universe, same entry/exit logic, only sort direction changed. Three competing hypotheses collapse to one: the value_gap formula is anti-informative under its current monotonicity assumption. NOTE 2026-05-26: this summary describes the original probe finding; three downstream reverse-base variants ran on 2026-05-25 and all three were rejected by review, see follow_up_review_results below."
    facts:
      probe_run_dir: data/cb_arb_value_gap_switch_reverse-probe_20260524
      probe_script: scripts/evaluate_cb_arb_reverse_probe.py
      cost_model_enabled: false
      forward_baseline_test_excess_cost_off_approx: -0.03
      reverse_train_excess_return: 1.482063
      reverse_train_total_return: 1.754378
      reverse_train_max_drawdown: -0.185122
      reverse_train_win_rate: 0.5959
      reverse_train_trade_count: 1710
      reverse_test_excess_return: 0.380822
      reverse_test_total_return: 0.733087
      reverse_test_max_drawdown: -0.112613
      reverse_test_win_rate: 0.6458
      reverse_test_trade_count: 367
      reverse_test_best_params:
        max_hold_days: 180
        min_gap_pct: 0.01
        sell_gap_pct: 0.0
        switch_hurdle_pct: 0.01
      filter_unchanged: "value_gap_amount > 0 filter was NOT flipped; this probe selects nearest-to-zero positive gaps, not negative gaps"
      hypotheses_ruled_out:
        - "(a) signal real, costs eat alpha — dead because forward also loses cost-off"
        - "(b) universe drifts negative — dead because reverse makes 148% train cost-off"
      hypothesis_supported: "(c) value_gap formula is anti-informative under current monotonicity assumption"
      likely_confounders_to_investigate:
        - "issuer credit distress masquerading as undervaluation"
        - "short-term negative momentum (gap widens because selling continues)"
        - "liquidity (high-gap CBs illiquid, entry/exit asymmetric)"
        - "formula misses conversion features (call protection, dilution)"
    decision_use: |
      DEPRECATED 2026-05-26 — DO NOT use as default new direction. Three reverse-base
      follow-up variants (exit_duration_adaptive_reverse, reverse_moneyness_entry_filter_v1_1,
      reverse_bond_floor_entry_filter_v2) were tested on 2026-05-25 and all three were
      rejected by review. The review chain specifically concluded that the
      value_gap_amount signal is structurally broken even on the reverse base, not just
      that the forward direction is anti-alpha. See follow_up_review_results below.

      Ideator (Hermes) must NOT cite this insight as evidence for new reverse-base
      entry-filter or position-scaling variants. Acceptable uses going forward:
        - investigating WHY the +30.3% test cost-on result did not survive any downstream
          extension (mechanism diagnostic, not new strategy candidate)
        - modifications to the valuation formula itself (e.g. credit-adjusted, term-
          structure-aware) that change the formula, not just stack a filter / scale
          on the existing one
      Reverse-direction entry-filter or scaling variants on the same value_gap_amount
      base are CLOSED until new evidence overturns the reject chain.

      No truth promotion, no current.yaml change, no live deployment.
    follow_ups:
      - cost_on_reverse_rerun
      - full_filter_flip_probe
      - value_gap_correlation_diagnostic
    cost_on_follow_up_result:
      run_dir: data/cb_arb_value_gap_switch_reverse-probe-coston_20260524
      completed_at: "2026-05-24T11:08:00+08:00"
      cost_model_enabled: true
      slippage_pct: 0.0015
      market_impact_coeff: 0.001
      market_impact_cap_pct: 0.02
      train_excess_return: 0.966487
      train_total_return: 1.238802
      train_max_drawdown: -0.235789
      train_win_rate: 0.5379
      train_trade_count: 1740
