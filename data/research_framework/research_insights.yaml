      # proposals whose `family` matches any entry — unless the proposal
      # cites a NEW (still active, non-deprecated) critical insight that
      # would overturn the reject chain. Listed both the 3 rejected
      # families and adjacent reverse-base families because they all
      # rest on the same disproven premise.
      closed_families:
        - reverse_moneyness_entry_filter
        - exit_duration_adaptive_reverse
        - reverse_bond_floor_entry_filter
        - volatility_position_scaling_reverse
        - reverse_volatility_position_scaling
        - reverse_volatility_scaling
      next_research_direction_recommended_by_reviews:
        - "Abandon bond-floor entry filter for value_gap family"
        - "Investigate gap formula itself (credit-adjusted, term-structure-aware) rather than stacking more filters"
        - "Cement forward-base as the only viable direction within the existing formula"
      ideator_directive_2026_05_26: |
        Stop ideating reverse-base entry-filter / position-scaling variants on this
        insight. The reverse +30% cost-on number is now treated as disputed: it failed
        to extend to ANY downstream variant. New ideation should pursue either
        (1) mechanism diagnostics that explain the +30% itself, or (2) modifications
        to the value_gap formula. Research Delta Gate has been augmented (2026-05-26)
        to skip same-family proposals when the family has accumulated >= N rejects
        without an overturning insight.

