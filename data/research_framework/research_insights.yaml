      test_total_return: 0.655398
      test_max_drawdown: -0.113253
      test_win_rate: 0.5862
      test_trade_count: 377
      test_best_params:
        max_hold_days: 180
        min_gap_pct: 0.01
        sell_gap_pct: 0.0
        switch_hurdle_pct: 0.0
      cost_bleed_test: "+0.381 (cost off) → +0.303 (cost on); 8pp loss, 81% of excess preserved"
      swing_vs_forward_test: "+30.3% reverse cost-on vs -10.5% forward cost-on = 41pp swing from sort direction alone"
      interpretation: "Reverse rule is no longer just a signal-side curiosity — it is a tradeable inversion candidate. Survives standard cost model with most of the excess intact."
      interpretation_disputed_by: "follow_up_review_results below: three downstream variants on the same reverse base were rejected. The +30.3% bare-reverse number did not generalize to any extension; reviewers now interpret it as a statistical artifact rather than a tradeable signal."
    follow_up_review_results:
      summary: "Three reverse-base follow-up variants were tested on 2026-05-25 and all three were rejected by review. The reject chain converges on 'the value_gap_amount signal is structurally broken on the reverse base too' — i.e. the original +30.3% reverse cost-on result was not a tradeable inversion, it was a statistical anomaly that did not survive any downstream extension."
      rejects:
        - run_id: cb_arb_value_gap_switch_reverse_moneyness_entry_filter_v1_1
          family: reverse_moneyness_entry_filter
          review_verdict: failed_mechanical_thresholds
          review_status_code: 2
          dominant_reason: "gap signal is directionally broken: even on the reverse base, entering low-gap CBs leads to gap widening, suggesting the value_gap_amount metric itself is not mean-reverting"
        - run_id: cb_arb_value_gap_switch_exit_duration_adaptive_reverse_20260525
          family: exit_duration_adaptive_reverse
          review_verdict: failed_mechanical_thresholds
          review_status_code: 2
          dominant_reason: "the exit rule is structurally coupled to the forward sort and cannot be ported to the reverse base — 64 grid combos produced zero excess return and massive negative PnL"
        - run_id: cb_arb_value_gap_switch_reverse_bond_floor_entry_filter_v2
          family: reverse_bond_floor_entry_filter
          review_verdict: failed_mechanical_thresholds
          review_status_code: 2
          dominant_reason: "near-bond-floor CBs with large positive gaps are not mispriced — the gap formula itself appears to be the root problem, not the entry filter"
