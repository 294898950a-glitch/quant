objective: Optimize cb_arb option false-undervaluation without repeating rejected
  global filters/haircuts.
strategy_id: cb_arb_value_gap_switch
vm_host: root@100.91.245.108
remote_repo: /root/projects/quant
local_repo: /home/jay/projects/quant
poll_seconds: 600
max_auto_budget_yuan: 100
auto_discover_ready_specs: true
ideation:
  enabled: false
  disabled_reason: 后台推进脚本不得自行调用 LLM；需要新方向时只能由 Hermes 当轮读取记录后生成 READY spec。
  provider: hermes_current_turn_only
  command: none
  model: null
  max_budget_usd: 0.0
  timeout_seconds: 0
  allow_fallback: false
  prompt_injection: false
  context_sources:
  - data/research_framework/runtime_entrypoints.yaml
  - data/research_framework/current.yaml
  - data/research_framework/strategies.yaml
  - data/research_framework/baseline_registry.yaml
  - data/research_framework/experiments.yaml
  - data/research_framework/research_insights.yaml
  - data/research_framework/protocol_rules.yaml
  - recent data/* result artifacts
  supported_executors:
  - option_position_sizing
  - option_source_pnl_feedback_scaler
  max_contract_rewrite_attempts: 3
discovery:
  strategy_id: cb_arb_value_gap_switch
  include_tokens:
  - option
  - 期权
  - undervalue
  - undervaluation
  - value gap
  - 估值
  exclude_statuses:
  - COMPLETE
  - ARCHIVED
  - RUNNING
forbidden_families:
- global_option_entry_gate
- regime_conditioned_option_entry_gate
- global_option_value_haircut
- panic_family_reruns
- universe_filter
rules:
- Local machine only schedules and monitors; cb_arb backtests must execute on VM/spot
  host.
- Every queued run must have a READY spec.yaml with spot_minutes > 0 and local_minutes
  = 0.
- If queue is empty, auto-discover new READY option-related specs and enqueue them.
- If no READY spec exists, stop at needs_hermes_research_direction. Background scripts
  must not call Claude or any LLM to generate one.
- Do not promote current.yaml or baseline_registry from this loop.
- If any queue item is running, do not generate or discover a new direction.
- If a run fails or is rejected, record it and move to the next queued mechanism only
  if its spec family is not in forbidden_families.
default_sync_paths:
- scripts/auto_research_pipeline.py
- scripts/research_sanity_checker.py
- scripts/gatekeeper.py
