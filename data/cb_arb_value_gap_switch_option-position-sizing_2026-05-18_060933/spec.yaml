      period: train
    rank_by: score
    rank_desc: true
    thresholds:
      excess_return:
        min: 0.0
      max_drawdown:
        min: -0.3
    train_single_year_dd_ceiling: -0.15
status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 60 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只降低可疑期权型候选的实际暴露。
ideation:
  source: claude
  proposal_id: tiered_or_option_position_sizing
  family: option_position_sizing
  why_not_rejected_repeat: '禁止方向（global_option_entry_gate / regime_conditioned_option_entry_gate
    / global_option_value_haircut / panic_family_reruns）均属于"禁买"或"改理论价格"机制； 本测试仅在进场时对高风险子集降低排序金额和买入金额，不禁买、不改理论价格，属于
    position_sizing 路径。 已测方案均为单门槛+单一固定 scale；双层（温和宽集+深度极端交集）在本路径中未见记录。 pnl_feedback
    不重复：本提案不依赖已平仓盈亏历史，不属于 rolling_option_source_pnl_feedback 方向。

    '
  risk: 主要风险（数据缺口）：scripts/evaluate_cb_arb_option_position_sizing.py 当前是否支持 双层/分级参数配置未在现有运行记录中确认；若执行器不支持多层
    scale，需先修改脚本或降级为 单层 OR+固定 scale（后者可能与 run 212511 重复，该 run 详情暂缺）。 次要风险（机制失效）：OR
    并集（约240笔）在训练期同时涵盖部分盈利期权， 分层折扣仍可能损伤训练期 score，重蹈单条件 position_sizing 被拒模式； 如 READY
    run 060047（AND 交集）先完成且结果为 reject， 则本提案的深度层（极端 AND 交集）的假设依据将进一步削弱，应在 060047 结果出来后再决定是否启动。
  fallback_reason: null
