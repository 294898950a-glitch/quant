strategy_id: cb_arb_value_gap_switch
family: dynamic_drawdown_exit
hypothesis: Introducing a drawdown-adjusted time-based exit will reduce extreme losses
  in bearish regimes without significantly lowering returns in favorable periods,
  because it cuts tail risk earlier.
source_insight: Baseline train max drawdown was -0.324 vs test -0.098, indicating
  that exits that worked in test may not suffice in stress; a dynamic exit that responds
  to portfolio drawdown could improve stability.
expected_improvement: Reduce train max drawdown by at least 20% while keeping test
  excess return within 10% of baseline.
