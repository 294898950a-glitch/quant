  files:
  - path: generated_executor/evaluate_cb_arb_dynamic_exit_gap_decay.py
    purpose: Complete draft evaluator implementation.
    content: "#!/usr/bin/env python3\n\"\"\"Dynamic exit evaluator: drawdown‑adjusted\
      \ time‑based exit for cb_arb_value_gap_switch.\"\"\"\nimport argparse\nimport\
      \ json\nimport os\nfrom pathlib import Path\nimport pandas as pd\nimport numpy\
      \ as np\nimport yaml\n\ndef declare_data_requirements(command, spec):\n    return\
      \ {\n        \"required_files\": [\n            {\"path\": \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet\"\
      },\n            {\"path\": \"data/cb_warehouse/cb_basic.parquet\"},\n      \
      \      {\"path\": \"data/cb_warehouse/stk_daily_qfq.parquet\"}\n        ]\n\
      \    }\n\ndef load_data(data_root):\n    base = Path(data_root)\n    gap_df\
      \ = pd.read_parquet(base / \"cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet\"\
      )\n    cb_basic_df = pd.read_parquet(base / \"cb_warehouse/cb_basic.parquet\"\
      )\n    stock_df = pd.read_parquet(base / \"cb_warehouse/stk_daily_qfq.parquet\"\
      )\n    return gap_df, cb_basic_df, stock_df\n\ndef prepare_entry_signals(gap_df):\n\
      \    # Assumes gap_df has columns: trade_date, stock_code, amount (value gap)\n\
      \    # We rank stocks by amount descending and pick top 10 where amount > 0.\n\
      \    gap_df = gap_df.copy()\n    gap_df['trade_date'] = pd.to_datetime(gap_df['trade_date'])\n\
      \    # Some rows may have amount = 0 or NaN -> filter\n    gap_df = gap_df[gap_df['amount']\
      \ > 0].copy()\n    # daily rank\n    gap_df['rank'] = gap_df.groupby('trade_date')['amount'].rank(method='first',\
      \ ascending=False)\n    top10 = gap_df[gap_df['rank'] <= 10].copy()\n    return\
      \ top10[['trade_date', 'stock_code']]\n\ndef simulate_portfolio(entry_signals,\
      \ stock_returns_df, base_hold_days=30, dynamic=True):\n    # entry_signals:\
      \ DataFrame with columns trade_date, stock_code\n    # stock_returns_df: index=date,\
      \ columns=stock_code, values=simple return (or log)\n    # dynamic: if True,\
      \ adjust max holding period based on portfolio drawdown\n    # Returns equity\
      \ curve pd.Series\n    dates = pd.to_datetime(sorted(stock_returns_df.index))\n\
      \    # Map stock codes to columns\n    col_map = {c: c for c in stock_returns_df.columns}\n\
      \    # Trading calendar\n    # Initialize positions list: each item dict(entry_date,\
      \ stock, entry_day_idx, planned_exit_day_idx)\n    positions = []\n    # Portfolio\
      \ value\n    portfolio_value = 1.0\n    peak = 1.0\n    equity_curve = []\n\
      \    calendar = dates.tolist()\n    # Create a date->index mapping\n    date2idx\
      \ = {d: i for i, d in enumerate(calendar)}\n    \n    # Pre-process entry signals:\
      \ group by date\n    entry_by_date = entry_signals.groupby('trade_date')['stock_code'].apply(list).to_dict()\n\
      \    \n    for i, today in enumerate(calendar):\n        # Process entries\n\
      \        today_str = pd.Timestamp(today).strftime('%Y-%m-%d')  # ensure matching\
      \ format\n        if today in entry_by_date:\n            stocks = entry_by_date[today]\n\
      \            for s in stocks:\n                if s in col_map:\n          \
      \          # Determine max hold days dynamically if dynamic\n              \
      \      if dynamic:\n                        # compute current drawdown from\
      \ peak\n                        dd = (peak - portfolio_value) / peak if peak\
      \ > 0 else 0.0\n                        if dd >= 0.10:\n                   \
      \         max_hold = 10\n                        elif dd >= 0.05:\n        \
      \                    max_hold = 20\n                        else:\n        \
      \                    max_hold = base_hold_days\n                    else:\n\
      \                        max_hold = base_hold_days\n                    exit_day_idx\
      \ = min(i + max_hold, len(calendar) - 1)\n                    positions.append({\n\
      \                        'entry_idx': i,\n                        'stock': s,\n\
      \                        'exit_idx': exit_day_idx,\n                    })\n\
      \        \n        # Current date index\n        # Compute total return from\
      \ all active positions (equal weight)\n        daily_return = 0.0\n        active_pos\
      \ = [p for p in positions if p['entry_idx'] <= i <= p['exit_idx']]\n       \
      \ if active_pos:\n            stock_returns_today = []\n            for p in\
      \ active_pos:\n                # get return for stock p['stock'] on date today\n\
      \                # stock_returns_df index should be date, column stock code\n\
      \                if p['stock'] in stock_returns_df.columns:\n              \
      \      try:\n                        ret = stock_returns_df.loc[today, p['stock']]\n\
      \                        if isinstance(ret, pd.Series):\n                  \
      \          ret = ret.iloc[0]\n                        if pd.notna(ret):\n  \
      \                          stock_returns_today.append(ret)\n               \
      \     except:\n                        pass\n            if stock_returns_today:\n\
      \                daily_return = np.mean(stock_returns_today)\n        \n   \
      \     # Apply return\n        portfolio_value *= (1 + daily_return)\n      \
      \  peak = max(peak, portfolio_value)\n        equity_curve.append(portfolio_value)\n\
      \    \n    return pd.Series(equity_curve, index=calendar)\n\ndef compute_max_drawdown(equity):\n\
      \    peak = equity.expanding(min_periods=1).max()\n    dd = (peak - equity)\
      \ / peak\n    return dd.max()\n\ndef compute_excess_return(equity, period_start,\
      \ period_end):\n    sub = equity.loc[period_start:period_end]\n    if len(sub)\
      \ < 2:\n        return 0.0\n    return sub.iloc[-1] / sub.iloc[0] - 1\n\ndef\
      \ main():\n    parser = argparse.ArgumentParser()\n    parser.add_argument('--data-root',\
      \ required=True)\n    parser.add_argument('--train-start', required=True)\n\
      \    parser.add_argument('--train-end', required=True)\n    parser.add_argument('--test-start',\
      \ required=True)\n    parser.add_argument('--test-end', required=True)\n   \
      \ parser.add_argument('--output-dir', required=True)\n    args = parser.parse_args()\n\
      \n    output_dir = Path(args.output_dir)\n    output_dir.mkdir(parents=True,\
      \ exist_ok=True)\n\n    # Load data\n    gap_df, cb_basic_df, stock_df = load_data(args.data_root)\n\
      \n    # Build stock return matrix\n    stock_df['trade_date'] = pd.to_datetime(stock_df['trade_date'])\n\
      \    stock_df = stock_df.pivot_table(index='trade_date', columns='stock_code',\
      \ values='close')\n    # Compute daily returns\n    stock_returns = stock_df.pct_change()\n\
      \    stock_returns = stock_returns.loc[args.train_start:args.test_end]\n\n \
      \   # Prepare entry signals from value gaps\n    entry_signals = prepare_entry_signals(gap_df)\n\
      \n    # Simulate baseline (fixed exit)\n    baseline_equity = simulate_portfolio(entry_signals,\
      \ stock_returns, dynamic=False)\n    # Simulate dynamic exit\n    dynamic_equity\
      \ = simulate_portfolio(entry_signals, stock_returns, dynamic=True)\n\n    train_slice\
      \ = slice(args.train_start, args.train_end)\n    test_slice = slice(args.test_start,\
      \ args.test_end)\n    repair_slice = slice('2020-01-01', '2020-12-31')\n\n \
      \   # Compute metrics\n    baseline_train_max_dd = compute_max_drawdown(baseline_equity[train_slice])\n\
      \    dynamic_train_max_dd = compute_max_drawdown(dynamic_equity[train_slice])\n\
      \n    baseline_test_excess_return = compute_excess_return(baseline_equity, args.test_start,\
      \ args.test_end)\n    dynamic_test_excess_return = compute_excess_return(dynamic_equity,\
      \ args.test_start, args.test_end)\n\n    baseline_repair_excess = compute_excess_return(baseline_equity,\
      \ '2020-01-01', '2020-12-31')\n    dynamic_repair_excess = compute_excess_return(dynamic_equity,\
      \ '2020-01-01', '2020-12-31')\n\n    # Adoption criteria\n    train_dd_improve\
      \ = (abs(baseline_train_max_dd) - abs(dynamic_train_max_dd)) / abs(baseline_train_max_dd)\
      \ >= 0.10 if baseline_train_max_dd != 0 else False\n    test_excess_ok = dynamic_test_excess_return\
      \ >= 0.9 * baseline_test_excess_return\n    repair_ok = dynamic_repair_excess\
      \ >= baseline_repair_excess  # not worse\n    adoption_pass = train_dd_improve\
      \ and test_excess_ok and repair_ok\n\n    summary = {\n        'adoption_pass':\
      \ bool(adoption_pass),\n        'baseline': {\n            'train_max_drawdown':\
      \ float(baseline_train_max_dd),\n            'test_excess_return': float(baseline_test_excess_return),\n\
      \            'repair_excess_return': float(baseline_repair_excess)\n       \
      \ },\n        'dynamic': {\n            'train_max_drawdown': float(dynamic_train_max_dd),\n\
      \            'test_excess_return': float(dynamic_test_excess_return),\n    \
      \        'repair_excess_return': float(dynamic_repair_excess)\n        }\n \
      \   }\n    with open(output_dir / 'summary.json', 'w') as f:\n        json.dump(summary,\
      \ f, indent=2)\n\n    report = {\n        'train_max_drawdown_improvement_pct':\
      \ float((abs(baseline_train_max_dd) - abs(dynamic_train_max_dd)) / abs(baseline_train_max_dd)\
      \ * 100 if baseline_train_max_dd != 0 else 0),\n        'test_excess_return_ratio':\
      \ float(dynamic_test_excess_return / baseline_test_excess_return if baseline_test_excess_return\
      \ != 0 else 1),\n        'repair_excess_change': float(dynamic_repair_excess\
      \ - baseline_repair_excess),\n        'adoption_pass': adoption_pass\n    }\n\
      \    with open(output_dir / 'report.yaml', 'w') as f:\n        yaml.dump(report,\
      \ f)\n\n    l4_ack = {\n        'acknowledged': True,\n        'reason': 'Dynamic\
      \ drawdown exit evaluation complete'\n    }\n    with open(output_dir / 'l4_ack.yaml',\
      \ 'w') as f:\n        yaml.dump(l4_ack, f)\n\n    diagnostic = {\n        'data_range':\
      \ {'train': [args.train_start, args.train_end], 'test': [args.test_start, args.test_end]},\n\
      \        'repair_period': ['2020-01-01', '2020-12-31'],\n        'status': 'completed'\n\
      \    }\n    with open(output_dir / 'diagnostic.yaml', 'w') as f:\n        yaml.dump(diagnostic,\
      \ f)\n\nif __name__ == '__main__':\n    main()"
