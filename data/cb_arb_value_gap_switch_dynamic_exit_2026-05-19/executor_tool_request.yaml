why_existing_tools_insufficient: Option_position_sizing (implemented) only tests static
  position scaling and cannot modify exit logic (C007). Option_source_pnl_feedback_scaler
  (implemented) tests rolling PnL feedback but explicitly excludes new exit rules
  (C007). Dynamic_exit_gap_decay_executor (draft) targets a retracement‑based trailing
  exit mechanism, not a drawdown‑adjusted time‑based exit. No existing executor can
  evaluate the drawdown‑adjusted exit proposed here.
