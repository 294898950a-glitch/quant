proposal_id: cb_arb_value_gap_switch_regime-adaptive-exit-v1
strategy_id: cb_arb_value_gap_switch
family: regime_adaptive_exit
hypothesis: 'The duration-adaptive exit accepted on 2026-05-22 applies a single fixed
  decay schedule (initial_threshold_fraction=0.7, decay_period_factor=0.5) regardless
  of market conditions. Gap-closing speeds differ systematically across regimes: in
  deteriorating markets gaps re-widen faster, while in stable or improving markets
  gaps close more reliably. Conditioning the decay schedule on a daily CSI 300-based
  regime classifier will improve cumulative excess return by accelerating exits in
  adverse regimes (preventing re-widening losses) and extending patience in favorable
  regimes (capturing full gap closure).

  '
source_insight: 'The duration-adaptive exit is the only recent direction accepted
  by review memory, confirming time-decaying gap thresholds work. The gap-speed-adaptive-exit_2
  result (adoption_pass: True) independently suggests gap-closing dynamics carry predictive
  information. A single fixed decay schedule optimizes for the average regime, leaving
  efficiency on the table in both tails — regime conditioning directly addresses this
  by matching exit urgency to environment.

  '
expected_improvement: 'Cumulative excess compound expected to improve 2-5pp over the
  fixed-decay baseline, primarily by reducing drawdown in stressed years (2020, 2022)
  without sacrificing returns in normal years. The mechanism is asymmetric: regime
  conditioning can prevent late exits in bad markets while still capturing full gap
  closure in good ones.

  '
