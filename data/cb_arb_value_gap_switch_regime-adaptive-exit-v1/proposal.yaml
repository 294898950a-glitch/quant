- cb_arb_value_gap_switch_gap-speed-adaptive-exit_2
- cb_arb_value_gap_switch_market_drawdown_entry_filter
implementation_assumption: Executor classifies each trading day into 2-3 buckets using
  CSI 300 rolling return and volatility percentiles, assigns a regime-specific (initial_threshold_fraction,
  decay_period_factor) pair per position at entry time, and applies the duration-adaptive
  exit formula with regime-tuned parameters. The fixed-decay baseline uses the accepted
  parameters (0.7, 0.5, min_hold_days=5).
