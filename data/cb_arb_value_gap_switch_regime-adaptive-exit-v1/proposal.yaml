test_design:
  parameter_grid:
    regime_classifier:
      signal_primary: CSI 300 rolling 20-day return percentile rank
      signal_secondary: CSI 300 rolling 60-day realized volatility percentile rank
      bucket_count:
      - 2
      - 3
    decay_schedule_per_regime:
      adverse_regime:
        initial_threshold_fraction:
        - 0.4
        - 0.5
        - 0.6
        decay_period_factor:
        - 0.2
        - 0.3
        - 0.4
      favorable_regime:
        initial_threshold_fraction:
        - 0.7
        - 0.8
        - 0.9
        decay_period_factor:
        - 0.5
        - 0.6
        - 0.7
    min_hold_days:
    - 3
    - 5
  method: grid_search
  split: time_series_cross_val
  benchmark: cb_arb-value-gap-switch-medium-signal-cost-on-20260516
success_criteria:
  criteria:
  - cumulative_excess_compound_cross_year_gt_0
  - any_single_year_drawdown_vs_benchmark_lt_15pct
  - at_least_one_holdout_year_sharpe_gte_0_5
falsifiers:
  train: &id001
  - regime_adaptive_excess_compound_lte_fixed_decay_baseline
  - no_regime_configuration_reduces_2020_max_drawdown
  - all_holdout_years_sharpe_lt_0_5
  validate: *id001
  test: *id001
risk: medium
why_not_repeated_failure: 'This is a new direction building on the one accepted result.
  No prior run has conditioned exit decay parameters on market regime. closed_tags
  includes ''regime_conditioned_option_entry_gate'' and ''regime_classifier_variant'',
  but those target entry-gate filtering and classifier architecture variants respectively
  — this proposal applies regime information to exit logic via a different signal
  path and a different executor family. Not a re-run of market_drawdown_entry_filter,
  bond-floor-entry-filter, or contrarian_drawdown_entry, all of which gate entries
  rather than modulate exits.

  '
related_prior_runs:
