proposal_id: cb_arb_value_gap_switch_duration-exit_2026-05-22
strategy_id: cb_arb_value_gap_switch
family: new_exit_rule
hypothesis: 'The baseline strategy''s low win rate (29.3% in 2020, 45.3% in train)
  signals many positions are held too long waiting for a gap closure that never materializes.
  A duration-adaptive exit rule that linearly tightens the exit gap threshold from
  initial_threshold_fraction down to 0 over max_hold_days (subject to min_hold_days)
  will force earlier exits on stale positions, improving win rate and reducing drawdown
  without destroying the upside from genuine fast gap closures.

  '
source_insight: 'From the position-sizing review: the progressive_stocklike variant
  improved 2020 win_rate from 0.2933 (baseline) to 0.3636 and max_drawdown from -0.179
  to -0.135 by reducing exposure to positions far from bond floor. This suggests managing
  exposure to stale or low-conviction positions is the key lever for 2020 robustness.
  A time-based exit decay formalizes this on the exit side: instead of reducing position
  size, force liquidation when the expected gap closure has not occurred within a
  reasonable holding window.

  '
expected_improvement: 'Train win_rate improvement from 0.4533 to >= 0.50. 2020 max_drawdown
  improvement from -0.179 to >= -0.15. Maintain test excess_return > 0 (baseline test
  excess = 0.37976). The mechanism converts negative-carry stale positions into early
  small-loss exits while preserving full upside on positions where the gap closes
  quickly.

  '
capability_ids:
- C007
required_executor: exit_rule_duration_adaptive_executor
