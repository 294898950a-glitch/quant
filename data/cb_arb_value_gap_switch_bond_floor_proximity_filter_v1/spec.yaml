    forbidden family option_position_sizing), so this proposal will be DRAFT until
    a new executor is implemented.

    '
  why_not_repeated_failure: 'This is NOT a market-level entry gate (unlike market_drawdown_entry_filter
    and contrarian_drawdown_entry, which both failed mechanical thresholds). It is
    NOT a position sizing variant (unlike volatility_position_scaling and pnl_feedback_scaling).
    It filters entries based on a CB-specific, structurally grounded characteristic
    — bond-floor proximity — that has never been tested. It does not use any closed
    mechanic or family.

    '
