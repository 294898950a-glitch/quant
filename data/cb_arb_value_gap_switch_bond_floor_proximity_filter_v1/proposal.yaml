proposal_id: cb_arb_value_gap_switch_bond_floor_proximity_filter_v1
strategy_id: cb_arb_value_gap_switch
family: entry_quality_filter
hypothesis: 'The strategy''s -7.47pp cost degradation is driven by entries into CBs
  whose market price is far above the bond floor, where the value-gap signal is indistinguishable
  from model noise and gap convergence is unreliable. By requiring the CB market price
  to be within a configurable threshold of its calculated bond floor at entry, the
  strategy concentrates exposure on positions with structurally asymmetric payoff
  — limited downside anchored by the bond floor, upside from gap convergence. This
  should reduce turnover, improve hit rate, and shrink the cost wall without changing
  the theoretical value model or exit logic.

  '
source_insight: 'The only exit variant that passed adoption (duration-adaptive-exit)
  improved results by imposing patience, not by adding complexity. All binary market-level
  entry gates failed mechanical thresholds. Position sizing and PnL feedback variants
  failed adoption. The unresolved bottleneck is entry quality — the strategy enters
  too many noise positions. The bond floor is a fundamental CB characteristic that
  the current strategy ignores entirely; filtering entries by bond-floor proximity
  creates a natural margin of safety without overfitting to market conditions.

  '
expected_improvement: 'Reduce cost degradation from -7.47pp toward the -3pp to -5pp
  range by cutting noise entries; improve cumulative excess compound toward breakeven.

  '
capability_ids:
- C002
required_executor: null
required_data:
- data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
- data/cb_warehouse/cb_basic.parquet
- data/cb_warehouse/stk_daily_qfq.parquet
required_data_fields:
  data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet:
  - trade_date
  - ts_code
  - value_gap_amount
  - entry_signal
  data/cb_warehouse/cb_basic.parquet:
