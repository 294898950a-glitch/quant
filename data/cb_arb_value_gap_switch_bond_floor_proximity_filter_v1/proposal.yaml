  - coupon_rate
  - interest_rate_explain
  - maturity_date
  - list_date
  - delist_date
  - value_date
  data/cb_warehouse/stk_daily_qfq.parquet:
  - ts_code
  - stk_code
  - trade_date
  - close
test_design:
  description: 'Grid search over bond_floor_proximity_threshold (e.g., 0.85 to 1.05
    in steps of 0.05, where the threshold is a multiplier: entry allowed only when
    cb_close <= threshold * bond_floor). Run the existing backtester with the bond-floor
    filter applied before entry, keeping scoring, sizing, and exit logic unchanged
    from the current baseline. Compare cost-on and cost-off metrics against baseline.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound_cost_on improves by at least 2pp over baseline
  - number of noise entries (positions exited within min_hold_days at a loss) decreases
    by >= 20% vs baseline
  - no single-year drawdown_vs_benchmark exceeds 15pct
falsifiers:
  train: &id001
  - cumulative_excess_compound_cost_on does not improve over baseline
  - bond-floor filter eliminates so many entries that the strategy becomes cash-heavy
    and underperforms baseline in absolute terms
  - any holdout year Sharpe drops below 0.5
  validate: *id001
  test: *id001
risk: 'Low risk of overfitting — the bond floor is a mechanical calculation, not a
  learned parameter. Medium risk of sparse entries: if the threshold is too tight,
  the strategy may hold too few positions. Grid search over threshold values mitigates
  this. The required executor does not exist (only available executor belongs to forbidden
  family option_position_sizing), so this proposal will be DRAFT until a new executor
  is implemented.

  '
why_not_repeated_failure: 'This is NOT a market-level entry gate (unlike market_drawdown_entry_filter
  and contrarian_drawdown_entry, which both failed mechanical thresholds). It is NOT
  a position sizing variant (unlike volatility_position_scaling and pnl_feedback_scaling).
  It filters entries based on a CB-specific, structurally grounded characteristic
  — bond-floor proximity — that has never been tested. It does not use any closed
  mechanic or family.

  '
related_prior_runs:
- cb_arb_value_gap_switch_market_drawdown_entry_filter
- cb_arb_value_gap_switch_contrarian_drawdown_entry_20260522
- cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
- cb_arb_value_gap_switch_volatility_position_scaling_v1
- cb_arb_value_gap_switch_pnl_feedback_scaling_20260522
implementation_assumption: 'Bond floor is calculated as sum of discounted coupon payments
  plus discounted par value at maturity, using a risk-free rate proxy. The filter
  is: if cb_close > bond_floor_proximity_threshold * bond_floor, suppress entry. All
  other strategy logic (value-gap scoring, position sizing, exit rules) remains at
  current baseline. A new executor must be implemented; the only existing C002 executor
  (option_position_sizing) belongs to a forbidden family.

  '
missing_capability_request:
