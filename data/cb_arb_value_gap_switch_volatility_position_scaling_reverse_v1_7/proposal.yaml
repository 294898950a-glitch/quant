test_design:
  description: 'Sort value_gap_amount ASCENDING (>0 filter unchanged) for proven reverse
    direction. Compute ATR from stk_daily_qfq close per CB per day. Grid: ATR lookback
    in [10, 20, 40, 60], scaling_beta in [0.25, 0.5, 0.75, 1.0, 1.5]. Inverse scaling:
    position_weight = baseline * (scaling_beta / ATR_rank). Exit: reverse-probe grid
    (max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct 0.0, switch_hurdle_pct
    [0.0, 0.01]). Cost-on: slippage 0.0015, market_impact 0.001. Train 2018-2022,
    test 2023-2026. Baseline: reverse-probe-coston (+30.3% test excess, -11.3% test
    max drawdown).

    '
success_criteria:
  criteria:
  - test_excess_return >= 0.20
  - test_max_drawdown <= reverse_probe_coston_baseline_test_max_drawdown
  - test_sharpe > 0
  - train_excess_return > 0
falsifiers:
  train: &id001
  - test_excess_return < 0.15
  - test_max_drawdown > reverse_probe_coston_baseline_test_max_drawdown * 1.1
  - train_excess_return <= 0
  validate: *id001
  test: *id001
risk: 'Low risk of signal destruction (no candidates removed). Moderate risk that
  thin reverse candidate pool limits weight differentiation. ATR scaling may overweight
  volatile small-cap CBs, amplifying idiosyncratic risk. Mitigated by grid search
  over scaling_beta — low beta (0.25) produces near-equal-weighting as safe fallback.

  '
why_not_repeated_failure: 'Not a variant of moneyness_stock_to_conv_threshold (3x
  reject) or bond floor entry filter (2x fail). Those families remove candidates;
  this proposal adjusts weights without culling. The reverse signal is intact — entry
  filters killed it by shrinking the pool. Position scaling is non-destructive by
  construction and cannot reproduce that failure mode. This is the first non-destructive
  overlay on the proven reverse base.

  '
