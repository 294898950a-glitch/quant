proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_7
strategy_id: cb_arb_value_gap_switch
family: volatility_position_scaling_reverse
hypothesis: 'Applying inverse-ATR position scaling to the reverse-sorted (ASCENDING
  value_gap_amount) base preserves the +30.3% test excess cost-on while reducing drawdowns,
  because position scaling adjusts allocation weights without removing candidates.
  Entry filters (moneyness, bond floor) failed on the reverse base because they culled
  an already-sparse candidate pool to near-zero trade counts; position scaling cannot
  reproduce that failure mode since it keeps every candidate. The execution-condition
  explanation for prior reverse failures: filters were too aggressive for the thin
  reverse universe, not that the reverse signal is invalid.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 (critical). Reverse sort
  direction (ASCENDING, least-positive gap first) produces +30.3% test excess cost-on
  — a 41pp swing from forward direction (-10.5%). This is the only proven alpha direction.
  Prior reverse experiments with entry filters (moneyness 3x reject, bond floor 2x
  fail) all failed mechanical thresholds. The failure mechanism was candidate pool
  destruction, not signal invalidity: filtering to near-the-money or near-bond-floor
  CBs in the reverse universe left too few trades to evaluate. Position scaling is
  orthogonal — it never removes a candidate, only reweights allocations.

  '
expected_improvement: 'Reduce train max drawdown from -23.6% (reverse-probe-coston
  baseline) by 3-8pp through inverse-ATR downweighting of volatile candidates, while
  preserving at least 80% of the +30.3% test excess (target >= +24% test excess cost-on).
  If drawdown improves materially and test excess stays above +20%, this becomes the
  strongest reverse-direction variant.

  '
