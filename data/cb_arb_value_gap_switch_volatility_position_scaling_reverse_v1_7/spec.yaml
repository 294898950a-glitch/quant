      ATR lookback in [10, 20, 40, 60], scaling_beta in [0.25, 0.5, 0.75, 1.0, 1.5].
      Inverse scaling: position_weight = baseline * (scaling_beta / ATR_rank). Exit:
      reverse-probe grid (max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01],
      sell_gap_pct 0.0, switch_hurdle_pct [0.0, 0.01]). Cost-on: slippage 0.0015,
      market_impact 0.001. Train 2018-2022, test 2023-2026. Baseline: reverse-probe-coston
      (+30.3% test excess, -11.3% test max drawdown).

      '
