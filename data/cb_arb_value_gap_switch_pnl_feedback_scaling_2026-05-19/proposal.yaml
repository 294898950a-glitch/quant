proposal_id: cb_arb_value_gap_switch_pnl_feedback_scaling_2026-05-19
strategy_id: cb_arb_value_gap_switch
family: option_source_pnl_feedback
hypothesis: Dynamically scaling down position size when recent strategy PnL is negative
  will reduce drawdowns and improve risk-adjusted returns, potentially breaking the
  structural tradeoff observed in static scaling and regime‑guard attempts.
source_insight: Static position scaling based on bond‑floor distance failed to beat
  baseline; an adaptive feedback mechanism that responds to the strategy’s own recent
  performance may better navigate adverse regimes without introducing overfit regime
  classifiers.
expected_improvement: Higher Sharpe ratio, lower max drawdown, and test excess return
  that at least matches the baseline (~+0.38 excess return vs. baseline test) or improves
  upon it, while maintaining or improving 2020 stress‑test outcomes.
capability_ids:
- C004
required_executor: option_source_pnl_feedback_scaler
required_data:
- data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
- data/cb_warehouse/cb_basic.parquet
- data/cb_warehouse/stk_daily_qfq.parquet
test_design:
  description: Run backtests on train (2019‑2024) and 2020 stress period and sealed
    test (2025‑2026) using the existing option‑sourced value‑gap strategy and the
    option_source_pnl_feedback_scaler executor. Vary the lookback window (10, 20,
    30 trading days) and scaling sensitivity. Compare each variant against the unmodified
    baseline using total return, excess return, max drawdown, Sharpe ratio, and 2020
    performance.
success_criteria:
  test_excess_return: '>= 0.38'
  test_max_drawdown: <= -0.098
  sharpe_ratio: '>= baseline Sharpe'
  y2020_excess_return: '>= -0.195'
falsifiers:
  train:
    excess_return: < 0.40
    max_drawdown: < -0.10
  validate:
    y2020_excess_return: < -0.25
  test:
    excess_return: < 0.30
    max_drawdown: < -0.15
risk: The feedback mechanism may lag and amplify drawdowns in trending markets, or
  could be too slow to revert exposure after a losing streak. Over‑optimization of
  lookback window may cause data‑snooping bias.
why_not_repeated_failure: Previous static position scaling (C001) used fixed mapping
  based on bond‑floor distance; this proposal introduces a time‑varying, PnL‑feedback
  adjustment that has not been evaluated. It also differs from the trend‑guard regime‑classifier
  family by using the strategy’s own outcome rather than external market momentum
  inputs.
related_prior_runs:
- cb_arb_value_gap_switch_option-position-sizing_2026-05-17_151411
- cb_arb_value_gap_switch_regime-trend-guard_2026-05-19
implementation_assumption: The executor calculates a rolling unscaled PnL over N days,
  passes it through a logistic scaling function to map recent drawdowns to a position‑size
  multiplier (e.g., 0.2–1.0), and applies the multiplier to each candidate’s allocated
  amount without altering entry eligibility or theoretical valuation.
