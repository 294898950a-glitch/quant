risk: 'Early exits during brief stress dips may terminate profitable trades. Four
  parameters risk overfitting; test design limits to three named variants. CSI 300
  stress indicator may lag idiosyncratic CB sell-offs. Stress mode deactivation threshold
  must be set conservatively to avoid thrashing.

  '
why_not_repeated_failure: 'This is mechanically distinct from closed directions. Position
  sizing (closed) adjusts entry amounts for new trades only; stress exit gate acts
  on existing open positions and modifies when to exit. Entry gates (separate runs
  already in progress) filter which new trades to take; this mechanic does not touch
  entry logic. The 2020 failure (win_rate=0.29) is consistent with late exits on deteriorating
  positions—a problem that entry-side and sizing-side changes structurally cannot
  address.

  '
