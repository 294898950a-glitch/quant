strategy_id: cb_arb_value_gap_switch
family: exit_management
hypothesis: 'The strategy''s largest drawdowns (train max_dd -32.4%, 2020 excess -19.5%)
  occur during market stress when held positions deteriorate faster than the default
  holding period allows exits. A stress-triggered early-exit gate that shortens max
  holding days and enforces a per-position stop-loss when a market drawdown indicator
  exceeds a threshold should cut peak drawdown without materially hurting win rate,
  because the value gap signal remains valid but continuing to hold through stress
  amplifies loss.

  '
source_insight: 'Baseline train score 0.050 vs test score 0.355 signals a regime mismatch.
  The 2020 sub-period (win_rate=0.29, excess=-0.195) is the primary drag. All 11 position-sizing
  variants failed to fix this; the root cause is not entry weighting but exit timing
  under stress. Regime-aware exit has not been tested in isolation for this strategy.

  '
expected_improvement: 'Train excess return improves from 0.131 toward 0.20+ by reducing
  2020-style holding losses; test performance holds near baseline (excess >=0.34)
  because severe stress regimes are rare in 2025-2026. Target: train max_dd < -0.22,
  2020 excess > -0.15.

  '
