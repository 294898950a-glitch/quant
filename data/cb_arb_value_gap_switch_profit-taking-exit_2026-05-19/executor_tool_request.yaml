    ])\n\n            if not in_position and gap > 0:\n                in_position\
    \ = True\n                entry_gap_val = gap\n                entry_date = row[\"\
    trade_date\"]\n                continue\n\n            if in_position and gap\
    \ <= 0:\n                pnl = round((gap - entry_gap_val) * 100.0, 2)\n     \
    \           total_pnl += pnl\n                days = (row[\"trade_date\"] - entry_date).days\
    \ if entry_date else 0\n                trades.append({\n                    \"\
    stock\": str(row[\"ts_code\"]),\n                    \"entry_date\": str(entry_date.date())\
    \ if entry_date else \"\",\n                    \"exit_date\": str(row[\"trade_date\"\
    ].date()),\n                    \"exit_reason\": \"gap_closed\",\n           \
    \         \"entry_gap\": round(entry_gap_val, 4),\n                    \"exit_gap\"\
    : round(gap, 4),\n                    \"pnl\": pnl,\n                    \"hold_days\"\
    : days,\n                })\n                in_position = False\n           \
    \     entry_gap_val = 0.0\n                entry_date = None\n\n        if in_position:\n\
    \            last = grp.iloc[-1]\n            final_gap = float(last[\"value_gap_amount\"\
    ])\n            pnl = round((final_gap - entry_gap_val) * 100.0, 2)\n        \
