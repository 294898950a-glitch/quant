    \ if entry_date else 0\n            trades.append({\n                \"stock\"\
    : str(last[\"ts_code\"]),\n                \"entry_date\": str(entry_date.date())\
    \ if entry_date else \"\",\n                \"exit_date\": str(last[\"trade_date\"\
    ].date()),\n                \"exit_reason\": \"force_close\",\n              \
    \  \"entry_gap\": round(entry_gap_val, 4),\n                \"exit_gap\": round(final_gap,\
    \ 4),\n                \"pnl\": pnl,\n                \"hold_days\": days,\n \
    \           })\n\n    return _compute_metrics(trades, total_pnl)\n\n\ndef _simulate_profit_take(df,\
    \ target_fraction: float) -> dict[str, Any]:\n    \"\"\"Simulate profit-taking\
    \ exit rule.\n\n    Entry: gap > 0 → enter, record entry_gap.\n    Exit (baseline):\
    \ gap <= 0 → exit (gap_closed).\n    Exit (our rule): if position active and\n\
    \        gap <= (1 - target_fraction) * entry_gap → exit (profit_take).\n    \"\
    \"\"\n    df = df.copy()\n    total_pnl = 0.0\n    trades: list[dict[str, Any]]\
    \ = []\n\n    for _code, grp in df.groupby(\"ts_code\"):\n        grp = grp.sort_values(\"\
    trade_date\")\n        in_position = False\n        entry_gap_val = 0.0\n    \
    \    entry_date = None\n        exit_threshold = 0.0\n\n        for _, row in\
    \ grp.iterrows():\n            gap = float(row[\"value_gap_amount\"])\n\n    \
    \        if not in_position and gap > 0:\n                in_position = True\n\
    \                entry_gap_val = gap\n                entry_date = row[\"trade_date\"\
    ]\n                exit_threshold = (1.0 - target_fraction) * entry_gap_val\n\
    \                continue\n\n            if not in_position:\n               \
    \ continue\n\n            should_exit = False\n            exit_reason: str =\
    \ \"\"\n\n            if gap <= 0:\n                should_exit = True\n     \
    \           exit_reason = \"gap_closed\"\n            elif gap <= exit_threshold:\n\
    \                should_exit = True\n                exit_reason = \"profit_take\"\
    \n\n            if should_exit:\n                pnl = round((gap - entry_gap_val)\
    \ * 100.0, 2)\n                total_pnl += pnl\n                days = (row[\"\
    trade_date\"] - entry_date).days if entry_date else 0\n                trades.append({\n\
    \                    \"stock\": str(row[\"ts_code\"]),\n                    \"\
    entry_date\": str(entry_date.date()) if entry_date else \"\",\n              \
    \      \"exit_date\": str(row[\"trade_date\"].date()),\n                    \"\
    exit_reason\": exit_reason,\n                    \"entry_gap\": round(entry_gap_val,\
    \ 4),\n                    \"exit_gap\": round(gap, 4),\n                    \"\
    pnl\": pnl,\n                    \"hold_days\": days,\n                    \"\
    target_fraction\": target_fraction,\n                })\n                in_position\
    \ = False\n                entry_gap_val = 0.0\n                entry_date = None\n\
    \                exit_threshold = 0.0\n\n        if in_position:\n           \
    \ last = grp.iloc[-1]\n            final_gap = float(last[\"value_gap_amount\"\
    ])\n            pnl = round((final_gap - entry_gap_val) * 100.0, 2)\n        \
    \    total_pnl += pnl\n            days = (last[\"trade_date\"] - entry_date).days\
    \ if entry_date else 0\n            trades.append({\n                \"stock\"\
    : str(last[\"ts_code\"]),\n                \"entry_date\": str(entry_date.date())\
    \ if entry_date else \"\",\n                \"exit_date\": str(last[\"trade_date\"\
    ].date()),\n                \"exit_reason\": \"force_close\",\n              \
    \  \"entry_gap\": round(entry_gap_val, 4),\n                \"exit_gap\": round(final_gap,\
    \ 4),\n                \"pnl\": pnl,\n                \"hold_days\": days,\n \
    \               \"target_fraction\": target_fraction,\n            })\n\n    return\
    \ _compute_metrics(trades, total_pnl)\n\n\ndef _compute_metrics(trades: list[dict[str,\
    \ Any]], total_pnl: float) -> dict[str, Any]:\n    pd = _get_pd()\n    if not\
    \ trades:\n        return {\n            \"total_pnl\": 0.0,\n            \"trade_count\"\
    : 0,\n            \"win_rate\": 0.0,\n            \"avg_win\": 0.0,\n        \
    \    \"avg_loss\": 0.0,\n            \"avg_hold_days\": 0.0,\n            \"max_drawdown\"\
    : 0.0,\n            \"gap_closed_exits\": 0,\n            \"profit_take_exits\"\
    : 0,\n            \"force_closes\": 0,\n        }\n\n    tdf = pd.DataFrame(trades)\n\
    \    winning = tdf[tdf[\"pnl\"] > 0]\n    losing = tdf[tdf[\"pnl\"] <= 0]\n\n\
    \    win_rate = round(len(winning) / len(tdf), 4) if len(tdf) > 0 else 0.0\n \
    \   avg_win = round(float(winning[\"pnl\"].mean()), 2) if len(winning) > 0 else\
    \ 0.0\n    avg_loss = round(float(losing[\"pnl\"].mean()), 2) if len(losing) >\
    \ 0 else 0.0\n    trade_count = len(tdf)\n    avg_hold = round(float(tdf[\"hold_days\"\
    ].mean()), 1)\n\n    tdf_sorted = tdf.sort_values(\"exit_date\")\n    tdf_sorted[\"\
    cum_pnl\"] = tdf_sorted[\"pnl\"].cumsum()\n    equity = tdf_sorted[\"cum_pnl\"\
    ].values\n    peak = equity[0] if len(equity) > 0 else 0.0\n    max_dd = 0.0\n\
    \    for val in equity:\n        if val > peak:\n            peak = float(val)\n\
    \        dd = float(val) - peak\n        if dd < max_dd:\n            max_dd =\
    \ dd\n\n    gap_closed = int((tdf[\"exit_reason\"] == \"gap_closed\").sum()) if\
    \ \"exit_reason\" in tdf.columns else 0\n    profit_take = int((tdf[\"exit_reason\"\
    ] == \"profit_take\").sum()) if \"exit_reason\" in tdf.columns else 0\n    force_closes\
    \ = int((tdf[\"exit_reason\"] == \"force_close\").sum()) if \"exit_reason\" in\
    \ tdf.columns else 0\n\n    return {\n        \"total_pnl\": round(total_pnl,\
    \ 2),\n        \"trade_count\": trade_count,\n        \"win_rate\": win_rate,\n\
    \        \"avg_win\": avg_win,\n        \"avg_loss\": avg_loss,\n        \"avg_hold_days\"\
    : avg_hold,\n        \"max_drawdown\": round(max_dd, 4),\n        \"gap_closed_exits\"\
    : gap_closed,\n        \"profit_take_exits\": profit_take,\n        \"force_closes\"\
