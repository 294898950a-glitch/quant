  strategy_id: cb_arb_value_gap_switch
  family: reverse_bond_floor_entry_filter
  hypothesis: 'The bond floor entry filter failed mechanical thresholds in forward
    direction, but the active_critical_insight value_gap_rank_is_anti_alpha_2026_05_24
    established that the forward value-gap sort (most-positive first) is anti-alpha
    — the reverse sort (least-positive first) produces a +41pp cost-on swing vs forward.
    The bond floor filter''s single forward failure may therefore reflect a broken
    base, not a broken filter. Applied to the reverse-sorted base, constraining entries
    to CBs trading near their bond floor should provide additional intrinsic downside
    protection on top of the already-strong reverse base (+30.3% test excess cost-on),
    improving max drawdown without destroying the alpha signal. If this passes where
    forward failed, it confirms that entry filter families were rejected only because
    they were stacked on an anti-alpha base.

    '
  source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 priority 4 — reverse-direction
    variants applied to families that previously failed in forward, to see if those
    families were rejected only because they were stacked on an anti-alpha base.

    '
  expected_improvement: 'Reduced max drawdown relative to the reverse baseline (-0.113),
    improved Sharpe, while preserving most of the +30.3% test excess. The bond floor
    acts as a hard valuation anchor — CBs trading far above it carry speculative premium
    that swamps the value-gap signal. Filtering to near-floor entries removes those
    noise trades.

    '
  capability_ids:
  - C002
  required_executor: evaluate_cb_arb_bond_floor_entry_filter_reverse
  required_data:
  - path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
