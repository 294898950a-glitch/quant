test_design:
  description: 'Grid search bond_floor_distance_pct in [0.02, 0.05, 0.10, 0.15, 0.20]
    with reverse-probe exit logic (max_hold_days in [120, 150, 180], min_gap_pct in
    [0.005, 0.01], sell_gap_pct=0.0, switch_hurdle_pct in [0.0, 0.01]). Cost-on evaluation
    with standard slippage (0.0015) and market impact (0.001). Entry mask: cb_close
    / bond_floor - 1 <= bond_floor_distance_pct. Bond floor computed from par_value
    and coupon_rate discounted at simplified risk-free rate. Candidate pool: value_gap_amount
    > 0, sorted ascending (least-positive first = reverse direction).

    '
success_criteria:
  criteria:
  - test_excess_return > 0
  - test_max_drawdown < reverse_baseline_max_drawdown (-0.113)
  - cost_on_excess_preserves >= 70% of cost_off_excess
  - adoption_pass == true
falsifiers:
  train: &id001
  - test_cumulative_excess <= 0
  - test_max_drawdown > reverse_baseline_max_drawdown
  - cost_degradation > 10pp from cost_off
  - mechanical_adoption_threshold_not_met
  validate: *id001
  test: *id001
risk: 'Low. The bond floor proximity filter is a simple, interpretable constraint
  with clear economic rationale. The main risk is over-constraining the candidate
  pool, reducing trade count below statistical significance. The reverse base already
  has 377 test trades — losing 20-40% to the filter is acceptable if drawdown improves.

  '
why_not_repeated_failure: 'The bond floor entry filter family has only 1 prior failure
  (not a repeated_reject_family) and that failure was on the forward-sorted anti-alpha
  base. Unlike moneyness_entry_filter (5 forward failures, warranted abandonment of
  forward direction), bond_floor has not been tested enough to conclude the filter
  itself is worthless. The active_critical_insight explicitly prioritizes reverse-direction
  retests of previously-failed families. This proposal answers a clean question: was
  the bond floor filter bad, or was the forward base bad? If it passes on reverse,
  both the filter concept and the reverse sort direction gain supporting evidence.
  If it fails, the filter joins moneyness as a confirmed dead end even on a non-broken
  base.

  '
