l0_source: autonomous strategy ideator from recent_results_digest
hypothesis: 'The value-gap signal from the Black-Scholes-based theoretical valuation
  decomposes into two components: pure bond floor value (reliable) and option value
  (model-dependent). For deep out-of-the-money CBs where stock_price << conversion_price,
  the option component dominates the theoretical value and is highly sensitive to
  IV assumptions. Filtering out candidates below a stock_close/conv_price threshold
  will remove the noisiest signals, reducing false entries and drawdowns without destroying
  the alpha in near-the-money and in-the-money candidates.'
source_insight: 'Recent exit-side experiments (duration-adaptive, profit-take, gap-speed-adaptive)
  have produced directionally positive results but the strategy remains deeply negative
  in cumulative excess with cost-on at -10.47%. The accepted duration-adaptive exit
  (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5) provides
  a solid exit baseline. The unresolved problem is entry quality: bond-floor entry
  filtering failed mechanical thresholds, market drawdown entry filtering failed,
  and contrarian drawdown entry failed. Moneyness filtering attacks a different source
  of noise — valuation model fragility in deep OTM territory — and has not been tested.
  Since the valuation model''s option component is least reliable for deep OTM CBs,
  filtering on moneyness should reduce adverse selection at entry without the data
  snooping risk of PnL-feedback filters.'
