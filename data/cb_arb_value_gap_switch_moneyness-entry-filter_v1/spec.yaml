  success_criteria:
    primary: cumulative_excess_compound improves over baseline by >= 2pp on test years
    secondary: max_drawdown on test years does not worsen by > 2pp vs baseline
    sanity: average daily position count remains >= 3 on test years (to avoid over-filtering)
  falsifiers:
    train:
    - cumulative_excess_compound on test years <= baseline
    - any test year max_drawdown worsens by > 5pp vs baseline
    - average daily position count on test years falls below 1.5 (strategy starved
      of candidates)
    validate:
    - cumulative_excess_compound on test years <= baseline
    - any test year max_drawdown worsens by > 5pp vs baseline
    - average daily position count on test years falls below 1.5 (strategy starved
      of candidates)
    test:
    - cumulative_excess_compound on test years <= baseline
    - any test year max_drawdown worsens by > 5pp vs baseline
    - average daily position count on test years falls below 1.5 (strategy starved
      of candidates)
  risk: 'Medium. The primary risk is over-filtering: if the moneyness threshold is
    set too high, the strategy may starve for candidates during periods when most
    CBs are deep OTM (e.g., bear markets where stocks fall below conversion prices).
    This is mitigated by searching a wide threshold range (0.3-1.2) and including
    a sanity check on minimum position count. A secondary risk is that moneyness filtering
    removes candidates that actually have genuine value gaps caused by bond-floor
    undervaluation rather than option-model noise — but this is precisely the hypothesis
    being tested.'
  why_not_repeated_failure: C002 (bond-floor entry filter) failed mechanical thresholds,
    but moneyness is a fundamentally different filter dimension. Bond-floor filtering
    constrains entry to CBs already near their downside anchor, which mechanically
    biases toward low-upside situations. Moneyness filtering constrains entry to CBs
    where the option component of theoretical value is most reliable, which should
    preserve upside while reducing noise. C009/C010 (market drawdown entry gate) and
    contrarian drawdown entry (also failed) are global market-timing filters; moneyness
    is a cross-sectional per-candidate quality filter. None of these closed or failed
    directions overlap with the moneyness mechanism.
  related_prior_runs:
  - cb_arb_value_gap_switch_bond-floor-entry-filter_1 (failed_mechanical_thresholds)
  - cb_arb_value_gap_switch_market_drawdown_entry_filter (failed_mechanical_thresholds)
  - cb_arb_value_gap_switch_contrarian_drawdown_entry_20260522 (failed_mechanical_thresholds)
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22 (accepted, provides
    exit baseline)
  implementation_assumption: The executor compute moneyness as stock_close / conv_price
    at each entry signal date, apply a boolean mask before ranking, and pass the filtered
    candidate set through the existing value-gap ranking, duration-adaptive exit,
    and baseline position sizing. No changes to the valuation formula, exit logic,
    or position sizing logic.
