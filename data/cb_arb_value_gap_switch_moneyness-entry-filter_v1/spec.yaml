        - 1.2
        step: 0.1
        description: Minimum stock_close/conv_price ratio for entry eligibility. Below
          this threshold, the candidate is excluded from the ranking pool.
    fixed_from_baseline:
      entry: absolute value-gap ranking with option-sourced theoretical value, no
        additional entry gates
      exit: duration-adaptive exit with accepted best params (min_hold_days=5, initial_threshold_fraction=0.7,
        decay_period_factor=0.5, effective_max_hold_days=45)
      position_sizing: baseline ranking-weighted sizing, no PnL feedback or volatility
        scaling
    train_years: 2007-2021
