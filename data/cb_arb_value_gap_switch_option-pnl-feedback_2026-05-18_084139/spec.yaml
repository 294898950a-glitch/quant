status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: mild_scale_option_pnl_feedback
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: 不是全局期权买入封锁（global_option_entry_gate），不是整体期权估值打折（global_option_value_haircut），
    不是状态条件过滤（regime_conditioned_option_entry_gate），也不是重新运行 panic 系列； 属于 option_source_pnl_feedback
    family 内部 scale 参数精细化扫描， 覆盖之前所有轮次从未测试过的极温和缩减区间（0.70–0.90）。
  risk: 训练期期权来源整体净正收益（+75K，2019-2024），即使 scale=0.90 也会在信号触发时轻微降低训练分， 若训练期 baseline
    优势（score=0.050）足以压制所有温和变体， 则此方向将第 9 次确认 option_source_pnl_feedback family 结构性失败，
    届时需停止该 family 并上报用户做策略层决策。
  fallback_reason: null
