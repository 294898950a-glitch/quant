- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: feedback_standalone_sum_pnl_threshold
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: '已确认无效方向（rolling_option_source_pnl_feedback）测试的是 avg_pnl_pct
    主导触发（含单条件和 AND 组合）； 本轮将 trigger_avg_pnl_pct 设为极小值（实质禁用）， 使 trigger_sum_pnl 成为唯一激活变量，属于
    pnl_feedback executor 内独立参数维度首次单独测试， 不重复 avg_pnl_pct 主导的已拒绝变体，且不触碰 forbidden_families
    中任何方向。

    '
  risk: 训练期（2019-2024）60d 窗口内期权来源累计亏损的实际分布未在现有 summary.json 或归因文件中直接披露； 若训练期存在多个窗口
    sum_pnl 超过 40K 以上门槛，触发频次仍会压低训练分，方向将再次被拒绝。 此风险目前无法从现有数据预验证，需待 VM 回测后才可确认。 另一风险：executor
    对 trigger_avg_pnl_pct 极小值（-0.99）的解释行为未在历史 params_json 中出现， 若 executor 对超出正常范围的参数值有未知处理，候选结果可能与预期不符。
  fallback_reason: null
