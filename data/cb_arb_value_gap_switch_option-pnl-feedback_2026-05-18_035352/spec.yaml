schema_version: 1
run_id: cb_arb_value_gap_switch_option-pnl-feedback_2026-05-18_035352
date: '2026-05-18'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: option_value_loop Claude prompt injection from current.yaml, research_insights.yaml,
  experiments.yaml, baseline_registry.yaml, strategies.yaml, and protocol_rules.yaml
hypothesis: '只用近期已平仓的「高风险子集」（距债底比率 > 1.4 或正股溢价率 > 1.6）期权来源交易的已实现盈亏作触发信号； 该子集 2019-2024
  整体净亏（净 -255K，亏损捕获率 45.5% vs 盈利捕获率仅 19.3%）， 信号纯净度远优于全量期权来源（全量净 +75K），触发精准度更高， 有望在不误砍训练期盈利期权的前提下识别真正高风险暴露时段。

  '
source_insight: '三轮 rolling_option_source_pnl_feedback 全部被拒绝的根因是：全量期权来源 2019-2024
  净盈亏为正， 训练期最优始终退回 baseline_no_feedback（score 0.050351）， 任何触发门槛（avg_pnl_pct=0 / -5%
  / -10%，sum_pnl 门槛变体）均无法阻止训练期信号误砍盈利期权； 而 data/cb_arb_option_false_undervalue_attribution_2026-05-17/
  归因分析明确显示 ratio > 1.4 子集净 -255K（226 笔），是 2019-2024 唯一可识别的净亏子集， 其信号可提供更高质量的反馈触发，与全量信号有本质区别。

  '
parameter_space:
- name: option_source_pnl_feedback_lookback_days
  range:
  - 20
  - 60
  type: int
  description: 只看最近已平仓期权来源交易的天数。
- name: option_source_pnl_feedback_min_trades
  range:
  - 2
  - 3
  type: int
  description: 触发反馈前至少需要看到的已平仓期权来源交易数。
- name: option_source_pnl_feedback_scale
  range:
  - 0.25
  - 0.75
  type: float
  description: 触发后期权来源候选排序金额和实际买入金额保留比例。
new_data_sources:
- path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  description: 已有 value-gap 估值与可交易金额，避免重复计算基础基准。
- path: data/cb_warehouse/cb_basic.parquet
  description: 转股价和正股代码，复用共享 rank loader。
- path: data/cb_warehouse/stk_daily_qfq.parquet
  description: 前复权正股价格，复用共享 rank loader。
grid:
  dimensions:
  - option_source_pnl_feedback_lookback_days
  - option_source_pnl_feedback_min_trades
  - option_source_pnl_feedback_scale
  candidates_count: 19
  description: baseline + 18 组滚动期权来源盈亏反馈，全量跑 train/test/2019-2024 yearly，并输出 2020
    和 test 的入口来源拆解。
hard_floors:
  train_excess_return: 0.0
  train_max_drawdown: -0.3
  test_excess_return: 0.0
  test_max_drawdown: -0.3
  replay_2020_total_return: -0.090593
hard_floors_baseline_source: current cb_arb_value_gap_switch cost-aware branch and
  option-source false-undervaluation evidence
auxiliary_metrics:
- train_excess_return
- test_excess_return
- yearly_2020_total_return
- yearly_2020_excess_return
- max_drawdown
- total_trades
- win_rate
- entry_source_2020_option_loss
- entry_source_test_option_profit
- average_position_scale
cv_design: single-window
cv_holdout_years:
- 2025
- 2026
cv_adoption_threshold: 必须同时优于 baseline 的训练段、2020 修复和 2025-2026 测试段；否则只作为诊断资产。
compute_estimate:
  sig_minutes: 0
  spot_minutes: 90
  local_minutes: 0
  estimated_cost_yuan: 0.0
budget_cap_yuan: 100
spot_decision: 本轮使用已有 daily_value_gap_amounts，不重复计算基础基准；必须在 VM/spot host 执行。
stop_conditions:
- 脚本退出非 0
- 缺少 summary_option_pnl_feedback.csv
- 缺少 yearly_option_pnl_feedback.csv
- 缺少 entry_source_2020_option_pnl_feedback.csv
- 所有非 baseline 方案无法同时优于 train、2020 和 test baseline
artifacts_required:
- summary_option_pnl_feedback.csv
- yearly_option_pnl_feedback.csv
- entry_source_2020_option_pnl_feedback.csv
- entry_source_test_option_pnl_feedback.csv
- feedback_option_pnl_feedback.csv
- summary.json
- report.yaml
- l4_ack.yaml
- diagnostic.yaml
automation:
  output_dir: data/cb_arb_value_gap_switch_option-pnl-feedback_2026-05-18_035352
  gatekeeper_after_run: false
  sync_paths:
  - scripts/evaluate_cb_arb_option_pnl_feedback.py
  - scripts/evaluate_cb_arb_option_position_sizing.py
  - scripts/evaluate_cb_arb_value_gap_switch.py
  - data/research_framework/runtime_entrypoints.yaml
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - data/cb_warehouse/cb_basic.parquet
  - data/cb_warehouse/stk_daily_qfq.parquet
  command:
  - .venv/bin/python
  - scripts/evaluate_cb_arb_option_pnl_feedback.py
  - --data-root
  - data/cb_arb_concurrent_supervised_20260511_094500
  - --train-start
  - '20190101'
  - --train-end
  - '20241231'
  - --test-start
  - '20250101'
  - --test-end
  - '20260508'
  - --fixed-source
  - '2'
  - --rule
  - score_4state
  - --output-dir
  - '{output_dir}'
  - --base-ranks-path
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - --reuse-ranks
  - --cost-model-enabled
  verdict:
    table_path: summary_option_pnl_feedback.csv
    yearly_table_path: yearly_option_pnl_feedback.csv
    filters:
      period: train
    rank_by: score
    rank_desc: true
    thresholds:
      excess_return:
        min: 0.0
      max_drawdown:
        min: -0.3
    train_single_year_dd_ceiling: -0.15
status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: high_risk_subgroup_pnl_feedback
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: '不是对全量期权来源触发（非 rolling_option_source_pnl_feedback 系列）；
    不修改入场门槛（非 global_option_entry_gate / regime_conditioned_option_entry_gate）； 不修改理论价格（非
    global_option_value_haircut）； 不使用静态阈值始终缩减仓位（非 static_candidate_position_scale
    / close_to_bond_floor_threshold / moneyness_stock_to_conv_threshold， 这些方向已在 cb_arb_value_gap_switch_option-position-sizing_2026-05-17_151411
    中拒绝）； 唯一区别是把反馈信号的采样范围从「所有已平仓期权来源交易」收窄至「归因确认的净亏高风险子集」。

    '
  risk: '最大风险：scripts/evaluate_cb_arb_option_pnl_feedback.py 当前参数空间可能未实现 subgroup_filter
    参数——若脚本对所有已平仓期权来源交易统一计算反馈盈亏而无法按 CB 特征分子集， 则需先添加代码才能生成可执行 spec，本提案在脚本支持确认前状态为 BLOCKED；
    次要风险：高风险子集每年约 20 笔（116 笔 / 6 年），60 天回望窗口内可能仅有 1-2 笔， min_trades=2 的触发门槛在低频交易年份几乎永远不满足，导致测试退化为无触发的
    baseline； 另需确认 2025-2026 测试段高风险子集净盈亏方向，若测试段该子集也净盈则信号方向与预期相反。

    '
  fallback_reason: null
