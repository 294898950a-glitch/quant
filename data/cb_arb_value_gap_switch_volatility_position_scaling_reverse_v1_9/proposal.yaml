proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_9
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on) is the only
  proven alpha direction. Entry filters (moneyness, bond floor) culled the reverse
  candidate pool and killed the signal — all failed mechanical thresholds. Position
  scaling via inverse ATR does not remove candidates; it only adjusts allocation weights.
  Applying inverse-ATR weighting to the ascending-sort base should reduce drawdowns
  (by shrinking exposure to high-volatility names) while preserving at least 80% of
  the +30.3% test excess, because the unscaled entry signal remains intact. This addresses
  the repeated-reject-family question: (1) the underlying signal (ascending value_gap_amount)
  is valid, as demonstrated by +30.3% test excess cost-on; (2) the direction is correctly
  ascending — the forward (descending) sort is anti-alpha; (3) execution condition
  is the unsolved problem — entry filters destroy the signal by culling, but position
  scaling preserves it by reweighting. The moneyness family failed because it is an
  execution-condition approach that removes candidates; position scaling is orthogonal
  and non-destructive.

  '
source_insight: 'reverse-probe-coston produced +30.3% test excess cost-on (41pp swing
  from sort direction alone). All six entry-filter runs on the reverse base (moneyness
  x2, bond floor x2, plus forward counterparts) failed failed_mechanical_thresholds
  — they cull the already-thin candidate pool. Position scaling is the only remaining
  enhancement that does not alter entry eligibility.

  '
expected_improvement: 'Reduce max drawdown by >=5pp vs reverse-probe-coston (+30.3%
  test excess) while retaining >=24% test excess cost-on (>=80% preservation). Target:
  sharpen ratio improved by >=0.15.

  '
