test_design:
  description: 'Sort daily value_gap_amount ASCENDING (>0 filter unchanged). Compute
    ATR from stk_daily_qfq close per CB per day. Apply inverse scaling: position_weight
    = baseline * (scaling_beta / ATR_rank). Grid search over ATR lookback [10, 20,
    40, 60] and scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit: reverse-probe grid
    (max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct 0.0, switch_hurdle_pct
    [0.0, 0.01]). Cost-on (slippage 0.0015, impact 0.001). Train 2018-2022, test 2023-2026.
    Compare best candidate against reverse-probe-coston baseline.

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound >= 0.24
  - max_drawdown_reduction_vs_reverse_probe_coston >= 0.05
  - adoption_pass: true
falsifiers:
  train: &id001
  - test_cumulative_excess_compound < 0.10
  - max_drawdown_worse_than_reverse_probe_coston
  - any_test_year_sharpe < 0.0
  validate: *id001
  test: *id001
risk: 'Low-to-medium. Position scaling is a non-destructive overlay — worst case it
  degrades to equal-weight (when scaling_beta is large or ATR variance is low), which
  is the reverse-probe-coston baseline. The main risk is that ATR is noisy for illiquid
  CBs with sparse stock trading, diluting the scaling signal. Mitigated by grid-searching
  ATR lookback to find stable windows.

  '
why_not_repeated_failure: 'The repeated-reject family tag is moneyness_stock_to_conv_threshold
  (3 rejections). This proposal is NOT in that family — it uses static_candidate_position_scale
  (C001), which adjusts allocation weights without filtering entry eligibility. Moneyness
  filters failed because they cull candidates from an already-thin pool; position
  scaling preserves all candidates and only reweights. These are different mechanics,
  different executors, and different failure modes.

  '
