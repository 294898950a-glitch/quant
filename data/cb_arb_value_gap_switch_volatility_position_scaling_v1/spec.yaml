    option_source_pnl_feedback_scaler, adoption_pass=False) used reactive realized-PnL
    adjustment — unstable feedback loop with 19 candidates failing mechanical thresholds.
    This proposal uses forward-looking ATR-based volatility scaling (C001 executor
    volatility_based_position_scaling_executor) — a fundamentally different mechanism.
    Market drawdown entry gates (C009, failed_mechanical_thresholds) filtered entries
    by market-level returns; this scales within existing entries without filtering.
    Exit rule experiments (C007) changed when to sell; this changes how much to buy,
    using the best proven exit. iv_percentile_exit was rejected by review_memory for
    negative train-period excess — different capability family entirely.

    '
