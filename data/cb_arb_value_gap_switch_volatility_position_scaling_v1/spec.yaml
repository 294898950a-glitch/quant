hypothesis: 'Inverse-volatility position scaling reduces cost drag from -7.47pp without
  destroying alpha, because high-ATR CBs contribute disproportionately to turnover
  costs (wider spreads, more frequent rebalancing) while their value-gap signals are
  no stronger than low-volatility peers. Forward-looking ATR-based scaling avoids
  the instability that killed PnL-feedback scaling (adoption_pass=False, 19 candidates).

  '
source_insight: 'Cost realism wall: baseline cumulative excess degrades -7.47pp with
  costs on. Duration-adaptive exit (best accepted result: min_hold_days=5, initial_threshold_fraction=0.7,
  decay_period_factor=0.5, effective_max_hold_days=45) still uses uniform position
  sizing. PnL-feedback scaling failed mechanically (adoption_pass=False) — reactive
  PnL loop was unstable. Volatility-based sizing is a forward-looking risk control
  grounded in microstructure: wider spreads on volatile names amplify cost drag disproportionately.
  Reducing exposure there should improve net returns without changing the signal.

  '
