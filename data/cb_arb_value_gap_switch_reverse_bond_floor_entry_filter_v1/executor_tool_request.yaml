    \ / 365.25\n\n    bond_floor = np.full(len(merged), np.nan)\n\n    past_mask =\
    \ days_to_mat <= 0\n    bond_floor[past_mask] = pars[past_mask]\n\n    active_mask\
    \ = ~past_mask\n    if active_mask.any():\n        t = years_to_mat[active_mask]\n\
    \        p = pars[active_mask]\n        c_rate = coupons[active_mask]\n\n    \
