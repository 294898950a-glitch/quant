    trade_date\"])\n    return df.sort_values([\"ts_code\", \"trade_date\"]).reset_index(drop=True)\n\
    \n\ndef _load_cb_basic() -> pd.DataFrame:\n    path = _find_parquet(\"data/cb_warehouse/cb_basic.parquet\"\
    )\n    cols = [\"ts_code\", \"par_value\", \"coupon_rate\", \"maturity_date\"\
    , \"list_date\", \"delist_date\"]\n    df = pd.read_parquet(path, columns=cols)\n\
    \    for c in (\"ts_code\",):\n        if hasattr(df[c], \"str\"):\n         \
    \   df[c] = df[c].astype(str)\n    return df\n\n\ndef _load_cb_daily() -> pd.DataFrame:\n\
    \    path = _find_parquet(\"data/cb_warehouse/cb_daily.parquet\")\n    df = pd.read_parquet(path,\
    \ columns=[\"ts_code\", \"trade_date\", \"close\"])\n    df[\"trade_date\"] =\
    \ pd.to_datetime(df[\"trade_date\"])\n    return df.sort_values([\"ts_code\",\
    \ \"trade_date\"]).reset_index(drop=True)\n\n\ndef _load_cb_call() -> pd.DataFrame:\n\
    \    path = _find_parquet(\"data/cb_warehouse/cb_call.parquet\")\n    df = pd.read_parquet(path,\
    \ columns=[\"ts_code\", \"ann_date\", \"call_date\"])\n    df[\"ann_date\"] =\
    \ pd.to_datetime(df[\"ann_date\"], format=\"%Y%m%d\")\n    df[\"call_date\"] =\
    \ pd.to_datetime(df[\"call_date\"], format=\"%Y%m%d\")\n    return df\n\n\n# ────────────────────────────────────────────────────────────────────────\n\
    #  Bond-floor computation (same as bond_floor_entry_filter executor)\n# ────────────────────────────────────────────────────────────────────────\n\
    \n_BOND_FLOOR_DISCOUNT_RATE = 0.03\n\n\ndef _compute_bond_floor(\n    cb_basic:\
