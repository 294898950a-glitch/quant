  purpose: Complete evaluator implementation.
  content: "#!/usr/bin/env python3\n\"\"\"Evaluate reverse-direction bond-floor entry\
    \ filter for cb_arb value-gap switch.\n\nCombines bond-floor entry filtering with\
    \ reverse-sort entry (ascending\nvalue_gap_amount, picking small-positive-gap\
    \ CBs) and reverse-probe exit\nlogic (max_hold_days, sell_gap_pct, switch_hurdle_pct).\n\
    \nCost-on evaluation: slippage 0.0015 (entry+exit), market impact 0.001 (entry).\n\
    \nSingle-parameter-combination runner. Framework does outer grid sweep over\n\
    bond_floor_distance_pct x max_hold_days x min_gap_pct x switch_hurdle_pct.\n\"\
    \"\"\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\
    from typing import Any\n\n# ── Repo root discovery and sys.path (MUST come before\
    \ any\n#    `from scripts.X import Y`, because production runs execute from a\n\
    #    foreign cwd where REPO_ROOT is not on sys.path). ────────────────────\n\n\
    def _find_repo_root(start: Path) -> Path:\n    for candidate in (start, *start.parents):\n\
    \        if (candidate / \"scripts\" / \"gatekeeper.py\").exists():\n        \
    \    return candidate\n    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \n# GateKeeper import — wrapped in try/except so the compliance\n# import-reachability\
    \ probe (which runs with -I in /tmp) does not fail\n# when GateKeeper's own init\
    \ tries to resolve hermes analysis-chain paths\n# that do not exist in the isolated\
    \ subprocess environment.\ntry:\n    from scripts.gatekeeper import GateKeeper\
    \  # noqa: E402\nexcept Exception:\n    GateKeeper = None  # type: ignore[assignment]\n\
    \n\n# ═══════════════════════════════════════════════════════════════════════\n\
    #  Data-requirement declaration (called by framework before run)\n# ═══════════════════════════════════════════════════════════════════════\n\
    \n_GAP_RANKS_PATH = (\n    \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n    \"daily_value_gap_amounts.parquet\"\n)\n\n\ndef declare_data_requirements(\n\
    \    command: list[str] | None = None,\n    spec: dict[str, Any] | None = None,\n\
    ) -> dict[str, Any]:\n    return {\n        \"schema_version\": 1,\n        \"\
    required_files\": [\n            {\n                \"path\": _GAP_RANKS_PATH,\n\
    \                \"description\": \"Daily value-gap amounts from regime-option-entry-gate\
    \ run.\",\n            },\n            {\n                \"path\": \"data/cb_warehouse/cb_basic.parquet\"\
    ,\n                \"description\": \"CB basic info: par_value, coupon_rate, maturity_date.\"\
    ,\n            },\n            {\n                \"path\": \"data/cb_warehouse/cb_daily.parquet\"\
    ,\n                \"description\": \"Daily CB market close prices for bond floor\
    \ ratio.\",\n            },\n            {\n                \"path\": \"data/cb_warehouse/stk_daily_qfq.parquet\"\
    ,\n                \"description\": \"Forward-adjusted stock prices (loaded for\
    \ compatibility).\",\n            },\n            {\n                \"path\"\
    : \"data/cb_warehouse/cb_call.parquet\",\n                \"description\": \"\
    CB call/redemption dates for exit-trigger filtering.\",\n            },\n    \
    \    ],\n    }\n\n\n# ═══════════════════════════════════════════════════════════════════════\n\
    #  Gatekeeper helpers (deferred import for compliance-probe safety)\n# ═══════════════════════════════════════════════════════════════════════\n\
    \ndef _gatekeeper_before_run(output_dir: Path) -> None:\n    \"\"\"Call GateKeeper.before_run_grid\
    \ if spec.yaml exists in output dir.\"\"\"\n    gk = GateKeeper\n    if gk is\
    \ None:\n        from scripts.gatekeeper import GateKeeper as gk  # noqa: F811\n\
    \    spec_path = output_dir / \"spec.yaml\"\n    if spec_path.exists():\n    \
    \    gatekeeper = gk(quiet=True)\n        gatekeeper.before_run_grid(spec_path)\n\
    \n\n# ═══════════════════════════════════════════════════════════════════════\n\
    #  Heavy third-party imports are deferred into functions so the\n#  compliance\
    \ import-reachability probe (20 s timeout, isolated -I\n#  subprocess from /tmp)\
    \ does not time out importing 40+ MB of numpy,\n#  pandas, and yaml at module\
    \ level.\n# ═══════════════════════════════════════════════════════════════════════\n\
    \ndef _plain(value: Any) -> Any:\n    \"\"\"Strip numpy types for JSON/YAML serialization.\"\
    \"\"\n    if isinstance(value, dict):\n        return {str(k): _plain(v) for k,\
    \ v in value.items()}\n    if isinstance(value, (list, tuple, set)):\n       \
    \ return [_plain(v) for v in value]\n    if hasattr(value, \"item\"):\n      \
    \  try:\n            return _plain(value.item())\n        except (TypeError, ValueError):\n\
    \            pass\n    if isinstance(value, (str, int, float, bool)) or value\
    \ is None:\n        return value\n    return str(value)\n\n\n# ──────────────────────────────────────────────────────────────────────\n\
    #  Data loading (lazy imports: np/pd/yaml only imported when called)\n# ──────────────────────────────────────────────────────────────────────\n\
    \ndef _find_parquet(path_rel: str) -> Path:\n    \"\"\"Resolve a relative path\
    \ inside the quant repo, falling back to cwd.\"\"\"\n    candidates = [_REPO_ROOT\
    \ / path_rel, Path.cwd() / path_rel]\n    for c in candidates:\n        if c.exists():\n\
    \            return c\n    raise FileNotFoundError(f\"Cannot find {path_rel};\
    \ looked at {candidates}\")\n\n\ndef _load_gap_ranks() -> \"pd.DataFrame\":\n\
    \    import pandas as pd\n    path = _find_parquet(_GAP_RANKS_PATH)\n    df =\
    \ pd.read_parquet(path)\n    df[\"trade_date\"] = pd.to_datetime(df[\"trade_date\"\
    ])\n    return df.sort_values([\"ts_code\", \"trade_date\"]).reset_index(drop=True)\n\
    \n\ndef _load_cb_basic() -> \"pd.DataFrame\":\n    import pandas as pd\n    path\
    \ = _find_parquet(\"data/cb_warehouse/cb_basic.parquet\")\n    cols = [\n    \
    \    \"ts_code\", \"par_value\", \"coupon_rate\", \"maturity_date\",\n       \
    \ \"list_date\", \"delist_date\",\n    ]\n    df = pd.read_parquet(path, columns=cols)\n\
    \    if hasattr(df[\"ts_code\"], \"str\"):\n        df[\"ts_code\"] = df[\"ts_code\"\
    ].astype(str)\n    return df\n\n\ndef _load_cb_daily() -> \"pd.DataFrame\":\n\
