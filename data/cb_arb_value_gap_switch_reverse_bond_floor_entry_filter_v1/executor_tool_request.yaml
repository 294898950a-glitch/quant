tool_request_id: evaluate_cb_arb_bond_floor_entry_filter_reverse_v1
why_existing_tools_insufficient: evaluate_cb_arb_bond_floor_entry_filter sorts value_gap_amount
  descending (forward direction, buying most-underpriced CBs first) and applies bond
  floor entry filter. It cannot sort ascending because the sort direction is hard-coded
  in its entry selection logic, and the entire backtester pipeline — rank computation,
  position sizing, exit rules — is built around the forward-direction assumption.
  evaluate_cb_arb_reverse_probe and evaluate_cb_arb_reverse_probe_coston sort ascending
  (reverse direction) with the correct exit logic (max_hold_days, min_gap_pct, sell_gap_pct,
  switch_hurdle_pct) and support cost-on evaluation, but they have zero bond floor
  filter logic — every candidate with value_gap_amount > 0 passes entry eligibility.
  No existing executor combines reverse sort with bond floor filtering. The proposal
  requires a new executor that bridges the bond floor calculation from evaluate_cb_arb_bond_floor_entry_filter
  with the reverse-sort entry and exit pipeline from evaluate_cb_arb_reverse_probe.
reviewed_existing_executor_ids:
- evaluate_cb_arb_bond_floor_entry_filter
- evaluate_cb_arb_reverse_probe
- evaluate_cb_arb_reverse_probe_coston
- option_position_sizing
