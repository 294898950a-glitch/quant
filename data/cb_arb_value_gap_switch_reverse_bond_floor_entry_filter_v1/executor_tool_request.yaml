implementation_outline:
  script_path: scripts/evaluate_cb_arb_bond_floor_entry_filter_reverse.py
  main_inputs:
  - data_root
  - train_start/train_end/test_start/test_end
  - output_dir
  - bond_floor_distance_pct
  - max_hold_days, min_gap_pct, sell_gap_pct, switch_hurdle_pct
  core_steps:
  - Load daily_value_gap_amounts.parquet and filter value_gap_amount > 0
  - Load cb_basic.parquet (par_value, coupon_rate, maturity_date) and cb_daily.parquet
    (close)
  - Compute simplified bond floor per CB per day: par_value discounted at 3% risk-free
      rate from trade_date to maturity_date, plus coupon stream similarly discounted
  - Merge bond floor into daily gap data on ts_code + trade_date
  - Apply entry mask: value_gap_amount > 0 AND cb_close / bond_floor - 1 <= bond_floor_distance_pct
  - Sort remaining candidates ascending on value_gap_amount (reverse direction)
  - Run grid search over bond_floor_distance_pct in [0.02, 0.05, 0.10, 0.15, 0.20]
    crossed with exit params max_hold_days in [120, 150, 180], min_gap_pct in [0.005,
    0.01], switch_hurdle_pct in [0.0, 0.01], with sell_gap_pct fixed at 0.0
  - For each parameter combination, run backtest with reverse-probe exit logic: enter
      on ascending rank (top-N eligible), exit when hold_days >= max_hold_days OR
      (current_gap / entry_gap <= sell_gap_pct) OR gap rank crosses switch_hurdle_pct,
      subject to call-date triggers
  - Apply cost model: slippage 0.0015 on entry and exit, market impact 0.001 on entry
  - Write summary.json with adoption_pass boolean, best_params, train/test metrics
  - Write report.yaml, l4_ack.yaml, diagnostic.yaml
  code_constraints:
  - Use existing project data files; do not overwrite raw warehouse data
  - Define main() entry point
  - Define declare_data_requirements(command, spec) per artifact_contract
  - Do not change current strategy truth
  - Bond floor discount rate defaults to 0.03 but treat bond_floor_distance_pct as
    a tunable hyperparameter to absorb bond floor calculation noise
  - Follow reverse-probe exit logic exactly (same hold-day counting, gap-ratio tracking,
    switch-hurdle mechanics) to ensure comparable results
validation_plan:
- python3 -m py_compile scripts/evaluate_cb_arb_bond_floor_entry_filter_reverse.py
- Run a small data smoke test: single parameter combination (bond_floor_distance_pct=0.05,
    max_hold_days=150) on train period only, verify trade_count > 0 and all four artifacts
    exist
- Verify summary.json contains adoption_pass boolean and best_params dict
- Verify report.yaml contains train/test metrics with cost-on excess return
- Spot-check that bond floor values are positive and cb_close/bond_floor ratios are
  reasonable (0.5 to 2.0 range)
