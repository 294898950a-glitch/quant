    ]],\n        on=\"ts_code\",\n        how=\"inner\",\n    )\n    merged[\"maturity_date\"\
    ] = pd.to_datetime(merged[\"maturity_date\"], format=\"%Y%m%d\")\n\n    trade_dates\
