hypothesis: 'The forward-direction bond floor entry filter (v1, failed_mechanical_thresholds)
  failed because it was filtering a candidate set dominated by anti-alpha — large
  positive value_gap_amount CBs that the reverse probe exposed as negatively informative
  under the current monotonicity assumption. In reverse direction, where we sort ascending
  on value_gap_amount>0 and select small-positive gaps, the bond floor filter has
  a different economic role: it removes CBs whose small-positive gap is driven by
  liquidity premia or technical factors rather than genuine undervaluation. A CB trading
  near its bond floor with a small positive theoretical-value gap is the cleanest
  expression of the reverse signal — mispriced optionality with limited downside.
  Filtering to near-floor entries in reverse direction should produce higher risk-adjusted
  excess than the base reverse probe.

  '
