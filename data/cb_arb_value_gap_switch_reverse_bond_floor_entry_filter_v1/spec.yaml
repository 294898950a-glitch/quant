    - ann_date
    - call_date
  test_design:
    description: 'Grid search over bond_floor_distance_pct in [0.02, 0.05, 0.10, 0.15,
      0.20] (cb_close / bond_floor - 1 <= threshold). Entry only when value_gap_amount
      > 0 AND bond floor distance condition is met. Sort ascending on value_gap_amount.
      Use reverse probe parameter space as base: max_hold_days in [120, 150, 180],
      min_gap_pct in [0.005, 0.01], sell_gap_pct=0.0, switch_hurdle_pct in [0.0, 0.01].
      Cost-on evaluation. Same train/test split as reverse probe (train through 2020,
      test 2021+). Bond floor computed as discounted par at AAA yield curve plus discounted
      coupon stream, or a simplified floor using par discounted at 3% risk-free rate
      when full curve data is unavailable.

      '
