    - and_test_max_drawdown_gte_reverse_base: 0.113
    - test_trade_count_lt: 100
  risk: 'Low-medium. The reverse direction is proven tradeable (cost-on test excess
    +0.303, 81% of cost-off excess preserved). The bond floor filter is a conservative
    overlay — it removes candidates, it doesn''t change signal logic. The main risk
    is over-filtering: if too few CBs trade near bond floor, trade count drops below
    statistical significance (target >= 200). Secondary risk: the bond floor calculation
    itself may be noisy without a full yield curve, but sensitivity to bond floor
    distance pct reveals whether the filter survives imprecise inputs.

    '
  why_not_repeated_failure: 'The forward bond floor filter (v1) failed because the
    candidate set was dominated by anti-alpha — large positive value_gap_amount CBs.
    Filtering that set further cannot fix a broken signal. This proposal applies bond
    floor filtering to a different candidate set: small-positive-gap CBs selected
    by reverse sort, which the reverse probe proved are genuine alpha (test excess
    +0.303 cost-on). The economic role of the bond floor filter changes from "filter
    noise in a broken signal" to "amplify a proven signal by removing the weakest
    entries." This is not a renamed repeat; it is a different candidate universe with
    a different expected failure mode (over-filtering vs signal-quality degradation).

    '
  related_prior_runs:
