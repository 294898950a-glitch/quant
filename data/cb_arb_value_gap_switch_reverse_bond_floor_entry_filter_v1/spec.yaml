  strategy_id: cb_arb_value_gap_switch
  family: reverse_bond_floor_entry_filter
  hypothesis: 'The forward-direction bond floor entry filter (v1, failed_mechanical_thresholds)
    failed because it was filtering a candidate set dominated by anti-alpha — large
    positive value_gap_amount CBs that the reverse probe exposed as negatively informative
    under the current monotonicity assumption. In reverse direction, where we sort
    ascending on value_gap_amount>0 and select small-positive gaps, the bond floor
    filter has a different economic role: it removes CBs whose small-positive gap
    is driven by liquidity premia or technical factors rather than genuine undervaluation.
    A CB trading near its bond floor with a small positive theoretical-value gap is
    the cleanest expression of the reverse signal — mispriced optionality with limited
    downside. Filtering to near-floor entries in reverse direction should produce
    higher risk-adjusted excess than the base reverse probe.

    '
  source_insight: value_gap_rank_is_anti_alpha_2026_05_24
  expected_improvement: 'Test-period cost-on excess return above the base reverse
    probe (+0.303) OR comparable excess with materially lower max drawdown (below
    -0.113). Specifically, the bond floor filter should eliminate the worst-performing
    reverse-probe trades — CBs trading far above bond floor where gap closure is unreliable.

    '
  capability_ids:
  - C002
  required_executor: evaluate_cb_arb_bond_floor_entry_filter_reverse
  missing_capability_request: 'C002 (bond floor threshold) mechanic fits the idea,
    but no existing executor combines reverse sort with bond floor filtering. Need
    a new executor that: 1. sorts value_gap_amount ascending (>0 filter unchanged)
    2. computes bond floor per CB (discounted par + coupons) 3. applies entry filter:
    cb_close / bond_floor - 1 <= bond_floor_distance_pct 4. uses the reverse probe
    exit logic (max_hold_days, sell_gap_pct, switch_hurdle_pct) 5. runs cost-on evaluation
    with standard slippage (0.0015) and market impact (0.001)

    '
  required_data:
  - path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - path: data/cb_warehouse/cb_basic.parquet
  - path: data/cb_warehouse/cb_daily.parquet
  - path: data/cb_warehouse/stk_daily_qfq.parquet
  - path: data/cb_warehouse/cb_call.parquet
  required_data_fields:
