  - cb_arb_value_gap_switch_reverse-probe-coston_20260524
  - cb_arb_value_gap_switch_bond-floor-entry-filter_v1
  implementation_assumption: 'New executor required: evaluate_cb_arb_bond_floor_entry_filter_reverse.py.
    Extends the reverse probe executor with a bond floor calculation step between
    gap loading and entry filtering. Bond floor computed per CB per day using cb_basic
    (par_value, coupon_rate, maturity_date) and cb_daily (close). The filter masks
    entries where cb_close > bond_floor * (1 + bond_floor_distance_pct). Everything
    else — value_gap_amount > 0 filter, ascending sort, exit logic, cost model, train/test
    split — matches the reverse probe exactly. If bond floor calculation is noisy,
    treat bond_floor_distance_pct as a tunable hyperparameter rather than a hard economic
    threshold; the grid search reveals the effective range.'
