  risk: 'Low-moderate. The regime classifier adds a hyperparameter dimension (3-5
    extra params) that increases overfitting risk on the 2019-2023 training window.
    If regime assignments are noisy or regimes are too similar, the conditional exit
    collapses to the non-conditional baseline and adds complexity for no benefit.
    Two-regime classification with simple rolling-return metric is the starting point
    to keep the search space manageable.

    '
  why_not_repeated_failure: 'This is not a repeat of market_drawdown_entry_filter
    (failed_mechanical_thresholds) or contrarian_drawdown_entry (failed_mechanical_thresholds).
    Both of those were entry-side filters that suppressed new positions based on market
    conditions. This proposal operates on the exit side only — it does not block any
    entry, it only adjusts how existing positions are closed. The mechanism is entirely
    different: conditioning exit decay parameters on regime rather than gating entries
    on drawdown. It is also not a repeat of any closed_tag direction: regime_classifier_variant
    is closed, but this does not use a classifier to gate options or size positions
    — it only conditions exit decay curves on a simple CSI-300-based regime, which
    the capability menu explicitly supports via C005 and evaluate_cb_arb_regime_adaptive_exit.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22: accepted, baseline
