hypothesis: 'The duration-adaptive exit accepted on 2026-05-22 uses a single fixed
  decay schedule (initial_threshold_fraction=0.7, decay_period_factor=0.5) regardless
  of market conditions. In high-volatility or trending-down regimes, gaps close faster
  and a single schedule may exit too early (leaving money) or too late (allowing gaps
  to re-widen). Conditioning the decay parameters — specifically initial_threshold_fraction
  and decay_period_factor — on a daily market regime classifier derived from CSI 300
  returns and volatility will improve cumulative excess by matching exit patience
  to the prevailing environment. Regime classification uses rolling CSI 300 return
  and realized volatility to assign each day to one of 2-3 discrete regimes, then
  each regime gets its own decay parameter pair. Entry, ranking, and sizing logic
  remain untouched.

  '
source_insight: 'The accepted duration-adaptive exit proves that time-decaying gap
  thresholds work better than static exits. But a single decay curve cannot be optimal
  across all market conditions. Gap closing dynamics differ systematically by regime:
  during calm uptrends gaps close slowly (need patience), during volatile selloffs
  gaps close rapidly or re-widen unpredictably (need tighter thresholds). A regime-conditional
  decay curve should capture this interaction.

  '
