schema_version: 1
run_id: cb_arb_value_gap_switch_low-freq-concentrated_2026-05-18
date: '2026-05-18'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: 'user strategic fork B: 保留绝对价值差额排名信号，改打法。方向三：降频+集中持仓。'
hypothesis: '降低调仓频率（日频→周/月/季）并集中持仓（30只→5-8只），可以减少成本摩擦

  和换手损耗，让价值差额排名的信号优势在更长时间尺度上发挥作用。

  期权型标的同样适用：集中持仓减少小额亏损交易，不改变估值或准入规则。


  当前基线的问题：3%单只上限 + 30只持仓 + 90天持有期 = 分散但高频。

  最差的10笔交易贡献了23%的亏损。集中持仓后，前几名信号的超额收益

  可能覆盖偶尔的失误。低频减少了约 7.47pp 成本侵蚀中的大部分换手成本。

  '
source_insight: 'research_insights.yaml id=cost_realism_wall: cost-on退化 -7.47pp，绝大部分来自换手。

  research_insights.yaml id=single_filter_dead_end: 2020年74%交易亏损,但最差10笔只占23%亏损。

  说明不是每笔都亏得一样惨——集中持仓到最强信号可以避免大量小额亏损交易。

  当前 verifier 已有 max_holdings / max_position_pct / max_holding_days 参数，无需新评估脚本。

  '
