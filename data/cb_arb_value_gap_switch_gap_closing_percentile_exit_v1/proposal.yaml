test_design:
  description: 'Grid search over percentile thresholds P in [0.50, 0.60, 0.70, 0.75,
    0.80, 0.85, 0.90] and gap magnitude bins (quantile-based bucketing vs absolute
    threshold buckets). Min hold days also grid-searched [3, 5, 7]. For each candidate,
    on each entry day, look up the historical days-to-close distribution for gaps
    within the same magnitude bin (using expanding window only, no forward-looking).
    Exit when hold_days > P-th percentile of that distribution AND hold_days >= min_hold_days.
    Baseline comparator is the accepted duration-adaptive exit (min_hold_days=5, initial_threshold_fraction=0.7,
    decay_period_factor=0.5). Cost-on evaluation with slippage 0.0015 and market impact
    0.001. Train 2018-2022, test 2023-2026.

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound_gt_baseline: true
  - test_max_drawdown_lte_baseline_or_within_2pp: true
  - any_holdout_year_sharpe_gt_0: true
falsifiers:
  train: &id001
  - test_cumulative_excess_compound_lte_baseline
  - test_max_drawdown_worse_than_baseline_by_gt_5pp
  - all_holdout_years_sharpe_lt_0
  validate: *id001
  test: *id001
risk: 'Low. This is a pure exit-rule change that does not touch entry signal, universe
  selection, or position sizing. Worst case it degrades to the baseline duration-adaptive
  performance if gap-closing times carry no usable signal. The expanding-window constraint
  eliminates look-ahead bias. The primary implementation risk is that historical gap-closing
  distributions may be unstable across regimes, but the grid search over P covers
  a wide range of conservatism.

  '
why_not_repeated_failure: 'This proposal is not a variant of any failed or closed
  family. It targets exit logic (C007, new_exit_rule) using a non-parametric empirical
  distribution approach (exit_gap_closing_percentile family), not an entry filter
  or position sizing tweak. The repeated_reject_families tag moneyness_stock_to_conv_threshold
  refers to entry filtering — this proposal does not touch entry eligibility. The
  closed_families_from_insights list (reverse_moneyness_entry_filter, exit_duration_adaptive_reverse,
  reverse_bond_floor_entry_filter, volatility_position_scaling_reverse, reverse_volatility_position_scaling,
  reverse_volatility_scaling) all concern reverse-direction variants closed by the
  anti-alpha insight — this proposal operates in the forward (descending value gap)
  direction and does not cite that demoted insight. The only prior exit-rule work
  in this direction (duration-adaptive exit) was accepted, not rejected — this proposal
  builds on that success with a strictly more informed exit mechanism.

  '
