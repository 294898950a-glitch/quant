hypothesis: 'The current duration-adaptive exit uses a fixed linear decay schedule
  that treats all entry gaps identically regardless of their initial magnitude. In
  reality, large gaps and small gaps close at different speeds — empirical evidence
  from the cb_arb trade history shows heterogeneous gap-closing time distributions.
  Replacing the parametric decay with a non-parametric exit rule — "exit when hold
  days exceeds the P-th percentile of historical days-to-close for gaps of similar
  initial magnitude" — will tailor exit patience to each position''s actual gap profile.
  Small gaps that historically close fast get shorter holds; large gaps that need
  more time get longer holds. This should reduce premature exits (selling before the
  gap closes) and avoid holding dead positions past their useful life, improving cumulative
  excess without changing the entry signal or universe.

  '
source_insight: 'The duration-adaptive exit (accepted 2026-05-22) proved that time-decaying
  thresholds improve over static exits, but its single fixed schedule imposes the
  same patience on all positions. The gap-closing-percentile approach uses the strategy''s
  own trade history to compute conditional exit timing — it is a strictly more informed
  version of the same idea. No active_critical_insights exist to reference.

  '
