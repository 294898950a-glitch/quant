  strategy_id: cb_arb_value_gap_switch
  family: pnl_adaptive_position_sizing
  hypothesis: 'A rolling realized PnL feedback scaler can reduce cost drag by shrinking
    position sizes when recent strategy-level PnL is negative and restoring normal
    sizing when PnL recovers. The underlying idea: with a ~26% win rate, the strategy
    suffers long sequences of small losing trades. Reducing exposure during those
    streaks lowers turnover, shrink cost, and preserves capital for the next winning
    cluster — without touching entry eligibility, valuation, or exit logic.

    '
  source_insight: 'Baseline cost-on cumulative excess is -0.1047 despite cost-off
    being near breakeven (-0.03). The degradation is driven by frequent losing trades
    whose costs compound. Exit-side improvements (duration-adaptive, IV percentile)
    help but do not address the sizing side of the cost equation. Rolling PnL feedback
    is a lightweight overlay that needs no regime classifier, no new data, and no
    valuation change.

    '
  expected_improvement: 'Reduce cost-on cumulative excess degradation by 2-4 percentage
    points relative to the medium-signal-cost-on baseline, primarily through lower
    turnover and smaller position sizes during losing streaks.

    '
  capability_ids:
  - C004
  required_executor: option_source_pnl_feedback_scaler
