hypothesis: 'Exiting positions based on the historical empirical distribution of days-to-close
  for gaps of similar initial magnitude — rather than a fixed fraction of the entry
  gap or a linear decay schedule — will produce a dynamic, non-parametric exit that
  avoids both premature exits (leaving money on the table) and overstaying (allowing
  gaps to re-widen). The empirical gap-closing distribution captures actual market
  behavior that parametric exits miss: gap closure speed varies by initial gap magnitude
  in ways that fixed thresholds cannot express.

  '
source_insight: 'The duration-adaptive exit (accepted 2026-05-22) and gap-speed-adaptive
  exit (adoption_pass=True) both succeeded where profit-take exits (fixed gap fraction)
  failed across multiple runs. This pattern suggests that gap closure is not uniform
  — the market does not close all gaps at a predictable fraction or rate. A non-parametric
  approach that learns from the historical distribution of "how long did it take gaps
  of this size to close?" should outperform any single parametric form by adapting
  to the empirical reality of gap closure dynamics. If gaps of similar initial magnitude
  typically close within T days, holding beyond the 80th percentile of that distribution
  is likely inefficient.

  '
