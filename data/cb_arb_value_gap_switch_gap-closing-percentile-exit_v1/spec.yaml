    - close
  test_design:
    description: 'Grid search over two parameters: (1) gap_magnitude_bucket_count
      — number of quantile buckets for binning initial gap magnitudes to compute per-bucket
      empirical gap-closing distributions (candidates: 5, 10, 20), and (2) exit_percentile
      — the percentile of the historical days-to-close distribution at which to trigger
      exit (candidates: 70, 75, 80, 85, 90, 95). Also test a min_hold_days floor (5,
      10, 15) to prevent whipsaw exits on very small gaps where the empirical distribution
      may be noisy. All other strategy logic (entry eligibility, position sizing,
      ranking) remains identical to the accepted duration-adaptive exit baseline.
      Evaluate on the same holdout periods: 2018-2020 train, 2021-2025 test.

      '
  success_criteria:
    criteria:
    - test_cumulative_excess_compound > baseline_cumulative_excess_compound by at
      least 0.02
    - test_max_drawdown_single_year <= baseline_max_drawdown_single_year
    - test_sharpe > baseline_sharpe
    - adoption_pass is true
  falsifiers:
    train:
    - test_cumulative_excess_compound <= baseline_cumulative_excess_compound
    - any_holdout_year_drawdown_vs_benchmark > 0.20
    - test_sharpe < 0
    validate:
    - test_cumulative_excess_compound <= baseline_cumulative_excess_compound
    - any_holdout_year_drawdown_vs_benchmark > 0.20
    - test_sharpe < 0
    test:
    - test_cumulative_excess_compound <= baseline_cumulative_excess_compound
    - any_holdout_year_drawdown_vs_benchmark > 0.20
    - test_sharpe < 0
  risk: 'Low-to-medium. The empirical distribution approach requires sufficient historical
    data for each gap-magnitude bucket; very large gaps may have too few observations
    for reliable percentile estimation. Early years (2007-2010) with fewer CBs listed
    may produce noisy distributions. The non-parametric nature means the exit rule
    cannot be expressed as a simple closed-form function, which makes it harder to
    debug but does not affect backtest validity.

    '
  why_not_repeated_failure: 'This is not a renamed repeat of any failed direction.
    The profit-take exit family (4+ runs, all adoption_pass=False) used a fixed target
    fraction of the entry gap — a parametric rule. The duration-adaptive exit (accepted)
    uses a linear decay schedule — also parametric. The gap-speed-adaptive exit (adoption_pass=True)
    uses gap closing speed — again parametric. The proposed non-parametric exit using
    historical gap-closing distributions is a fundamentally different mechanism that
    has never been tested. It is also distinct from the IV-percentile exit (rejected,
    negative train excess) which conditions on implied volatility rather than on the
    gap''s own historical closing behavior.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
  - cb_arb_value_gap_switch_gap-speed-adaptive-exit_2
  - cb_arb_value_gap_switch_profit-take-exit_2026-05-22
  - cb_arb_value_gap_switch_profit-take-exit_2026-05-22_1
  - cb_arb_value_gap_switch_profit-take-exit_v1
  - cb_arb_value_gap_switch_gap-trailing-exit
  implementation_assumption: The executor will compute gap-closing distributions from
    the baseline trade PnL history (or from the full daily_value_gap_amounts history)
    by binning initial gap magnitudes into quantile buckets, then for each bucket
    computing the empirical CDF of days-to-close. At each rebalance, the executor
    looks up the current position's initial gap bucket, finds the exit_percentile-th
    percentile of the bucket's days-to-close distribution, and exits if days_held
    exceeds that threshold. The exit_percentile and bucket_count are tuned via grid
    search. No new data sources are required; all needed columns exist in the listed
    parquet files.
