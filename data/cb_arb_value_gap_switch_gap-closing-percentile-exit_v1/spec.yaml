  proposal_id: cb_arb_value_gap_switch_gap-closing-percentile-exit_v1
  strategy_id: cb_arb_value_gap_switch
  family: exit_rule_nonparametric
  hypothesis: 'Exiting positions based on the historical empirical distribution of
    days-to-close for gaps of similar initial magnitude — rather than a fixed fraction
    of the entry gap or a linear decay schedule — will produce a dynamic, non-parametric
    exit that avoids both premature exits (leaving money on the table) and overstaying
    (allowing gaps to re-widen). The empirical gap-closing distribution captures actual
    market behavior that parametric exits miss: gap closure speed varies by initial
    gap magnitude in ways that fixed thresholds cannot express.

    '
  source_insight: 'The duration-adaptive exit (accepted 2026-05-22) and gap-speed-adaptive
    exit (adoption_pass=True) both succeeded where profit-take exits (fixed gap fraction)
    failed across multiple runs. This pattern suggests that gap closure is not uniform
    — the market does not close all gaps at a predictable fraction or rate. A non-parametric
    approach that learns from the historical distribution of "how long did it take
    gaps of this size to close?" should outperform any single parametric form by adapting
    to the empirical reality of gap closure dynamics. If gaps of similar initial magnitude
    typically close within T days, holding beyond the 80th percentile of that distribution
    is likely inefficient.

    '
  expected_improvement: 'Improve cumulative excess return by 2-4 percentage points
    over the accepted duration-adaptive exit baseline, primarily by reducing premature
    exits on large gaps (where the linear decay schedule may be too aggressive) and
    by cutting losers faster on small gaps (where the empirical distribution shows
    quick mean reversion).

    '
  capability_ids:
  - C007
  required_executor: evaluate_cb_arb_exit_gap_closing_percentile
  required_data:
  - path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
