    baseline) while preserving at least 80% of the +30.3% test excess return. Target:
    test excess > +0.24 with max drawdown < -0.10. If inverse-ATR scaling is noise-reducing,
    the risk-adjusted metrics (Sharpe, Calmar) should improve vs the unweighted reverse
    base even if raw excess dips slightly.

    '
