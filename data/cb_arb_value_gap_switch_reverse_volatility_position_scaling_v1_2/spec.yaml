  risk: 'Medium. Inverse-ATR scaling assumes high stock volatility predicts worse
    value-gap trade outcomes. If volatility and gap-closing are uncorrelated or positively
    correlated (volatile stocks close gaps faster), scaling will reduce returns without
    reducing risk. The grid search over ATR lookback and scaling_beta provides a safety
    net — if no parameter combination beats the unweighted base, the null hypothesis
    (volatility is uninformative) is confirmed.

    '
  why_not_repeated_failure: 'This is not an entry filter. The three entry-filter families
    (forward moneyness, reverse moneyness, forward bond floor, reverse bond floor)
    all failed `failed_mechanical_thresholds` because they removed candidates from
    the pool, which killed signal density. Position scaling preserves every candidate
    — only allocation weights change. The mechanism is orthogonal: it modulates exposure
    rather than censoring entries.


    The reverse exit duration adaptive also failed `adoption_pass: False`, but that
    was an exit-rule overlay, not a position-sizing overlay. Position sizing applied
    to the reverse base has not been tested in any form (neither static nor volatility-based).


    This is the only reverse-direction capability remaining in C001 that has not been
    evaluated, and it is explicitly designed to be non-destructive to the candidate
    pool.

    '
