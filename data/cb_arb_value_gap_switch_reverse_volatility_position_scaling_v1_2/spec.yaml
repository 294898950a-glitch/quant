  test_design:
    description: 'Base: reverse-probe-coston logic (value_gap_amount > 0 filter, ASCENDING
      sort, exit grid over max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01],
      sell_gap_pct=0.0, switch_hurdle_pct [0.0, 0.01]).


      Overlay: for each candidate on each day, compute ATR from stk_daily_qfq close
      (ATR lookback grid [10, 20, 40, 60]). Apply inverse scaling: position_weight
      = baseline * (scaling_beta / ATR_rank), where scaling_beta grid = [0.25, 0.5,
      0.75, 1.0, 1.5]. Higher-ATR CBs get lower weight; all candidates remain eligible.


      Cost-on: slippage 0.0015, market impact 0.001. Train 2018-2022, test 2023-2026.


      Compare best grid result against reverse-probe-coston baseline (+30.3% test
      excess, max drawdown -0.113).

      '
