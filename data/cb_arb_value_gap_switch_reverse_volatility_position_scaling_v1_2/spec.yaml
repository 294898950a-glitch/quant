hypothesis: 'Entry filters (moneyness, bond floor) systematically failed in the reverse
  direction because they cull candidates from the already-verified +30.3% test-excess
  reverse base. Position scaling is a fundamentally different mechanism: it preserves
  all candidates and adjusts only allocation weights, making it strictly less destructive.


  Inverse-ATR weighting applied to the ASCENDING-sort (least-positive-gap-first) base
  should reduce drawdowns and cost drag without destroying the reverse alpha signal.
  The reasoning: high-volatility CBs contribute disproportionately to PnL variance
  and cost bleed; allocating less capital to them preserves exposure to the signal
  while trimming tail risk.


  Re: repeated_reject_families [moneyness_stock_to_conv_threshold] — (1) the underlying
  value-gap signal is NOT invalid (the reverse sort proves it contains alpha, just
  in the opposite direction of the original monotonicity assumption); (2) the direction
  IS reversed — the critical insight already established that ASCENDING sort is the
  correct direction; (3) the execution condition (entry filters culling candidates)
  is the proximate cause of failure for the moneyness and bond-floor families, not
  the signal itself. This proposal avoids the execution failure by not filtering candidates
  at all.

  '
source_insight: value_gap_rank_is_anti_alpha_2026_05_24
