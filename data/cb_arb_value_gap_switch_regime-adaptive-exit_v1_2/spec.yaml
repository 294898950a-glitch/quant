    code by adding a pre-computed daily regime label column (derived from CSI300 20-day
    rolling volatility percentile with a configurable threshold). During exit evaluation,
    the decay parameters are looked up per-regime instead of using global constants.
    Regime labels are computed once per backtest date range before the main loop,
    so no forward-looking bias.
