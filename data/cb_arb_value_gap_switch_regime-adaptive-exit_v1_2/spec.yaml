hypothesis: 'The duration-adaptive exit accepted on 2026-05-22 uses a single global
  decay schedule (initial_threshold_fraction=0.7, decay_period_factor=0.5) regardless
  of market environment. Gap closing dynamics are not uniform — in high-volatility
  regimes gaps close faster, making a fixed decay schedule simultaneously too patient
  in calm markets (leaving money on the table as gaps reverse) and too impatient in
  turbulent markets (exiting before gaps fully close). Conditioning the decay parameters
  on a daily market regime classifier derived from CSI300 rolling volatility will
  improve cumulative excess by matching exit patience to the prevailing gap-closing
  speed.

  '
source_insight: 'The only accepted result in the current research track is the duration-adaptive
  exit, proving that time-decaying gap thresholds work. But a single schedule is a
  blunt instrument. The recent digest shows entry filters (bond floor, market drawdown,
  contrarian drawdown) all failed mechanical thresholds, and position scaling (volatility,
  PnL feedback) failed adoption — suggesting the remaining edge is in exit refinement,
  not entry gating or sizing.

  '
