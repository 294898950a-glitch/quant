  test_design:
    description: 'Replace the global fixed decay parameters with regime-conditioned
      ones. Classify each trading day into two regimes (high-vol / low-vol) using
      CSI300 20-day rolling annualized volatility percentile (threshold at median).
      In high-vol regimes apply faster decay: lower initial_threshold_fraction (e.g.
      0.5-0.7) and shorter effective_max_hold_days (e.g. 20-35). In low-vol regimes
      apply slower decay: higher initial_threshold_fraction (e.g. 0.7-0.9) and longer
      effective_max_hold_days (e.g. 35-60). Grid search over regime threshold percentile,
      per-regime initial_threshold_fraction, and per-regime decay_period_factor. Keep
      min_hold_days at 5 (from accepted result). Run full cost-on backtest with the
      same train/validation/holdout split as the accepted duration-adaptive run.

      '
  success_criteria:
    criteria:
    - cumulative_excess_compound_cost_on improves over the duration-adaptive exit
      baseline
    - at least one candidate achieves adoption_pass=True
    - max_drawdown does not materially degrade relative to baseline
  falsifiers:
    train:
    - no candidate improves cumulative excess compound over the duration-adaptive
      baseline
    - all per-regime parameterizations produce worse risk-adjusted metrics than the
      single global schedule
    - regime switching introduces whipsaw that degrades exit timing relative to the
      simpler fixed schedule
    validate:
    - no candidate improves cumulative excess compound over the duration-adaptive
      baseline
    - all per-regime parameterizations produce worse risk-adjusted metrics than the
      single global schedule
    - regime switching introduces whipsaw that degrades exit timing relative to the
      simpler fixed schedule
    test:
    - no candidate improves cumulative excess compound over the duration-adaptive
      baseline
    - all per-regime parameterizations produce worse risk-adjusted metrics than the
      single global schedule
    - regime switching introduces whipsaw that degrades exit timing relative to the
      simpler fixed schedule
  risk: 'Medium. Regime classification adds a layer of complexity and an additional
    parameter (regime threshold). Risk of overfitting if regimes are defined too granularly.
    Mitigated by using only two regimes and a simple CSI300 volatility classifier
    — the regime signal is slow-moving and economically grounded, not a fragile pattern.

    '
  why_not_repeated_failure: 'This is not a repeat of any failed or closed direction.
    The closed tag regime_classifier_variant applies to entry gate conditioning (deciding
    whether to enter), not exit adaptation. The closed tag regime_conditioned_option_entry_gate
    applies to option-sourced entry gating. Recent entry filter failures (bond floor,
    market drawdown, contrarian drawdown) all modified entry eligibility — this proposal
    modifies exit timing only, preserving the exact same entry logic as the accepted
    duration-adaptive run. The moneyness entry filter (C003) and gap-closing percentile
    exit (C007) are alternative unexplored directions, but C005 builds directly on
    the only accepted result in the track.

    '
