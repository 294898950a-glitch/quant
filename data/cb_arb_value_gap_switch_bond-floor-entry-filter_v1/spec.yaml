  test_design:
    description: 'Grid-search over the bond-floor proximity threshold parameter (close
      / bond_floor <= threshold, with threshold ∈ {1.00, 1.05, 1.10, 1.15, 1.20, 1.25,
      1.30}) plus a no-filter baseline. Compute bond floor as the present value of
      remaining coupons and par value discounted at a flat yield (e.g., 3% or the
      bond''s stated coupon as a proxy for its credit-appropriate yield). Use the
      existing duration-adaptive exit with accepted best params (min_hold_days=5,
      initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45)
      as the exit rule. Run on both cost-off and cost-on configurations. Compare each
      threshold''s cumulative excess, max drawdown, Sharpe, and annual breakdown against
      baseline. Pay special attention to 2020 stress-period drawdown improvement and
      whether the filter introduces any new worst-year that is worse than baseline.

      '
