hypothesis: 'Filtering CB arbitrage entries to only candidates where the CB close
  price is within a threshold distance above the bond floor (computed from discounted
  remaining coupons and principal at par) will reduce cumulative excess drawdown and
  improve risk-adjusted returns by excluding positions where the theoretical value
  gap is dominated by speculative option premium rather than genuine mispricing. The
  bond floor is the most reliable component of CB theoretical value — it depends only
  on contractual cash flows discounted at a reasonable yield, not on IV assumptions.
  When a CB trades far above its floor, the model-implied value gap is disproportionately
  driven by the embedded option valuation, which is sensitive to model error. By constraining
  entries to near-floor CBs, we increase the probability that a positive value gap
  represents an actionable mispricing.

  '
source_insight: 'The current value-gap signal at entry treats all CBs uniformly regardless
  of how much of the theoretical value comes from the bond floor vs. the embedded
  option. The bond component has high valuation reliability; the option component
  has low reliability (IV estimation, volatility surface assumptions, credit spread
  interactions). A CB trading at 130 with a bond floor of 95 has ~73% of its theoretical
  value coming from the option — the value gap for such a CB is overwhelmingly an
  option-pricing gap, not a bond-pricing gap. Filtering to CBs where close / bond_floor
  <= 1 + margin (e.g., 1.10) concentrates the strategy on positions where mispricing
  is more likely to be real and mean-reverting.

  '
