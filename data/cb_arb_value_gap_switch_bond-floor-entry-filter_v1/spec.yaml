  risk: 'Medium. The bond floor filter may eliminate too many candidates, especially
    in bull markets where most CBs trade well above their floors. If 2020-2021 sees
    near-zero entries, the filter is useless in practice. The discount rate assumption
    for bond floor computation (flat 3% vs. credit-specific yield) could introduce
    its own noise. If the true alpha in the value-gap signal comes from the option
    component (not the bond component), filtering to near-floor CBs could actually
    destroy the signal rather than purify it.

    '
  why_not_repeated_failure: 'The 5 failed moneyness-entry-filter runs (C003 family,
    tagged moneyness_stock_to_conv_threshold, all failed_mechanical_thresholds) filtered
    on stock_close / conv_price — this is an equity-domain filter that screens based
    on option moneyness (how deep in/out of the money the embedded call option is).
    The bond floor filter (C002) operates in the fixed-income domain — it screens
    based on how much of the theoretical value comes from the reliable bond component
    vs. the noisy option component. These are orthogonal filters with different economic
    rationale and different data dependencies (bond floor needs coupon_rate, maturity_date,
    par_value; moneyness needs conv_price, stock_close). A CB can be deep in-the-money
    (high stock/conv_price) and still near its bond floor, or deep out-of-the-money
    and far above its bond floor. The failure of moneyness filtering says nothing
    about whether proximity to the bond floor improves signal quality.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
  - cb_arb_value_gap_switch_moneyness-entry-filter_v1
  - cb_arb_value_gap_switch_moneyness_entry_filter_v1_3
  - cb_arb_value_gap_switch_moneyness_entry_filter_v1_4
  - cb_arb_value_gap_switch_moneyness_entry_filter_v1_5
  - cb_arb_value_gap_switch_moneyness-entry-filter_v1_1
  implementation_assumption: Bond floor is computed as present value of remaining
    semi-annual coupon payments plus par value at maturity, discounted at a flat annual
    rate of 3% (a conservative proxy for investment-grade CN CB yield). For CBs where
    the stated coupon schedule is irregular (interest_rate_explain field), the executor
    will parse the schedule or fall back to using the base coupon_rate for all remaining
    periods. For CBs that have been called (cb_call table), remaining cash flows are
    truncated at the call date with call_price replacing par. CBs with missing maturity_date
    or coupon data are excluded from the filter (treated as if they pass, so no data-quality
    bias against poorly-documented CBs). The filter is applied at entry only — once
    a position is opened, it is not force-closed if the CB subsequently moves away
    from its bond floor.
