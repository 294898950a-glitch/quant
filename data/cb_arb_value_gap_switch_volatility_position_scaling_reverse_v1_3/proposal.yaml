proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_3
strategy_id: cb_arb_value_gap_switch
family: volatility_position_scaling_reverse
hypothesis: 'The reverse-direction value-gap base (ASCENDING sort, +30.3% test excess
  cost-on) is the only proven alpha direction in the current family. Entry filters
  (moneyness, bond floor) failed when applied to the reverse base because they culled
  candidates from an already narrow positive-gap pool, destroying the signal. Position
  scaling via inverse-ATR preserves all eligible candidates and only adjusts allocation
  weights — high-volatility CBs get smaller positions, low-volatility CBs get larger
  ones. This noise-reduction overlay should reduce drawdowns without the signal destruction
  that sank the entry-filter approach.

  Repeated-reject-family analysis (moneyness_stock_to_conv_threshold, 3 rejections):
  (1) Underlying signal is NOT invalid — the reverse probe proves the value_gap signal
  is real and tradeable (+30.3% test excess cost-on). (2) Direction is NOT the problem
  — we are already using the proven reverse (ASCENDING) direction. (3) The execution
  condition WAS wrong — entry filters culled candidates and killed the signal. Position
  scaling is an execution-condition fix (allocation weighting), not a candidate-removal
  filter. The moneyness family failed because of the culling mechanic, not because
  the underlying signal or direction was wrong. This proposal specifically avoids
  the culling mechanic.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: The reverse-rank probe established
  that within the value_gap_amount>0 candidate set, sorting ASCENDING wins large (+30.3%
  test excess cost-on) while DESCENDING loses. The insight''s decision_use recommends
  reverse-direction variants applied to families that previously failed in forward,
  specifically including position sizing. Entry filters applied to the reverse base
  (moneyness, bond floor) both failed because they culled candidates. Position scaling
  preserves all candidates — it is the logical next reverse-direction overlay that
  cannot repeat the culling failure mode.

  '
expected_improvement: 'Reduce max drawdown from the reverse-probe-coston baseline
  (-23.6% train, -11.3% test) by 3-8pp through inverse-ATR weighting, while preserving
  at least 80% of the +30.3% test excess. Position scaling is a noise-reduction layer
  — it should improve Sharpe and lower drawdown without the signal destruction caused
  by entry filters.

  '
