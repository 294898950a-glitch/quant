implementation_assumption: The executor computes ATR from stk_daily_qfq close prices
  per CB per day, ranks candidates by ATR within each day, applies inverse scaling
  factor (position_weight = baseline * scaling_beta / ATR_rank), and uses the existing
  reverse-probe exit logic with grid search. Cost model is the standard slippage (0.0015)
  + market impact (0.001) + cap (0.02). All value_gap_amount>0 candidates remain eligible;
  only allocation weights change.
