test_design:
  description: 'Grid search over ATR lookback in [10, 20, 40, 60] trading days and
    scaling_beta in [0.25, 0.5, 0.75, 1.0, 1.5]. For each candidate, compute ATR from
    stk_daily_qfq close prices, rank candidates by ATR within each day, apply position_weight
    = baseline * (scaling_beta / ATR_rank). Exit uses reverse-probe grid: max_hold_days
    in [120, 150, 180], min_gap_pct in [0.005, 0.01], sell_gap_pct=0.0, switch_hurdle_pct
    in [0.0, 0.01]. Sort ASCENDING, value_gap_amount>0 filter. Cost-on evaluation
    with slippage=0.0015, market_impact=0.001. Train 2018-2022, test 2023-2026.

    '
success_criteria:
  criteria:
  - test_excess_return >= 0.242 (80% of reverse-probe-coston baseline +0.303)
  - test_max_drawdown <= reverse-probe-coston baseline (-0.113) by at least 2pp improvement
  - test_sharpe > 0.5
  - 'adoption_pass: true'
falsifiers:
  train: &id001
  - test_excess_return < 0.15 (less than half of reverse baseline, scaling destroyed
    too much return)
  - test_max_drawdown worse than reverse baseline (scaling added noise instead of
    removing it)
  - 'adoption_pass: false (mechanical thresholds not met)'
  validate: *id001
  test: *id001
risk: 'Low — position scaling does not remove candidates, so the worst case is that
  inverse-ATR weighting adds noise and produces results similar to equal-weight reverse
  base. The failure mode is flat performance, not signal destruction. The reverse
  base has already proven tradeable at +30.3% test excess cost-on, so scaling cannot
  make it worse than the failed entry filters.

  '
why_not_repeated_failure: 'This proposal uses C001 (static candidate position scaling),
  not C003 (moneyness entry filter). The moneyness family failed because entry filters
  cull candidates from the reverse base''s already-narrow positive-gap pool — removing
  candidates destroys the signal. Position scaling preserves every eligible candidate
  and only adjusts allocation weights. The three repeated-reject questions are answered
  in the hypothesis field. This is not a renamed moneyness variant — it is a different
  capability (C001 vs C003) with a different mechanic (weighting vs filtering). The
  closed_directions do not include any volatility or position-scaling tags.

  '
