proposal_id: cb_arb_value_gap_switch_profit-take-exit_2026-05-22
strategy_id: cb_arb_value_gap_switch
family: exit_rule
hypothesis: 'When the value gap contracts significantly from entry (indicating partial
  market correction of the mispricing), taking profits early by exiting at a fixed
  gap-contraction threshold will improve realized PnL compared to time-decay-based
  exits. The duration-adaptive exit relies on a decaying ratio threshold over time
  but does not directly respond to the magnitude of gap closure. A profit-take exit
  that triggers when current_gap <= (1 - target_fraction) * entry_gap locks in gains
  on meaningful partial corrections before the gap can re-widen, reducing round-trip
  gap erosion.

  '
source_insight: 'The duration-adaptive exit is the best exit rule found so far (accepted
  2026-05-22 with min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5,
  effective_max_hold_days=45), but it is primarily a time-driven mechanism. It does
  not distinguish between a position where the gap closed 80% in 5 days vs one where
  it closed 20% in 40 days — both may exit around the same time if the decaying threshold
  is met. A gap-contraction-based exit directly targets the economic event of interest
  (mispricing correction) and should capture profits more reliably, especially in
  cases where the gap closes quickly and then re-widens before the duration threshold
  triggers.

  '
expected_improvement: 'Better realized PnL per trade by exiting at peak gap contraction
  rather than waiting for time-decay thresholds. Should reduce the cases where a large
  gap closure partially reverses before the time-based exit fires. Target: improve
  cumulative_excess_compound over the duration-adaptive exit, especially in years
  with high gap volatility.

  '
