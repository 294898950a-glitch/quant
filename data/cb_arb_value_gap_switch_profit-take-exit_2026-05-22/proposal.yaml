test_design:
  description: 'Grid search over target_fraction (0.3, 0.5, 0.7, 0.9) and min_hold_days
    (1, 3, 5, 10). target_fraction=0.3 means exit when gap has contracted 30% from
    entry (current_gap <= 0.7 * entry_gap). target_fraction=0.9 means exit only when
    gap is nearly closed (current_gap <= 0.1 * entry_gap). Same train/validation/holdout
    split as baseline. Compare cumulative excess compound and max drawdown against
    both the plain baseline and the duration-adaptive exit. Report year-by-year breakdown.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound > baseline cost-on value (-0.1047)
  - At least one candidate improves on duration-adaptive exit in cumulative excess
    compound
  - No single-year max drawdown vs benchmark exceeds 15%
  - Train-period excess return is non-negative (avoiding iv_percentile_exit failure
    mode)
falsifiers:
  train: &id001
  - All candidates produce cumulative_excess_compound <= baseline
  - Best candidate is strictly worse than duration-adaptive exit in both cumulative
    excess and max drawdown
  - Train-period excess return is negative (same fatal flaw as iv_percentile_exit_v1_1)
  - No candidate passes adoption threshold
  validate: *id001
  test: *id001
risk: 'Low-medium. Like other exit rule attempts, the underlying value-gap signal
  may not be strong enough for any exit rule to produce deployable absolute PnL. The
  main risk is that profit-taking exits too early, missing larger subsequent gap closures
  — but the grid search over target_fraction with a high end of 0.9 should reveal
  whether this is a real problem. A secondary risk is that small gap contractions
  are noise rather than signal, leading to premature exits on random fluctuations;
  min_hold_days provides a guard against this.

  '
why_not_repeated_failure: "This is not a repeat of any closed or failed direction:\
  \ - gap-trailing-exit (failed) triggered on gap WIDENING from best level (trailing\
  \ stop-loss),\n  not on gap CONTRACTION from entry (profit-taking). Opposite direction.\n\
  - duration-adaptive-exit (accepted) is time-decay driven, not gap-magnitude driven.\
  \ - iv_percentile_exit (rejected) used implied volatility, not gap contraction.\
  \ - pnl_feedback_scaling (failed) adjusted position size based on rolling PnL, not\
  \ exit timing. - Not in any closed_tag or forbidden_family. The profit-take executor\
  \ (C007) is registered and available but has never been run.\n"
