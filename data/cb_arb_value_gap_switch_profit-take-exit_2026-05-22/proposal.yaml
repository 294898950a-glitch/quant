implementation_assumption: 'The profit_take_exit_executor receives the same entry
  signal pipeline as the baseline backtester. It tracks entry_gap per open position
  and overrides the default exit decision: if current_gap <= (1 - target_fraction)
  * entry_gap AND days_held >= min_hold_days, force-exit the position. All other logic
  (entry, ranking, position sizing) remains identical to baseline. The executor performs
  a grid search across the specified target_fraction and min_hold_days parameter space
  and outputs standard PnL artifacts for review.'
