  test_design:
    description: 'Grid search over moneyness entry threshold (stock_close / conv_price)
      from 0.5 to 1.2 in 0.1 steps. For each threshold, only allow entry when the
      CB''s moneyness is at or above the threshold. Use the accepted duration-adaptive
      exit parameters (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5,
      effective_max_hold_days=45) unchanged. Evaluate on standard train/test/validation
      split. Report cumulative excess, max drawdown, Sharpe, trade count, and average
      holding period per threshold.

      '
  success_criteria:
    criteria:
    - best_threshold_cumulative_excess_compound >= baseline_cumulative_excess - 0.02
    - best_threshold_max_drawdown < baseline_max_drawdown - 0.03
    - best_threshold_sharpe > baseline_sharpe + 0.05
    - adoption_pass is true
  falsifiers:
    train:
