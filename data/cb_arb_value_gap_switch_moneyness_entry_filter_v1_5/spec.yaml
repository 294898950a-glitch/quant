    - no_threshold_reduces_max_drawdown_by_2pp_or_more
    - best_threshold_trade_count_drops_below_50_percent_of_baseline
    - train_test_ranking_inconsistent (best train threshold not best or second-best
      in test)
    test:
    - all_thresholds_degrade_cumulative_excess_by_more_than_5pp
    - no_threshold_reduces_max_drawdown_by_2pp_or_more
    - best_threshold_trade_count_drops_below_50_percent_of_baseline
    - train_test_ranking_inconsistent (best train threshold not best or second-best
      in test)
  risk: 'Low implementation risk — this is a simple boolean entry gate on existing
    data. Primary risk is that screening out deep OTM CBs also screens out the highest-gap
    signals, which could reduce alpha. Secondary risk is that the moneyness threshold
    interacts poorly with the duration-adaptive exit, creating too few trades. If
    all thresholds degrade performance, the moneyness family is exhausted and the
    entry-filter direction should be paused in favor of exit or valuation work.

    '
  why_not_repeated_failure: 'This is not a repeat of the failed bond-floor entry filter
    (C002). Bond-floor filtering uses CB price relative to pure bond valuation — a
    downside protection metric. Moneyness filtering uses stock price relative to conversion
    price — an option signal-quality metric. They are measuring fundamentally different
    things: one screens for cheapness vs intrinsic bond value, the other screens for
    signal reliability of the option component. It is also not a repeat of the failed
    market-drawdown or contrarian-drawdown entry gates, which were time-series macro
    filters rather than cross-sectional fundamental filters.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_bond-floor-entry-filter_1
  - cb_arb_value_gap_switch_market_drawdown_entry_filter
  - cb_arb_value_gap_switch_contrarian_drawdown_entry_20260522
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
  implementation_assumption: 'The executor computes daily moneyness = stock_close
    / conv_price for each CB candidate on each trade date. It applies a boolean filter:
    only candidates with moneyness >= threshold are eligible for entry ranking. The
    existing value-gap ranking, position sizing, and exit logic (duration-adaptive
    with accepted parameters) are unchanged. The executor runs a grid search over
    8 threshold values (0.5 to 1.2) and reports per-threshold metrics. The concurrent
    supervised best_params.json files provide the accepted baseline exit parameters.'
