  hypothesis: 'Restricting entries to convertible bonds where the underlying stock
    price is at or above a threshold fraction of the conversion price (stock_close
    / conv_price >= threshold) will screen out deep out-of-the-money CBs whose theoretical-value
    gaps are dominated by time premium and IV noise rather than genuine mispricing.
    Filtering these noise-dominated entries should reduce drawdowns and improve risk-adjusted
    returns without destroying the alpha signal.

    '
  source_insight: 'Deep OTM CB option values are dominated by time premium and IV
    assumptions, making their theoretical-value gaps the least reliable and most likely
    to represent model noise rather than tradable mispricing. The recent accepted
    duration-adaptive exit (2026-05-22) improves exit timing, but entry quality remains
    unaddressed — all three recent entry filters (bond-floor, market drawdown, contrarian
    drawdown) failed, leaving entry-side optimization as the highest-value untapped
    lever.

    '
  expected_improvement: 'Reduce max drawdown and improve Sharpe ratio by avoiding
    positions whose value-gap signals are least trustworthy. Cumulative excess may
    be slightly lower due to fewer trades, but risk-adjusted metrics should improve.
    Targets max_drawdown reduction of 3-5pp vs baseline while keeping cumulative excess
    within 2pp of baseline.

    '
