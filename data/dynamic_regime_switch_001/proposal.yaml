proposal_id: dynamic_regime_switch_001
strategy_id: cb_arb_value_gap_switch
family: dynamic_regime_switch
hypothesis: 'Dynamically switching entry eligibility and position sizing based on
  a continuous market regime indicator (e.g., trend strength and volatility) will
  improve strategy risk-adjusted returns, especially in stress periods like 2020,
  by reducing exposure in unfavorable regimes and increasing it in favourable ones.

  '
source_insight: 'The baseline value-gap strategy suffers large drawdowns in 2020 and
  fails cost-on deployment checks. Regime-adaptive behaviour has been effective in
  other asset classes and may allow the CB arb strategy to automatically dial risk
  up/down with market conditions.

  '
expected_improvement: 'Higher cumulative excess return, lower max drawdown, particularly
  better 2020 repair performance, and improved cost-on metrics.

  '
capability_ids:
- C005
required_executor: dynamic_regime_switch_executor
required_data:
- data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
- data/cb_warehouse/csi300_daily.parquet
test_design:
  description: 'Grid-search over regime classifier parameters (lookback, threshold)
    and adaptation mappings (entry gate multiplier, position size scaling). Backtest
    on train 2019-2024, validate on sealed test 2025+ and 2020 repair. Compare against
    baseline with cost-off and cost-on.

    '
  split:
    train: 20190101-20241231
    repair_window: 20200101-20201231
    test: 20250101-20260508
success_criteria:
  description: '- At least one variant achieves test cumulative excess return > baseline.
    - The selected variant must reduce 2020 max drawdown relative to baseline. - Test
    win rate must not degrade below baseline.

    '
falsifiers:
  train: '- No variant beats baseline test cumulative excess return. - No variant
    reduces 2020 max drawdown by at least 5%. - Parameter instability across train/test
    leads to rejection.

    '
  validate: '- No variant beats baseline test cumulative excess return. - No variant
    reduces 2020 max drawdown by at least 5%. - Parameter instability across train/test
    leads to rejection.

    '
  test: '- No variant beats baseline test cumulative excess return. - No variant reduces
    2020 max drawdown by at least 5%. - Parameter instability across train/test leads
    to rejection.

    '
risk: 'Moderate. Regime signals can overfit; out-of-sample behaviour may differ. Additional
  complexity increases maintenance burden and the chance of bugs.

  '
why_not_repeated_failure: 'This is not a re-run of the closed option_position_sizing
  or option_source_pnl_feedback families, nor a static market drawdown gate. The prior
  regime-trend-guard was a boolean entry guard; this proposes a continuous regime-dependent
  adjustment of *both* entry and sizing, a fundamentally different mechanism.

  '
related_prior_runs:
- cb_arb_value_gap_switch_regime-trend-guard_2026-05-19
- market_drawdown_entry_gate_v1_20260521
implementation_assumption: The executor will compute a daily regime index from CSI300
  data (e.g., moving average slope and volatility) and map it to entry gates and position
  multipliers. A parametric model (e.g., logistic) will be trained via grid search.
  Required data beyond capability_menu defaults is justified because regime classification
  requires a broad market benchmark.
