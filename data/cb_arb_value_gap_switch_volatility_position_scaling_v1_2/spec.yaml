  hypothesis: 'Six entry-filter variants (5 moneyness + 1 bond floor) on the forward
    value-gap direction all failed mechanical thresholds with adoption_pass=False
    — they remove too many candidates, violating the evaluator''s minimum trade-frequency
    requirement. Position scaling via inverse ATR preserves all candidates while reducing
    allocation to high-volatility names, making adoption_pass failure structurally
    impossible. The reverse probe''s +30.3% test excess (cost-on) proves the value-gap
    ranking contains information; the forward direction''s problem is noise in high-volatility
    picks, not signal invalidity. Down-weighting noisy candidates should improve risk-adjusted
    returns without destroying the candidate pool. This is the least destructive overlay
    available — it adjusts weights, not eligibility.

    '
  source_insight: 'All 6 entry-filter runs returned failed_mechanical_thresholds (adoption_pass=False).
    The reverse probe (cb_arb_value_gap_switch_reverse-probe-coston_20260524) showed
