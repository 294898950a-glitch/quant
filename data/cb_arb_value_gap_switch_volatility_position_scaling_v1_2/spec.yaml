    the pool below the evaluator''s minimum.

    '
  expected_improvement: 'Maintain adoption_pass=True (structurally guaranteed by zero
    candidate removal) while improving Sharpe ratio and reducing max drawdown relative
    to the unfiltered forward baseline. Target: cumulative test excess compound >
    0 with lower drawdown than baseline.

    '
  capability_ids:
  - C001
  required_executor: volatility_based_position_scaling_executor
  required_data:
