    - trade_date
    - close
  test_design:
    description: 'Forward direction (value_gap_amount DESC, >0 filter unchanged).
      Compute ATR from stk_daily_qfq close per CB per day. Rank candidates by ATR
      within each day, apply inverse scaling: position_weight = baseline_rank_weight
      * (scaling_beta / ATR_rank). Buy amount scales proportionally. Grid search over
      ATR lookback [10, 20, 40, 60] × scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit
      uses accepted duration-adaptive logic (min_hold_days=5, initial_threshold_fraction=0.7,
      decay_period_factor=0.5). Cost-on with slippage 0.0015 and market impact 0.001.
      Train 2018-2022, test 2023-2026. Compare best grid result against unfiltered
      forward baseline.

      '
  success_criteria:
    criteria:
    - cumulative_excess_compound_test_gt_0
    - max_drawdown_test_lower_than_forward_baseline
    - sharpe_test_gt_0.3
    - adoption_pass_eq_true
  falsifiers:
    train:
    - cumulative_excess_compound_test_still_negative
    - no_meaningful_drawdown_reduction_vs_baseline
    validate:
    - cumulative_excess_compound_test_still_negative
    - no_meaningful_drawdown_reduction_vs_baseline
    test:
    - cumulative_excess_compound_test_still_negative
    - no_meaningful_drawdown_reduction_vs_baseline
  risk: 'Low. Position scaling preserves the full candidate pool, so adoption_pass
    failure — the killer for all 6 entry-filter runs — is structurally impossible.
    The main risk is a null result: ATR-based weighting provides no meaningful improvement
    over equal-weighting. This would close the static position scaling direction but
    does not damage the strategy.

    '
  why_not_repeated_failure: 'This is not a repeated failure. The 6 failed runs all
    used entry filters (C003 moneyness threshold, C002 bond floor threshold) that
    remove candidates from the pool. All failed mechanical thresholds because adoption_pass=False
    — the filters culled the candidate pool below the evaluator''s minimum trade frequency.
    This proposal uses C001 position scaling, which preserves all candidates and adjusts
    only allocation weights. The failure mode of the prior 6 runs (candidate removal
    → too few trades → adoption_pass failure) is structurally impossible here. The
    repeated_reject_family moneyness_stock_to_conv_threshold is not the family being
    proposed.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_moneyness-entry-filter_v1
  - cb_arb_value_gap_switch_moneyness_entry_filter_v1_3
  - cb_arb_value_gap_switch_moneyness_entry_filter_v1_4
  - cb_arb_value_gap_switch_moneyness_entry_filter_v1_5
  - cb_arb_value_gap_switch_moneyness-entry-filter_v1_1
  - cb_arb_value_gap_switch_bond-floor-entry-filter_v1
  - cb_arb_value_gap_switch_reverse-probe-coston_20260524
  implementation_assumption: Executor computes daily ATR per CB from stk_daily_qfq
    close (True Range = max of daily high-low, |high-prev_close|, |low-prev_close|;
    ATR = rolling mean of True Range over lookback window). Within each trade_date,
    ranks candidates by ATR ascending. Applies inverse scaling factor to baseline
    ranking weight and buy amount. Does not alter entry eligibility, exit logic, or
    the value_gap_amount sort direction.
