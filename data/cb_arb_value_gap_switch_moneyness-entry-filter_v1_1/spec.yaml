  test_design:
    description: 'Grid search over moneyness thresholds (stock_close / conv_price):
      0.6, 0.7, 0.8, 0.9, 1.0, 1.1, 1.2. For each threshold, filter candidates to
      only those where stock_close >= threshold * conv_price on the entry signal date,
      then run the standard backtester without modifying valuation, ranking, sizing,
      or exit logic. Threshold 1.0 means only at-the-money or in-the-money candidates;
      lower thresholds are progressively more permissive. Compare risk-adjusted metrics
      against the current baseline with no moneyness filter. Standard train/test split
      over years, same as prior runs.

      '
  success_criteria:
    criteria:
    - cumulative_excess_compound > baseline cumulative excess for at least one threshold
      in test period
    - max_single_year_drawdown_vs_benchmark <= baseline max drawdown (no worse) for
      best threshold
    - at least one threshold produces directionally positive improvement in both train
      and test slices
  falsifiers:
    train:
    - all thresholds degrade cumulative_excess_compound vs baseline in test period
    - best threshold still leaves strategy deeply unprofitable in absolute PnL (cumulative
      excess < 0)
    - no threshold produces a meaningful improvement in risk-adjusted returns (Sharpe
      ratio unchanged or worse)
    validate:
    - all thresholds degrade cumulative_excess_compound vs baseline in test period
    - best threshold still leaves strategy deeply unprofitable in absolute PnL (cumulative
      excess < 0)
    - no threshold produces a meaningful improvement in risk-adjusted returns (Sharpe
      ratio unchanged or worse)
    test:
    - all thresholds degrade cumulative_excess_compound vs baseline in test period
    - best threshold still leaves strategy deeply unprofitable in absolute PnL (cumulative
      excess < 0)
    - no threshold produces a meaningful improvement in risk-adjusted returns (Sharpe
      ratio unchanged or worse)
  risk: 'Low. This is an additive filter on top of existing entry logic. If moneyness
    filtering removes too many candidates, the strategy reverts to fewer trades but
    introduces no new risk sources. Worst case is reduced opportunity without improvement
    — same pattern as failed entry filters but with a different targeting mechanism
    that doesn''t suppress all signals during market stress.

    '
  why_not_repeated_failure: 'This is not a repeat of the failed bond-floor (C002)
    or market drawdown (C009) entry filters. Those filters suppress all entries during
    adverse market conditions (timing/regime approach). The moneyness filter operates
    at the individual candidate level: it filters out specific CBs whose theoretical
    value calculation is inherently unreliable due to deep OTM option characteristics.
    The failed entry filters failed because they suppress good signals along with
    bad ones during market stress; moneyness filtering targets signal quality directly,
    independent of market regime. This is also not a repeat of the closed ''universe_filter''
    tag — moneyness filtering preserves the full universe and only gates individual
    entry signals based on a real-time observable condition.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_bond-floor-entry-filter_1: failed_mechanical_thresholds
      (entry filter, different mechanism — regime/timing)
  - cb_arb_value_gap_switch_market_drawdown_entry_filter: failed_mechanical_thresholds
      (entry filter, different mechanism — regime/timing)
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22: accepted (exit rule,
      same strategy, evidence that signal has merit)
  - cb_arb_value_gap_switch_gap-speed-adaptive-exit_2: adoption_pass (exit rule, same
      strategy, reinforcing evidence)
  implementation_assumption: The executor reads stock_close from stk_daily_qfq, conv_price
    from cb_basic, computes moneyness = stock_close / conv_price on each signal date,
    and applies a boolean mask before candidate ranking. The concurrent_supervised
    pool best_params.json files provide the valuation model parameters used to compute
    value_gap_amount. No changes to valuation, ranking, sizing, or exit logic. The
    filter is applied as a pre-ranking gate on the daily candidate pool.
