  proposal_id: cb_arb_value_gap_switch_moneyness-entry-filter_v1_1
  strategy_id: cb_arb_value_gap_switch
  family: moneyness_entry_filter
  hypothesis: 'Restricting entries to candidates where the underlying stock price
    is at or above a threshold fraction of the conversion price (stock_close / conv_price
    >= threshold) will improve cumulative excess by screening out deep out-of-the-money
    CBs. Deep OTM CB option values are dominated by time premium and IV assumptions,
    making their theoretical-value gaps least reliable and most likely to represent
    model noise rather than tradable mispricing. Unlike the failed entry filters (bond-floor
    and market drawdown) that suppress all signals during adverse conditions, this
    filter targets signal quality at the individual candidate level without reference
    to market regime.

    '
  source_insight: 'Two entry filters (bond-floor and market drawdown) failed mechanical
    thresholds because they suppress all entries during adverse conditions, destroying
    opportunity without fixing the root cause. Meanwhile, exit rule innovations (duration-adaptive
    accepted, gap-speed-adaptive passed adoption) prove the core value-gap signal
    has merit when combined with smarter mechanics. The logical next step is to improve
    signal quality at the source — filtering out candidates whose theoretical value
    is inherently unreliable — rather than suppressing all entries during bad times.

    '
  expected_improvement: 'Improved risk-adjusted excess returns by reducing exposure
    to false signals from deep OTM CBs where theoretical value estimates are least
    reliable. Expected to reduce drawdowns without proportionally reducing upside
    capture, since filtered candidates contribute noise rather than alpha. Targets
    the cost-degradation problem (-7.47pp cost-on) by reducing low-quality trades
    that incur costs without delivering excess returns.

    '
  capability_ids:
