l0_source: autonomous strategy ideator from recent_results_digest
hypothesis: 'Deep out-of-the-money convertible bonds have option values dominated
  by time premium and implied volatility assumptions, making their theoretical-value
  gaps the least reliable signals. Restricting entries to candidates where the underlying
  stock price is at or above a threshold fraction of the conversion price (stock_close
  / conv_price >= threshold) will screen out the noisiest signals, improving the quality
  of remaining value-gap entries and producing better risk-adjusted excess returns.

  '
source_insight: 'The duration-adaptive exit (accepted 2026-05-22) improved exit timing
  but the strategy remains deeply unprofitable with costs (cumulative excess -10.47%).
  Three entry-filter families have been tested and all failed: bond-floor proximity
  (C002, failed mechanical thresholds), market drawdown gate (C009, failed), and contrarian
  drawdown entry (failed). None of these target the core failure mode of deep OTM
  CBs — where theoretical value is most sensitive to model assumptions that the current
  valuation formula may not capture accurately. Moneyness filtering attacks the signal
  quality problem at its root rather than applying a blunt market-timing overlay.

  '
