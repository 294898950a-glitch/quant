  test_design:
    description: 'Grid search over moneyness threshold parameter (stock_close / conv_price)
      from 0.5 to 1.1 in steps of 0.1. For each threshold, filter the candidate pool
      to only CBs where stock_close >= threshold * conv_price on the signal date,
      then run the existing backtester with baseline exit logic unchanged. Evaluate
      all candidates on the standard train/test split with cost-on. Compare each candidate
      against the current baseline row (cb_arb-value-gap-switch-medium-signal-cost-on-20260516).

      '
  success_criteria:
    criteria:
    - At least one threshold produces a candidate with improved Sharpe ratio vs baseline
      (cost-on)
    - No candidate worsens max drawdown vs baseline by more than 2 percentage points
    - At least one candidate shows directionally improved cumulative excess vs baseline
      (cost-on)
  falsifiers:
    train:
    - All moneyness thresholds produce cumulative excess worse than or equal to baseline
      (cost-on)
    - The best candidate Sharpe is lower than baseline Sharpe (cost-on)
    - Filtering reduces average annual trade count below 5, rendering the strategy
      non-viable
    validate:
    - All moneyness thresholds produce cumulative excess worse than or equal to baseline
      (cost-on)
    - The best candidate Sharpe is lower than baseline Sharpe (cost-on)
    - Filtering reduces average annual trade count below 5, rendering the strategy
      non-viable
    test:
    - All moneyness thresholds produce cumulative excess worse than or equal to baseline
      (cost-on)
    - The best candidate Sharpe is lower than baseline Sharpe (cost-on)
    - Filtering reduces average annual trade count below 5, rendering the strategy
      non-viable
  risk: 'Low. The moneyness filter reduces the candidate pool, which could shrink
    trade count below viability if the threshold is set too high. But the grid covers
    0.5–1.1, so low thresholds (0.5–0.7) should preserve most candidates while still
    screening out the deepest OTM names where model noise is worst. The risk of accidentally
    filtering out genuine alpha is low because deep OTM CB option values are theoretically
    the least reliable inputs to the valuation model.

    '
  why_not_repeated_failure: 'This is not a repeat of any failed or closed direction.
    The bond-floor entry filter (C002, cb_arb_value_gap_switch_bond-floor-entry-filter_1,
    failed mechanical thresholds) tested CB price proximity to bond floor — a credit-floor
    mechanism. The market drawdown entry filter (C009, cb_arb_value_gap_switch_market_drawdown_entry_filter,
    failed) tested a global market-timing gate. The contrarian drawdown entry tested
    another market-level timing gate. C003 moneyness filtering is a per-CB quality
    screen based on the equity option''s distance from the conversion price — a fundamentally
    different failure mode (model noise in deep OTM theoretical valuations). None
    of the closed_tags (global_option_entry_gate, option_position_sizing, universe_filter,
    regime_classifier_variant, etc.) cover this mechanic. The moneyness_entry_filter
    family has a registered executor (evaluate_cb_arb_moneyness_entry_filter) that
    has not been tested in any prior run in the recent digest.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_bond-floor-entry-filter_1 (failed_mechanical_thresholds,
    C002, different mechanic)
  - cb_arb_value_gap_switch_market_drawdown_entry_filter (failed_mechanical_thresholds,
