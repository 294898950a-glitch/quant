    different mechanic)
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22 (accepted, C007 exit-side,
    complementary)
  implementation_assumption: The evaluate_cb_arb_moneyness_entry_filter executor computes
    stock_close / conv_price for each candidate on each signal date using stk_daily_qfq.parquet
    (stock close) and cb_basic.parquet (conv_price). It applies a boolean mask to
    the candidate pool before ranking/scoring, runs the existing backtester unchanged,
    grid-searches over threshold values, and produces standard review artifacts including
    train/test metrics, trade logs, and parameter comparison tables.
