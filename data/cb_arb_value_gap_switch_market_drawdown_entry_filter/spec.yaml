hypothesis: 'Suppressing new entries when the CSI 300 is in a significant drawdown
  (rolling N-day return below a tunable threshold, with a buffer period to prevent
  immediate re-entry) will reduce the strategy''s exposure during bear market regimes.
  This should improve cumulative excess return and reduce max drawdown without destroying
  upside capture, because the duration-adaptive exit already handles individual position
  discipline — the missing piece is macro-level entry gating.

  '
source_insight: 'The duration-adaptive exit (min_hold_days=5, effective_max_hold_days=45,
  decay_period_factor=0.5) was accepted as evidence but the strategy remains deeply
  unprofitable in absolute terms (cost-on cumulative excess -10.47%). Multiple exit-rule
  variants (profit-take, gap-trailing, IV-percentile, PnL-adaptive) all failed to
  meaningfully improve the strategy. The contrarian-drawdown-entry approach failed
  at mechanical thresholds, suggesting drawdown periods are structurally harmful rather
  than opportunities. This points to entry timing — not exit refinement — as the highest-leverage
  unexplored dimension.

  '
