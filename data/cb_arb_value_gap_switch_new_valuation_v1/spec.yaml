hypothesis: 'The current theoretical value model uses static or oversimplified credit
  spread and volatility assumptions that produce noisy value gaps — especially for
  CBs far from the bond floor where the option component dominates. Incorporating
  a dynamic credit spread (derived from CB market price vs risk-free bond PV) and
  time-varying implied volatility into the theoretical valuation will produce more
  accurate value gaps. This attacks the root cause (signal quality) rather than applying
  filters on top of a weak signal. The forward-direction sort (most-positive gap first,
  which review has concluded IS the correct signal direction) should see improved
  risk-adjusted excess returns because fewer entries will be driven by model noise
  rather than genuine mispricing.

  Repeated-reject family check — moneyness_stock_to_conv_threshold (3 recent failures):
  (1) Is the underlying signal invalid? No — review_memory has concluded the forward
  direction IS the signal and the reverse is anti-alpha. The signal direction is correct
  but noisy. (2) Is the direction reversed? No — the reverse direction produces strong
  test excess but review has closed reverse families. The forward direction is correct.
  (3) Is only the execution condition wrong? Partially — the accepted duration-adaptive
  exit already improved execution, but the entry signal itself remains the bottleneck.
  Entry filters (moneyness, bond floor) failed because they reduce candidate count
  without improving signal-to-noise. The solution is to improve the signal at the
  source — the valuation formula — not to cull candidates from a noisy signal.

  This proposal is not in any closed family, not in any forbidden family, and not
  a renamed repeat of failed entry-filter or reverse-direction experiments.

  '
source_insight: 'The recent digest shows the forward-direction value-gap signal consistently
  produces negative cumulative excess (-0.1047 cost-on baseline). Entry filters (moneyness
  v1.1, v1.5, bond floor v1) all failed mechanical thresholds in the forward direction.
  Reverse-direction probes show +30.3% test excess but review_memory has closed all
  reverse families under value_gap_rank_is_anti_alpha_2026_05_24. The accepted duration-adaptive
  exit (2026-05-22) improved execution but did not flip the strategy to positive.
  The unresolved bottleneck is the valuation model itself — no valuation formula experiment
  has been run. Improving the theoretical value computation is the highest-leverage
  untested intervention.

  '
