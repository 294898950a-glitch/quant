implementation_assumption: The new theoretical value can be computed from existing
  warehouse data without requiring new external data sources. Dynamic credit spread
  uses CB market close price minus risk-free bond PV (using par_value, coupon_rate,
  maturity_date from cb_basic). Time-varying volatility uses a rolling window (e.g.
  60-day) of stock daily returns from stk_daily_qfq. The executor replaces value_gap_amount
  in the daily value gap parquet with the new computation, then passes control to
  the existing value-gap switch backtester with the accepted exit parameters.
