test_design:
  description: 'Replace the existing theoretical value computation with one that incorporates:
    (a) a dynamic credit spread estimated daily from CB market price vs discounted
    bond cash flows, and (b) a rolling historical volatility or GARCH estimate for
    the equity option component. Recompute daily value_gap_amount = close - new_theo_value.
    Run the existing value-gap switch backtester with the accepted duration-adaptive
    exit (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5)
    in the forward direction (descending sort, most-positive gap first). Compare against
    the current baseline (cb_arb-value-gap-switch-medium-signal-cost-on-20260516).
    Train 2018-2022, test 2023-2026, cost-on (slippage=0.0015, impact=0.001).

    '
success_criteria:
  criteria:
  - cumulative_excess_compound_test_gt_baseline: true
  - test_sharpe_gte_0: true
  - adoption_pass: true
falsifiers:
  train: &id001
  - cumulative_excess_compound_test_lte_baseline: No improvement over current valuation
  - any_test_year_drawdown_gt_35pct: New valuation increases tail risk
  - test_sharpe_lt_0: Signal remains unprofitable despite valuation change
  validate: *id001
  test: *id001
risk: 'Low structural risk — changing the valuation formula does not remove candidates
  or alter exit logic. The worst case is no improvement over baseline. The main risk
  is that dynamic spread estimation introduces its own noise (lookback parameter sensitivity),
  but this is testable and can be iterated.

  '
why_not_repeated_failure: "This is not a repeated failure of any prior direction:\
  \ - Entry filter families (moneyness, bond floor) culled candidates from a noisy\n\
  \  signal and all failed mechanical thresholds. This proposal does not filter\n\
  \  candidates — it improves the signal they are ranked on.\n- Reverse-direction\
  \ families (reverse_moneyness, reverse_bond_floor, reverse_exit,\n  reverse_vol_scaling)\
  \ were closed by review_memory under\n  value_gap_rank_is_anti_alpha_2026_05_24.\
  \ This proposal uses the forward direction.\n- PnL feedback scaling (C004) failed\
  \ because it scales exposure to a weak signal.\n  This proposal improves the signal\
  \ itself.\n- IV percentile exit (C007, iv_percentile_exit_v2) was rejected for negative\n\
  \  train-period excess. That was an exit overlay on a weak signal; this attacks\n\
  \  the signal at the source.\n- No valuation formula experiment has been run. This\
  \ is a genuinely new direction.\n"
