hypothesis: 'The forward value-gap strategy (-10.47% cumulative excess cost-on) suffers
  from extended cold periods where the signal produces serial negative returns. Rolling
  realized PnL feedback can identify these cold regimes and reduce position sizes
  proportionally, cutting cost drag without abandoning the signal or removing candidates.
  Unlike entry filters (moneyness x5, bond floor x1) which culled the candidate pool
  and failed to rescue forward-direction returns, PnL feedback is an orthogonal overlay
  that preserves all candidates and only adjusts allocation weights. The key testable
  claim: scaling inverse to recent strategy PnL reduces cumulative excess degradation
  by at least 3pp relative to the cost-on baseline (-10.47%), without needing to change
  which bonds enter or when they exit.

  '
source_insight: 'Recent digest shows 6 consecutive entry-filter failures (moneyness
  x5 variants + bond floor x1) on the forward direction, all returning adoption_pass=false.
  These filters removed candidates and destroyed whatever signal the forward direction
  had. The logical next step is an overlay that preserves all candidates — position
  scaling via rolling PnL feedback is the only remaining untested forward-direction
  mechanic that does not alter entry eligibility or exit rules. This is not a renamed
  repeat of any closed or failed direction.

  '
