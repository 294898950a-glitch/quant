proposal_id: volatility_scaling_001
strategy_id: cb_arb_value_gap_switch
family: static_volatility_position_scaling
hypothesis: 'Scaling position size inversely with recent realized volatility (e.g.,
  20-day ATR) reduces drawdowns by avoiding large bets during high-uncertainty periods,
  while preserving upside during calm markets.

  '
source_insight: 'Baseline train max_drawdown of -0.324 and win rate 0.453 suggest
  that some trades are too large during volatile periods. Volatility tends to be high
  when signal quality is low; reducing position size then can cut tail risk.

  '
expected_improvement: 'Reduce train max_drawdown by at least 10% vs. baseline, keep
  test excess return within 2% of baseline, and improve 2020 total return above -0.05.

  '
capability_ids:
- C001
required_executor: volatility_based_position_scaling_executor
required_data:
- data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
- data/cb_warehouse/cb_basic.parquet
- data/cb_warehouse/stk_daily_qfq.parquet
- data/cb_warehouse/cb_daily.parquet
test_design:
  description: 'Use baseline value-gap switch signals to generate candidate lists.
    For each candidate, compute a volatility scaling factor based on 20-day ATR of
    the underlying stock (or CB price), scaled relative to cross-sectional median
    ATR on that day. Multiply the baseline ranking weight and order size by min(1,
    1 / (1 + β * (ATR/median_ATR - 1))). Grid-search over β (0.5, 1.0, 2.0) and lookback
    window (10, 20, 30 days). Evaluate on train (2019-2024), 2020 repair, and sealed
    test (2025-2026) using the same metric suite as baseline (total return, excess
    return, max drawdown, win rate).

    '
success_criteria:
  train_max_drawdown: <= -0.25
  test_excess_return: '>= 0.2'
  yr2020_total_return: '>= -0.05'
falsifiers:
  train: &id001
  - No parameter set achieves all three success criteria simultaneously.
  - Test excess return < 0.2 even if train drawdown improves.
  - Train win rate remains below 0.45.
  validate: *id001
  test: *id001
risk: 'Volatility scaling may reduce exposure during high-volatility periods that
  later produce strong gap closures, hurting test returns. The success criteria guard
  this.

  '
why_not_repeated_failure: 'The previous position sizing run (option-position-sizing_2026-05-17)
  tested scaling based on distance from bond floor and conversion price. Volatility-based
  scaling is a new, untested factor and does not reuse the rejected variants.

  '
related_prior_runs:
- cb_arb_value_gap_switch_option-position-sizing_2026-05-17_151411
implementation_assumption: The new executor will compute daily ATR from cb_daily.parquet
  (or stock daily) and produce a scaling factor per CB. It will apply the factor as
  a multiplier to the existing ranking weight and buy amount, without changing entry
  eligibility. The evaluation will use the same backtest harness as the baseline.
