implementation_outline:
  script_path: scripts/evaluate_cb_arb_volatility_position_scaling.py
  main_inputs:
  - data_root
  - output_dir
  core_steps:
  - load base ranks and warehouse data (cb_daily, stock prices, cb_basic)
  - compute daily ATR for each CB using the specified lookback window (from adjusted
    close prices of stock or CB)
  - compute cross-sectional median ATR per day
  - compute scaling factor = min(1, 1 / (1 + β * (ATR / median_ATR - 1)))
  - apply factor to rank weight and buy amount without modifying entry eligibility
  - run the existing backtest harness with scaled weights
  - produce required artifacts (summary, report, etc.)
  code_constraints:
  - use existing project data files and shared rank loader
  - do not change current strategy truth
  - do not overwrite raw warehouse data
validation_plan:
- python3 -m py_compile scripts/evaluate_cb_arb_volatility_position_scaling.py
- run a small data smoke test on train period 2019-2020
- verify that summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml are produced
