tool_request_id: volatility_based_position_scaling_executor_v1
why_existing_tools_insufficient: The existing executor 'option_position_sizing' can
  test static candidate position scaling (C001) but does not implement volatility-based
  scaling. It only scales positions based on distance from bond floor or conversion
  price, not on recent realized volatility (ATR). The executor 'option_source_pnl_feedback_scaler'
  tests rolling PnL feedback scaling, not volatility. The proposal's core mechanic
  requires computing asset-level ATR and multiplying the baseline rank weight and
  order size by min(1, 1/(1+β*(ATR/median_ATR - 1))). No registered executor implements
  this mechanism; therefore a new executor must be drafted.
reviewed_existing_executor_ids:
- option_position_sizing
- option_source_pnl_feedback_scaler
