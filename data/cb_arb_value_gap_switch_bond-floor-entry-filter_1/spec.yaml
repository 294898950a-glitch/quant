    and improve risk-adjusted returns without destroying the alpha signal, in contrast
    to market-level entry gates (market drawdown, contrarian drawdown) which both
    failed.

    '
  source_insight: 'The strategy''s cost-on max drawdown (-0.3516) is a falsifier-level
    problem. Two market-level entry gates (CSI 300 drawdown, contrarian drawdown)
    both failed mechanical thresholds. The bond floor is a fundamentally different
