      accepted duration-adaptive exit (min_hold_days=5, initial_threshold_fraction=0.7,
      decay_period_factor=0.5, effective_max_hold_days=45). Compare cost-on metrics
      against baseline. Also test with no exit override (pure entry filter) as a control
      to isolate the entry-filter contribution.

