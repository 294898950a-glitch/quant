hypothesis: 'Restricting value-gap entries to periods when the CB price trades near
  its bond floor introduces intrinsic downside protection. The bond floor — computed
  by discounting future coupon and principal cash flows — acts as a hard valuation
  anchor. When the CB trades near it, the equity-like downside is capped while gap-closing
  upside is preserved, creating an asymmetric payoff. This should reduce max drawdown
  and improve risk-adjusted returns without destroying the alpha signal, in contrast
  to market-level entry gates (market drawdown, contrarian drawdown) which both failed.

  '
source_insight: 'The strategy''s cost-on max drawdown (-0.3516) is a falsifier-level
  problem. Two market-level entry gates (CSI 300 drawdown, contrarian drawdown) both
  failed mechanical thresholds. The bond floor is a fundamentally different gating
  mechanism — it operates at the instrument level using the CB''s own contractual
  fixed-income floor rather than external market regime signals. The bond floor provides
  a concrete valuation reason to skip weak signals: when the CB trades far above its
  bond floor, the theoretical-value gap may reflect noise or speculative premium rather
  than genuine mispricing. Filtering to near-floor entries targets the signal-quality
  root cause rather than the macro-timing symptom.

  '
