test_design:
  description: 'Grid search over the bond-floor proximity threshold (e.g., CB close
    within 0%, 2%, 5%, 10%, 15%, 20% above computed bond floor). For each threshold,
    apply a boolean entry mask — suppress entries where CB close exceeds bond_floor
    * (1 + threshold). Run the existing backtester with baseline ranking and the accepted
    duration-adaptive exit (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5,
    effective_max_hold_days=45). Compare cost-on metrics against baseline. Also test
    with no exit override (pure entry filter) as a control to isolate the entry-filter
    contribution.

    '
success_criteria:
  criteria:
  - max_drawdown single-year below 0.15 (current falsifier threshold)
  - cumulative_excess_compound directionally improved over baseline cost-on (-0.1047)
  - adoption_pass is True (candidate survives review mechanical thresholds)
  - entry count remains above 30% of baseline (filter is selective, not destructive)
falsifiers:
  train: &id001
  - max_drawdown does not decrease relative to baseline cost-on
  - cumulative_excess_compound degrades further (falls below -0.15)
  - filter eliminates more than 70% of baseline entries without improving per-trade
    metrics
  - adoption_pass is False
  validate: *id001
  test: *id001
risk: 'Primary risk is over-filtering — if the bond floor threshold is too tight,
  the strategy may have too few entries to compound. Secondary risk is that near-floor
  CBs are near-floor for a reason (credit deterioration) and the gap may not close.
  The executor should report entry counts at each threshold to detect this.

  '
why_not_repeated_failure: 'C002 (bond floor entry filter) has never been tested. The
  two prior entry-filter runs both used market-level gating based on CSI 300 returns
  (market_drawdown_entry_filter → failed_mechanical_thresholds, contrarian_drawdown_entry
  → failed_mechanical_thresholds). The bond floor filter operates at the instrument
  level using fixed-income valuation, not market regime. It is not a variant of any
  closed tag or prior entry-filter family. The capability C002 has a registered executor
  (evaluate_cb_arb_bond_floor_entry_filter) and no blockers preventing its use.

  '
