implementation_assumption: The executor will compute each CB's bond floor daily by
  discounting future coupon payments and principal at an appropriate yield (current
  CB yield or comparable credit spread). It then filters entries to only those where
  CB daily close is within a threshold percentage of the computed bond floor. The
  original ranking signal and the accepted duration-adaptive exit are preserved unchanged.
  Grid search sweeps the threshold parameter.
