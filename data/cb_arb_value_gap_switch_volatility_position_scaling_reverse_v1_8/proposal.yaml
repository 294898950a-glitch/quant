test_design:
  description: 'Base: value_gap_amount ASCENDING sort, >0 filter unchanged. Compute
    daily ATR from stk_daily_qfq close per CB per day (lookback grid: [10, 20, 40,
    60] days). Rank by ATR within each day, apply inverse scaling: position_weight
    = baseline * (scaling_beta / ATR_rank). Grid over scaling_beta: [0.25, 0.5, 0.75,
    1.0, 1.5]. Exit: reverse-probe grid (max_hold_days [120, 150, 180], min_gap_pct
    [0.005, 0.01], sell_gap_pct 0.0, switch_hurdle_pct [0.0, 0.01]). Cost-on: slippage
    0.0015, market impact 0.001. Train 2018-2022, test 2023-2026. Baseline comparator:
    reverse-probe-coston best params (max_hold_days=180, min_gap_pct=0.01, sell_gap_pct=0.0,
    switch_hurdle_pct=0.0).

    '
success_criteria:
  criteria:
  - test_excess_return > 0.24
  - test_max_drawdown less than -0.113
  - test_win_rate > 0.55
  - adoption_pass equals true
falsifiers:
  train: &id001
  - test_excess_return < 0.10
  - test_max_drawdown greater than or equal to -0.113
  - any_train_year excess < -0.05
  - best candidate win_rate < 0.50
  validate: *id001
  test: *id001
risk: 'Low. Position scaling may over-concentrate in low-volatility bonds with negligible
  gaps but no real alpha, or fail to differentiate (all weights ≈ equal, wasted run).
  Neither case destroys the base signal. Worst outcome: null result, one run burned.
  Distant possibility: inverse-ATR systematically allocates more to bonds whose gap
  is small because they are illiquid, amplifying transaction cost drag. Cost-on evaluation
  will surface this.

  '
why_not_repeated_failure: 'The moneyness_stock_to_conv_threshold family (3 failures)
  removes candidates from the pool. Those filters failed because the reverse base''s
  alpha lives in the small-positive-gap tail — removing those candidates removes the
  signal. Inverse-ATR position scaling is a different mechanic: zero candidates are
  removed. Only allocation weights adjust. The base candidate set is identical to
  the winning reverse-probe-coston run. This is not a renamed entry filter.

  '
