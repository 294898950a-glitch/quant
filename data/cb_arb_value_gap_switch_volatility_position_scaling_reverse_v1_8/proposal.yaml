proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_8
strategy_id: cb_arb_value_gap_switch
family: volatility_position_scaling_reverse
hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on) wins because
  it selects small-positive-gap bonds least distorted by the broken valuation formula.
  Entry filters (moneyness, bond floor) all failed on the reverse base because they
  remove exactly those small-gap candidates that carry the alpha. Inverse-ATR position
  scaling is fundamentally different: it preserves ALL candidates and only adjusts
  allocation weights — less volatile bonds get more capital, noisier bonds get less.
  This is strictly less destructive than entry filtering and should reduce drawdowns
  while preserving at least 80% of the proven reverse-direction excess.

  Repeated-reject-family check (moneyness_stock_to_conv_threshold, 3 failures): (1)
  Underlying signal invalid? No. The reverse sort''s +30.3% test excess proves the
  small-positive-gap zone contains real alpha. (2) Direction reversed? The reverse
  IS the correct direction. The moneyness filter was applied to the reverse base —
  direction is not the issue. (3) Execution condition wrong? Yes. Entry filters are
  the wrong tool because they cull the candidate pool. Position scaling is a weight-adjustment
  overlay, not a candidate-removal filter. Same base, same candidates, different allocation.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 — reverse probe confirmed
  tradeable alpha (+30.3% test excess cost-on, 41pp swing from sort direction alone).
  Follow-up reverse entry filters (moneyness reverse v1_1, bond floor reverse v2)
  both hit failed_mechanical_thresholds because they thin an already-sparse candidate
  pool. Position scaling avoids this failure mode entirely by keeping the full candidate
  set.

  '
expected_improvement: 'Reduce max drawdown below the reverse cost-on baseline test
  DD of -11.3% while preserving ≥80% of the +30.3% test excess. Target: test excess
  > +24%, test DD < -10%, win rate > 0.55.

  '
