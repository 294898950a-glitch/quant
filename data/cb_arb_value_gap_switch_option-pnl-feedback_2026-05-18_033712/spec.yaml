notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: option_pnl_feedback_sum_trigger
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: '已禁家族是"禁止买入期权来源"（global_option_entry_gate）、"整体期权价格折价" （global_option_value_haircut）、"政权条件入场门控"（regime_conditioned_option_entry_gate）
    和"panic 家族重跑"（panic_family_reruns）；confirmed_invalid_directions 包括 rolling_option_source_pnl_feedback（零触发）、conditional_option_position_sizing、
    static_candidate_position_scale。本批测试的是 trigger_sum_pnl 绝对累计亏损门槛，是 executor 参数空间中从未变动的新维度，不改理论价格、不禁买，与已测
    trigger_avg_pnl_pct 正交，不属于任何 forbidden_family。

    '
  risk: 'trigger_sum_pnl 绝对值与账户实际资金量强耦合：若策略净值在训练期（6 年）与测试期（1.5 年）规模差异大，同一绝对门槛在资金大时基本不触发、资金小时过频触发，跨期稳健性存疑。
    若执行器内部没有做资金归一化，该机制在 2019-2024 训练期大概率无触发，导致与 baseline 无差异，无法真正检验假设。需在 Codex 跑前确认脚本是否支持
    trigger_sum_pnl 参数非零 变体，以及该参数是否按账户净值百分比还是绝对 CNY 计量。

    '
  fallback_reason: null
