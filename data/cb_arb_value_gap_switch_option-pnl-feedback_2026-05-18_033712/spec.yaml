schema_version: 1
run_id: cb_arb_value_gap_switch_option-pnl-feedback_2026-05-18_033712
date: '2026-05-18'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: option_value_loop Claude prompt injection from current.yaml, research_insights.yaml,
  experiments.yaml, baseline_registry.yaml, strategies.yaml, and protocol_rules.yaml
hypothesis: '将反馈触发条件从"任意平均亏损率（trigger_avg_pnl_pct=0）"改为"近期期权来源累计实现亏 损绝对值超过固定门槛（trigger_sum_pnl
  设为 -50000/-100000/-200000）"，只在真正出现 持续大额亏损时才缩减后续期权来源买入金额，可过滤单笔小波动噪声触发、保留训练期正常期权 收益，同时在
  2020 式深度亏损集中期自动降低暴露。

  '
source_insight: '022212 和 004259 两轮共 38 变体均将 trigger_sum_pnl 固定为 0，从未变动绝对累计亏损门槛； option_false_undervalue_attribution_2026_05_17
  显示期权来源亏损高度集中在少数高暴露交 易（far_above_bond_floor >1.5 共 116 笔，net_pnl=-177K；ratio>1.5
  或 moneyness>1.6 共 240 笔，net_pnl=-286K），说明有意义的累计绝对亏损门槛能区分噪声触发与真实大额亏损事件。 READY 批次
  023149 已测 trigger_avg_pnl_pct=-5%/-10%（平均亏损率维度），本批补充正交维度。

  '
parameter_space:
- name: option_source_pnl_feedback_lookback_days
  range:
  - 20
  - 60
  type: int
  description: 只看最近已平仓期权来源交易的天数。
- name: option_source_pnl_feedback_min_trades
  range:
  - 2
  - 3
  type: int
  description: 触发反馈前至少需要看到的已平仓期权来源交易数。
- name: option_source_pnl_feedback_scale
  range:
  - 0.25
  - 0.75
  type: float
  description: 触发后期权来源候选排序金额和实际买入金额保留比例。
new_data_sources:
- path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
