    \npd: Any = None\nyaml: Any = None\n\n\ndef _setup_heavy_deps() -> None:\n   \
    \ global pd, yaml\n    import pandas as _pd\n    import yaml as _yaml\n    pd\
    \ = _pd\n    yaml = _yaml\n\n\n# ── Lazy project module imports ──\n\ndef _import_value_gap_switch():\n\
    \    from scripts.evaluate_cb_arb_value_gap_switch import (  # noqa: E402\n  \
    \      _gap_source_shares,\n        _load_or_build_value_ranks,\n        _run_value_gap_backtest,\n\
    \        _score,\n        _with_cost_params,\n        _write_csv,\n    )\n   \
    \ return (\n        _gap_source_shares,\n        _load_or_build_value_ranks,\n\
    \        _run_value_gap_backtest,\n        _score,\n        _with_cost_params,\n\
    \        _write_csv,\n    )\n\n\ndef _import_position_sizing():\n    from scripts.evaluate_cb_arb_option_position_sizing\
    \ import _add_moneyness  # noqa: E402\n    return _add_moneyness\n\n\n# ── constants\
    \ ──\n\nBASE_PARAMS: dict[str, Any] = {\n    \"min_gap_pct\": 0.0,\n    \"sell_gap_pct\"\
    : 0.0,\n    \"switch_hurdle_pct\": 0.03,\n    \"max_hold_days\": 180.0,\n    \"\
    stop_gap_ratio_floor\": 0.30,\n    \"stop_signal_threshold\": 999.0,\n    \"option_source_pnl_feedback_enabled\"\
    : 0.0,\n    \"candidate_position_scale_enabled\": 0.0,\n}\n\nCONFIGS: list[dict[str,\
    \ Any]] = [\n    {\n        \"name\": \"baseline_no_feedback_v2\",\n        \"\
    description\": \"不应用任何期权来源盈亏反馈（v2基线）\",\n        \"feedback_enabled\": False,\n\
    \    },\n    *[\n        {\n            \"name\": (\n                f\"feedback_{signal}_thresh{str(threshold).replace('.',\
    \ 'p').replace('-', 'n')}\"\n                f\"_scale{str(scale).replace('.',\
    \ 'p')}\"\n            ),\n            \"description\": (\n                f\"\
    信号={signal}, 阈值={threshold}, 缩放={scale}: \"\n                f\"当期权来源的{signal}低于{threshold}时，\"\
    \n                f\"后续该来源的候选排序金额和买入金额乘以{scale}\"\n            ),\n          \
    \  \"feedback_enabled\": True,\n            \"feedback_signal\": signal,\n   \
    \         \"feedback_threshold\": float(threshold),\n            \"feedback_scale\"\
    : float(scale),\n        }\n        for signal in (\"sum_pnl_amount\", \"avg_pnl_pct\"\
    )\n        for threshold in (-50000, -100000, -200000, -5000, -0.005, -0.01)\n\
    \        for scale in (0.75, 0.50, 0.25)\n    ],\n]\n\n\n# ── CSV parsing helpers\
    \ ──\n\ndef _parse_entry_source_csv(csv_path: Path) -> pd.DataFrame:\n    \"\"\
    \"Read an entry-source CSV and return a DataFrame.\"\"\"\n    return pd.read_csv(csv_path,\
    \ na_values=[\"None\", \"null\"])\n\n\ndef _extract_baseline_source_pnl(\n   \
    \ csv_df: pd.DataFrame, baseline_names: tuple | None = None\n) -> dict[str, dict[str,\
    \ float]]:\n    \"\"\"Extract per-source PnL stats for the baseline (unscaled)\
    \ config.\"\"\"\n    if baseline_names is None:\n        baseline_names = (\"\
    baseline_no_position_scale\", \"baseline_no_feedback\")\n    baseline_rows = csv_df[csv_df[\"\
    name\"].isin(baseline_names)]\n    if baseline_rows.empty and len(csv_df) > 0:\n\
    \        baseline_rows = csv_df.iloc[[0]]\n    result: dict[str, dict[str, float]]\
    \ = {}\n    for _, row in baseline_rows.iterrows():\n        source = str(row.get(\"\
    source\", \"unknown\"))\n        result[source] = {\n            \"sum_pnl_amount\"\
    : float(str(row.get(\"sum_pnl_amount\", 0)).replace(\",\", \"\") or 0),\n    \
    \        \"avg_pnl_pct\": float(str(row.get(\"avg_pnl_pct\", 0)).replace(\",\"\
    , \"\") or 0),\n            \"count\": int(float(str(row.get(\"count\", 0)) or\
