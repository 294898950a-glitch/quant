files:
- path: generated_executor/evaluate_cb_arb_option_pnl_feedback_v2.py
  purpose: Complete evaluator implementation.
  content: "\"\"\"Evaluate rolling option-source PnL feedback v2 for cb_arb value-gap\
    \ switch.\n\nUnlike v1 which computes rolling realized PnL internally from its\
    \ own trade\nsimulation, this executor ingests pre-computed entry-source CSV files\
    \ from\na prior option-position-sizing run and uses their aggregate source-level\n\
    PnL to scale future option-source candidate exposure.\n\nThe feedback mechanism:\n\
    \  1. Parse entry-source CSVs to extract per-source realized PnL stats\n     (sum_pnl_amount,\
    \ avg_pnl_pct) from the baseline (unscaled) config.\n  2. For each source that\
    \ is \"recently losing\" (metrics cross a threshold),\n     scale down value_gap_amount\
    \ and position_cash on option-source\n     candidate rows during rank pre-processing.\n\
    \  3. Run standard value-gap backtest on adjusted ranks.\n  4. Compare multiple\
    \ feedback strategies (threshold, scale, signal type)\n     against a no-feedback\
    \ baseline.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\n\
    import hashlib\nimport json\nimport sys\nfrom datetime import datetime\nfrom pathlib\
    \ import Path\nfrom typing import Any\n\nimport pandas as pd\nimport yaml\n\n\
    _REPO_ROOT = Path(__file__).resolve().parent.parent.parent.parent\nif str(_REPO_ROOT)\
    \ not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\nfrom scripts.evaluate_cb_arb_option_position_sizing\
    \ import (\n    _add_moneyness,\n    _option_source_mask,\n)\nfrom scripts.evaluate_cb_arb_value_gap_switch\
    \ import (\n    _gap_source_shares,\n    _load_or_build_value_ranks,\n    _run_value_gap_backtest,\n\
    \    _score,\n    _with_cost_params,\n    _write_csv,\n)\n\n\nBASE_PARAMS: dict[str,\
    \ Any] = {\n    \"min_gap_pct\": 0.0,\n    \"sell_gap_pct\": 0.0,\n    \"switch_hurdle_pct\"\
    : 0.03,\n    \"max_hold_days\": 180.0,\n    \"stop_gap_ratio_floor\": 0.30,\n\
    \    \"stop_signal_threshold\": 999.0,\n    \"option_source_pnl_feedback_enabled\"\
    : 0.0,\n    \"candidate_position_scale_enabled\": 0.0,\n}\n\n\n# --- CONFIGS:\
    \ grid of feedback strategies ---\n\nCONFIGS: list[dict[str, Any]] = [\n    {\n\
    \        \"name\": \"baseline_no_feedback_v2\",\n        \"description\": \"不应用任何期权来源盈亏反馈（v2基线）\"\
    ,\n        \"feedback_enabled\": False,\n    },\n    *[\n        {\n         \
    \   \"name\": (\n                f\"feedback_{signal}_thresh{str(threshold).replace('.',\
    \ 'p').replace('-', 'n')}\"\n                f\"_scale{str(scale).replace('.',\
    \ 'p')}\"\n            ),\n            \"description\": (\n                f\"\
    信号={signal}, 阈值={threshold}, 缩放={scale}: \"\n                f\"当期权来源的{signal}低于{threshold}时，\"\
    \n                f\"后续该来源的候选排序金额和买入金额乘以{scale}\"\n            ),\n          \
    \  \"feedback_enabled\": True,\n            \"feedback_signal\": signal,\n   \
    \         \"feedback_threshold\": float(threshold),\n            \"feedback_scale\"\
    : float(scale),\n        }\n        for signal in (\"sum_pnl_amount\", \"avg_pnl_pct\"\
    )\n        for threshold in (-50000, -100000, -200000, -5000, -0.005, -0.01)\n\
    \        for scale in (0.75, 0.50, 0.25)\n    ],\n]\n\n\n# --- CSV parsing helpers\
    \ ---\n\ndef _parse_entry_source_csv(csv_path: Path) -> pd.DataFrame:\n    \"\"\
    \"Read an entry-source CSV and return a DataFrame.\n\n    CSV columns: name, source,\
    \ count, avg_pnl_pct, sum_pnl_amount, wins,\n                 avg_close_to_bond_floor,\
    \ avg_moneyness_stock_to_conv,\n                 avg_position_cash_scale\n   \
    \ \"\"\"\n    df = pd.read_csv(csv_path)\n    for col in (\"avg_pnl_pct\", \"\
    sum_pnl_amount\", \"count\", \"wins\"):\n        if col in df.columns:\n     \
    \       df[col] = pd.to_numeric(df[col], errors=\"coerce\")\n    return df\n\n\
    \ndef _extract_baseline_source_pnl(\n    csv_df: pd.DataFrame, baseline_names:\
    \ tuple[str, ...] | None = None\n) -> dict[str, dict[str, float]]:\n    \"\"\"\
    Extract per-source PnL stats for the baseline (unscaled) config.\n\n    Returns\
    \ {source: {sum_pnl_amount, avg_pnl_pct, count, wins}}\n    \"\"\"\n    if baseline_names\
    \ is None:\n        baseline_names = (\"baseline_no_position_scale\", \"baseline_no_feedback\"\
    )\n\n    baseline_rows = csv_df[csv_df[\"name\"].isin(baseline_names)]\n    if\
    \ baseline_rows.empty:\n        # Fallback: use the first config name as baseline\n\
    \        first_name = csv_df[\"name\"].iloc[0] if len(csv_df) > 0 else None\n\
    \        if first_name is not None:\n            baseline_rows = csv_df[csv_df[\"\
    name\"] == first_name]\n\n    result: dict[str, dict[str, float]] = {}\n    for\
    \ _, row in baseline_rows.iterrows():\n        source = str(row[\"source\"])\n\
    \        result[source] = {\n            \"sum_pnl_amount\": float(row[\"sum_pnl_amount\"\
    ]),\n            \"avg_pnl_pct\": float(row[\"avg_pnl_pct\"]),\n            \"\
    count\": int(row[\"count\"]),\n            \"wins\": int(row[\"wins\"]),\n   \
    \     }\n    return result\n\n\ndef _source_name_for_row(row: Any, params: dict[str,\
    \ Any]) -> str:\n    \"\"\"Determine the gap source name for a single rank row.\"\
    \"\"\n    source, _, _ = _gap_source_shares(row, params)\n    return source\n\n\
    \n# --- Rank adjustment helpers ---\n\ndef _adjust_ranks_for_feedback(\n    ranks:\
    \ pd.DataFrame,\n    source_pnl_lookup: dict[str, dict[str, float]],\n    cfg:\
    \ dict[str, Any],\n    params: dict[str, Any],\n) -> pd.DataFrame:\n    \"\"\"\
    Pre-adjust ranks based on entry-source PnL feedback.\n\n    For each option-source\
    \ candidate row, look up the source's aggregate PnL\n    from the prior run. If\
    \ the PnL signal crosses the feedback threshold,\n    scale down value_gap_amount\
    \ and position_cash_scale.\n\n    Returns the adjusted DataFrame.\n    \"\"\"\n\
    \    if not cfg.get(\"feedback_enabled\"):\n        return ranks\n\n    signal\
    \ = str(cfg.get(\"feedback_signal\", \"sum_pnl_amount\"))\n    threshold = float(cfg.get(\"\
    feedback_threshold\", 0.0))\n    scale = float(cfg.get(\"feedback_scale\", 1.0))\n\
    \n    adjusted = ranks.copy()\n    if \"position_cash_scale\" not in adjusted.columns:\n\
    \        adjusted[\"position_cash_scale\"] = 1.0\n\n    # Build a per-row source\
    \ mask:\n    # option_mask = rows where gap source == \"option\"\n    option_mask_values:\
    \ list[bool] = []\n    losing_mask_values: list[bool] = []\n    for row in adjusted.itertuples(index=False):\n\
    \        source = _source_name_for_row(row, params)\n        is_option = source\
    \ == \"option\"\n        option_mask_values.append(is_option)\n        if is_option\
    \ and source in source_pnl_lookup:\n            pnl_val = source_pnl_lookup[source].get(signal,\
    \ 0.0)\n            losing_mask_values.append(pnl_val < threshold)\n        else:\n\
    \            losing_mask_values.append(False)\n\n    option_mask = pd.Series(option_mask_values,\
    \ index=adjusted.index)\n    losing_mask = pd.Series(losing_mask_values, index=adjusted.index)\n\
    \    apply_mask = option_mask & losing_mask\n\n    if not bool(apply_mask.any()):\n\
    \        return adjusted\n\n    adjusted.loc[apply_mask, \"position_cash_scale\"\
    ] = (\n        adjusted.loc[apply_mask, \"position_cash_scale\"].astype(float)\
    \ * scale\n    )\n    adjusted.loc[apply_mask, \"value_gap_amount\"] = (\n   \
    \     adjusted.loc[apply_mask, \"value_gap_amount\"].astype(float) * scale\n \
    \   )\n    adjusted.loc[apply_mask, \"value_gap_pct_of_cash\"] = (\n        adjusted.loc[apply_mask,\
    \ \"value_gap_amount\"].astype(float)\n        / adjusted.loc[apply_mask, \"position_cash\"\
    ].astype(float)\n    )\n    return adjusted\n\n\n# --- Spec binding ---\n\ndef\
    \ _spec_binding_fields(output_dir: Path) -> dict[str, str]:\n    spec_path = output_dir\
    \ / \"spec.yaml\"\n    if not spec_path.exists():\n        return {\"spec_run_id\"\
    : output_dir.name, \"spec_binding_hash\": \"\"}\n    spec = yaml.safe_load(spec_path.read_text(encoding=\"\
    utf-8\"))\n    if not isinstance(spec, dict):\n        return {\"spec_run_id\"\
    : output_dir.name, \"spec_binding_hash\": \"\"}\n    binding = {\n        \"run_id\"\
    : spec.get(\"run_id\") or output_dir.name,\n        \"hypothesis\": spec.get(\"\
    hypothesis\"),\n        \"source_insight\": spec.get(\"source_insight\"),\n  \
    \      \"parameter_space\": spec.get(\"parameter_space\"),\n        \"mechanics\"\
    : spec.get(\"mechanics\"),\n        \"proposal_id\": ((spec.get(\"automation\"\
    ) or {}).get(\"proposal_id\")),\n    }\n    payload = json.dumps(binding, ensure_ascii=False,\
    \ sort_keys=True, default=str)\n    return {\n        \"spec_run_id\": str(binding[\"\
    run_id\"]),\n        \"spec_binding_hash\": hashlib.sha256(payload.encode(\"utf-8\"\
    )).hexdigest()[:16],\n    }\n\n\ndef _attach_spec_binding(rows: list[dict[str,\
    \ Any]], output_dir: Path) -> None:\n    binding = _spec_binding_fields(output_dir)\n\
    \    for row in rows:\n        row.update(binding)\n\n\n# --- CLI ---\n\ndef declare_data_requirements(\n\
    \    command: list[Any], spec: dict[str, Any] | None = None\n) -> dict[str, Any]:\n\
    \    \"\"\"Return the files this executor will read before it is allowed to run.\"\
    \"\"\n    _cmd_val = lambda flag: next(\n        (str(p) for i, p in enumerate(command[:-1])\
    \ if str(p) == flag), None\n    )\n    data_root_raw = _cmd_val(\"--data-root\"\
    )\n    if not data_root_raw:\n        raise ValueError(\"evaluate_cb_arb_option_pnl_feedback_v2\
    \ requires --data-root\")\n    base_ranks = _cmd_val(\"--base-ranks-path\")\n\
    \    csv_2020 = _cmd_val(\"--option-2020-csv\")\n    csv_test = _cmd_val(\"--option-test-csv\"\
    )\n\n    required_files: list[dict[str, str]] = [\n        {\"path\": str(Path(data_root_raw)\
    \ / \"data/cb_warehouse/cb_basic.parquet\"), \"role\": \"warehouse_input\"},\n\
    \        {\"path\": str(Path(data_root_raw) / \"data/cb_warehouse/cb_daily.parquet\"\
    ), \"role\": \"warehouse_input\"},\n        {\"path\": str(Path(data_root_raw)\
    \ / \"data/cb_warehouse/cb_call.parquet\"), \"role\": \"warehouse_input\"},\n\
    \        {\"path\": str(Path(data_root_raw) / \"data/cb_warehouse/stk_daily_qfq.parquet\"\
