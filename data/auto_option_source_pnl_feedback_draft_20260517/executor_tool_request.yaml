  position scaling and cannot test rolling_pnl_feedback (C004). The existing option_source_pnl_feedback_scaler
  executor can test rolling_pnl_feedback but it computes rolling realized PnL internally
  from its own trade simulation; it does not consume the two entry-source CSV files
  from the prior option-position-sizing run that the proposal explicitly depends on
  to compute realized option-source PnL before scaling. That strict data dependency
  creates a mismatch, so a new executor is required that ingests the pre-computed
  trade history and applies the proposal’s feedback scaling logic.
