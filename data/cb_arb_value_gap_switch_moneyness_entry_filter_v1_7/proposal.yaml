test_design:
  description: 'Grid search over moneyness thresholds: stock_close / conv_price >=
    {0.5, 0.6, 0.7, 0.8, 0.9, 1.0}. Use the accepted duration-adaptive exit parameters
    (min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45).
    Standard train/test split with sealed holdout. Compare each threshold against
    baseline (no moneyness filter, same exit params).

    '
success_criteria:
  criteria:
  - At least one threshold improves cumulative_excess_compound vs baseline in both
    train and sealed test
  - No single-year max_drawdown degradation > 5pp vs baseline
  - The improvement direction is consistent across train and test (no overfitting
    sign)
falsifiers:
  train: &id001
  - No moneyness threshold improves cumulative_excess vs baseline
  - Best threshold increases max_drawdown by > 5pp vs baseline
  - Any train improvement disappears or reverses in sealed test
  validate: *id001
  test: *id001
risk: 'Low. This is a simple binary entry mask that does not change the value-gap
  ranking, position sizing, or exit logic. The main risk is shrinking the candidate
  pool too aggressively in bear markets (deep OTM becomes the norm), but the grid
  search will reveal whether a viable threshold exists without starving the strategy
  of trades.

  '
why_not_repeated_failure: 'This moneyness-based entry filter (C003) is an untested
  mechanic. It is distinct from the bond-floor filter (C002, failed_mechanical_thresholds)
  which uses a different valuation anchor (bond floor vs conversion parity), and from
  the market drawdown filter (C009, failed_mechanical_thresholds) which is a macro
  timing gate rather than a per-security signal-quality filter. Moneyness filtering
  is not in closed_tags or any forbidden family.

  '
