proposal_id: cb_arb_value_gap_switch_moneyness_entry_filter_v1_7
strategy_id: cb_arb_value_gap_switch
family: moneyness_entry_filter
hypothesis: 'Deep out-of-the-money CBs (where stock_close / conv_price is below a
  threshold) have option values dominated by time premium and IV model assumptions,
  making their theoretical-value gaps the least reliable. Filtering these candidates
  out at entry will improve signal quality — fewer noise-driven entries and exits
  — without altering the value-gap ranking, position sizing, or exit logic. Combined
  with the accepted duration-adaptive exit, this should improve cumulative excess
  and reduce drawdown severity.

  '
source_insight: 'The duration-adaptive exit (2026-05-22, accepted) established a credible
  exit mechanism, but the strategy still produces deeply negative cumulative excess
  with costs (-10.47pp). A plausible leak is entering positions where the value gap
  is dominated by model noise rather than genuine mispricing. Deep OTM CBs are the
  most vulnerable: small changes in IV or credit spread assumptions produce large
  swings in theoretical value that look like gaps but aren''t tradable. Filtering
  them is a high-ROI, low-risk cleanup step.

  '
expected_improvement: 'Reduce cumulative excess degradation by removing noise-dominated
  entries. Expect higher win rate, lower turnover, and fewer whipsaw exits. The improvement
  should be visible in cumulative_excess_compound and max_drawdown reduction.

  '
