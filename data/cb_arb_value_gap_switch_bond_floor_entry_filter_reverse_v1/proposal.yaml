hypothesis: 'The forward bond floor entry filter failed mechanical thresholds, but
  the reverse-probe critical insight (value_gap_rank_is_anti_alpha_2026_05_24) demonstrates
  the forward sort direction is anti-alpha. The reverse-sorted base produced +30.3%
  test excess cost-on — a 41pp swing from sort direction alone. Applying the bond
  floor proximity constraint to this tradeable reverse base tests whether the entry
  filter family was rejected only because it was stacked on an anti-alpha base, or
  if the bond floor constraint itself destroys signal. If the constraint preserves
  or improves the reverse base''s alpha, this rehabilitates a previously-failed family
  and narrows the confounder space.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 — priority #4: reverse-direction
  variants applied to families that previously failed in forward, to determine if
  those families were rejected only because they were stacked on an anti-alpha base.
  The bond floor filter had exactly 1 forward rejection; testing it on the verified
  tradeable reverse base is the most direct way to disambiguate signal-side vs execution-side
  failure.

  '
expected_improvement: 'Best case: bond floor proximity on the reverse base preserves
  or exceeds the unfiltered reverse baseline (+30.3% test excess cost-on) while reducing
  max drawdown by screening out CBs trading far above intrinsic debt value. Null case:
  the filter destroys alpha regardless of sort direction, confirming the constraint
  itself is signal-destructive — a clean negative that closes this entry filter family
  without further grid-search iterations.

  '
