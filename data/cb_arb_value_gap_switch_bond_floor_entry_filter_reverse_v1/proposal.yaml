test_design:
  description: 'Base: reverse sort (value_gap_amount > 0 filter unchanged, sort ascending
    — least-positive gaps first). Bond floor computed from par_value and coupon_rate
    per CB per day. Entry mask: cb_close / bond_floor - 1 <= bond_floor_distance_pct.
    Grid over bond_floor_distance_pct ∈ [0.02, 0.05, 0.10, 0.15, 0.20]. Exit parameters
    pinned to reverse-probe cost-on best: max_hold_days=180, min_gap_pct=0.01, sell_gap_pct=0.0,
    switch_hurdle_pct=0.0. Cost model ENABLED (slippage 0.0015, market impact 0.001,
    cap 0.02). Train/test split inherited from baseline. Compare best grid candidate
    to unfiltered reverse baseline (+30.3% test excess cost-on).

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound >= 0.0
  - test_max_drawdown <= reverse_baseline_max_drawdown or test_max_drawdown >= -0.15
  - test_win_rate >= 0.50
  - train_cumulative_excess_compound >= 0.0
falsifiers:
  train: &id001
  - all grid candidates produce test_cumulative_excess_compound < 0.0
  - best candidate test_excess < 0.05 (no meaningful improvement)
  - test trade count < 100 (filter too restrictive for reverse base)
  validate: *id001
  test: *id001
risk: 'Low: only 5 grid points on a single mechanic applied to a verified tradeable
  base. Main risk is that bond floor proximity shrinks the reverse-direction candidate
  pool too aggressively, eliminating the alpha-producing trades. The trade-count falsifier
  catches this. Not a data-mining concern — the base is pre-validated and the constraint
  is pre-registered.

  '
why_not_repeated_failure: 'Not a moneyness entry filter variant. The bond floor entry
  filter has exactly 1 forward rejection (bond-floor-entry-filter_v1, failed_mechanical_thresholds),
  not 4. The critical insight explicitly reprioritizes reverse-direction tests of
  previously forward-failed families above new forward experiments. This proposal
  follows that priority: test whether the bond floor constraint was rejected due to
  the anti-alpha base, not due to the constraint itself. Passing would rehabilitate
  a family; failing would cleanly close it with direction-agnostic evidence.

  '
