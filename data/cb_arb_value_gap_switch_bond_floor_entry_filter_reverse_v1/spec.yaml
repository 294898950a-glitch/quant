      pinned to reverse-probe cost-on best: max_hold_days=180, min_gap_pct=0.01, sell_gap_pct=0.0,
      switch_hurdle_pct=0.0. Cost model ENABLED (slippage 0.0015, market impact 0.001,
      cap 0.02). Train/test split inherited from baseline. Compare best grid candidate
      to unfiltered reverse baseline (+30.3% test excess cost-on).

      '
