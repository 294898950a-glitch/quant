implementation_assumption: The profit_take_exit_executor compares each held position's
  current daily gap to its entry gap. Per the capability menu description, it exits
  when current_gap <= (1 - target_fraction) * entry_gap. A min_hold_days parameter
  prevents exits in the first N days. If the position reaches delist_date or maturity
  before the profit-take condition triggers, the default exit logic applies. The executor
  runs on the existing daily_value_gap_amounts data without modifying entry eligibility,
  scoring, or position sizing.
