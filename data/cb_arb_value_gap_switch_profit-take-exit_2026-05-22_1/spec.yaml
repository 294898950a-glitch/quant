  risk: 'Low-medium. The mechanic is a straightforward modification of the exit rule.
    Main risk is that profit-take exits prematurely on gaps that eventually close
    fully, forfeiting the tail of the distribution in exchange for a higher win rate.
    If the gap-re-widening probability is high, this trade-off is positive; if gaps
    typically close fully, it''s negative. The grid search across target_fraction
    covers both conservative (0.1-0.2, exit on small closure) and aggressive (0.5-0.6,
    wait for substantial closure) regimes.

    '
  why_not_repeated_failure: 'The gap-trailing-exit (adoption_pass: false) likely used
    dynamic_exit_gap_decay_executor, which exits when current_gap < entry_gap * gap_decay_factor
    — mathematically equivalent to profit-take''s (1 - target_fraction). If gap-trailing-exit
    used a trailing/dynamic reference gap instead of a fixed entry gap, the profit-take
    is genuinely different (fixed vs dynamic reference). If they are the same executor
    with different parameter naming, the failure may have been due to parameter range
    or min_hold interaction rather than the mechanic itself, and a targeted grid sweep
    with explicit min_hold_days + cost-on evaluation provides new evidence. Either
    way, this is not a renamed repeat of duration-adaptive-exit (different mechanic:
    fixed target vs decaying threshold), iv_percentile_exit (different signal: gap
    ratio vs IV), or pnl_feedback_scaling (different domain: exit rule vs position
    sizing).

    '
