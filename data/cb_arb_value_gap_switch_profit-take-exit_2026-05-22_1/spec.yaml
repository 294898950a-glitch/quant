hypothesis: 'Exiting when the option-implied value gap has partially closed relative
  to entry gap (exit when current_gap <= (1 - target_fraction) * entry_gap, with a
  minimum hold period) locks in gains before gaps re-widen. The accepted duration-adaptive
  exit proved gap-ratio-based exits work; this tests whether a simpler fixed-target
  exit delivers better risk-adjusted returns with fewer premature exits.

  '
source_insight: 'The duration-adaptive exit (accepted, best: min_hold_days=5, initial_threshold=0.7,
  decay_factor=0.5, max_hold=45) showed that comparing current gap to entry gap is
  a viable exit mechanic. However, the decaying-threshold approach starts aggressive
  and relaxes over time, which may force exits on temporarily-widening gaps early
  in the hold. A fixed profit-target flips the logic: exit only when the gap has demonstrably
  closed enough, regardless of time (beyond min_hold). This is mechanically distinct:
  duration-adaptive changes the bar over time; profit-take holds a constant bar and
  waits for gap closure.

  '
