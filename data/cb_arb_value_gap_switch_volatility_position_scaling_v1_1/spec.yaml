hypothesis: 'The forward value-gap ranking signal is noisy — reverse-probe evidence
  (+30.3% test excess cost-on vs forward''s -10.47%) proves the ranking direction
  is anti-alpha. Previous attempts to fix this via entry filters (moneyness ×3, bond
  floor ×2) failed mechanical thresholds because removing candidates from an already-weak
  signal pool further thins the trade count below viability. Volatility-based position
  scaling attacks a different dimension: it preserves all candidates but down-weights
  those with high ATR (average true range), which tend to contribute disproportionately
  to drawdowns and noise. By allocating less capital to volatile names and more to
  stable ones, the strategy should reduce tail risk without culling the already-thin
  candidate pool. This is a noise-reduction overlay, not a signal filter.

  '
source_insight: 'The repeated failure of entry filters (moneyness ×3 rejects, bond
  floor ×2 rejects in recent digest) establishes that candidate-culling overlays are
  lethal to the forward direction. The reverse-probe evidence confirms the ranking
  is anti-alpha, but all reverse families are closed by value_gap_rank_is_anti_alpha_2026_05_24.
  The only unexplored, non-closed, non-culling dimension for the forward direction
  is position-level risk adjustment via volatility. This draws on the quant principle
  that equal-weighting noisy signals amplifies noise — inverse-vol weighting is a
  standard remedy.

  '
