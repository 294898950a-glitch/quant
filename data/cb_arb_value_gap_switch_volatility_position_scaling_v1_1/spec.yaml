      positive gap first), apply >0 filter unchanged. Compute ATR per CB per day from
      stk_daily_qfq close/high/low (lookback grid: [10, 20, 40, 60] days). Apply inverse
      scaling: position_weight = baseline_rank_weight * (scaling_beta / ATR_percentile_rank).
      Grid search: ATR lookback × scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit:
