  risk: medium
  why_not_repeated_failure: 'This proposal is not in repeated_reject_families (moneyness_stock_to_conv_threshold).
    The three moneyness rejections share one mechanic: entry filtering — removing
    candidates where stock_close/conv_price falls below a threshold. This culls the
    candidate pool, reducing trade count below mechanical viability. Volatility position
    scaling is NOT an entry filter: zero candidates are removed. All entries that
    pass the >0 value_gap filter remain eligible; only allocation weights change.
    Position scaling also addresses a different problem (noise/drawdown concentration
    in volatile names) rather than signal quality. The repeated-filter-failure pattern
    does not predict failure here because the mechanism is fundamentally different
    — it preserves all candidates instead of culling them.

    '
