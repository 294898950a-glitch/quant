test_design:
  description: 'Forward direction: sort daily value_gap_amount DESCENDING (largest
    positive gap first), apply >0 filter unchanged. Compute ATR per CB per day from
    stk_daily_qfq close/high/low (lookback grid: [10, 20, 40, 60] days). Apply inverse
    scaling: position_weight = baseline_rank_weight * (scaling_beta / ATR_percentile_rank).
    Grid search: ATR lookback × scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit: use
    accepted duration-adaptive exit (min_hold_days=5, initial_threshold_fraction=0.7,
    decay_period_factor=0.5). Cost-on: slippage 0.0015, market impact 0.001. Train
    2018-2022, test 2023-2026. Compare against baseline: cb_arb-value-gap-switch-medium-signal-cost-on-20260516.

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound_ge_baseline
  - test_max_drawdown_improvement_ge_5pp
  - any_holdout_year_sharpe_gt_0
falsifiers:
  train: &id001
  - test_cumulative_excess_compound_lt_baseline_minus_3pp
  - test_max_drawdown_worse_than_baseline
  - all_holdout_years_sharpe_lt_0
  validate: *id001
  test: *id001
risk: medium
why_not_repeated_failure: 'This proposal is not in repeated_reject_families (moneyness_stock_to_conv_threshold).
  The three moneyness rejections share one mechanic: entry filtering — removing candidates
  where stock_close/conv_price falls below a threshold. This culls the candidate pool,
  reducing trade count below mechanical viability. Volatility position scaling is
  NOT an entry filter: zero candidates are removed. All entries that pass the >0 value_gap
  filter remain eligible; only allocation weights change. Position scaling also addresses
  a different problem (noise/drawdown concentration in volatile names) rather than
  signal quality. The repeated-filter-failure pattern does not predict failure here
  because the mechanism is fundamentally different — it preserves all candidates instead
  of culling them.

  '
