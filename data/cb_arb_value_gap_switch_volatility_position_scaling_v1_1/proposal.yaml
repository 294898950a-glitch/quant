implementation_assumption: ATR-based inverse weighting reduces allocation to candidates
  whose price volatility contributes disproportionately to portfolio drawdowns. The
  forward-direction signal, while weak (negative excess), may still have positive
  Sharpe in low-volatility candidates — inverse-vol weighting isolates that component
  without removing any candidates.
