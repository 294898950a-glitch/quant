schema_version: 1
run_id: cb_arb_value_gap_switch_option-value-haircut_2026-05-17
date: '2026-05-17'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: 'user request: put option false-undervaluation finding into the general
  framework and run tests'
hypothesis: 期权来源的错误低估不应通过全局禁买解决；当转债已经远离债底或正股已深度超过转股价时，直接折减期权估值，可以减少坏的期权来源交易，同时保留正常期权修复收益。
source_insight: 2019-2024 本地归因显示，亏损集中在价格/债底较高或正股/转股价较高的 option-source 交易；高波动率本身不是坏信号，恐慌日买入也不是主要来源。因此本实验只调整期权估值，不新增禁买规则，不改变卖出和换仓框架。
parameter_space:
- name: option_value_haircut_variant
  range:
  - 0
  - 10
  type: int
  description: 11 个固定估值调整方案，包括 baseline、价格/债底触发、正股/转股价触发、二者任一触发和渐进折减。
- name: close_to_bond_floor_threshold
  range:
  - 1.4
  - 1.5
  type: float
  description: 期权型低估中，转债价格相对债底过高的触发线。
- name: moneyness_stock_to_conv_threshold
  range:
  - 1.6
  - 2.0
  type: float
  description: 期权型低估中，正股价格相对转股价过高的触发线。
- name: option_value_weight
  range:
  - 0.25
  - 0.75
  type: float
  description: 触发后保留的期权价值比例。
new_data_sources:
- path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  description: 已有 value-gap 估值与可交易金额，避免重复计算基础基准。
- path: data/cb_warehouse/cb_basic.parquet
  description: 转股价和正股代码，用于计算正股/转股价。
- path: data/cb_warehouse/stk_daily_qfq.parquet
  description: 前复权正股价格，用于计算正股/转股价。
grid:
  dimensions:
  - option_value_haircut_variant
  candidates_count: 11
  description: 固定 11 组估值折减方案，全量跑 train/test/2019-2024 yearly，并输出 2020 和 test 的入口来源拆解。
hard_floors:
  train_excess_return: 0.0
  train_max_drawdown: -0.3
  test_excess_return: 0.0
  test_max_drawdown: -0.3
  replay_2020_total_return: -0.090593
hard_floors_baseline_source: current cb_arb_value_gap_switch yearly replay and train/test
  falsifier contract
auxiliary_metrics:
- train_excess_return
- test_excess_return
- yearly_2020_total_return
- yearly_2020_excess_return
- max_drawdown
- total_trades
- win_rate
- entry_source_2020_option_loss
- entry_source_test_option_profit
cv_design: single-window
cv_holdout_years:
- 2025
- 2026
cv_adoption_threshold: 必须同时满足 train 累计不为负、2020 不继续恶化、2025-2026 测试段不被明显伤害；否则只作为诊断资产，不晋升。
compute_estimate:
  sig_minutes: 0
  spot_minutes: 45
  local_minutes: 0
  estimated_cost_yuan: 0.0
budget_cap_yuan: 100
spot_decision: 本轮使用已有 daily_value_gap_amounts，不重复计算基础基准；预计 spot 45 分钟内完成，预算 4.69 元，低于
  100 元自动执行；必须在 VM/spot host 执行。
stop_conditions:
- 脚本退出非 0
- 缺少 summary_option_value_haircut.csv
- 缺少 yearly_option_value_haircut.csv
- 缺少 entry_source_2020_option_value_haircut.csv
- 所有非 baseline 方案 train_excess_return < 0 且 2020 total_return 未改善
artifacts_required:
- summary_option_value_haircut.csv
- yearly_option_value_haircut.csv
- entry_source_2020_option_value_haircut.csv
- entry_source_test_option_value_haircut.csv
- adjustment_option_value_haircut.csv
- summary.json
- report.yaml
automation:
  output_dir: data/cb_arb_value_gap_switch_option-value-haircut_2026-05-17
  gatekeeper_after_run: false
  manual_2020_review_required: true
  manual_review_reason: 自动 verdict 只看 train 汇总表；本实验必须额外检查 2020 单年是否修复，以及 test 段 option-source
    收益是否被砍掉。
  command:
  - .venv/bin/python
  - scripts/evaluate_cb_arb_option_value_haircut.py
  - --data-root
  - data/cb_arb_concurrent_supervised_20260511_094500
  - --train-start
  - '20190101'
  - --train-end
  - '20241231'
  - --test-start
  - '20250101'
  - --test-end
  - '20260508'
  - --fixed-source
  - '2'
  - --rule
  - score_4state
  - --output-dir
  - '{output_dir}'
  - --base-ranks-path
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - --reuse-ranks
  - --cost-model-enabled
  verdict:
    table_path: summary_option_value_haircut.csv
    yearly_table_path: yearly_option_value_haircut.csv
    filters:
      period: train
    rank_by: score
    rank_desc: true
    thresholds:
      excess_return:
        min: 0.0
      max_drawdown:
        min: -0.3
    train_single_year_dd_ceiling: -0.15
status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 测试段 option-source 收益被明显砍掉
- 运行时间超过 45 分钟
notes: 这是正式框架实验，不改 current.yaml，不改 baseline_registry。关键比较是估值折减是否比入口禁买更好：能否压掉 stock-like
  / far-from-bond-floor 的错误低估，同时保留 2025-2026 的期权来源盈利。
updated_at: '2026-05-17T05:25:01Z'
