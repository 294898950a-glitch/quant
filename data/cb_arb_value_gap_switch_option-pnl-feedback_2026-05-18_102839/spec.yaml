status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: pnl_feedback_gentle_medium_window_v1
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: '本提案不禁买、不整体折价、不设全局期权来源入场门槛； 机制为：仅当回看窗口内已有≥4笔已平仓期权来源交易且每笔平均亏损率绝对值≥1.5%时，
    对后续期权来源候选的排序金额和买入金额乘以0.80（缩减20%）； 属于option_source_pnl_feedback executor现有参数空间内的新四维组合，
    与已禁止的global_option_entry_gate、global_option_value_haircut机制路径完全不同。

    '
  risk: 最大风险：训练期2019-2024期权来源整体净正收益（净盈利约74858元，总收益超过总亏损）， 任何在训练期有效触发的反馈机制都会减少期权暴露，导致train
    score低于baseline（baseline train score=0.050351极低，几乎不可能被反馈变体超越）； 若90d+min4+trigger-0.015+scale0.80组合在训练期仍触发导致score继续被压，
    则option_source_pnl_feedback方向已基本穷尽当前executor参数空间， 需升级用户讨论是否引入新executor或放弃该方向。
  fallback_reason: null
