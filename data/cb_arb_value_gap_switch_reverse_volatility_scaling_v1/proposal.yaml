implementation_assumption: The volatility_based_position_scaling_executor must support
  ASCENDING sort direction (reverse probe base). If it lacks a sort_direction parameter,
  it needs a minor modification to accept 'ascending'/'descending' — a parameterization
  change, not a new executor from scratch. ATR computed from cb_daily close (stk_daily_qfq
  close as fallback for thin CB trading days). Scaling factor = 1 / (ATR_pct_rank
  + epsilon), multiplied by baseline buy_amount before cost model.
