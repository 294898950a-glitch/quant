proposal_id: cb_arb_value_gap_switch_reverse_volatility_scaling_v1
strategy_id: cb_arb_value_gap_switch
family: static_volatility_position_scaling
hypothesis: 'The reverse-direction value-gap strategy (ASCENDING sort, +30.3% test
  excess cost-on) treats all positions equally regardless of volatility. CBs with
  higher realized ATR have noisier value-gap signals — apparent undervaluation may
  be transient price noise rather than genuine mispricing. Applying inverse-volatility
  position scaling (smaller positions for high-ATR names, larger for low-ATR names)
  should improve risk-adjusted returns by concentrating capital on stable signals
  and reducing exposure to noisy candidates. This is a pure overlay — entry eligibility,
  exit logic, and ranking are unchanged.


  Repeated-reject analysis: moneyness family (3 rejections) failed because entry filters
  remove candidates entirely, reducing signal breadth. Position scaling is different
  — it keeps all candidates but adjusts exposure, preserving full breadth while managing
  risk. The reverse-direction signal is independently validated as tradeable (+30.3%
  test excess cost-on), so the execution condition (position sizing) is the remaining
  untested lever, not a rehash of a failed signal filter.'
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 confirms reverse-direction
  is tradeable (+30.3% test excess cost-on). Decision_use directive: ''reverse-direction
  variants applied to families that previously failed in forward.'' Position sizing
  via C001 volatility scaling is an untested family in the reverse direction. The
  insight''s confounder hypothesis — that volatility differences distort the value-gap
  signal — directly motivates volatility-aware position sizing as the next diagnostic
  step.'
expected_improvement: Reverse probe achieves +30.3% test excess but with -11.3% test
  max drawdown. Inverse-volatility scaling should reduce drawdown by allocating less
  capital to high-volatility (noisy) candidates. Expect improved Sharpe and lower
  max drawdown while preserving most of the cumulative excess. If scaling hurts performance,
  it suggests excess returns concentrate in high-volatility names — useful diagnostic
  either way.
