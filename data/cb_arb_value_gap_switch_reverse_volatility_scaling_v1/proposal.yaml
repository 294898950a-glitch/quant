test_design:
  description: 'Grid search over ATR lookback window (10, 20, 40, 60 days) and scaling
    formula (inverse, sqrt-inverse, capped-inverse at 2x/0.5x). Apply scaling factor
    to baseline buy_amount on reverse-sorted base (value_gap_amount > 0, ASCENDING,
    top-N). Use standard exit grid from reverse probe (max_hold_days: 120/150/180,
    min_gap_pct: 0.005/0.01, sell_gap_pct: 0.0, switch_hurdle_pct: 0.0/0.01). Evaluate
    with cost-on (slippage 0.0015, market_impact 0.001). Compare best candidate against
    reverse-probe-coston baseline (+30.3% test excess).'
success_criteria:
  test_excess_return_gt_0_25: Preserves at least 80% of the reverse probe's +30.3%
    test excess
  test_max_drawdown_lt_0_10: Reduces drawdown below the reverse probe's -11.3%
  test_sharpe_improved: Sharpe ratio higher than reverse probe baseline
falsifiers:
  alpha_destroyed: test_excess < 0.10 (volatility scaling destroys more alpha than
    it preserves)
  risk_not_reduced: test_max_drawdown >= reverse probe baseline
  no_candidate_passes: No grid candidate meets both success criteria simultaneously
risk: 'Low structural risk. The reverse-direction signal is already validated as tradeable.
  Position scaling is an overlay — if it fails, the base signal remains intact and
  we learn whether excess returns concentrate in high or low volatility names. Main
  risk: ATR from CB daily close is a noisy volatility proxy (CBs less liquid than
  stocks), partially mitigated by grid search over lookback windows.'
why_not_repeated_failure: Not a moneyness or bond-floor entry filter variant. Entry
  filters failed because removing candidates reduces signal breadth and trade count,
  causing mechanical threshold rejection (adoption_pass=False). Position scaling preserves
  all candidates and adjusts only capital allocation. Targets the risk dimension (volatility
  concentration) rather than the signal dimension (entry eligibility). The reverse-sort
  signal is independently validated as tradeable (+30.3% test excess cost-on), making
  this an execution-condition refinement on a proven base.
