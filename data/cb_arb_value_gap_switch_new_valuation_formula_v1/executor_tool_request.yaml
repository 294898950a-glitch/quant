- path: generated_executor/evaluate_cb_arb_new_valuation.py
  purpose: Complete evaluator implementation.
  content: "#!/usr/bin/env python3\n\"\"\"Evaluate refined CB theoretical value model\
    \ for value-gap switch strategy.\n\nComputes new theoretical values using a Tsiveriotis-Fernandes\
    \ decomposition:\n  theoretical = bond_floor + option_value\n\nEnhancements over\
    \ baseline:\n  - Dynamic credit spread: rating-based base + market-implied calibration\n\
    \  - Historical volatility: 60-day rolling from forward-adjusted stock prices\n\
    \  - Proper bond cash-flow discounting with dynamic spread\n\nThen feeds the new\
    \ value gaps into the baseline entry/exit logic\n(enter when gap > 0, exit when\
    \ gap <= 0) and compares against the\nexisting theoretical-value-based gaps.\n\
    \"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\nimport json\n\
    import sys\nfrom datetime import datetime as _dt, timezone as _tz\nfrom pathlib\
    \ import Path\nfrom typing import Any\n\n# ---------------------------------------------------------------------------\n\
    # Repo root & sys.path — must come before any `from scripts.X import Y`.\n# The\
    \ compliance import-reachability probe runs with -E in /tmp, so all\n# non-stdlib\
    \ imports that follow must resolve from the venv site-packages\n# (numpy/pandas/yaml)\
    \ or from REPO_ROOT (scripts.*).\n# ---------------------------------------------------------------------------\n\
    \ndef _find_repo_root(start: Path) -> Path:\n    for candidate in (start, *start.parents):\n\
    \        if (candidate / \"scripts\" / \"gatekeeper.py\").exists():\n        \
    \    return candidate\n    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \nfrom scripts.gatekeeper import GateKeeper  # noqa: E402\n\n# ---------------------------------------------------------------------------\n\
    # Lazy third-party imports — not available at module level in isolated probe.\n\
    # ---------------------------------------------------------------------------\n\
    \ndef _get_np():\n    \"\"\"Lazy import numpy.\"\"\"\n    import numpy as _np\n\
    \    return _np\n\n\ndef _get_pd():\n    \"\"\"Lazy import pandas.\"\"\"\n   \
    \ import pandas as _pd\n    return _pd\n\n\ndef _get_yaml():\n    \"\"\"Lazy import\
    \ yaml.\"\"\"\n    import yaml as _yaml\n    return _yaml\n\n\ndef _get_scipy_opt():\n\
    \    \"\"\"Lazy import scipy.optimize.brentq.\"\"\"\n    from scipy.optimize import\
    \ brentq as _brentq\n    return _brentq\n\n\ndef _get_scipy_stats():\n    \"\"\
    \"Lazy import scipy.stats.norm.\"\"\"\n    from scipy.stats import norm as _norm\n\
    \    return _norm\n\n\n# YAML numpy representer registration (once)\n_YAML_REPRS_REGISTERED\
    \ = False\n\n\ndef _ensure_yaml_np_reprs():\n    global _YAML_REPRS_REGISTERED\n\
    \    if _YAML_REPRS_REGISTERED:\n        return\n    yaml = _get_yaml()\n    np\
    \ = _get_np()\n\n    def _yaml_repr_np_float(dumper, data):\n        return dumper.represent_float(float(data))\n\
    \n    def _yaml_repr_np_int(dumper, data):\n        return dumper.represent_int(int(data))\n\
    \n    yaml.SafeDumper.add_representer(np.floating, _yaml_repr_np_float)\n    yaml.SafeDumper.add_representer(np.integer,\
    \ _yaml_repr_np_int)\n    yaml.SafeDumper.add_multi_representer(np.floating, _yaml_repr_np_float)\n\
    \    yaml.SafeDumper.add_multi_representer(np.integer, _yaml_repr_np_int)\n  \
    \  _YAML_REPRS_REGISTERED = True\n\n\n# Risk-free rate proxy (China 5Y government\
    \ bond ~2.5%)\nRISK_FREE_RATE = 0.025\n\n# Rating -> base credit spread (bps)\n\
    _RATING_SPREAD_MAP: dict[str, float] = {\n    \"AAA\": 0.0050, \"AA+\": 0.0080,\
    \ \"AA\": 0.0100, \"AA-\": 0.0130,\n    \"A+\": 0.0160, \"A\": 0.0200, \"A-\"\
    : 0.0250,\n    \"BBB+\": 0.0320, \"BBB\": 0.0400, \"BBB-\": 0.0500,\n    \"BB+\"\
    : 0.0650, \"BB\": 0.0800, \"BB-\": 0.1000,\n    \"B+\": 0.1200, \"B\": 0.1500,\
    \ \"B-\": 0.1800,\n    \"CCC\": 0.2200, \"CC\": 0.2800, \"C\": 0.3500,\n}\n_DEFAULT_SPREAD\
    \ = 0.0200\n\n\ndef rating_to_spread(rating: Any) -> float:\n    \"\"\"Map credit\
    \ rating to base annual spread.\"\"\"\n    pd = _get_pd()\n    if not isinstance(rating,\
    \ str) or pd.isna(rating):\n        return _DEFAULT_SPREAD\n    r = str(rating).strip().upper()\n\
    \    return _RATING_SPREAD_MAP.get(r, _DEFAULT_SPREAD)\n\n\ndef bs_call_price(S:\
    \ float, K: float, T: float, r: float, sigma: float) -> float:\n    \"\"\"Black-Scholes\
    \ European call price.\"\"\"\n    np = _get_np()\n    norm = _get_scipy_stats()\n\
    \    if T <= 0 or sigma <= 0 or S <= 0 or K <= 0:\n        return max(0.0, S -\
    \ K)\n    d1 = (np.log(S / K) + (r + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))\n\
    \    d2 = d1 - sigma * np.sqrt(T)\n    return float(S * norm.cdf(d1) - K * np.exp(-r\
    \ * T) * norm.cdf(d2))\n\n\ndef bond_floor_pv(\n    par: float,\n    coupon_rate:\
    \ float,\n    maturity_date: _dt,\n    trade_date: _dt,\n    discount_rate: float,\n\
    ) -> float:\n    \"\"\"Present value of bond cash flows (annual coupons + bullet\
    \ principal).\"\"\"\n    remaining_years = max(0.0, (maturity_date - trade_date).days\
    \ / 365.25)\n    if remaining_years <= 0:\n        return par\n    annual_coupon\
    \ = par * coupon_rate\n    pv = 0.0\n    t = 0.0\n    while t + 1.0 <= remaining_years\
    \ + 1e-6:\n        t += 1.0\n        pv += annual_coupon / ((1 + discount_rate)\
    \ ** t)\n    pv += par / ((1 + discount_rate) ** remaining_years)\n    return\
    \ pv\n\n\ndef compute_cb_theoretical(\n    stock_price: float,\n    conv_price:\
    \ float,\n    time_to_maturity: float,\n    risk_free: float,\n    credit_spread:\
    \ float,\n    hist_vol: float,\n    par: float,\n    coupon_rate: float,\n   \
    \ maturity_date: _dt,\n    trade_date: _dt,\n) -> dict[str, float]:\n    \"\"\"\
    Compute theoretical CB value: bond_floor + option_value.\"\"\"\n    discount_rate\
    \ = risk_free + credit_spread\n    bf = bond_floor_pv(par, coupon_rate, maturity_date,\
    \ trade_date, discount_rate)\n    conversion_ratio = par / conv_price if conv_price\
    \ > 0 else 0.0\n    strike = conv_price\n    opt_val = conversion_ratio * bs_call_price(\n\
    \        stock_price, strike, time_to_maturity, risk_free, hist_vol\n    )\n \
    \   theoretical = bf + opt_val\n    return {\n        \"bond_floor\": round(bf,\
    \ 6),\n        \"option_value\": round(opt_val, 6),\n        \"theoretical\":\
    \ round(theoretical, 6),\n        \"credit_spread_used\": round(credit_spread,\
    \ 6),\n        \"hist_vol_used\": round(hist_vol, 6),\n    }\n\n\ndef compute_rolling_volatility(\n\
    \    stk_df: _dt, lookback: int = 60, min_periods: int = 20\n):\n    \"\"\"Compute\
    \ rolling annualised historical volatility from stock prices.\n\n    Uses log\
    \ returns, annualised by sqrt(252). Returns DataFrame with\n    columns [ts_code,\
    \ trade_date, hist_vol].\n    \"\"\"\n    pd = _get_pd()\n    np = _get_np()\n\
    \    stk = stk_df.copy()\n    stk[\"trade_date\"] = pd.to_datetime(stk[\"trade_date\"\
    ])\n    stk = stk.sort_values([\"ts_code\", \"trade_date\"])\n    stk[\"log_ret\"\
    ] = stk.groupby(\"ts_code\")[\"close\"].transform(\n        lambda s: np.log(s\
    \ / s.shift(1))\n    )\n    stk[\"hist_vol\"] = (\n        stk.groupby(\"ts_code\"\
    )[\"log_ret\"]\n        .transform(lambda s: s.rolling(lookback, min_periods=min_periods).std())\n\
    \        * np.sqrt(252)\n    )\n    result = stk[[\"ts_code\", \"trade_date\"\
    , \"hist_vol\"]].copy()\n    result[\"hist_vol\"] = result[\"hist_vol\"].fillna(0.25)\n\
    \    return result\n\n\ndef calibrate_credit_spread(\n    market_price: float,\n\
    \    stock_price: float,\n    conv_price: float,\n    time_to_maturity: float,\n\
    \    risk_free: float,\n    hist_vol: float,\n    par: float,\n    coupon_rate:\
    \ float,\n    maturity_date: _dt,\n    trade_date: _dt,\n    base_spread: float,\n\
    ) -> float:\n    \"\"\"Calibrate credit spread so that theoretical_value approx\
    \ = market_price.\n\n    Uses Brent's method. Falls back to base_spread on failure.\n\
    \    \"\"\"\n    brentq = _get_scipy_opt()\n    conversion_ratio = par / conv_price\
    \ if conv_price > 0 else 0.0\n\n    def residual(spread: float) -> float:\n  \
    \      disc = risk_free + spread\n        bf = bond_floor_pv(par, coupon_rate,\
    \ maturity_date, trade_date, disc)\n        opt = conversion_ratio * bs_call_price(\n\
    \            stock_price, conv_price, time_to_maturity, risk_free, hist_vol\n\
    \        )\n        return (bf + opt) - market_price\n\n    lo, hi = 0.001, 0.50\n\
    \    try:\n        flo = residual(lo)\n        fhi = residual(hi)\n        if\
    \ flo * fhi > 0:\n            tv_base = residual(base_spread) + market_price\n\
    \            diff_pct = abs(tv_base - market_price) / max(market_price, 1.0)\n\
    \            if diff_pct < 0.20:\n                return base_spread\n       \
    \     direction = 1.0 if residual(base_spread) > 0 else -1.0\n            return\
    \ base_spread * (1.0 + direction * 0.3)\n        implied = brentq(residual, lo,\
    \ hi, xtol=1e-6, maxiter=50)\n        return float(implied)\n    except (ValueError,\
    \ RuntimeError):\n        return base_spread\n\n\ndef compute_refined_value_gaps(\n\
    \    cb_daily: _dt,\n    cb_basic: _dt,\n    stk_daily: _dt,\n    hist_vol_df:\
    \ _dt,\n):\n    \"\"\"Compute refined theoretical values and value gaps for all\
    \ CBs.\n\n    Returns DataFrame with:\n      trade_date, ts_code, close, refined_theoretical,\
    \ refined_bond_floor,\n      refined_option_value, refined_gap, base_spread, calibrated_spread,\
    \ hist_vol\n    \"\"\"\n    pd = _get_pd()\n    np = _get_np()\n\n    basic_map:\
    \ dict[str, dict[str, Any]] = {}\n    for _, row in cb_basic.iterrows():\n   \
    \     ts = str(row[\"ts_code\"])\n        basic_map[ts] = {\n            \"stk_code\"\
    : str(row.get(\"stk_code\", \"\")),\n            \"conv_price\": float(row.get(\"\
    conv_price\", 100.0)),\n            \"maturity_date\": pd.Timestamp(str(row.get(\"\
    maturity_date\", \"20991231\"))),\n            \"rating\": row.get(\"rating\"\
    , \"\"),\n            \"coupon_rate\": float(row.get(\"coupon_rate\", 0.02)),\n\
    \            \"par_value\": float(row.get(\"par_value\", 100.0)),\n        }\n\
    \n    cb_daily = cb_daily.copy()\n    cb_daily[\"trade_date\"] = pd.to_datetime(cb_daily[\"\
    trade_date\"])\n\n    stk_map: dict[tuple[str, _dt], float] = {}\n    stk_daily_copy\
    \ = stk_daily.copy()\n    stk_daily_copy[\"trade_date\"] = pd.to_datetime(stk_daily_copy[\"\
    trade_date\"])\n    for _, row in stk_daily_copy.iterrows():\n        key = (str(row[\"\
    stk_code\"]), row[\"trade_date\"])\n        stk_map[key] = float(row[\"close\"\
    ])\n\n    vol_map: dict[tuple[str, _dt], float] = {}\n    for _, row in hist_vol_df.iterrows():\n\
    \        key = (str(row[\"ts_code\"]), row[\"trade_date\"])\n        vol_map[key]\
    \ = float(row[\"hist_vol\"])\n\n    results: list[dict[str, Any]] = []\n    unique_codes\
    \ = cb_daily[\"ts_code\"].unique()\n\n    for ts_code in unique_codes:\n     \
    \   if ts_code not in basic_map:\n            continue\n        info = basic_map[ts_code]\n\
    \        stk_code = info[\"stk_code\"]\n        conv_price = info[\"conv_price\"\
    ]\n        maturity_date = info[\"maturity_date\"]\n        rating = info[\"rating\"\
    ]\n        coupon_rate = info[\"coupon_rate\"]\n        par_value = info[\"par_value\"\
    ]\n        base_spread = rating_to_spread(rating)\n\n        cb_sub = cb_daily[cb_daily[\"\
    ts_code\"] == ts_code].sort_values(\"trade_date\")\n\n        prev_calibrated_spread:\
    \ float | None = None\n\n        for _, row in cb_sub.iterrows():\n          \
    \  trade_date = row[\"trade_date\"]\n            market_close = float(row[\"close\"\
    ])\n            ttm = max(0.0, (maturity_date - trade_date).days / 365.25)\n \
    \           stock_price = stk_map.get((stk_code, trade_date), np.nan)\n      \
    \      hist_vol = vol_map.get((stk_code, trade_date), 0.25)\n\n            if\
