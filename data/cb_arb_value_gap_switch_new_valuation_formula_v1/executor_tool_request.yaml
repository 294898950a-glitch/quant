tool_request_id: new_valuation_executor_v1
why_existing_tools_insufficient: Every reviewed existing executor explicitly lists
  new_valuation_formula in its cannot_test set and C006 in cannot_test_capability_ids.
  They all consume the precomputed daily_value_gap_amounts.parquet and do not recompute
  the core theoretical value or the resulting gap. The proposal requires a full recalculation
  of the CB theoretical value using a refined pricing model and a fresh gap series
  to drive the baseline strategy – a capability no current executor provides.
reviewed_existing_executor_ids:
- option_position_sizing
- option_source_pnl_feedback_scaler
- dynamic_exit_gap_decay_executor
- dynamic_regime_switch_executor
- profit_take_exit_executor
- exit_rule_duration_adaptive_executor
- pnl_adaptive_exit_executor
- cb_arb_iv_percentile_exit_executor
registry_entry:
  id: new_valuation_executor
  version: 1
  status: draft
  strategy_id: cb_arb_value_gap_switch
  family: new_valuation_formula
  script_path: scripts/evaluate_cb_arb_new_valuation.py
  owner: ai_draft
  description: Compute refined CB theoretical values using a convertible bond pricing
    model incorporating dynamic credit spread estimation, option-adjusted spread calibration,
    and stock‑credit correlation adjustments. Recompute value gaps and evaluate the
    baseline value‑gap switch strategy using the new gaps, comparing performance to
    the baseline.
  can_test:
  - new_valuation_formula
  can_test_capability_ids:
  - C006
  cannot_test:
  - rolling_pnl_feedback
  - dynamic_regime_switch
  - new_exit_rule
  - new_data_source
  cannot_test_capability_ids:
  - C004
  - C005
  - C007
  - C008
  required_data:
  - path: data/cb_warehouse/cb_daily.parquet
    description: Daily CB market prices and yields.
    schema_hash: null
  - path: data/cb_warehouse/cb_basic.parquet
    description: CB basic terms and conversion price.
    schema_hash: null
  - path: data/cb_warehouse/stk_daily_qfq.parquet
    description: Forward-adjusted stock prices.
    schema_hash: null
  - path: data/cb_warehouse/credit_spreads.parquet
    description: Credit spread data (CDS or synthetic spreads).
    schema_hash: null
  required_config_fields:
  - data_root
  - train_start
  - train_end
  - test_start
  - test_end
  - output_dir
  command_template:
  - .venv/bin/python
  - scripts/evaluate_cb_arb_new_valuation.py
  - --data-root
  - '{data_root}'
  - --train-start
  - '{train_start}'
  - --train-end
  - '{train_end}'
  - --test-start
  - '{test_start}'
  - --test-end
  - '{test_end}'
  - --output-dir
  - '{output_dir}'
  default_config:
    data_root: data/cb_arb_concurrent_supervised_20260511_094500
    train_start: '20190101'
    train_end: '20241231'
    test_start: '20250101'
    test_end: '20260508'
    output_dir: output/new_valuation_test
  artifacts_produced:
  - summary.json
  - report.yaml
  - l4_ack.yaml
  - diagnostic.yaml
  budget_estimate:
    sig_minutes: 0
    spot_minutes: 120
    local_minutes: 0
    estimated_cost_yuan: 0.0
  vm_local_limits:
    vm_required: true
    local_allowed: false
  obsolescence_date: null
implementation_outline:
  script_path: scripts/evaluate_cb_arb_new_valuation.py
  main_inputs:
  - data_root
  - output_dir
  core_steps:
  - 'Load required data: cb_daily, cb_basic, stk_daily_qfq, credit_spreads.'
  - Compute refined theoretical values for each CB on each day using a convertible
    bond pricing model (e.g., Tsiveriotis‑Fernandes) with dynamic credit spread derived
    from available spreads, and volatility surfaces.
  - Compute new value_gap = market_price - theoretical_value.
  - Feed the new gap series into the existing baseline entry/exit logic (entry when
    gap > threshold, exit when gap shrinks) to simulate the strategy with identical
    parameters.
  - 'Calculate performance metrics: cumulative excess returns, max drawdown, Sharpe
    ratio for train and test periods.'
  - 'Write required artifacts: summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml.'
  code_constraints:
  - Use existing project data files; do not overwrite raw warehouse data.
  - Do not change current strategy truth; store results in output_dir.
  - Vectorise computations where possible to meet budget.
  - Define main() and declare_data_requirements(command, spec).
validation_plan:
- python3 -m py_compile scripts/evaluate_cb_arb_new_valuation.py
- Run a smoke test on a small date range (e.g., one month) to verify theoretical values
  and gap series are computed without errors.
- Confirm that summary.json, report.yaml, l4_ack.yaml, and diagnostic.yaml are produced
  in the output directory.
- Check that summary.json contains a valid adoption_pass boolean and that report.yaml
  contains metrics consistent with the test period.
