files:
- path: generated_executor/evaluate_cb_arb_new_valuation.py
  purpose: Complete evaluator implementation.
  content: "#!/usr/bin/env python3\n\"\"\"Evaluate refined CB theoretical value model\
    \ for value-gap switch strategy.\n\nComputes new theoretical values using a Tsiveriotis-Fernandes\
    \ decomposition:\n  theoretical = bond_floor + option_value\n\nEnhancements over\
    \ baseline:\n  - Dynamic credit spread: rating-based base + market-implied feedback\
    \ adjustment\n  - Historical volatility: 60-day rolling from forward-adjusted\
    \ stock prices\n  - Proper bond cash-flow discounting with dynamic spread\n\n\
    Then feeds the new value gaps into the baseline entry/exit logic\n(enter when\
    \ gap > 0, exit when gap <= 0) and compares against the\nexisting theoretical-value-based\
    \ gaps.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\nimport\
    \ json\nimport sys\nfrom pathlib import Path\nfrom typing import Any\n\nimport\
    \ numpy as np\nimport pandas as pd\nimport yaml\nfrom scipy.optimize import brentq\n\
    from scipy.stats import norm\n\n\ndef _find_repo_root(start: Path) -> Path:\n\
    \    for candidate in (start, *start.parents):\n        if (candidate / \"scripts\"\
    \ / \"gatekeeper.py\").exists():\n            return candidate\n    return start.parent\n\
    \n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\nif str(_REPO_ROOT)\
    \ not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\n# Risk-free rate\
    \ proxy (China 5Y government bond ~2.5%)\nRISK_FREE_RATE = 0.025\n\n\n# ── Rating\
    \ → base credit spread (bps) ──────────────────────────────────────\n_RATING_SPREAD_MAP:\
    \ dict[str, float] = {\n    \"AAA\": 0.0050,\n    \"AA+\": 0.0080,\n    \"AA\"\
    : 0.0100,\n    \"AA-\": 0.0130,\n    \"A+\": 0.0160,\n    \"A\": 0.0200,\n   \
    \ \"A-\": 0.0250,\n    \"BBB+\": 0.0320,\n    \"BBB\": 0.0400,\n    \"BBB-\":\
    \ 0.0500,\n    \"BB+\": 0.0650,\n    \"BB\": 0.0800,\n    \"BB-\": 0.1000,\n \
    \   \"B+\": 0.1200,\n    \"B\": 0.1500,\n    \"B-\": 0.1800,\n    \"CCC\": 0.2200,\n\
    \    \"CC\": 0.2800,\n    \"C\": 0.3500,\n}\n_DEFAULT_SPREAD = 0.0200  # fallback\
    \ for unknown ratings\n\n\ndef rating_to_spread(rating: Any) -> float:\n    \"\
    \"\"Map credit rating to base annual spread.\"\"\"\n    if not isinstance(rating,\
    \ str) or pd.isna(rating):\n        return _DEFAULT_SPREAD\n    r = str(rating).strip().upper()\n\
    \    return _RATING_SPREAD_MAP.get(r, _DEFAULT_SPREAD)\n\n\n# ── Black-Scholes\
    \ call price ───────────────────────────────────────────────\ndef bs_call_price(\n\
    \    S: float, K: float, T: float, r: float, sigma: float\n) -> float:\n    \"\
    \"\"Black-Scholes European call price.\"\"\"\n    if T <= 0 or sigma <= 0 or S\
    \ <= 0 or K <= 0:\n        return max(0.0, S - K)\n    d1 = (np.log(S / K) + (r\
    \ + 0.5 * sigma**2) * T) / (sigma * np.sqrt(T))\n    d2 = d1 - sigma * np.sqrt(T)\n\
    \    return float(S * norm.cdf(d1) - K * np.exp(-r * T) * norm.cdf(d2))\n\n\n\
    # ── Bond floor (PV of remaining cash flows) ────────────────────────────────\n\
    def bond_floor_pv(\n    par: float,\n    coupon_rate: float,\n    maturity_date:\
    \ pd.Timestamp,\n    trade_date: pd.Timestamp,\n    discount_rate: float,\n) ->\
    \ float:\n    \"\"\"Compute present value of bond cash flows.\n\n    Assumes annual\
    \ coupon payments and bullet principal at maturity.\n    \"\"\"\n    remaining_years\
    \ = max(0.0, (maturity_date - trade_date).days / 365.25)\n    if remaining_years\
    \ <= 0:\n        return par  # at/after maturity, bond floor = principal\n\n \
    \   annual_coupon = par * coupon_rate\n    pv = 0.0\n\n    # Coupon payments\n\
    \    t = 0.0\n    while t + 1.0 <= remaining_years + 1e-6:\n        t += 1.0\n\
    \        pv += annual_coupon / ((1 + discount_rate) ** t)\n\n    # Principal at\
    \ maturity\n    pv += par / ((1 + discount_rate) ** remaining_years)\n\n    return\
    \ pv\n\n\n# ── CB theoretical value (Tsiveriotis-Fernandes decomposition) ──────────────\n\
    def compute_cb_theoretical(\n    stock_price: float,\n    conv_price: float,\n\
    \    time_to_maturity: float,\n    risk_free: float,\n    credit_spread: float,\n\
    \    hist_vol: float,\n    par: float,\n    coupon_rate: float,\n    maturity_date:\
    \ pd.Timestamp,\n    trade_date: pd.Timestamp,\n) -> dict[str, float]:\n    \"\
    \"\"Compute theoretical CB value: bond_floor + option_value.\"\"\"\n    discount_rate\
    \ = risk_free + credit_spread\n\n    bf = bond_floor_pv(par, coupon_rate, maturity_date,\
    \ trade_date, discount_rate)\n\n    # Conversion ratio: par / conv_price\n   \
    \ conversion_ratio = par / conv_price if conv_price > 0 else 0.0\n    strike =\
    \ conv_price\n\n    # Option value = conversion_ratio * BS_call(stock_price, strike,\
    \ T, r, sigma)\n    opt_val = conversion_ratio * bs_call_price(\n        stock_price,\
    \ strike, time_to_maturity, risk_free, hist_vol\n    )\n\n    theoretical = bf\
    \ + opt_val\n\n    return {\n        \"bond_floor\": round(bf, 6),\n        \"\
    option_value\": round(opt_val, 6),\n        \"theoretical\": round(theoretical,\
    \ 6),\n        \"credit_spread_used\": round(credit_spread, 6),\n        \"hist_vol_used\"\
    : round(hist_vol, 6),\n    }\n\n\n# ── Historical volatility computation ──────────────────────────────────────\n\
    def compute_rolling_volatility(\n    stk_df: pd.DataFrame, lookback: int = 60,\
    \ min_periods: int = 20\n) -> pd.DataFrame:\n    \"\"\"Compute rolling annualised\
    \ historical volatility from stock prices.\n\n    Uses log returns, annualised\
    \ by sqrt(252).\n    Returns DataFrame with columns [ts_code, trade_date, hist_vol].\n\
    \    \"\"\"\n    stk = stk_df.copy()\n    stk[\"trade_date\"] = pd.to_datetime(stk[\"\
    trade_date\"])\n    stk = stk.sort_values([\"ts_code\", \"trade_date\"])\n\n \
    \   stk[\"log_ret\"] = stk.groupby(\"ts_code\")[\"close\"].transform(\n      \
    \  lambda s: np.log(s / s.shift(1))\n    )\n\n    stk[\"hist_vol\"] = (\n    \
    \    stk.groupby(\"ts_code\")[\"log_ret\"]\n        .transform(lambda s: s.rolling(lookback,\
    \ min_periods=min_periods).std())\n        * np.sqrt(252)\n    )\n\n    result\
    \ = stk[[\"ts_code\", \"trade_date\", \"hist_vol\"]].copy()\n    result[\"hist_vol\"\
    ] = result[\"hist_vol\"].fillna(0.25)  # fallback vol ~25%\n    return result\n\
    \n\n# ── Implied credit spread calibration ──────────────────────────────────────\n\
    def calibrate_credit_spread(\n    market_price: float,\n    stock_price: float,\n\
    \    conv_price: float,\n    time_to_maturity: float,\n    risk_free: float,\n\
    \    hist_vol: float,\n    par: float,\n    coupon_rate: float,\n    maturity_date:\
    \ pd.Timestamp,\n    trade_date: pd.Timestamp,\n    base_spread: float,\n) ->\
    \ float:\n    \"\"\"Calibrate credit spread so that theoretical_value ≈ market_price.\n\
    \n    Uses Brent's method to solve for spread. Falls back to base_spread\n   \
    \ on failure.\n    \"\"\"\n    conversion_ratio = par / conv_price if conv_price\
    \ > 0 else 0.0\n\n    def residual(spread: float) -> float:\n        disc = risk_free\
    \ + spread\n        bf = bond_floor_pv(par, coupon_rate, maturity_date, trade_date,\
    \ disc)\n        opt = conversion_ratio * bs_call_price(\n            stock_price,\
    \ conv_price, time_to_maturity, risk_free, hist_vol\n        )\n        tv = bf\
    \ + opt\n        return tv - market_price\n\n    # Try to bracket the root\n \
    \   lo, hi = 0.001, 0.50  # 10bp to 50%\n    try:\n        flo = residual(lo)\n\
    \        fhi = residual(hi)\n        if flo * fhi > 0:\n            # Can't bracket;\
    \ return weighted blend\n            # If theoretical at base_spread is already\
    \ close, use base_spread\n            tv_base = residual(base_spread) + market_price\n\
    \            diff_pct = abs(tv_base - market_price) / max(market_price, 1.0)\n\
    \            if diff_pct < 0.20:  # within 20%, reasonable\n                return\
    \ base_spread\n            # Otherwise use a simple adjustment\n            direction\
    \ = 1.0 if residual(base_spread) > 0 else -1.0\n            return base_spread\
    \ * (1.0 + direction * 0.3)\n        implied = brentq(residual, lo, hi, xtol=1e-6,\
    \ maxiter=50)\n        return float(implied)\n    except (ValueError, RuntimeError):\n\
    \        return base_spread\n\n\n# ── Main refined valuation engine ──────────────────────────────────────────\n\
    def compute_refined_value_gaps(\n    cb_daily: pd.DataFrame,\n    cb_basic: pd.DataFrame,\n\
    \    stk_daily: pd.DataFrame,\n    hist_vol_df: pd.DataFrame,\n) -> pd.DataFrame:\n\
    \    \"\"\"Compute refined theoretical values and value gaps for all CBs on all\
    \ days.\n\n    Returns DataFrame with columns:\n      trade_date, ts_code, close,\
    \ refined_theoretical, refined_bond_floor,\n      refined_option_value, refined_gap,\
    \ base_spread, calibrated_spread, hist_vol\n    \"\"\"\n    # Prepare basic info\
    \ keyed by ts_code\n    basic_map: dict[str, dict[str, Any]] = {}\n    for _,\
    \ row in cb_basic.iterrows():\n        ts = str(row[\"ts_code\"])\n        basic_map[ts]\
    \ = {\n            \"stk_code\": str(row.get(\"stk_code\", \"\")),\n         \
    \   \"conv_price\": float(row.get(\"conv_price\", 100.0)),\n            \"maturity_date\"\
    : pd.Timestamp(str(row.get(\"maturity_date\", \"20991231\"))),\n            \"\
    rating\": row.get(\"rating\", \"\"),\n            \"coupon_rate\": float(row.get(\"\
    coupon_rate\", 0.02)),\n            \"par_value\": float(row.get(\"par_value\"\
    , 100.0)),\n        }\n\n    # Prepare daily data\n    cb_daily = cb_daily.copy()\n\
    \    cb_daily[\"trade_date\"] = pd.to_datetime(cb_daily[\"trade_date\"])\n\n \
    \   # Merge stock close price onto cb_daily via stk_code → stk_daily\n    stk_map:\
    \ dict[tuple[str, pd.Timestamp], float] = {}\n    stk_daily_copy = stk_daily.copy()\n\
    \    stk_daily_copy[\"trade_date\"] = pd.to_datetime(stk_daily_copy[\"trade_date\"\
    ])\n    for _, row in stk_daily_copy.iterrows():\n        key = (str(row[\"stk_code\"\
    ]), row[\"trade_date\"])\n        stk_map[key] = float(row[\"close\"])\n\n   \
    \ # Merge hist_vol onto cb_daily via stk_code\n    vol_map: dict[tuple[str, pd.Timestamp],\
    \ float] = {}\n    for _, row in hist_vol_df.iterrows():\n        key = (str(row[\"\
    ts_code\"]), row[\"trade_date\"])\n        vol_map[key] = float(row[\"hist_vol\"\
    ])\n\n    results: list[dict[str, Any]] = []\n    unique_codes = cb_daily[\"ts_code\"\
    ].unique()\n\n    for ts_code in unique_codes:\n        if ts_code not in basic_map:\n\
    \            continue\n        info = basic_map[ts_code]\n        stk_code = info[\"\
    stk_code\"]\n        conv_price = info[\"conv_price\"]\n        maturity_date\
    \ = info[\"maturity_date\"]\n        rating = info[\"rating\"]\n        coupon_rate\
    \ = info[\"coupon_rate\"]\n        par_value = info[\"par_value\"]\n\n       \
    \ base_spread = rating_to_spread(rating)\n\n        cb_sub = cb_daily[cb_daily[\"\
    ts_code\"] == ts_code].sort_values(\"trade_date\")\n\n        # Track rolling\
    \ calibrated spread\n        prev_calibrated_spread: float | None = None\n\n \
    \       for _, row in cb_sub.iterrows():\n            trade_date = row[\"trade_date\"\
    ]\n            market_close = float(row[\"close\"])\n\n            # Time to maturity\n\
    \            ttm = max(0.0, (maturity_date - trade_date).days / 365.25)\n\n  \
    \          # Stock price and vol\n            stock_price = stk_map.get((stk_code,\
    \ trade_date), np.nan)\n            hist_vol = vol_map.get((stk_code, trade_date),\
    \ 0.25)\n\n            if ttm <= 0 or pd.isna(stock_price) or stock_price <= 0:\n\
    \                # CB matured or missing stock data → bond floor only\n      \
    \          disc = RISK_FREE_RATE + base_spread\n                bf = bond_floor_pv(\n\
    \                    par_value, coupon_rate, maturity_date, trade_date, disc\n\
    \                )\n                results.append({\n                    \"trade_date\"\
    : trade_date,\n                    \"ts_code\": ts_code,\n                   \
    \ \"close\": market_close,\n                    \"refined_theoretical\": round(bf,\
    \ 6),\n                    \"refined_bond_floor\": round(bf, 6),\n           \
    \         \"refined_option_value\": 0.0,\n                    \"refined_gap\"\
    : round(market_close - bf, 6),\n                    \"base_spread\": round(base_spread,\
    \ 6),\n                    \"calibrated_spread\": round(base_spread, 6),\n   \
