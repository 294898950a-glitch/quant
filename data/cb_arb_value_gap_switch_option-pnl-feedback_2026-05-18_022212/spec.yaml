- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: option_pnl_feedback_loss_threshold
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: 已确认无效方向 rolling_option_source_pnl_feedback 的全部19变体均以 trigger_avg_pnl_pct=0
    运行，即"任何净亏损即触发"；本提案核心维度是损失门槛从零变为非零（如 -0.03 至 -0.10），该参数区间在整个历史参数空间内从未被探索；机制性质从"噪声敏感反馈"变为"信号门控反馈"，不属于任何
    forbidden_families（非禁买、非整体期权折价、非入场门控）。
  risk: "主要风险有三点： (1) 若2020崩盘期间期权交易的每笔平均亏损幅度未达到所设门槛（例如每笔实际仅亏1%-3%），则机制在2020期间仍不触发，2020修复依然失败；\
    \ (2) option_source_pnl_feedback_trigger_avg_pnl_pct 在脚本\n    scripts/evaluate_cb_arb_option_pnl_feedback.py\
    \ 中是否实现为真实条件逻辑\n    （即 if avg_pnl_pct < trigger_threshold 时才缩减）需在发送 spec 前验证，\n\
    \    若脚本将0作为硬编码阈值而忽略传入参数，则本轮结果与上一轮无差异；\n(3) 框架可能将本轮判定为已确认无效方向 rolling_option_source_pnl_feedback\n\
    \    的变体，存在 sanity_checker 拦截风险，需在 spec 中明确说明本轮测试的是\n    未被覆盖的门槛维度。"
  fallback_reason: null
