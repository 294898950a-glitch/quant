proposal_id: cb_arb_value_gap_switch_reverse-moneyness-filter_v1
strategy_id: cb_arb_value_gap_switch
family: moneyness_entry_filter_reverse
hypothesis: 'The moneyness entry filter (stock_close / conv_price >= threshold) failed
  5 consecutive forward-direction runs not because the filter logic is invalid, but
  because it was applied to an anti-informative value_gap_amount DESCENDING ranking.
  The reverse-rank probe (2026-05-24) proved the sort direction, not the signal values,
  is the root cause: same universe, same gates, ASCENDING sort produces +30.3% test
  excess cost-on vs -10.5% forward. Applying moneyness filtering to the ASCENDING-sorted
  candidate set should preserve real-mispricing trades while screening out deep-OTM
  noise, delivering a compound improvement over either the bare reverse sort or the
  forward moneyness filter alone.

  '
source_insight: value_gap_rank_is_anti_alpha_2026_05_24
expected_improvement: 'Reverse-sort test excess (+30.3% cost-on) already outperforms
  forward baseline (-10.5% cost-on) by 41pp. Adding moneyness filtering to the ASCENDING-sorted
  candidate set should:

  - Maintain or improve the +30.3% test excess by removing deep-OTM positions where
  value-gap signal is most likely model noise

  - Reduce max drawdown below the reverse probe''s -11.3% test drawdown by avoiding
  illiquid deep-OTM CBs

  - Increase win rate above the reverse probe''s 58.6% test win rate

  '
