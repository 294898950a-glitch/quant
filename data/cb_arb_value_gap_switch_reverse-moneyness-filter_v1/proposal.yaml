test_design:
  description: '1. Load daily_value_gap_amounts and filter value_gap_amount > 0 (unchanged
    gate)

    2. Sort candidates ASCENDING by value_gap_amount (reverse direction, per anti-alpha
    evidence)

    3. Apply moneyness filter: stock_close / conv_price >= threshold, grid-search
    threshold from [0.5, 0.7, 0.85, 0.95, 1.0]

    4. Use accepted duration-adaptive exit parameters (min_hold_days=5, initial_threshold_fraction=0.7,
    decay_period_factor=0.5, effective_max_hold_days=45)

    5. Standard cost model: slippage 0.15%, market impact coeff 0.001, cap 2%

    6. Standard train/test split

    7. Primary comparison: reverse+moneyness vs bare reverse probe cost-on

    8. Secondary comparison: reverse+moneyness vs forward+moneyness to quantify sort-direction
    contribution

    '
success_criteria:
  criteria:
  - test_excess_return_cost_on > 0.15
  - test_max_drawdown <= 0.15
  - test_sharpe > 0.5
  - win_rate > 0.55
falsifiers:
  train: &id001
  - test_excess_return_cost_on <= 0.10
  - test_max_drawdown > 0.20
  - any_threshold_test_excess < bare_reverse_test_excess
  validate: *id001
  test: *id001
risk: 'The moneyness filter may remove too many candidates, reducing trade count and
  increasing variance. If the reverse-sort signal is concentrated in deep-OTM CBs
  (precisely what gets filtered), the filter could destroy the alpha rather than refine
  it. The reverse probe''s test trade count of 377 is already modest; cutting further
  could produce unreliable results.

  '
why_not_repeated_failure: 'moneyness_stock_to_conv_threshold family: 5 consecutive
  failed_mechanical_thresholds rejections. Three-question analysis per repeated_reject_families
  rule:

  (1) Is the underlying signal invalid? The value_gap_amount ranking is anti-informative
  under DESCENDING sort, proven by reverse-rank probe. The signal values themselves
  are not proven invalid — when sorted ASCENDING, same signal produces +30.3% test
  excess cost-on.

  (2) Is the direction reversed? YES. Reverse-rank probe evidence: forward-sort test
  excess = -10.5% cost-on, reverse-sort test excess = +30.3% cost-on. 41pp swing from
  sort direction alone.

  (3) Is only the execution condition wrong? No. Execution conditions (entry/exit
  gates, hold durations, cost model) were identical between forward and reverse probes.
  The differentiator is sort direction. Therefore the moneyness filter''s rejection
  is a consequence of the anti-alpha ranking it was applied to, not an indictment
  of the filter logic itself.

  This is not a blind re-run of a rejected family. It tests whether the moneyness
  filter works when applied to the correct (ASCENDING) sort direction.

  '
