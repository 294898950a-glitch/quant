interpretation:
  review_status_code: 2
  result_summary: IV-percentile exit shows directional test improvement (+26.9M excess)
    but train excess is negative (-22M) and all candidates remain deeply unprofitable
    — the exit overlay does not rescue the broken entry signal.
  main_reason: Train-period excess return is negative, violating the hard floor requiring
    cumulative excess improvement over the full backtest.
  failure_causes:
  - Train excess return is -22.0M while test excess is +26.9M — improvement is holdout-specific,
    not generalizable, indicating overfitting or regime shift.
  - All candidates including best_candidate (IV=95) remain deeply unprofitable with
    total PnL of -233M test and -894M train, meaning the underlying value-gap entry
    signal is broken and an exit overlay cannot compensate.
  - Best win_rate is 23.7% in test and drops as IV threshold rises, confirming the
    signal is selecting bonds where gaps tend to widen rather than close.
  next_research_directions:
  - direction: Fix underlying value-gap entry logic before further exit experiments
    why: Both baseline (-260M test, -872M train) and experiment (-233M test, -894M
      train) lose hundreds of millions; exit timing cannot salvage a fundamentally
      broken entry signal.
    priority_code: 1
    priority: high
  - direction: Investigate why gap-based selection yields negative edge
    why: Win rates of 24-35% with avg_loss magnitude exceeding avg_win magnitude across
      all candidates suggest the gap metric systematically selects deteriorating rather
      than mean-reverting situations.
    priority_code: 1
    priority: high
  - direction: Test IV as an entry filter instead of exit trigger
    why: If high IV inflates value gaps, filtering out high-IV bonds at entry might
      be more effective than exiting them post-entry; the IV signal is orthogonal
      and worth repurposing.
    priority_code: 2
    priority: medium
  evidence_gaps:
  - Sharpe ratios not provided for any holdout year, so hard floor requiring at least
    one holdout Sharpe >= 0.5 cannot be verified.
  - Per-year drawdown decomposition not available, preventing assessment of the 15%
    single-year drawdown hard floor.
  - No analysis of force-closed vs gap-closed vs IV-exited trade outcomes to understand
    which exit channel drove the losses.
  - No breakdown of PnL attribution between the value-gap alpha decay and the IV exit
    timing effect.
  review_status: reject
