hypothesis: 'When a held CB''s implied volatility is elevated (high percentile relative
  to its own 252-day rolling history), the observed value gap is more likely driven
  by volatility premium than genuine mispricing. Exiting positions when IV crosses
  above a high percentile threshold (e.g., 90th) should improve realized returns by
  cutting exposure during volatility-inflated gap periods, while keeping the baseline
  entry logic untouched.

  '
source_insight: 'Recent exit experiments show mixed results: dynamic exit and dynamic
  trail were unusable (no_adoption_decision_unusable), profit-taking exit failed adoption,
  but duration-based exits (duration-exit, duration-adaptive-exit) both passed adoption
  with adoption_pass=True. This suggests exit improvements can work, but the signal
  matters. None of the prior exit experiments used market-implied volatility as the
  exit trigger — they all operated on gap dynamics or time alone. IV provides an orthogonal
  signal: it captures whether the gap is real mispricing (low IV) or inflated by fear/uncertainty
  (high IV). The IV-regime exit executor (cb_arb_iv_percentile_exit_executor) is registered
  but has never been run.

  '
