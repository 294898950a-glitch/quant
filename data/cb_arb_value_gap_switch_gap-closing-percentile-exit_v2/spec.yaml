hypothesis: 'The duration-adaptive exit uses a fixed linear decay schedule that ignores
  the empirical reality of how gaps actually close. Different initial gap magnitudes
  have different characteristic closing-time distributions. By conditioning the exit
  on the historical percentile of days-to-close for gaps of similar initial magnitude,
  we get a data-driven, non-parametric exit that adapts to each position''s specific
  gap profile. Positions held longer than the typical close time for their gap size
  are exited, while fast-closing positions are allowed to run. This should improve
  risk-adjusted returns versus the fixed decay schedule by reducing both premature
  exits and stale holdings that linger past their empirical close window.

  '
source_insight: 'The duration-adaptive exit (accepted 2026-05-22) demonstrated that
  time-conditioned exits improve on fixed-threshold exits. However, its linear decay
  schedule is a parametric assumption. The forward base remains at -10.47% cumulative
  excess cost-on even with that accepted exit. A non-parametric exit conditioned on
  the empirical distribution of gap-closing times may better match the data-generating
  process than a linear decay assumption. Active critical insights list is empty;
  no decision_use obligations apply.

  '
