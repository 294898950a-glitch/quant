    description: 'Train 2018-2022, test 2023-2026. Forward direction: value_gap_amount
      > 0, sort DESCENDING (largest gap first), select top N by baseline ranking.
      For each entry, record initial gap magnitude and bin into deciles using train-period
      gap distribution. Compute empirical CDF of days-to-gap-close for each gap decile
      from train-period data (gap close defined as current_gap / entry_gap < 0.5 or
      gap turns negative). Exit when holding days exceeds the P-th percentile of the
      historical close-time distribution for that gap decile. Grid search over percentile
      P in [50, 60, 70, 80, 90] and min_hold_days in [5, 10, 20]. Cost-on: slippage
      0.0015, market impact 0.001. Compare best result against the current baseline
      (cb_arb-value-gap-switch-medium-signal-cost-on-20260516).

