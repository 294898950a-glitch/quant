    variant (all reverse families are closed by value_gap_rank_is_anti_alpha_2026_05_24).
    It changes only exit logic — all candidates passing value_gap > 0 still enter.
    The exit is non-parametric (empirical CDF binned by gap magnitude) rather than
    parametric (linear decay schedule), making it a genuinely different approach from
    the accepted duration-adaptive exit. For the repeated-reject moneyness family
    (moneyness_stock_to_conv_threshold): this proposal does not touch entry filtering
