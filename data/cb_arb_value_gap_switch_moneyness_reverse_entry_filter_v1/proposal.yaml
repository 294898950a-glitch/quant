proposal_id: cb_arb_value_gap_switch_moneyness_reverse_entry_filter_v1
strategy_id: cb_arb_value_gap_switch
family: moneyness_stock_to_conv_threshold
hypothesis: 'The moneyness entry filter (stock_close / conv_price >= threshold) failed
  5 times in forward direction not because the filter logic is invalid, but because
  it was applied to an anti-alpha base. The underlying signal (OTM CBs have noisier
  theoretical values) is sound in principle. The direction is the key issue: the forward
  base sorts value_gap_amount descending, which the reverse-probe proved is anti-alpha.
  Applied to the reverse-sorted base (ascending value_gap_amount, +30.3% test excess
  cost-on), filtering to near-the-money CBs should improve signal quality by screening
  out deep-OTM CBs whose option values are dominated by time premium and IV assumptions,
  reducing noise trades and improving risk-adjusted excess returns. The execution
  condition (threshold grid, exit logic) is also adjusted to match the reverse-probe
  exit framework rather than the forward baseline exit.

  '
source_insight: value_gap_rank_is_anti_alpha_2026_05_24
expected_improvement: 'Reduce noise trades from deep-OTM CBs whose theoretical value
  gaps are unreliable, improving reverse-direction cumulative excess return above
  the current +30.3% test excess cost-on baseline, while maintaining or reducing max
  drawdown.

  '
