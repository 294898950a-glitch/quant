test_design:
  description: 'Sort ascending by value_gap_amount (reverse direction, least-positive
    gaps first). Apply entry mask: stock_close / conv_price >= moneyness_threshold.
    Grid search moneyness_threshold over [0.3, 0.5, 0.7, 0.9, 1.0, 1.1, 1.3] and exit
    parameters (max_hold_days, min_gap_pct, sell_gap_pct, switch_hurdle_pct) matching
    the reverse-probe exit framework. Run cost-on with standard slippage (0.0015)
    and market impact (0.001). Train/validation/test split matching the existing reverse-probe
    setup.

    '
success_criteria:
  criteria:
  - cumulative_excess_compound_test_gt: 0.3
  - max_drawdown_test_lte: 0.15
  - train_test_excess_drop_lt_50pct: true
falsifiers:
  train: &id001
  - any moneyness threshold produces test excess below the unfiltered reverse baseline
    (+0.303)
  - all thresholds reduce trade count below 100 in test period
  - train-to-test excess drop exceeds 50%
  validate: *id001
  test: *id001
risk: 'Medium. The moneyness filter could over-restrict candidates and reduce trade
  count below viable levels, especially since the reverse base already selects from
  a narrower set of small-positive-gap CBs. If the filter eliminates too many candidates,
  the strategy may lose statistical significance.

  '
why_not_repeated_failure: 'The 5 prior moneyness entry filter runs (v1, v1_1, v1_3,
  v1_4, v1_5) all failed mechanical thresholds on the forward-direction base where
  value_gap_amount is sorted descending. The critical insight value_gap_rank_is_anti_alpha_2026_05_24
  proved that the forward direction loses regardless of entry filters — the forward
  base produces -10.5% test excess cost-on vs reverse''s +30.3%. This proposal switches
  the sort direction to ascending (reverse). It is not a renamed repeat of the same
  experiment because the underlying entry signal direction is inverted. We are testing
  whether moneyness filtering was rejected because the forward base was anti-alpha,
  not because the filter itself is useless. The bond-floor reverse probe already demonstrated
  this pattern is viable: a filter that failed forward can work in reverse.

  '
