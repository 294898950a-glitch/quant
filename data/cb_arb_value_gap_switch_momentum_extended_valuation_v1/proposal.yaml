  - theoretical_value
test_design:
  description: 'Extend new_valuation_v1''s credit-adjusted theoretical value by applying
    a multiplicative momentum penalty: theoretical_value_momentum = credit_adjusted_TV
    × (1 - momentum_penalty_weight × max(0, -stock_momentum_zscore)).  The momentum_zscore
    is computed from the stock''s 60d cumulative return relative to the cross-sectional
    distribution on each day.  Grid search over momentum_penalty_weight in {0.1, 0.2,
    0.3, 0.5} and momentum_lookback_days in {20, 40, 60}.  Backtest uses reverse-probe
    exit logic (max_hold_days ∈ {120, 150, 180}, min_gap_pct ∈ {0.005, 0.01}, sell_gap_pct=0.0,
    switch_hurdle_pct ∈ {0.0, 0.01}) with cost-on evaluation (slippage=0.0015, market_impact=0.001).  Train
    2018-2022, test 2023-2026.  Compare best candidate against both new_valuation_v1
    (baseline for formula improvement) and duration-adaptive-exit (baseline for exit
    quality).

    '
success_criteria:
  criteria:
  - test_cumulative_excess_compound_gt: 0.0
  - test_sharpe_gt: 0.0
  - test_max_drawdown_gt: -50.0
  - test_win_rate_gt: 0.5
falsifiers:
  train: &id001
  - test_sharpe_lte: -0.05
  - test_max_drawdown_lte: -100.0
  - momentum penalty reduces trade count below 100 in test period
  - best candidate test_sharpe not statistically distinguishable from new_valuation_v1
    test_sharpe (-0.0128) at p < 0.10
  - momentum_penalty_weight best value is 0.0 (degenerate — momentum adds nothing
    beyond credit adjustment)
  validate: *id001
  test: *id001
risk: 'Medium.  The new_valuation_v1 partial success provides strong mechanistic evidence
  that formula-side changes work where all overlays failed.  But the path from -0.0128
  sharpe to positive sharpe may require more than momentum alone — liquidity terms
  or bid-ask spread adjustments may also be needed. Two risks: (1) momentum and credit
  distress are correlated enough that momentum adds no incremental discrimination
  over credit alone; (2) the remaining losers after credit adjustment are driven by
  factors momentum doesn''t capture (e.g. forced selling by institutions, regulatory
  events).

  '
why_not_repeated_failure: 'This is NOT a repeated failure.  The active critical insight
  asymmetric_payoff_mechanism_2026_05_27 explicitly identifies that all overlay attempts
  (entry filters, exit rules, position scaling) uniformly fail because they do not
  change the underlying 64/36 asymmetric payoff distribution — they only select subsets
  or adjust timing within the same distribution.  new_valuation_v1 is the ONLY direction
  that materially changed the payoff (max_drawdown -250M → -12), proving formula-side
  intervention works.  This proposal extends that proven direction with the one missing
  ingredient identified by the insight: momentum.  It does not repeat any closed family
  (reverse variants are closed, single-attribute entry filters are forbidden).  It
  is not a renamed bond-floor or moneyness filter.  It is a direct follow-up to the
  only partial-success result in the entire run history.

  '
