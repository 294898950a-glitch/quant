implementation_assumption: The existing evaluate_cb_arb_valuation_formula executor
  does not implement momentum penalties.  A new executor is required that (1) computes
  credit-adjusted theoretical value using new_valuation_v1's logic, (2) computes daily
  stock momentum z-score from stk_daily_qfq close prices, (3) applies the multiplicative
  momentum penalty to produce a revised value_gap_amount, (4) feeds the revised gaps
  through the standard backtester with duration-adaptive exit stacked.  This will
  be a DRAFT proposal; the compiler must generate the executor code.  The mandatory
  parallelization pattern from the critical insight (ThreadPoolExecutor, os.cpu_count()-1
  workers) must be applied to the grid search loop.  The GateKeeper import and sys.path
  boilerplate are required per AGENTS.md compliance rules.
