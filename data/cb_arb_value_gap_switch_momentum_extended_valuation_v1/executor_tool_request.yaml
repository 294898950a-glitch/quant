implementation_outline:
  script_path: scripts/evaluate_cb_arb_valuation_formula_momentum.py
  main_inputs:
  - data_root
  - train_start
  - train_end
  - test_start
  - test_end
  - output_dir
  - momentum_penalty_weight
  - momentum_lookback_days
  - max_hold_days
  - min_gap_pct
  - sell_gap_pct
  - switch_hurdle_pct
  core_steps:
  - load cb_daily, cb_basic, stk_daily_qfq, and daily_value_gap_amounts from warehouse
    paths
  - compute credit-adjusted theoretical value per CB per day using new_valuation_v1
    logic (time-varying credit spreads, OAS, implied volatility)
  - for each CB-day, compute stock momentum z-score: stock 60d cumulative return relative
      to cross-sectional distribution on each date, using momentum_lookback_days
  - compute revised theoretical value: TV_momentum = credit_adjusted_TV * (1 - momentum_penalty_weight
      * max(0, -stock_momentum_zscore))
  - compute revised value_gap_amount = TV_momentum - market_close
  - apply value_gap_amount > 0 filter, sort descending by revised gap, select top
    N by rank
  - run backtest with reverse-probe exit logic (max_hold_days, min_gap_pct, sell_gap_pct,
    switch_hurdle_pct) and duration-adaptive exit stacked
  - apply cost-on evaluation (slippage=0.0015, market_impact=0.001)
  - perform grid search over momentum_penalty_weight in [0.1, 0.2, 0.3, 0.5] and momentum_lookback_days
    in [20, 40, 60]
  - for each (weight, lookback) combination, run train on 2018-2022, test on 2023-2026
  - select best candidate by train cumulative excess
  - compare best test result against new_valuation_v1 baseline and duration-adaptive-exit
    baseline
  - write summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml
  code_constraints:
  - use existing project data files from data/cb_warehouse/ and data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/
  - import GateKeeper from scripts.gatekeeper
  - prepend REPO_ROOT to sys.path before any project imports
  - define main() and declare_data_requirements(command, spec)
  - use ThreadPoolExecutor with os.cpu_count()-1 workers for parallel grid search
  - do not overwrite raw warehouse files
  - do not change current strategy truth
  - do not write placeholder, TODO, or pseudocode implementations
