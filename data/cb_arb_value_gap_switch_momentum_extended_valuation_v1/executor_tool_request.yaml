tool_request_id: evaluate_cb_arb_valuation_formula_momentum_v1
why_existing_tools_insufficient: 'Two existing executors match capability C006 (new_valuation_formula):
  evaluate_cb_arb_valuation_formula and evaluate_cb_arb_new_valuation. Both compute
  a credit-adjusted theoretical value using time-varying credit spreads and implied
  volatility. Neither implements momentum penalties on the underlying stock. The proposal
  explicitly requires: (1) credit-adjusted theoretical value using new_valuation_v1
  logic, (2) daily stock momentum z-score from stk_daily_qfq close prices over configurable
  lookback windows, (3) a multiplicative momentum penalty applied to the credit-adjusted
  TV, (4) grid search across momentum_penalty_weight and momentum_lookback_days, (5)
  duration-adaptive exit stacked on top of the revised value gaps. No existing C006
  executor computes momentum z-scores, applies penalty weights, or performs the combined
  grid search. A new executor is required.'
reviewed_existing_executor_ids:
- evaluate_cb_arb_valuation_formula
- evaluate_cb_arb_new_valuation
