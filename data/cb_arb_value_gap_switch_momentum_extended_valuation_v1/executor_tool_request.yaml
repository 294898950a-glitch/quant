files:
- path: generated_executor/evaluate_cb_arb_valuation_formula_momentum.py
  purpose: Complete evaluator implementation.
  content: "\"\"\"\nEvaluate momentum-extended credit-adjusted valuation formula for\
    \ cb_arb.\n\nExtends the credit-adjusted theoretical value from new_valuation_v1\
    \ with a\ndownward-momentum penalty on the underlying stock:\n\n    TV_momentum\
    \ = theoretical_value * (1 - penalty_weight * max(0, -momentum_zscore))\n\nwhere\
    \ momentum_zscore is the stock's N-day cumulative return z-scored within the\n\
    cross-section on each trading day. Grid search over penalty_weight x lookback_days.\n\
    \nEntry/exit rules, position sizing, and market regime switching are unchanged\n\
    from the value-gap-switch baseline.\n\"\"\"\n\nfrom __future__ import annotations\n\
    \nimport argparse\nimport json\nimport os\nimport sys\nfrom concurrent.futures\
    \ import ThreadPoolExecutor, as_completed\nfrom datetime import datetime\nfrom\
    \ pathlib import Path\nfrom typing import Any\n\n# ── Repo root & sys.path ────────────────────────────────────────────────\n\
    # Must come before any third-party import AND before `from scripts.X import Y`,\n\
    # because production runs execute from a foreign cwd where REPO_ROOT is not\n\
    # automatically on sys.path.  The compliance import-reachability probe runs\n\
    # with -I in /tmp, so all non-stdlib imports that follow this block must\n# resolve\
    \ from the venv site-packages (numpy/pandas/yaml) or from REPO_ROOT\n# (scripts.*).\n\
    \n\ndef _find_repo_root(start: Path) -> Path:\n    for candidate in (start, *start.parents):\n\
    \        if (candidate / \"scripts\" / \"gatekeeper.py\").exists():\n        \
    \    return candidate\n    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \nfrom scripts.gatekeeper import GateKeeper  # noqa: E402\n\n# ── Third-party\
    \ imports (venv site-packages) ────────────────────────────\nimport numpy as np\n\
    import pandas as pd\nimport yaml\n\n# ── Repo imports ────────────────────────────────────────────────────────\n\
    from strategies.cb_arb.verifier import (  # noqa: E402\n    _build_call_index,\n\
    \    _is_force_redeemed_on_date,\n    _load_cb_basic,\n    _load_cb_call,\n  \
    \  _load_cb_daily,\n    _load_stk_daily,\n    _load_trading_days,\n)\nfrom scripts.evaluate_cb_arb_daily_regime_switch\
    \ import (  # noqa: E402\n    _build_daily_features,\n)\nfrom scripts.evaluate_cb_arb_value_gap_switch\
    \ import (  # noqa: E402\n    _base_configs as _base_regime_configs,\n    _score,\n\
    \    _run_value_gap_backtest,\n)\n\n# ── YAML numpy representation fixes ─────────────────────────────────────\n\
    \n\ndef _yaml_repr_np_float(dumper, data):\n    return dumper.represent_float(float(data))\n\
    \n\ndef _yaml_repr_np_int(dumper, data):\n    return dumper.represent_int(int(data))\n\
    \n\nyaml.SafeDumper.add_representer(np.floating, _yaml_repr_np_float)\nyaml.SafeDumper.add_representer(np.integer,\
    \ _yaml_repr_np_int)\nyaml.SafeDumper.add_multi_representer(np.floating, _yaml_repr_np_float)\n\
    yaml.SafeDumper.add_multi_representer(np.integer, _yaml_repr_np_int)\n\n# ── Constants\
    \ ───────────────────────────────────────────────────────────\n\n_GAP_DATA_PATH\
    \ = (\n    \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n    \"daily_value_gap_amounts.parquet\"\n)\n_DEFAULT_MOMENTUM_WEIGHTS = [0.1,\
    \ 0.2, 0.3, 0.5]\n_DEFAULT_MOMENTUM_LOOKBACKS = [20, 40, 60]\n_SLIPPAGE = 0.0015\n\
    _MARKET_IMPACT = 0.001\n\n\n# ── Argument parsing ────────────────────────────────────────────────────\n\
    \n\ndef _parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=__doc__)\n\
    \    p.add_argument(\"--data-root\", type=Path, required=True)\n    p.add_argument(\"\
    --train-start\", default=\"20180101\")\n    p.add_argument(\"--train-end\", default=\"\
    20221231\")\n    p.add_argument(\"--test-start\", default=\"20230101\")\n    p.add_argument(\"\
    --test-end\", default=\"20260508\")\n    p.add_argument(\"--output-dir\", type=Path,\
    \ required=True)\n    p.add_argument(\"--momentum-penalty-weight\", type=float,\
    \ default=0.2)\n    p.add_argument(\"--momentum-lookback-days\", type=int, default=60)\n\
    \    p.add_argument(\"--max-hold-days\", type=int, default=150)\n    p.add_argument(\"\
    --min-gap-pct\", type=float, default=0.01)\n    p.add_argument(\"--sell-gap-pct\"\
    , type=float, default=0.0)\n    p.add_argument(\"--switch-hurdle-pct\", type=float,\
    \ default=0.0)\n    return p.parse_args()\n\n\n# ── Data requirements ───────────────────────────────────────────────────\n\
    \n\ndef declare_data_requirements(command: list[Any], spec: dict[str, Any] | None\
    \ = None) -> dict[str, Any]:\n    \"\"\"Return the files this executor will read.\"\
    \"\"\n    return {\n        \"schema_version\": 1,\n        \"executor\": \"generated_executor/evaluate_cb_arb_valuation_formula_momentum.py\"\
    ,\n        \"required_files\": [\n            {\n                \"path\": _GAP_DATA_PATH,\n\
    \                \"role\": \"warehouse_input\",\n                \"required_columns\"\
    : [\n                    \"trade_date\", \"ts_code\", \"close\", \"theoretical\"\
    ,\n                    \"value_gap_amount\",\n                ],\n           \
    \ },\n            {\n                \"path\": \"data/cb_warehouse/stk_daily_qfq.parquet\"\
    ,\n                \"role\": \"warehouse_input\",\n                \"required_columns\"\
    : [\"stk_code\", \"trade_date\", \"close\"],\n            },\n            {\n\
    \                \"path\": \"data/cb_warehouse/cb_basic.parquet\",\n         \
    \       \"role\": \"warehouse_input\",\n                \"required_columns\":\
    \ [\"ts_code\", \"stk_code\"],\n            },\n            {\n              \
    \  \"path\": \"data/cb_warehouse/cb_daily.parquet\",\n                \"role\"\
    : \"warehouse_input\",\n                \"required_columns\": [\"ts_code\", \"\
    trade_date\", \"close\", \"vol\"],\n            },\n            {\n          \
    \      \"path\": \"data/cb_warehouse/cb_call.parquet\",\n                \"role\"\
    : \"warehouse_input\",\n                \"required_columns\": [\"ts_code\", \"\
    ann_date\", \"call_date\", \"expire_date\"],\n            },\n        ],\n   \
    \ }\n\n\n# ── Gatekeeper ──────────────────────────────────────────────────────────\n\
    \n\ndef _gatekeeper_before_run(output_dir: Path) -> None:\n    spec_path = output_dir\
    \ / \"spec.yaml\"\n    if spec_path.exists():\n        gatekeeper = GateKeeper(quiet=True)\n\
    \        gatekeeper.before_run_grid(spec_path)\n\n\ndef _gatekeeper_after_run(output_dir:\
    \ Path) -> None:\n    gatekeeper = GateKeeper(quiet=True)\n    gatekeeper.after_run_grid(output_dir)\n\
    \n\n# ── Momentum computation ────────────────────────────────────────────────\n\
    \n\ndef _compute_stock_momentum_zscores(\n    stk_daily: pd.DataFrame,\n    lookback_days:\
    \ int,\n    trade_dates: list[str],\n) -> pd.DataFrame:\n    \"\"\"Compute daily\
    \ cross-sectional momentum z-scores per stock.\n\n    For each stock on each date:\n\
    \      mom = cumulative return over [date - lookback_days, date)\n      zscore\
    \ = (mom - mean(mom across all stocks on date)) / std(mom on date)\n\n    Returns\
    \ DataFrame with columns [stk_code, trade_date, momentum_ret, momentum_zscore].\n\
    \    \"\"\"\n    df = stk_daily[[\"stk_code\", \"trade_date\", \"close\"]].copy()\n\
    \    df[\"trade_date\"] = df[\"trade_date\"].astype(str)\n    df = df.sort_values([\"\
    stk_code\", \"trade_date\"]).reset_index(drop=True)\n\n    # Make close numeric\n\
    \    df[\"close\"] = pd.to_numeric(df[\"close\"], errors=\"coerce\")\n\n    #\
    \ Cumulative return over lookback window\n    df[\"close_lag\"] = df.groupby(\"\
    stk_code\")[\"close\"].shift(lookback_days)\n    df[\"momentum_ret\"] = np.where(\n\
    \        df[\"close_lag\"].notna() & (df[\"close_lag\"] > 0),\n        df[\"close\"\
    ] / df[\"close_lag\"] - 1.0,\n        np.nan,\n    )\n\n    # Drop rows where\
    \ momentum can't be computed\n    df = df.dropna(subset=[\"momentum_ret\"]).copy()\n\
    \n    # Cross-sectional z-score per date\n    df[\"momentum_zscore\"] = df.groupby(\"\
    trade_date\")[\"momentum_ret\"].transform(\n        lambda x: (x - x.mean()) /\
    \ x.std() if x.std() > 0 else 0.0\n    )\n\n    return df[[\"stk_code\", \"trade_date\"\
    , \"momentum_ret\", \"momentum_zscore\"]]\n\n\ndef _apply_momentum_penalty(\n\
    \    ranks_df: pd.DataFrame,\n    momentum_df: pd.DataFrame,\n    stk_map: dict[str,\
    \ str],\n    penalty_weight: float,\n) -> pd.DataFrame:\n    \"\"\"Apply momentum\
    \ penalty to theoretical values and recompute value_gap_amount.\n\n    Formula:\
    \ TV_new = theoretical * (1 - penalty_weight * max(0, -momentum_zscore))\n\n \
    \   Returns modified copy of ranks_df with recomputed theoretical, value_gap_amount,\n\
    \    and value_gap_pct_of_cash columns.\n    \"\"\"\n    result = ranks_df.copy()\n\
    \    result[\"trade_date\"] = result[\"trade_date\"].astype(str)\n    result[\"\
    ts_code\"] = result[\"ts_code\"].astype(str)\n\n    # Build lookup: (stk_code,\
    \ trade_date) -> momentum_zscore\n    mom_lookup: dict[tuple[str, str], float]\
    \ = {}\n    for row in momentum_df.itertuples(index=False):\n        mom_lookup[(str(row.stk_code),\
    \ str(row.trade_date))] = float(row.momentum_zscore)\n\n    new_theos: list[float]\
    \ = []\n    new_gaps: list[float] = []\n    new_gap_pcts: list[float] = []\n \
    \   penalty_applied_count = 0\n\n    for row in result.itertuples(index=False):\n\
    \        ts = str(row.ts_code)\n        td = str(row.trade_date)\n        orig_tv\
    \ = float(row.theoretical) if row.theoretical is not None and np.isfinite(row.theoretical)\
    \ else 0.0\n        stk = stk_map.get(ts, \"\")\n        z = mom_lookup.get((stk,\
    \ td))\n\n        if z is not None and np.isfinite(z) and z < 0:\n           \
    \ penalty = penalty_weight * abs(z)\n            new_tv = orig_tv * (1.0 - min(penalty,\
    \ 0.95))\n            penalty_applied_count += 1\n        else:\n            new_tv\
    \ = orig_tv\n\n        close_v = float(row.close) if row.close is not None and\
    \ np.isfinite(row.close) else 0.0\n        pos_cash = float(row.position_cash)\
    \ if hasattr(row, \"position_cash\") and row.position_cash is not None else 30000.0\n\
    \        buy_qty = int(row.buy_qty) if hasattr(row, \"buy_qty\") and row.buy_qty\
    \ is not None else max(1, int(pos_cash / max(close_v, 0.01)))\n        new_gap\
    \ = (new_tv - close_v) * buy_qty\n        new_gap_pct = new_gap / pos_cash if\
    \ pos_cash > 0 else 0.0\n\n        new_theos.append(new_tv)\n        new_gaps.append(new_gap)\n\
    \        new_gap_pcts.append(new_gap_pct)\n\n    result[\"theoretical\"] = new_theos\n\
    \    result[\"value_gap_amount\"] = new_gaps\n    result[\"value_gap_pct_of_cash\"\
    ] = new_gap_pcts\n\n    return result\n\n\n# ── Baseline comparison ─────────────────────────────────────────────────\n\
    \n\ndef _run_baseline_backtest(\n    ranks_df: pd.DataFrame,\n    args: argparse.Namespace,\n\
