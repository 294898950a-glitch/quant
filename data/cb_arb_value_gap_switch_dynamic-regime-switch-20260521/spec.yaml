proposal:
  proposal_id: cb_arb_value_gap_switch_dynamic-regime-switch-20260521
  strategy_id: cb_arb_value_gap_switch
  family: dynamic_regime_switch
  hypothesis: A market-regime switch that uses daily convertible-bond market stress
    indicators (derived from aggregate value-gap magnitude or gap volatility) to toggle
    between a fully invested aggressive mode and a cash/defensive mode will reduce
    tail drawdowns (especially the -17.9% max drawdown in the 2020 repair period)
    while preserving the current positive excess return profile on the sealed test
    set.
  source_insight: The baseline 2020 repair year suffered a -0.0906 total return and
    -0.1791 max drawdown, driven by market-wide CB stress. Past attempts to gate individual
    entries failed (rejected regime-trend-guard run). A market-level regime switch
    that moves to cash during high-market-stress periods could have avoided that loss
    and lowered overall cost-on max drawdown from -0.3516 without altering individual
    candidate ranking or entry logic.
  expected_improvement: Reduce cost-on max drawdown by at least 5 percentage points
    (e.g., from -0.3516 to below -0.30), improve 2020 repair return from negative
    to near zero or positive, and maintain sealed-test (2025–202605) total return
    within 10% of the baseline 0.7320, while keeping overall cost-on Sharpe ratio
    above baseline.
  capability_ids:
  - C005
  required_executor: dynamic_regime_switch_executor
  required_data:
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  test_design:
    description: '1. Compute a daily market stress index from the aggregate daily
      value gap data (e.g., rolling 20‑day mean of the top‑decile gap magnitude, or
      rolling volatility of gap mean).

      2. Define two regimes: NORMAL (index ≤ threshold) and STRESS (index > threshold).
      In STRESS mode, liquidate all open positions and hold cash; in NORMAL, apply
      the untouched baseline entry/exit/sizing rules.

      3. Run a grid search over threshold values (quantile‑based) on the train period
      2019‑2024 with a hold‑out 2020 repair evaluation.

      4. Select the best threshold per 2020 repair drawdown reduction and overall
      Sharpe.

      5. Evaluate the final candidate on the sealed test 2025‑01‑01 to 2026‑05‑08
      with realistic cost‑on.

      6. Report train, 2020 repair, and test metrics including total return, max drawdown,
      Sharpe, and trade count versus baseline.'
  success_criteria:
    criteria:
    - 2020 repair max drawdown ≤ -0.13 (at least a 5 pp improvement over baseline
      -0.1791).
    - 2020 repair total return ≥ -0.02 (near break‑even or positive).
    - Overall cost‑on max drawdown across full test period reduced by at least 5 pp
      vs baseline -0.3516.
    - Sealed test total return within 10% of baseline 0.7320.
    - Overall cost‑on Sharpe ratio > baseline Sharpe (to be computed from existing
      cost‑on metric if available).
  falsifiers:
    train:
    - The regime switch fails to reduce 2020 max drawdown by at least 3 pp (i.e.,
      2020 drawdown still worse than -0.15).
    - Test period total return drops more than 15% below baseline (i.e., lower than
      0.622).
    - Cash‑hopping causes excessive whipsaw and increases number of negative‑return
      months vs baseline.
    - 'The threshold selection appears unstable: optimum changes drastically between
      train and 2020 repair.'
    validate:
    - The regime switch fails to reduce 2020 max drawdown by at least 3 pp (i.e.,
      2020 drawdown still worse than -0.15).
    - Test period total return drops more than 15% below baseline (i.e., lower than
      0.622).
    - Cash‑hopping causes excessive whipsaw and increases number of negative‑return
      months vs baseline.
    - 'The threshold selection appears unstable: optimum changes drastically between
      train and 2020 repair.'
    test:
    - The regime switch fails to reduce 2020 max drawdown by at least 3 pp (i.e.,
      2020 drawdown still worse than -0.15).
    - Test period total return drops more than 15% below baseline (i.e., lower than
      0.622).
    - Cash‑hopping causes excessive whipsaw and increases number of negative‑return
      months vs baseline.
    - 'The threshold selection appears unstable: optimum changes drastically between
      train and 2020 repair.'
  risk: The market stress index may be too noisy or reactive, leading to frequent
    false alarms and missed rebounds. Overfitting a single threshold to the 2020 event
    may fail on other stress episodes. The short train period and single stress year
    limit robustness. Switching to cash forgoes potential upside from deep‑value CB
    rebounds.
  why_not_repeated_failure: 'The previously rejected run `cb_arb_value_gap_switch_regime-trend-guard_2026-05-19`
    applied a trend guard to individual CB entry eligibility, which falls under the
    closed `regime_conditioned_option_entry_gate`/`regime_classifier_variant` families.
    This proposal uses a wholly different mechanic: a market‑level, aggregate stress
    indicator that toggles the entire strategy between invested and cash states, with
    no per‑CB entry gating. It does not modify entry rules, position sizing, or theoretical
    value inputs, and is not a variant of the failed regime‑entry‑guard approach.'
  related_prior_runs:
  - cb_arb_value_gap_switch_regime-trend-guard_2026-05-19
  - cb_arb_value_gap_switch_option-position-sizing_2026-05-17_151411
  implementation_assumption: The `dynamic_regime_switch_executor` can consume a daily
    binary signal derived externally from the aggregated value‑gap parquet; it then
    applies a global position liquidation/invested toggle that overrides all current
    holdings. No changes to the baseline entry/exit logic are required inside NORMAL
    mode, and the toggle is purely an overlay.
