status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 90 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只在已实现的期权来源交易近期亏钱后降低后续暴露。
ideation:
  source: claude
  proposal_id: option_pnl_feedback_nonzero_trigger_v1
  family: option_source_pnl_feedback
  executor: option_source_pnl_feedback_scaler
  why_not_rejected_repeat: _004259 的所有 19 个变体均以 trigger_avg_pnl_pct=0 运行，本质是"任意亏损
    即触发"的无条件 PnL 反馈，属于已测试但被拒绝的无门槛子集； 本轮引入非零负门槛（-5%、-10%）作为激活条件，不禁止期权买入、不改变 理论价格、不依赖市场状态门槛，与
    forbidden_families 中的 global_option_entry_gate、regime_conditioned_option_entry_gate、
    global_option_value_haircut、panic_family_reruns 均无重叠。
  risk: （1）若 2020 期权来源每笔亏损幅度集中在 <5% 区间，非零门槛根本不触发， 本轮效果等同于 baseline（无修改），仍会 reject；
    （2）若门槛设置偏高（如 -10%），训练期本就少见的深度亏损触发次数极少， 测试段偶发大亏才触发，训练/测试分布不一致可能导致过拟合测试窗口； （3）缺乏
    2020 期权来源亏损幅度的分桶统计——无法事先确认 -5%/-10% 门槛 在 2020 崩盘段有足够的覆盖率，存在门槛设计空转的风险。 建议在跑回测前先用本地脚本统计
    2020 期权来源平均亏损分布，确认 trigger_avg_pnl_pct=-0.05 能覆盖至少 30% 的 2020 亏损交易，否则调高门槛无意义。
  fallback_reason: null
