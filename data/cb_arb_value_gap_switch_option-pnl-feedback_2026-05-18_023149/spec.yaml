schema_version: 1
run_id: cb_arb_value_gap_switch_option-pnl-feedback_2026-05-18_023149
date: '2026-05-18'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: option_value_loop Claude prompt injection from current.yaml, research_insights.yaml,
  experiments.yaml, baseline_registry.yaml, strategies.yaml, and protocol_rules.yaml
hypothesis: 零触发门槛（trigger_avg_pnl_pct=0）在训练期把正常小幅亏损也计入触发， 频繁误砍好的期权来源交易；将门槛收紧至 -5%/-10%，只在已平仓期权来源
  平均亏损真正超过该值时才缩减后续期权买入金额，可望保留训练期正常期权 收益，同时在 2020 式深度崩盘中自动降低暴露。
source_insight: 直接来自 _004259（19 个变体，全部 trigger_avg_pnl_pct=0）：测试期最优为 feedback_60d_min2_scale_0p5（test_excess=0.458，score=0.434），
  但训练期最优是 baseline（无反馈，score=0.050）；pipeline 判定 reject， 原因是零门槛在训练期正常波动期间频繁触发缩减，使三段联合检验
  （train + 2020 + sealed_test）整体不通过。 _022212 已提出相同假设并处于 READY 状态，本提案与其一致。
parameter_space:
- name: option_source_pnl_feedback_lookback_days
  range:
  - 20
  - 60
  type: int
  description: 只看最近已平仓期权来源交易的天数。
- name: option_source_pnl_feedback_min_trades
  range:
  - 2
  - 3
  type: int
  description: 触发反馈前至少需要看到的已平仓期权来源交易数。
- name: option_source_pnl_feedback_scale
  range:
  - 0.25
  - 0.75
  type: float
  description: 触发后期权来源候选排序金额和实际买入金额保留比例。
