    \ (scripts.*).\n# ---------------------------------------------------------------------------\n\
    \ndef _find_repo_root(start: Path) -> Path:\n    for candidate in (start, *start.parents):\n\
    \        if (candidate / \"scripts\" / \"gatekeeper.py\").exists():\n        \
    \    return candidate\n    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \nfrom scripts.gatekeeper import GateKeeper  # noqa: E402\n\n# ---------------------------------------------------------------------------\n\
    # Lazy third-party imports — not available at module level in isolated probe.\n\
    # ---------------------------------------------------------------------------\n\
    \ndef _get_np():\n    \"\"\"Lazy import numpy.\"\"\"\n    import numpy as _np\n\
    \    return _np\n\n\ndef _get_pd():\n    \"\"\"Lazy import pandas.\"\"\"\n   \
    \ import pandas as _pd\n    return _pd\n\n\ndef _get_yaml():\n    \"\"\"Lazy import\
    \ yaml.\"\"\"\n    import yaml as _yaml\n    return _yaml\n\n\n# YAML numpy representer\
    \ registration runs once at first yaml write.\n_YAML_REPRS_REGISTERED = False\n\
    \n\ndef _ensure_yaml_np_reprs():\n    global _YAML_REPRS_REGISTERED\n    if _YAML_REPRS_REGISTERED:\n\
    \        return\n    yaml = _get_yaml()\n    np = _get_np()\n\n    def _yaml_repr_np_float(dumper,\
    \ data):\n        return dumper.represent_float(float(data))\n\n    def _yaml_repr_np_int(dumper,\
    \ data):\n        return dumper.represent_int(int(data))\n\n    yaml.SafeDumper.add_representer(np.floating,\
    \ _yaml_repr_np_float)\n    yaml.SafeDumper.add_representer(np.integer, _yaml_repr_np_int)\n\
    \    yaml.SafeDumper.add_multi_representer(np.floating, _yaml_repr_np_float)\n\
    \    yaml.SafeDumper.add_multi_representer(np.integer, _yaml_repr_np_int)\n  \
    \  _YAML_REPRS_REGISTERED = True\n\n\n# ---------------------------------------------------------------------------\n\
    # Constants\n# ---------------------------------------------------------------------------\n\
    \n_PREVIOUS_RUN_DATA = (\n    \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n    \"daily_value_gap_amounts.parquet\"\n)\n_BASE_MAX_HOLD_DAYS = 90  # decay_period_factor\
    \ multiplies this\n\n_SWEEP_MIN_HOLD_DAYS = (5, 10, 15)\n_SWEEP_INITIAL_THRESHOLD\
    \ = (0.5, 0.7, 1.0)\n_SWEEP_DECAY_FACTOR = (0.5, 1.0, 1.5)\n\n\n# ---------------------------------------------------------------------------\n\
    # Data requirements\n# ---------------------------------------------------------------------------\n\
    \ndef declare_data_requirements(command: list[Any], spec: dict[str, Any] | None\
    \ = None) -> dict[str, Any]:\n    return {\n        \"required_files\": [\n  \
    \          {\n                \"path\": _PREVIOUS_RUN_DATA,\n                \"\
    description\": \"Daily value-gap amounts from regime-option-entry-gate run.\"\
    ,\n            },\n        ]\n    }\n\n\n# ---------------------------------------------------------------------------\n\
    # GateKeeper helpers\n# ---------------------------------------------------------------------------\n\
    \ndef _gatekeeper_before_run(output_dir: Path) -> None:\n    spec_path = output_dir\
    \ / \"spec.yaml\"\n    if spec_path.exists():\n        gatekeeper = GateKeeper(quiet=True)\n\
    \        gatekeeper.before_run_grid(spec_path)\n\n\ndef _gatekeeper_after_run(output_dir:\
    \ Path) -> None:\n    gatekeeper = GateKeeper(quiet=True)\n    gatekeeper.after_run_grid(output_dir)\n\
    \n\n# ---------------------------------------------------------------------------\n\
    # Data loading\n# ---------------------------------------------------------------------------\n\
    \ndef _resolve_data_path(data_root: str | Path, relative: str) -> Path:\n    data_root\
    \ = Path(data_root)\n    rel = Path(relative)\n    candidates = [\n        data_root\
    \ / rel,\n        _REPO_ROOT / rel,\n        Path.cwd() / rel,\n    ]\n    if\
    \ rel.parts[0] == \"data\":\n        inner = Path(*rel.parts[1:])\n        candidates.append(data_root\
    \ / inner)\n        candidates.append(_REPO_ROOT / rel)\n    for c in candidates:\n\
    \        if c.exists():\n            return c\n    searched = \", \".join(str(c)\
    \ for c in candidates)\n    raise FileNotFoundError(f\"Cannot find {relative}\
    \ under data_root={data_root}; searched: {searched}\")\n\n\ndef _load_gap_data(data_root:\
    \ str):\n    pd = _get_pd()\n    path = _resolve_data_path(data_root, _PREVIOUS_RUN_DATA)\n\
    \    df = pd.read_parquet(path)\n    df[\"trade_date\"] = pd.to_datetime(df[\"\
    trade_date\"])\n    df = df.sort_values([\"ts_code\", \"trade_date\"]).reset_index(drop=True)\n\
    \    return df\n\n\n# ---------------------------------------------------------------------------\n\
    # Core simulation logic\n# ---------------------------------------------------------------------------\n\
    \ndef _compute_threshold(\n    hold_days: int,\n    min_hold: int,\n    initial_frac:\
    \ float,\n    max_hold: int,\n) -> float:\n    \"\"\"Linearly decaying threshold.\n\
    \n    Before min_hold: no decay (returns initial_frac).\n    After min_hold: decays\
    \ from initial_frac at min_hold to 0 at max_hold,\n    clamped to [0, initial_frac].\n\
    \    \"\"\"\n    if hold_days < min_hold:\n        return initial_frac\n    if\
    \ max_hold <= min_hold:\n        return 0.0\n    decay_range = max_hold - min_hold\n\
    \    elapsed = min(hold_days - min_hold, decay_range)\n    return initial_frac\
    \ * max(0.0, 1.0 - elapsed / decay_range)\n\n\ndef _simulate_time_decay(\n   \
    \ df,\n    min_hold_days: int,\n    initial_threshold_fraction: float,\n    max_hold_days:\
    \ int,\n) -> dict[str, Any]:\n    \"\"\"Simulate the time-decaying gap exit strategy.\n\
    \n    Entry: gap > 0 and not in position.\n    Exit (gap closed): current_gap\
    \ <= 0.\n    Exit (time decay): after min_hold_days, if current_gap / entry_gap\
    \ > threshold, close.\n    PnL: (exit_gap - entry_gap) * 100.\n    \"\"\"\n  \
    \  total_pnl = 0.0\n    trades: list[dict[str, Any]] = []\n\n    for stock, grp\
    \ in df.groupby(\"ts_code\"):\n        grp = grp.sort_values(\"trade_date\")\n\
    \        idx_list = grp.index.tolist()\n        in_position = False\n        entry_gap_val\
    \ = 0.0\n        entry_date = None\n\n        for i, idx in enumerate(idx_list):\n\
    \            row = grp.loc[idx]\n            gap = float(row[\"value_gap_amount\"\
    ])\n\n            if not in_position and gap > 0:\n                in_position\
    \ = True\n                entry_gap_val = gap\n                entry_date = row[\"\
    trade_date\"]\n                continue\n\n            if not in_position:\n \
    \               continue\n\n            should_exit = False\n            exit_reason\
    \ = \"\"\n\n            if gap <= 0:\n                should_exit = True\n   \
    \             exit_reason = \"gap_closed\"\n            else:\n              \
    \  hold_days = (row[\"trade_date\"] - entry_date).days if entry_date else 0\n\
    \                if hold_days >= min_hold_days:\n                    threshold\
    \ = _compute_threshold(\n                        hold_days, min_hold_days, initial_threshold_fraction,\
    \ max_hold_days,\n                    )\n                    ratio = gap / entry_gap_val\
    \ if entry_gap_val > 0 else 0.0\n                    if ratio > threshold:\n \
    \                       should_exit = True\n                        exit_reason\
    \ = \"decay_exit\"\n\n            if should_exit:\n                pnl = (gap\
    \ - entry_gap_val) * 100.0\n                total_pnl += pnl\n               \
    \ hold_days = (row[\"trade_date\"] - entry_date).days if entry_date else 0\n \
    \               trades.append({\n                    \"stock\": stock,\n     \
    \               \"entry_date\": str(entry_date.date()) if entry_date else \"\"\
    ,\n                    \"exit_date\": str(row[\"trade_date\"].date()),\n     \
    \               \"exit_reason\": exit_reason,\n                    \"entry_gap\"\
    : round(entry_gap_val, 4),\n                    \"exit_gap\": round(gap, 4),\n\
    \                    \"pnl\": round(pnl, 2),\n                    \"hold_days\"\
    : hold_days,\n                    \"min_hold_days\": min_hold_days,\n        \
    \            \"initial_threshold_fraction\": initial_threshold_fraction,\n   \
    \                 \"max_hold_days\": max_hold_days,\n                })\n    \
    \            in_position = False\n                entry_gap_val = 0.0\n      \
    \          entry_date = None\n\n        # Force-close any still-open position\
    \ at end of data\n        if in_position:\n            last_row = grp.iloc[-1]\n\
    \            final_gap = float(last_row[\"value_gap_amount\"])\n            pnl\
    \ = (final_gap - entry_gap_val) * 100.0\n            total_pnl += pnl\n      \
    \      hold_days = (last_row[\"trade_date\"] - entry_date).days if entry_date\
    \ else 0\n            trades.append({\n                \"stock\": stock,\n   \
    \             \"entry_date\": str(entry_date.date()) if entry_date else \"\",\n\
    \                \"exit_date\": str(last_row[\"trade_date\"].date()),\n      \
    \          \"exit_reason\": \"force_close\",\n                \"entry_gap\": round(entry_gap_val,\
    \ 4),\n                \"exit_gap\": round(final_gap, 4),\n                \"\
    pnl\": round(pnl, 2),\n                \"hold_days\": hold_days,\n           \
    \     \"min_hold_days\": min_hold_days,\n                \"initial_threshold_fraction\"\
    : initial_threshold_fraction,\n                \"max_hold_days\": max_hold_days,\n\
    \            })\n\n    return _aggregate_metrics(trades, total_pnl)\n\n\ndef _simulate_baseline(df)\
    \ -> dict[str, Any]:\n    \"\"\"Simulate baseline: enter when gap > 0, exit when\
