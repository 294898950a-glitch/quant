    \n\ndef _aggregate_metrics(\n    trades: list[dict[str, Any]],\n    total_pnl:\
    \ float,\n) -> dict[str, Any]:\n    \"\"\"Compute performance metrics from trade\
    \ list.\"\"\"\n    pd = _get_pd()\n    if not trades:\n        return {\n    \
