why_existing_tools_insufficient: The proposal requires a new exit rule that exits
  when the ratio (current_gap / entry_gap) exceeds a time‑decaying threshold after
  min_hold_days. Reviewed executors that test 'new_exit_rule' (C007) are dynamic_exit_gap_decay_executor
  and profit_take_exit_executor. dynamic_exit_gap_decay_executor uses a static gap
  decay factor (current_gap < entry_gap * factor), profit_take_exit_executor uses
  a static target fraction (current_gap <= (1 - fraction) * entry_gap). Both apply
  fixed conditions without the required time‑dependent threshold schedule, so they
  cannot evaluate the proposed decay rule.
