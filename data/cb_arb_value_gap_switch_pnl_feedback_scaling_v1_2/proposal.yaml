proposal_id: cb_arb_value_gap_switch_pnl_feedback_scaling_v1_2
strategy_id: cb_arb_value_gap_switch
family: pnl_feedback_scaling_grid
hypothesis: 'Rolling realized PnL carries predictive signal about near-term strategy
  edge quality. The forward-direction value-gap signal produces only -3% cumulative
  excess cost-off but -10.47% cost-on — the signal itself is weak-not-negative, and
  cost drag accounts for ~7.5pp of deterioration. Scaling position size inversely
  with recent realized losses reduces exposure during cold streaks and restores it
  during hot streaks, directly attacking the cost-drag component without changing
  entry signal quality or exit logic. This is a capital-allocation governor, not a
  signal-improvement overlay.

  '
source_insight: 'Baseline cost-on cumulative excess is -10.47% vs cost-off -3% (7.47pp
  cost degradation per current.yaml). The reverse probe produced +30.3% test excess
  cost-on — the raw value-gap data contains exploitable signal. The forward direction''s
  problem is that the signal is near-zero, making cost drag dominant. PnL feedback
  scaling targets cost drag reduction directly, which is the largest fixable component
  of the forward-direction underperformance.

  '
expected_improvement: '2–5pp improvement in cumulative excess (from -10.47% toward
  -5% or better) by reducing exposure and thus cost drag during losing streaks. Ceiling
  is bounded by base signal quality — this cannot create alpha where none exists,
  only reduce the destruction from trading costs when the signal is cold.

  '
