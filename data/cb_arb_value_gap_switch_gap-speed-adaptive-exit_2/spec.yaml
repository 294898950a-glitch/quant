  risk: 'Medium. Gap-speed lookback introduces a lag parameter that may add noise
    in choppy markets. If gap trajectories are mean-reverting at multiple frequencies,
    a short lookback could trigger false divergence signals, causing premature exits.
    Mitigated by grid search over lookback windows and asymmetric factors (slowdown
    < 1.0, acceleration > 1.0) so the base behavior is conservative.

    '
  why_not_repeated_failure: 'Not a repeat of gap-trailing-exit (static ratio threshold,
    no time decay — failed). Not a repeat of profit-take-exit (partial exit at fixed
    fraction, no decay — failed). Not a repeat of pnl-adaptive-exit (uses PnL feedback,
    which couples gap speed with a closed direction). This extends the working duration-adaptive
    exit by adding gap-convergence speed as a modulator of the decay rate — a fundamentally
    different mechanic where the exit threshold still decays over time but the decay
    rate adapts to whether the position is converging or diverging. No prior exit
    experiment combined time-decay with gap-speed modulation.

    '
