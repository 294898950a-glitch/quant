hypothesis: 'The duration-adaptive exit (min_hold_days=5, decaying threshold) is the
  only exit variant that passed adoption, proving that time-decaying thresholds work
  better than static exit rules. But it treats all positions uniformly regardless
  of whether the gap is actually converging or diverging. By modulating the decay
  rate of the exit threshold based on recent gap trajectory — slowing decay for converging
  positions (be more patient) and accelerating decay for diverging positions (cut
  faster) — the strategy should improve the win/loss ratio of exits and reduce the
  7.47pp cost-on degradation. This adds a second signal dimension to a proven framework
  without introducing new data sources or regime classification.

  '
source_insight: 'Duration-adaptive exit passed adoption (best params: min_hold_days=5,
  initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45).
  Gap-trailing-exit, profit-take-exit, and pnl-adaptive-exit all failed. Market-drawdown
  and contrarian-drawdown entry gates failed mechanical thresholds. The edge is in
  exit timing, not entry filtering. The natural next step is refining the working
  exit framework with a gap-convergence-speed dimension — rewarding positions that
  are actively mean-reverting while punishing those that aren''t.

  '
