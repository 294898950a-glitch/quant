  implementation_assumption: 'Extends exit_rule_duration_adaptive_executor with gap-speed
    modulation: compute rolling N-day gap change normalized by entry_gap, then multiply
    base decay rate by convergence_slowdown_factor (if gap is shrinking) or divergence_acceleration_factor
