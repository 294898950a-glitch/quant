schema_version: 1
run_id: cb_arb_value_gap_switch_option-position-sizing_2026-05-17_212511
date: '2026-05-17'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: option_value_loop Claude prompt injection from current.yaml, research_insights.yaml,
  experiments.yaml, baseline_registry.yaml, strategies.yaml, and protocol_rules.yaml
hypothesis: 用最近 N 天期权来源实现盈亏（rolling PnL）动态调节期权型候选买入金额，2020 期权来源持续亏损时自动缩减暴露、2025-2026
  期权来源盈利时维持正常仓位，从而在不禁买前提下降低坏期权暴露同时保留好期权收益。
source_insight: 'attribution 研究（option_false_undervalue_attribution_2026_05_17）显示期权来源
  2020 PnL 为 -92630.91、

  测试段为 +729505.32，同类交易不同时期表现截然相反，说明需要一个能感知"当前期权来源是否在赚钱"的机制；

  progressive_stocklike_position_scale（训练 excess 0.386 远超基线 0.131）证明了仓位缩减机制本身在训练段有效，

  但静态 CB 特征缩减把 2025-2026 的好期权交易也一并压低（测试 0.119 vs 基线 0.380），

  说明"何时缩减"比"对谁缩减"更重要；时序 rolling PnL 反馈天然区分亏损期和盈利期，

  无需依赖任何 CB 特征阈值或市场状态分类器。'
parameter_space:
- name: position_scale_variant
  range:
  - 0
  - 10
  type: int
  description: 11 个固定候选仓位调整方案，包括 baseline、价格/债底触发、正股/转股价触发、任一触发和渐进调整。
- name: close_to_bond_floor_threshold
  range:
  - 1.5
  - 1.7
  type: float
  description: 期权型候选中，转债价格相对债底过高的触发线。
- name: moneyness_stock_to_conv_threshold
  range:
  - 1.6
  - 2.0
  type: float
  description: 期权型候选中，正股价格相对转股价过高的触发线。
- name: position_cash_scale
  range:
  - 0.25
  - 1.0
  type: float
  description: 触发后实际买入金额和排序金额保留比例。
new_data_sources:
- path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  description: 已有 value-gap 估值与可交易金额，避免重复计算基础基准。
- path: data/cb_warehouse/cb_basic.parquet
  description: 转股价和正股代码，用于计算正股/转股价。
- path: data/cb_warehouse/stk_daily_qfq.parquet
  description: 前复权正股价格，用于计算正股/转股价。
grid:
  dimensions:
  - position_scale_variant
  candidates_count: 11
  description: 固定 11 组候选仓位调整方案，全量跑 train/test/2019-2024 yearly，并输出 2020 和 test 的入口来源拆解。
hard_floors:
  train_excess_return: 0.0
  train_max_drawdown: -0.3
  test_excess_return: 0.0
  test_max_drawdown: -0.3
  replay_2020_total_return: -0.090593
hard_floors_baseline_source: current cb_arb_value_gap_switch cost-aware branch and
  option-value-haircut rejection evidence
auxiliary_metrics:
- train_excess_return
- test_excess_return
- yearly_2020_total_return
- yearly_2020_excess_return
- max_drawdown
- total_trades
- win_rate
- entry_source_2020_option_loss
- entry_source_test_option_profit
- average_position_scale
cv_design: single-window
cv_holdout_years:
- 2025
- 2026
cv_adoption_threshold: 必须同时优于 baseline 的训练段、2020 修复和 2025-2026 测试段；否则只作为诊断资产。
compute_estimate:
  sig_minutes: 0
  spot_minutes: 60
  local_minutes: 0
  estimated_cost_yuan: 0.0
budget_cap_yuan: 100
spot_decision: 本轮使用已有 daily_value_gap_amounts，不重复计算基础基准；必须在 VM/spot host 执行。
stop_conditions:
- 脚本退出非 0
- 缺少 summary_option_position_sizing.csv
- 缺少 yearly_option_position_sizing.csv
- 缺少 entry_source_2020_option_position_sizing.csv
- 所有非 baseline 方案无法同时优于 train、2020 和 test baseline
artifacts_required:
- summary_option_position_sizing.csv
- yearly_option_position_sizing.csv
- entry_source_2020_option_position_sizing.csv
- entry_source_test_option_position_sizing.csv
- adjustment_option_position_sizing.csv
- summary.json
- report.yaml
- l4_ack.yaml
- diagnostic.yaml
automation:
  output_dir: data/cb_arb_value_gap_switch_option-position-sizing_2026-05-17_212511
  gatekeeper_after_run: false
  sync_paths:
  - scripts/evaluate_cb_arb_option_position_sizing.py
  - scripts/evaluate_cb_arb_value_gap_switch.py
  - scripts/generate_option_value_next_spec.py
  - data/research_framework/runtime_entrypoints.yaml
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - data/cb_warehouse/cb_basic.parquet
  - data/cb_warehouse/stk_daily_qfq.parquet
  command:
  - .venv/bin/python
  - scripts/evaluate_cb_arb_option_position_sizing.py
  - --data-root
  - data/cb_arb_concurrent_supervised_20260511_094500
  - --train-start
  - '20190101'
  - --train-end
  - '20241231'
  - --test-start
  - '20250101'
  - --test-end
  - '20260508'
  - --fixed-source
  - '2'
  - --rule
  - score_4state
  - --output-dir
  - '{output_dir}'
  - --base-ranks-path
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - --reuse-ranks
  - --cost-model-enabled
  verdict:
    table_path: summary_option_position_sizing.csv
    yearly_table_path: yearly_option_position_sizing.csv
    filters:
      period: train
    rank_by: score
    rank_desc: true
    thresholds:
      excess_return:
        min: 0.0
      max_drawdown:
        min: -0.3
    train_single_year_dd_ceiling: -0.15
status: ARCHIVED
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 60 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只降低可疑期权型候选的实际暴露。
archive_reason: Claude 提出的 rolling option-source PnL 动态调仓需要新执行器；当前 spec 被错误编译到静态 position sizing 脚本，已拦截，不能作为有效测试。
ideation:
  source: claude
  proposal_id: option_ps_trailing_optionsrc_pnl
  family: trailing_optionsrc_feedback_scale
  why_not_rejected_repeat: '与 global_option_entry_gate / regime_conditioned_option_entry_gate
    的区别：不是 binary 禁买，

    是连续金额缩减，允许期权型候选以缩减仓位继续参与；

    与 global_option_value_haircut 的区别：不修改理论估值，不影响是否入场的决策逻辑；

    与 progressive_stocklike_position_scale 的本质区别：前者基于 CB 自身静态特征全时段缩减

    （导致测试段好交易同步受损），本方案基于期权来源子集时序盈亏动态触发，盈利期不缩减；

    与 cb_arb_self_pnl_lookback_regime_classifier（已拒绝，0/108 候选通过）的区别：

    那是全策略 PnL 驱动的状态切换影响所有交易，本方案是仅用期权来源子集 PnL 驱动、

    仅对期权型候选买入金额做连续缩减，作用范围和机制均不同。'
  risk: '主要风险：trailing PnL 反馈滞后 20-40 个交易日，2020 开始亏损后前期全额暴露仍无法避免，

    训练集 falsifier（单年 dd > 15%、跨年累计 excess < 0）可能仍然触发，和已拒绝的

    cb_arb_self_pnl_lookback_regime_classifier 面临同样的"只有 2020 一个坏年份可校准 rolling

    窗口参数"的过拟合风险（类似 0/108 模式）；

    次要风险：evaluate_cb_arb_option_position_sizing.py 当前可能不包含逐日期权来源 PnL 流计算，

    需 Codex 在脚本中增加 rolling option-source PnL 逻辑，若底层数据不支持则无法实现；

    第三风险：若 2020 期权来源亏损与全策略亏损高度同步，本方案实际效果可能退化为

    full-strategy trailing PnL 缩减，与已拒绝方向等价。'
  fallback_reason: null
