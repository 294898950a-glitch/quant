    description: 'Base: ASCENDING value_gap_amount sort (>0 filter unchanged). Entry:
      value_gap_amount > 0, top N by ascending gap. Position scaling overlay: compute
      ATR per CB per day from stk_daily_qfq close, rank by ATR percentile within each
