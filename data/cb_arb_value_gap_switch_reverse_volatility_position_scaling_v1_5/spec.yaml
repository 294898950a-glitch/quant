hypothesis: 'The reverse-sort base (ASCENDING value_gap_amount, value_gap_amount >
  0) produces +30.3% test excess cost-on — the only proven alpha direction. Previous
  reverse-direction improvement attempts (moneyness entry filter, bond floor entry
  filter, duration-adaptive exit) all failed because they CULLED the candidate pool,
  destroying the fragile reverse signal. Position scaling via inverse ATR (more volatile
  → smaller weight) is a fundamentally different mechanic: it PRESERVES all eligible
  candidates unchanged while only re-allocating capital. This makes it strictly less
  destructive than any entry filter.


  Repeated-reject-family check (moneyness_stock_to_conv_threshold, 3 rejections).
  I am not proposing in that family; I use C001, not C003. For completeness: (1) the
  ASCENDING-sort value_gap_amount > 0 signal is real and tradeable at +30.3% test
  excess cost-on; (2) the reverse direction IS the alpha direction — no further reversal
  needed; (3) the prior moneyness and bond-floor failures were wrong execution conditions
  because binary entry gates culled candidates and killed the signal. Position scaling
  is a non-destructive execution condition that addresses drawdown at the portfolio-construction
  level without touching entry eligibility.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 (critical): Reverse-rank
  probe shows +30.3% test excess cost-on vs -10.5% forward cost-on — a 41pp swing
  from sort direction alone. The insight''s decision_use priority 4 says "reverse-direction
  variants applied to families that previously failed in forward — to see if those
  families were rejected only because they were stacked on an anti-alpha base." Position
  scaling (C001) was previously applied only in forward direction via pnl-feedback-scaling
  (adoption_pass: false). Testing it in reverse addresses priority 4 directly.

  '
