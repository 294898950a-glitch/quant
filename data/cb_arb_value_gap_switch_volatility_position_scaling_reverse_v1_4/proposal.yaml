test_design:
  description: 'Sort value_gap_amount ASCENDING (>0 filter unchanged, reverse direction).
    Compute ATR from stk_daily_qfq close per CB per day. Apply inverse scaling: position_weight
    = baseline * (scaling_beta / ATR_rank). Grid search over ATR lookback [10, 20,
    40, 60] and scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit grid from reverse-probe-coston
    baseline: max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct
    0.0, switch_hurdle_pct [0.0, 0.01]. Cost-on (slippage 0.0015, impact 0.001). Train
    2018-2022, test 2023-2026. No candidates removed — all entries passing >0 filter
    are eligible.

    '
success_criteria:
  test_excess_ge_0.24: Preserve at least 80% of reverse baseline +30.3% test excess
  train_max_drawdown_improved: Reduced vs reverse baseline -23.6% train drawdown
  test_max_drawdown_le_0.12: Test drawdown remains manageable
  adoption_pass_true: Best candidate passes mechanical thresholds
falsifiers:
  train: &id001
  - test_excess_lt_0.20: Scaling destroys more than 1/3 of baseline alpha — signal
      too fragile for this overlay
  - train_max_drawdown_worse: Inverse ATR scaling increases drawdowns — mechanism
      counterproductive on reverse base
  - all_candidates_fail_adoption: No grid point passes mechanical thresholds
  validate: *id001
  test: *id001
risk: 'Low-to-medium. Position scaling is less destructive than entry filters (preserves
  all candidates) and the reverse base is proven tradeable at +30.3% test excess.
  Main risk: ATR is computed from stock close, not CB close — stock volatility may
  not fully proxy CB volatility, especially for deep ITM/OTM bonds. Mitigated by the
  fact that the value-gap signal itself is already derived from stock-linked option
  pricing.

  '
why_not_repeated_failure: 'Not in repeated_reject_families. The repeated family is
  moneyness_stock_to_conv_threshold — an entry filter that removes candidates. This
  proposal uses C001 (static position scaling), which adjusts weights without removing
  candidates. All prior entry filter failures share the same root cause: culling the
  candidate pool destroys the signal that lives in small-positive-gap territory. Position
  scaling is the orthogonal approach.

  '
