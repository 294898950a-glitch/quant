proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_4
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: 'The reverse-sorted value-gap base (ascending, least-positive gap first)
  produced +30.3% test excess cost-on — the only proven alpha direction. Entry filters
  (moneyness, bond floor) failed because they culled the candidate pool, removing
  the small-positive-gap candidates where the signal lives. Position scaling via inverse
  ATR is a fundamentally different mechanism: it preserves ALL candidates and only
  adjusts allocation weights. Lowering exposure to high-volatility names should reduce
  drawdowns and improve risk-adjusted returns without destroying the signal. This
  is not an entry filter — it operates on the same full candidate set the reverse
  probe proved tradeable.

  Repeated-reject family (moneyness_stock_to_conv_threshold) analysis: (1) Signal
  invalid? No — reverse probe proves signal exists. (2) Direction reversed? Already
  tested reverse moneyness — still failed. (3) Execution condition wrong? Yes. Entry
  filters remove candidates; the signal lives in small-gap territory where culling
  is destructive. Position scaling is the correct execution mechanism because it preserves
  all candidates. This proposal is NOT a moneyness variant — it is a different capability
  (C001 static position scaling) on a different family (reverse_volatility_position_scaling).

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: reverse-sort (ascending)
  produces +30.3% test excess cost-on, a 41pp swing from sort direction alone. Entry
  filters that remove candidates (moneyness forward v1/v1.1/v1.5, moneyness reverse
  v1.1, bond floor forward v1, bond floor reverse v2) all failed mechanical thresholds
  — they cull the pool and kill the signal. Position scaling preserves all entries
  and only adjusts weights, making it strictly less destructive. The reverse probe''s
  best exit params (max_hold_days=180, min_gap_pct=0.01, sell_gap_pct=0.0, switch_hurdle_pct=0.0)
  provide the baseline exit grid.

  '
expected_improvement: 'Reduce max drawdown from -23.6% train / -11.3% test (reverse
  probe cost-on baseline) by underweighting high-ATR names, while preserving at least
  80% of the +30.3% test excess. The volatility-position-scaling-forward executor
  already exists; the reverse variant applies the same inverse-ATR logic to the ascending-sort
  base.

  '
