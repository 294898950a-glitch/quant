proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_1
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: 'The reverse-direction value-gap base (+30.3% test excess cost-on) has
  been proven alpha-directional, but every entry-filter overlay (moneyness, bond floor,
  both forward and reverse) destroyed that signal by removing too many candidates.
  Volatility-based position scaling is structurally different — it never removes a
  candidate. It only adjusts allocation weights via inverse ATR, giving more capital
  to low-volatility CBs and less to noisy ones. Because the candidate pool is preserved
  intact, the underlying reverse-alpha signal should survive while drawdowns should
  compress. This is the least-destructive overlay available.

  Repeated-reject-family check: moneyness_stock_to_conv_threshold has 3 rejections.
  Three questions answered:

  (1) Is the underlying signal invalid? No — the reverse sort produces +30.3% test
  excess cost-on, a 41pp swing from forward direction. The signal is real and directionally
  confirmed. The failures are execution-side: the filter removes the signal-carriers.

  (2) Is the direction reversed? No reversal needed — we are already operating in
  the proven reverse direction (ASCENDING sort, least-positive gap first). The repeated-reject
  family is moneyness, which this proposal does not touch.

  (3) Is only the execution condition wrong? Yes. The moneyness and bond-floor filters
  culled candidates from an already-narrow positive-gap pool. Execution-side overlay
  that preserves all candidates (position scaling) should not reproduce that failure
  mode.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 — confirmed reverse-direction
  is the only working alpha direction (+30.3% test excess cost-on vs -10.5% forward).
  Decision_use priority #4 explicitly calls for reverse-direction variants on families
  that previously failed in forward, including position sizing. Two entry-filter families
  (moneyness, bond floor) have already been tested reverse and both failed — suggesting
  entry culling, not direction, is the common failure mechanism. Position scaling
  avoids culling entirely, making it the natural next experiment.

  '
expected_improvement: 'Reduce max drawdown from the reverse-probe-coston baseline
  (-0.235 train, -0.113 test) by at least 3pp while preserving ≥80% of test excess
  return (target ≥+0.242 test excess cost-on). If the scaling parameter (scaling_beta)
  is tuned correctly, low-volatility CBs should compound more reliably with fewer
  large adverse moves, improving the Sharpe ratio without sacrificing the direction
  alpha.

  '
