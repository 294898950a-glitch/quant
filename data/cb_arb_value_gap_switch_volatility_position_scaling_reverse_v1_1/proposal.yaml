implementation_assumption: The executor volatility_based_position_scaling_executor_reverse
  is registered and implements the full grid search as described in its capability_menu
  description. ATR computation uses stk_daily_qfq.close (not cb_daily.close) because
  CB price volatility is contaminated by the embedded option, while stock ATR captures
  the pure underlying risk. Daily cross-sectional ATR ranking ensures scaling is relative
  to the candidate pool, not absolute thresholds.
