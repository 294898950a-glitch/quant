test_design:
  description: 'Reverse-direction base: sort value_gap_amount ASCENDING (least-positive
    first, >0 filter unchanged). Compute daily ATR per CB from stk_daily_qfq.close
    using configurable lookback periods. Position weight = baseline_ranking_weight
    * (scaling_beta / ATR_rank), where ATR_rank is a daily cross-sectional rank of
    ATR within the candidate pool (higher ATR = lower weight). Grid search: ATR lookback
    [10, 20, 40, 60] × scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit: reverse-probe
    grid (max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct 0.0,
    switch_hurdle_pct [0.0, 0.01]). Cost-on evaluation: slippage 0.0015, market_impact
    0.001. Train 2018-2022, test 2023-2026. Compare best grid candidate against reverse-probe-coston
    baseline.

    '
success_criteria:
  criteria:
  - test_excess_return >= 0.242 (≥80% of reverse-probe-coston +0.303)
  - test_max_drawdown < -0.095 (at least 1.8pp improvement over reverse-probe-coston
    -0.113)
  - test_sharpe > reverse-probe-coston test Sharpe
  - adoption_pass must be True
falsifiers:
  train: &id001
  - test_excess_return < 0.15 (less than half the reverse base alpha — scaling destroyed
    the signal)
  - test_max_drawdown >= -0.113 (no drawdown improvement — scaling provided zero risk
    reduction)
  - train_best_params == scaling_beta 1.0 AND ATR lookback at boundary (scaling effectively
    disabled itself)
  validate: *id001
  test: *id001
risk: 'Moderate — ATR is a simple metric that converges fast across lookback windows,
  so grid overfitting risk is low. However, if high-ATR CBs are also the highest-alpha
  CBs (i.e., volatility correlates positively with gap-closing speed), inverse scaling
  will allocate capital AWAY from the best trades and degrade returns. The falsifier
  on test_excess_return < 0.15 guards against this.

  '
why_not_repeated_failure: 'This is not a repeated failure. All prior failures in the
  reverse family were entry filters (moneyness, bond floor) that removed candidates
  from the pool. Volatility position scaling is a fundamentally different mechanic:
  it never removes candidates, only adjusts allocation weights. The active_critical_insight
  value_gap_rank_is_anti_alpha_2026_05_24 priority #4 explicitly recommends this exact
  direction — reverse-direction variants on families that failed in forward — with
  position sizing named as an example. The C001 capability menu confirms the entry-filter
  failure diagnosis: "Unlike entry filters (moneyness, bond floor) which culled the
  reverse candidate pool and killed the signal, position scaling preserves all candidates,
  making it strictly less destructive."

  '
