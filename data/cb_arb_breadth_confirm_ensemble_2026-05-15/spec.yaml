l0_source: experience_ledger open-thread "multi-signal ensemble" (高优)
hypothesis: 在 market breadth signal (跌停转债比例) 之外加 'pool-mean daily return' 作 confirm
  信号, 双信号 AND 触发风险态. 期望解决 market breadth 单 signal 在 2024 的 false positive 问题 (5 个
  trigger 都不在大 panic, 但 path 污染 -¥16062), 让 ≥ 5/6 holdout 改善 vs 当前 baseline.
source_insight: '`reports/cb_arb_market_breadth_panic_retro_2026-05-15.md` L5 揭示:
  2024 selected risk-state trigger 5 次 (01-22, 02-05, 02-28, 06-24, 10-09) 都不在大 panic,
  但 path 污染导致 -16062 PnL gap.


  原因分析: market breadth 单 signal 在"短期局部跌幅"很敏感, 容易被"分化跌"误触发 (部分转债跌 ≥3% + 20% 池比例) 即使大盘整体平稳.
  加一个 "pool-mean 当日整体 daily return" 作 confirm 信号, 双信号 AND 才触发 → 拒绝"分化跌"型 false positive.


  Codex L5 推荐: "Any retry should change signal/action family, e.g. breadth combined
  with market index/vol/credit context".


  为什么选 pool-mean (不用市场指数 / vol / credit):

  1. 数据已有: 转债池 daily return 已在 cb_daily.parquet

  2. 跟 breadth 同一数据源, 一致性好

  3. 实施简单, 不引入新数据源 (B2 沙盒约束)

  4. 直觉清晰: breadth = "局部破", pool-mean = "整体破", AND = 真正系统性 panic'
