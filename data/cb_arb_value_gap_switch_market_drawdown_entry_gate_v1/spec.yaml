  strategy_id: cb_arb_value_gap_switch
  family: market_drawdown_entry_gate
  hypothesis: Suppressing new entries when the CSI 300 is in a rolling N-day drawdown
    reduces the strategy's exposure to adverse market regimes, improving cumulative
    excess returns and reducing max drawdown by avoiding entries most likely to fail
    during broad market stress.
  source_insight: The current strategy has negative cost-on cumulative excess (-0.1047)
    and deep max drawdown (-0.3516). The duration-adaptive exit and regime-adaptive
    exit approaches improve the exit side but do nothing to prevent entries during
    broad market selloffs. A CSI 300 rolling-return gate — don't enter when the market
    is falling — is a low-cost overlay that filters noise entries without touching
    the core ranking signal. Unlike per-CB entry filters (bond floor, moneyness) that
    cull the candidate pool to mechanically unviable levels, a market-level gate suppresses
    entries only on days when the entire universe is under stress — preserving candidate
    diversity on normal days.
  expected_improvement: Reduce max drawdown by 3-5pp and improve cumulative excess
    by 2-4pp cost-on, without reducing candidate count below 20% of baseline.
  capability_ids:
  - C009
  required_executor: market_drawdown_entry_gate_executor
  required_data:
  - path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
