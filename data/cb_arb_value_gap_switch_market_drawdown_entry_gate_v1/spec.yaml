    - trade_date
    - ts_code
    - value_gap_amount
    data/cb_warehouse/csi300_daily.parquet:
    - trade_date
    - close
  test_design:
    description: Grid search over CSI 300 rolling lookback [5, 10, 20, 40, 60] trading
      days and return threshold [-0.02, -0.03, -0.05, -0.08, -0.10], with optional
      buffer_days [0, 3, 5]. Compute rolling N-day CSI 300 return = close_t / close_{t-N}
      - 1. If return < threshold, suppress all new entries for that day plus buffer_days.
      Existing positions are unaffected. Run with current baseline backtest parameters,
      cost-on (slippage 0.0015, impact 0.001). Train 2018-2022, test 2023-2026.
  success_criteria:
    criteria:
    - test_cost_on_cumulative_excess_compound > baseline_test_cost_on_cumulative_excess_compound
    - test_cost_on_max_drawdown < baseline_test_cost_on_max_drawdown
    - candidate_count >= 20% of unfiltered baseline candidate count
    - any_holdout_year_sharpe >= 0
  falsifiers:
    train:
    - No grid cell improves both cumulative excess and max drawdown vs baseline
    - All grid cells reduce candidate count below 20% of baseline
    - Best grid cell worsens any single-year drawdown by >5pp vs baseline
    validate:
    - No grid cell improves both cumulative excess and max drawdown vs baseline
    - All grid cells reduce candidate count below 20% of baseline
    - Best grid cell worsens any single-year drawdown by >5pp vs baseline
    test:
    - No grid cell improves both cumulative excess and max drawdown vs baseline
    - All grid cells reduce candidate count below 20% of baseline
    - Best grid cell worsens any single-year drawdown by >5pp vs baseline
  risk: 'Low. Entry gate is a pure overlay that can be disabled without structural
    changes. Worst case: filters too aggressively and misses valid entries, hurting
    returns. The 20% candidate floor prevents total signal destruction. Unlike the
    bond-floor-entry-filter (which failed mechanical_thresholds due to per-CB candidate
    starvation), a market-level gate suppresses entries only on rare stress days and
    preserves the full candidate pool on normal days.'
  why_not_repeated_failure: 'This is not a renamed repeat of any closed direction.
    The closed ''global_option_entry_gate'' tag is specific to option-sourced entry
    gating, not CSI 300 market-level drawdown filtering. The bond-floor-entry-filter_v1
    failed due to candidate starvation from a per-CB valuation-anchor filter — a fundamentally
    different mechanic. No recent run has tested market-level entry gating. The pnl_feedback_scaling
    and volatility_position_scaling families failed adoption because they modified
    position sizing, not entry eligibility. This proposal targets a completely orthogonal
    dimension: broad market timing of entries.'
  related_prior_runs:
  - cb_arb_value_gap_switch_bond-floor-entry-filter_v1
  - cb_arb_value_gap_switch_regime_adaptive_exit_v1
  implementation_assumption: The executor applies the CSI 300 rolling-return binary
    mask to the daily value_gap_amounts table before the backtester selects candidates.
    The core ranking (value_gap_amount descending), position sizing, and exit logic
    remain unchanged from the current baseline. Buffer days extend the suppression
    window after a drawdown signal triggers, preventing whipsaw re-entry.
