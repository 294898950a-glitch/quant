proposal_id: cb_arb_value_gap_switch_market_drawdown_entry_gate_v1
strategy_id: cb_arb_value_gap_switch
family: market_drawdown_entry_gate
hypothesis: Suppressing new entries when the CSI 300 is in a rolling N-day drawdown
  reduces the strategy's exposure to adverse market regimes, improving cumulative
  excess returns and reducing max drawdown by avoiding entries most likely to fail
  during broad market stress.
source_insight: The current strategy has negative cost-on cumulative excess (-0.1047)
  and deep max drawdown (-0.3516). The duration-adaptive exit and regime-adaptive
  exit approaches improve the exit side but do nothing to prevent entries during broad
  market selloffs. A CSI 300 rolling-return gate — don't enter when the market is
  falling — is a low-cost overlay that filters noise entries without touching the
  core ranking signal. Unlike per-CB entry filters (bond floor, moneyness) that cull
  the candidate pool to mechanically unviable levels, a market-level gate suppresses
  entries only on days when the entire universe is under stress — preserving candidate
  diversity on normal days.
expected_improvement: Reduce max drawdown by 3-5pp and improve cumulative excess by
  2-4pp cost-on, without reducing candidate count below 20% of baseline.
capability_ids:
- C009
required_executor: market_drawdown_entry_gate_executor
required_data:
- data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
- data/cb_warehouse/csi300_daily.parquet
required_data_fields:
  data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet:
  - trade_date
  - ts_code
  - value_gap_amount
  data/cb_warehouse/csi300_daily.parquet:
  - trade_date
  - close
test_design:
  description: Grid search over CSI 300 rolling lookback [5, 10, 20, 40, 60] trading
    days and return threshold [-0.02, -0.03, -0.05, -0.08, -0.10], with optional buffer_days
    [0, 3, 5]. Compute rolling N-day CSI 300 return = close_t / close_{t-N} - 1. If
    return < threshold, suppress all new entries for that day plus buffer_days. Existing
    positions are unaffected. Run with current baseline backtest parameters, cost-on
    (slippage 0.0015, impact 0.001). Train 2018-2022, test 2023-2026.
success_criteria:
  criteria:
  - test_cost_on_cumulative_excess_compound > baseline_test_cost_on_cumulative_excess_compound
  - test_cost_on_max_drawdown < baseline_test_cost_on_max_drawdown
  - candidate_count >= 20% of unfiltered baseline candidate count
  - any_holdout_year_sharpe >= 0
falsifiers:
  train: &id001
  - No grid cell improves both cumulative excess and max drawdown vs baseline
  - All grid cells reduce candidate count below 20% of baseline
  - Best grid cell worsens any single-year drawdown by >5pp vs baseline
  validate: *id001
  test: *id001
risk: 'Low. Entry gate is a pure overlay that can be disabled without structural changes.
  Worst case: filters too aggressively and misses valid entries, hurting returns.
  The 20% candidate floor prevents total signal destruction. Unlike the bond-floor-entry-filter
  (which failed mechanical_thresholds due to per-CB candidate starvation), a market-level
  gate suppresses entries only on rare stress days and preserves the full candidate
  pool on normal days.'
why_not_repeated_failure: 'This is not a renamed repeat of any closed direction. The
  closed ''global_option_entry_gate'' tag is specific to option-sourced entry gating,
  not CSI 300 market-level drawdown filtering. The bond-floor-entry-filter_v1 failed
  due to candidate starvation from a per-CB valuation-anchor filter — a fundamentally
  different mechanic. No recent run has tested market-level entry gating. The pnl_feedback_scaling
  and volatility_position_scaling families failed adoption because they modified position
  sizing, not entry eligibility. This proposal targets a completely orthogonal dimension:
  broad market timing of entries.'
related_prior_runs:
- cb_arb_value_gap_switch_bond-floor-entry-filter_v1
- cb_arb_value_gap_switch_regime_adaptive_exit_v1
implementation_assumption: The executor applies the CSI 300 rolling-return binary
  mask to the daily value_gap_amounts table before the backtester selects candidates.
  The core ranking (value_gap_amount descending), position sizing, and exit logic
  remain unchanged from the current baseline. Buffer days extend the suppression window
  after a drawdown signal triggers, preventing whipsaw re-entry.
