- State-conditioned single-dimension entry filters as a class — reinforces single_filter_dead_end.
learnings:
- train_falsifier_pipeline now operational and correctly catches mechanical false-positives.
- Daily regime classifier (strong/neutral/flat_weak/weak) does not provide enough
  lift to convert option-entry filter from rejected (global) to adopted (state-conditioned).
- 2020 weakness is robust to conditional filtering — likely a market-wide regime shift,
  not a candidate-selection problem solvable by entry gating.
follow_up_actions:
- Close the option-entry-gate / regime-conditioned variant family. No further entry-time
  filter variants without genuinely new action mechanism (e.g. position sizing by
  regime, hedging overlay) — not just selection threshold.
- 'Consider stepping back: 2020 is the dominant failure mode across all batches. Direct
  attack on 2020 (e.g. hedge / cash-shift overlay / smaller capital deployment during
  specific market regimes) may be more productive than candidate selection tweaks.'
