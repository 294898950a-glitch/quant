  - data/cb_warehouse/cb_daily.parquet
  test_design:
    description: 'Grid search over IV percentile thresholds (e.g. 80, 85, 90, 95)
      and minimum hold days (1, 5, 10). For each open position, compute the CB’s implied
      volatility (via a suitable pricing model or stock‑vol proxy), then calculate
      its rolling 252‑day percentile rank. Exit the position when IV rank exceeds
      the threshold, subject to the min‑hold constraint. Evaluate on train (2019‑2024)
      and select the variant with the highest Sharpe ratio or composite score. Validate
      on 2020 repair year and on the sealed test period (2025‑01 to present).

      '
  success_criteria:
    criteria:
    - selected_test.total_return > baseline_test.total_return
    - selected_test.max_drawdown <= baseline_test.max_drawdown
    - selected_2020.total_return > baseline_2020.total_return
    - selected_2020.max_drawdown <= baseline_2020.max_drawdown
    - selected_test.excess_return > 0
  falsifiers:
    train:
    - No grid variant simultaneously beats baseline on both test and 2020 total return
      and max drawdown.
    - The selected variant’s test max drawdown exceeds baseline by more than 0.5 pp.
    validate:
    - No grid variant simultaneously beats baseline on both test and 2020 total return
      and max drawdown.
    - The selected variant’s test max drawdown exceeds baseline by more than 0.5 pp.
    test:
    - No grid variant simultaneously beats baseline on both test and 2020 total return
      and max drawdown.
    - The selected variant’s test max drawdown exceeds baseline by more than 0.5 pp.
  risk: 'CB IV estimation can be noisy; using a stock‑vol proxy may dilute the regime
    signal. A very conservative threshold may exit too late to avoid large losses,
    while a too‑early threshold may cut winning positions prematurely.

    '
  why_not_repeated_failure: 'Previous exit experiments (dynamic trail, profit‑taking,
    adaptive gap) relied on gap‑closure or PnL‑based logic. The IV‑percentile exit
    introduces a market‑wide volatility regime filter that is absent from those attempts
    and is not covered by the closed `regime_classifier_variant` family (it conditions
    exit, not entry).

    '
