implementation_outline:
  script_path: scripts/evaluate_cb_arb_volatility_position_scaling_reverse.py
  main_inputs:
  - data_root
  - train_start
  - train_end
  - test_start
  - test_end
  - output_dir
  - volatility_lookback
  - scaling_beta
  - max_hold_days
  - min_gap_pct
  - sell_gap_pct
  - switch_hurdle_pct
  core_steps:
  - Load daily_value_gap_amounts.parquet and filter value_gap_amount > 0
  - Sort value_gap_amount ASCENDING (least-positive gap first — reverse direction)
  - Load stk_daily_qfq.parquet and compute rolling ATR per CB using stock close prices
    over volatility_lookback window
  - Compute ATR rank per day per CB (rank 1 = lowest ATR, highest weight)
  - Apply inverse scaling: position_weight = baseline_weight * (scaling_beta / ATR_rank)
  - Select top N candidates by ascending value_gap_amount (reverse order)
  - Run backtest with reverse-direction exit: max_hold_days forced exit, min_gap_pct
      minimum gap to hold, sell_gap_pct exit gap threshold, switch_hurdle_pct switching
      friction
  - Apply cost model: slippage 0.0015, market_impact 0.001
  - Grid search over volatility_lookback × scaling_beta × max_hold_days × min_gap_pct
    × switch_hurdle_pct
  - Split: train 2018-01-01 to 2022-12-31, test 2023-01-01 to 2026-05-08
  - Select best grid candidate by train excess return and report test-period results
  - Write summary.json with adoption_pass, report.yaml with metrics, l4_ack.yaml,
    diagnostic.yaml with grid sweep diagnostics
  code_constraints:
  - Sort value_gap_amount ASCENDING (reverse direction); do NOT sort DESCENDING
  - Keep value_gap_amount > 0 filter unchanged from base
  - Use stk_daily_qfq close for ATR computation (stock-level volatility, not CB-level)
  - Do not remove any candidates — position scaling is weight-only, no entry filter
  - Do not modify cb_warehouse data files
  - Output all four required artifacts: summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml
  - summary.json must contain adoption_pass boolean field
  - Define main() entry point; declare_data_requirements(command, spec) must be called
    before main logic
  - Import GateKeeper from scripts.gatekeeper
validation_plan:
- python3 -m py_compile generated_executor/evaluate_cb_arb_volatility_position_scaling_reverse.py
- Verify ASCENDING sort is applied (spot-check value_gap_amount order on a sample
  date)
- Verify ATR is computed from stk_daily_qfq close (not cb_daily close)
- Run a 3-month smoke test (e.g., 2023-01 to 2023-03) to confirm no runtime errors
- Verify all four artifacts exist and summary.json contains adoption_pass
- Check that no cb_warehouse files were modified
