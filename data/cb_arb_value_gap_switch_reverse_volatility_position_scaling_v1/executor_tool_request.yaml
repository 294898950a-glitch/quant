    >0 filter unchanged) to operate in the proven reverse direction. Computes ATR
    from stk_daily_qfq close prices per CB per day, then applies inverse scaling:
    position_weight = baseline * (scaling_beta / ATR_rank). Runs grid search over
    ATR lookback [10, 20, 40, 60] and scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit:
    reverse-probe grid (max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01],
    sell_gap_pct 0.0, switch_hurdle_pct [0.0, 0.01]). Cost-on (slippage 0.0015, impact
    0.001). Train 2018-2022, test 2023-2026. Does not remove candidates — all entries
    passing the >0 filter are eligible; only allocation weights adjust.'
