tool_request_id: volatility_based_position_scaling_executor_reverse_v1
why_existing_tools_insufficient: 'volatility_based_position_scaling_executor (id=volatility_based_position_scaling_executor,
  status=implemented) is the closest match — it computes ATR from stk_daily_qfq close
  and applies inverse scaling to position weights via C001. However, it hardcodes
  value_gap_amount sort direction as DESCENDING (forward: most-underpriced first).
  The proposal requires ASCENDING sort (reverse direction: least-positive gap first,
  which the reverse-probe-coston baseline proved works at +30.3% test excess cost-on).
  No sort_direction parameter exists on the executor; the sort is baked into the implementation.
  A reverse variant or parameterized sort is required. The executor is not obsolete
  and is the correct base to extend from.

  option_position_sizing (id=option_position_sizing, status=implemented) also tests
  C001 but is marked OBSOLETE (obsolescence_date=2026-05-22) for lacking declare_data_requirements.
  Even if revived, its position scaling is combined with entry filters (C002 bond
  floor threshold, C003 moneyness threshold) that remove candidates — the proposal
  explicitly avoids candidate removal and only adjusts weights.

  option_source_pnl_feedback_scaler (id=option_source_pnl_feedback_scaler, status=implemented)
  tests C001 but uses rolling realized PnL feedback as the scaling signal, not ATR/volatility.
  The proposal specifically requires inverse-ATR weighting with grid search over ATR
  lookback and scaling strength. Different scaling mechanism, different grid parameters.
  PnL feedback is a fundamentally different signal (realized past returns vs. current
  market volatility).'
reviewed_existing_executor_ids:
- volatility_based_position_scaling_executor
- option_position_sizing
- option_source_pnl_feedback_scaler
