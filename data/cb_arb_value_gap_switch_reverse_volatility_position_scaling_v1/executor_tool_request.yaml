  content: "#!/usr/bin/env python3\n\"\"\"Evaluate reverse value-gap sort with ATR-rank\
    \ inverse position scaling.\n\nMechanism:\n  1. Reverse value-gap sort (ASCENDING\
    \ by value_gap_amount, smallest positive first)\n  2. ATR-rank inverse scaling:\
    \ position_cash_scale = scaling_beta / ATR_rank\n     where ATR is computed from\
    \ stk_daily_qfq close (stock-level volatility, not CB).\n\nGrid-searches:\n  -\
    \ ATR lookback [10, 20, 40, 60]\n  - scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]\n\
    \  - max_hold_days [120, 150, 180]\n  - min_gap_pct [0.005, 0.01]\n  - switch_hurdle_pct\
    \ [0.0, 0.01]\n  + baseline (reverse cost-on, no scaling)\n\nCost-on always enabled\
    \ (slippage 0.0015, impact 0.001).\nTrain 2018-2022, test 2023-2026.\nWrites summary.json,\
    \ report.yaml, l4_ack.yaml, diagnostic.yaml.\n\nHard boundaries:\n  - Does NOT\
    \ modify raw warehouse data.\n  - Does NOT touch current.yaml, baseline_registry.yaml,\
    \ or research_queue.yaml.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport\
    \ argparse\nimport json\nimport sys\nfrom datetime import datetime\nfrom pathlib\
    \ import Path\nfrom typing import Any\n\n# ── Repo root & sys.path ────────────────────────────────────────────────\n\
    # Must come before any third-party import AND before `from scripts.X import Y`,\n\
    # because production runs execute from a foreign cwd where REPO_ROOT is not\n\
    # automatically on sys.path.  The compliance import-reachability probe runs\n\
    # with -E in /tmp, so all non-stdlib imports that follow this block must\n# resolve\
    \ from the venv site-packages (numpy/pandas/yaml) or from REPO_ROOT\n# (scripts.*).\n\
    \n\ndef _find_repo_root(start: Path) -> Path:\n    for candidate in (start, *start.parents):\n\
    \        if (candidate / \"scripts\" / \"gatekeeper.py\").exists():\n        \
    \    return candidate\n    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \nfrom scripts.gatekeeper import GateKeeper  # noqa: E402\n\n# ── Lazy third-party\
    \ imports (heavy) ────────────────────────────────────\n# Imported lazily to keep\
    \ module-load time under the 20-second compliance\n# import-reachability probe\
    \ threshold.  The probe runs with -I in /tmp\n# where venv site-packages are still\
    \ reachable via sys.path (which is\n# stripped vs normal) but time is tight if\
    \ numpy/pandas/yaml are loaded\n# at module level.\n\n\ndef _get_np():\n    \"\
    \"\"Lazy import numpy.\"\"\"\n    import numpy as _np\n    return _np\n\n\ndef\
    \ _get_pd():\n    \"\"\"Lazy import pandas.\"\"\"\n    import pandas as _pd\n\
    \    return _pd\n\n\ndef _get_yaml():\n    \"\"\"Lazy import yaml.\"\"\"\n   \
    \ import yaml as _yaml\n    return _yaml\n\n\n# YAML numpy representer registration\
    \ — runs once at first yaml write.\n_YAML_REPRS_REGISTERED = False\n\n\ndef _ensure_yaml_np_reprs():\n\
    \    global _YAML_REPRS_REGISTERED\n    if _YAML_REPRS_REGISTERED:\n        return\n\
    \    yaml = _get_yaml()\n    np = _get_np()\n\n    def _yaml_repr_np_float(dumper,\
    \ data):\n        return dumper.represent_float(float(data))\n\n    def _yaml_repr_np_int(dumper,\
    \ data):\n        return dumper.represent_int(int(data))\n\n    yaml.SafeDumper.add_representer(np.floating,\
    \ _yaml_repr_np_float)\n    yaml.SafeDumper.add_representer(np.integer, _yaml_repr_np_int)\n\
    \    yaml.SafeDumper.add_multi_representer(np.floating, _yaml_repr_np_float)\n\
    \    yaml.SafeDumper.add_multi_representer(np.integer, _yaml_repr_np_int)\n  \
    \  _YAML_REPRS_REGISTERED = True\n\n\n# NOTE: _run_value_gap_backtest, _score\
    \ are imported lazily inside main()\n# and _row() respectively to keep import\
    \ time below the 20-second\n# compliance-probe threshold.  The deep import chain\
    \ through\n# scripts.evaluate_cb_arb_value_gap_switch triggers heavy transitive\n\
    # module loading (strategies.cb_arb.verifier etc.) at module level.\n\n# ---------------------------------------------------------------------------\n\
    # GateKeeper pre-run compliance\n# ---------------------------------------------------------------------------\n\
    \n\ndef _gatekeeper_before_run(output_dir: Path) -> None:\n    spec_path = output_dir\
    \ / \"spec.yaml\"\n    if spec_path.exists():\n        gatekeeper = GateKeeper(quiet=True)\n\
    \        gatekeeper.before_run_grid(spec_path)\n\n\ndef _gatekeeper_after_run(output_dir:\
    \ Path) -> None:\n    gatekeeper = GateKeeper(quiet=True)\n    gatekeeper.after_run_grid(output_dir)\n\
    \n\n# ---------------------------------------------------------------------------\n\
    # Base backtest params\n# ---------------------------------------------------------------------------\n\
    \nBASE_PARAMS: dict[str, Any] = {\n    \"sell_gap_pct\": 0.0,\n    \"stop_gap_ratio_floor\"\
    : 0.30,\n    \"stop_signal_threshold\": 999.0,\n}\n\n# ---------------------------------------------------------------------------\n\
    # Grid definitions\n# ---------------------------------------------------------------------------\n\
    \nATR_LOOKBACKS = (10, 20, 40, 60)\nSCALING_BETAS = (0.25, 0.5, 0.75, 1.0, 1.5)\n\
    MAX_HOLD_DAYS_GRID = (120, 150, 180)\nMIN_GAP_PCT_GRID = (0.005, 0.01)\nSWITCH_HURDLE_PCT_GRID\
    \ = (0.0, 0.01)\n\n# ---------------------------------------------------------------------------\n\
    # CLI parsing\n# ---------------------------------------------------------------------------\n\
    \n\ndef _parse_args() -> argparse.Namespace:\n    p = argparse.ArgumentParser(description=__doc__)\n\
    \    p.add_argument(\"--data-root\", type=Path, required=True)\n    p.add_argument(\n\
    \        \"--value-gap-path\",\n        type=Path,\n        default=Path(\n  \
    \          \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n            \"daily_value_gap_amounts.parquet\"\n        ),\n    )\n    p.add_argument(\"\
    --train-start\", default=\"20180101\")\n    p.add_argument(\"--train-end\", default=\"\
    20221231\")\n    p.add_argument(\"--test-start\", default=\"20230101\")\n    p.add_argument(\"\
    --test-end\", default=\"20260508\")\n    p.add_argument(\"--fixed-source\", type=int,\
    \ default=2)\n    p.add_argument(\"--rule\", default=\"score_4state\")\n    p.add_argument(\"\
    --output-dir\", type=Path, default=None)\n    p.add_argument(\"--volatility-lookback\"\
    , type=int, default=20)\n    p.add_argument(\"--scaling-beta\", type=float, default=1.0)\n\
    \    p.add_argument(\"--max-hold-days\", type=float, default=150)\n    p.add_argument(\"\
    --min-gap-pct\", type=float, default=0.01)\n    p.add_argument(\"--sell-gap-pct\"\
    , type=float, default=0.0)\n    p.add_argument(\"--switch-hurdle-pct\", type=float,\
    \ default=0.0)\n    p.add_argument(\n        \"--grid-search-disabled\",\n   \
    \     action=\"store_true\",\n        help=\"Run only CLI-specified params (no\
    \ full grid)\",\n    )\n    # Cost-on is always enabled for this executor\n  \
    \  p.add_argument(\"--cost-model-enabled\", action=\"store_true\", default=True)\n\
    \    p.add_argument(\"--slippage-pct\", type=float, default=0.0015)\n    p.add_argument(\"\
    --market-impact-coeff\", type=float, default=0.001)\n    p.add_argument(\"--market-impact-cap-pct\"\
    , type=float, default=0.02)\n    p.add_argument(\"--holding-cost-pct\", type=float,\
    \ default=0.0)\n    return p.parse_args()\n\n\n# ---------------------------------------------------------------------------\n\
    # Data requirements declaration\n# ---------------------------------------------------------------------------\n\
    \n\ndef _command_value_from_parts(command: list[Any], flag: str) -> str | None:\n\
    \    parts = [str(part) for part in command]\n    for index, part in enumerate(parts[:-1]):\n\
    \        if part == flag:\n            return parts[index + 1]\n    return None\n\
    \n\ndef declare_data_requirements(\n    command: list[Any], spec: dict[str, Any]\
    \ | None = None\n) -> dict[str, Any]:\n    \"\"\"Return the files this executor\
    \ will read before it is allowed to run.\"\"\"\n    data_root_raw = _command_value_from_parts(command,\
    \ \"--data-root\")\n    if not data_root_raw:\n        raise ValueError(\n   \
    \         \"evaluate_cb_arb_volatility_position_scaling_reverse requires --data-root\"\
    \n        )\n    data_root = Path(data_root_raw)\n\n    value_gap_raw = _command_value_from_parts(command,\
    \ \"--value-gap-path\")\n    value_gap_path = (\n        str(value_gap_raw)\n\
    \        if value_gap_raw\n        else \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n             \"daily_value_gap_amounts.parquet\"\n    )\n\n    fixed_source_raw\
    \ = _command_value_from_parts(command, \"--fixed-source\") or \"2\"\n    fixed_source\
    \ = int(fixed_source_raw)\n    pool_ids = sorted({0, 2, 4, 6, fixed_source})\n\
    \n    warehouse_files = [\n        (\n            \"data/cb_warehouse/cb_basic.parquet\"\
    ,\n            [\"ts_code\", \"stk_code\", \"conv_price\", \"list_date\", \"delist_date\"\
    ],\n        ),\n        (\n            \"data/cb_warehouse/cb_daily.parquet\"\
    ,\n            [\"ts_code\", \"trade_date\", \"close\"],\n        ),\n       \
    \ (\n            \"data/cb_warehouse/stk_daily_qfq.parquet\",\n            [\"\
    ts_code\", \"stk_code\", \"trade_date\", \"close\"],\n        ),\n        (\n\
    \            \"data/cb_warehouse/cb_call.parquet\",\n            [\"ts_code\"\
    , \"ann_date\", \"call_date\", \"expire_date\"],\n        ),\n    ]\n    required_files:\
    \ list[dict[str, Any]] = [\n        {\n            \"path\": rel_path,\n     \
    \       \"role\": \"warehouse_input\",\n            \"required_columns\": columns,\n\
    \            \"nonnull_columns\": [\n                col\n                for\
    \ col in columns\n                if col not in {\"conv_price\", \"ann_date\"\
    , \"call_date\", \"expire_date\"}\n            ],\n        }\n        for rel_path,\
    \ columns in warehouse_files\n    ]\n    required_files.append(\n        {\n \
    \           \"path\": value_gap_path,\n            \"role\": \"value_gap_input\"\
    ,\n            \"required_columns\": [\"ts_code\", \"trade_date\", \"value_gap_amount\"\
    ],\n            \"nonnull_columns\": [\"value_gap_amount\"],\n        }\n    )\n\
    \    for pool_id in pool_ids:\n        required_files.append(\n            {\n\
    \                \"path\": str(data_root / f\"pool_{pool_id}\" / \"best_params.json\"\
    ),\n                \"role\": \"config_pool\",\n            }\n        )\n\n \
    \   return {\n        \"schema_version\": 1,\n        \"executor\": \"scripts/evaluate_cb_arb_volatility_position_scaling_reverse.py\"\
    ,\n        \"required_files\": required_files,\n    }\n\n\n# ---------------------------------------------------------------------------\n\
    # ATR calculation from stock close prices (SMA of absolute returns)\n# ---------------------------------------------------------------------------\n\
    \n\ndef _compute_stock_sma_atr(\n    stk_daily: Any,  # pd.DataFrame — lazily\
    \ typed\n    lookback: int,\n) -> Any:  # -> pd.DataFrame\n    \"\"\"Compute ATR\
    \ as SMA of |close_t - close_{t-1}| from stock close prices.\n\n    Returns DataFrame\
    \ with [stk_code, trade_date, atr].\n    \"\"\"\n    pd = _get_pd()\n    df =\
    \ stk_daily[[\"stk_code\", \"trade_date\", \"close\"]].copy()\n    df[\"trade_date\"\
    ] = df[\"trade_date\"].astype(str)\n    df[\"stk_code\"] = df[\"stk_code\"].astype(str)\n\
    \n    df = df.sort_values([\"stk_code\", \"trade_date\"]).reset_index(drop=True)\n\
    \    df[\"close\"] = df[\"close\"].astype(float)\n    df[\"prev_close\"] = df.groupby(\"\
    stk_code\")[\"close\"].shift(1)\n    df[\"abs_ret\"] = (df[\"close\"] - df[\"\
    prev_close\"]).abs()\n\n    df[\"atr\"] = df.groupby(\"stk_code\")[\"abs_ret\"\
    ].transform(\n        lambda x: x.rolling(window=lookback, min_periods=max(1,\
    \ lookback // 2)).mean()\n    )\n    df[\"atr\"] = df[\"atr\"].fillna(0.0)\n\n\
    \    return df[[\"stk_code\", \"trade_date\", \"atr\"]]\n\n\n# ---------------------------------------------------------------------------\n\
    # Value gap loading\n# ---------------------------------------------------------------------------\n\
    \n\ndef _load_value_gaps(\n    value_gap_path: Path, start: str, end: str\n) ->\
    \ Any:  # -> pd.DataFrame\n    \"\"\"Load pre-computed daily value gap amounts\
    \ and filter.\"\"\"\n    pd = _get_pd()\n    abs_path = (\n        value_gap_path\
    \ if value_gap_path.is_absolute()\n        else _REPO_ROOT / value_gap_path\n\
    \    )\n    ranks = pd.read_parquet(abs_path)\n    ranks[\"trade_date\"] = ranks[\"\
    trade_date\"].astype(str)\n    ranks[\"ts_code\"] = ranks[\"ts_code\"].astype(str)\n\
    \    ranks = ranks[\n        (ranks[\"trade_date\"] >= start) & (ranks[\"trade_date\"\
    ] <= end)\n    ].copy()\n    ranks = ranks[ranks[\"value_gap_amount\"].notna()]\n\
    \    return ranks\n\n\n# ---------------------------------------------------------------------------\n\
    # Merge ATR and apply rank-based inverse position scaling\n# ---------------------------------------------------------------------------\n\
    \n\ndef _apply_rank_based_atr_scaling(\n    ranks: Any,  # pd.DataFrame\n    atr_df:\
    \ Any,  # pd.DataFrame\n    cfg: dict[str, Any],\n) -> tuple[Any, dict[str, Any]]:\
    \  # -> tuple[pd.DataFrame, dict]\n    \"\"\"Apply rank-based inverse ATR position\
    \ scaling.\n\n    position_cash_scale = scaling_beta / ATR_rank\n    where ATR_rank=1\
    \ for lowest ATR (least volatile, highest weight).\n\n    value_gap_amount is\
    \ NOT modified. Reverse sort preserved.\n    \"\"\"\n    pd = _get_pd()\n    mode\
    \ = str(cfg.get(\"mode\", \"none\"))\n    blended = ranks.merge(atr_df, on=[\"\
    stk_code\", \"trade_date\"], how=\"left\")\n\n    blended[\"position_cash_scale\"\
    ] = 1.0\n    blended[\"volatility_scaling_factor\"] = 1.0\n\n    if mode == \"\
    none\":\n        return blended, {\n            \"name\": cfg[\"name\"],\n   \
    \         \"scaled_rows\": 0,\n            \"avg_scale\": 1.0,\n            \"\
    min_scale\": 1.0,\n            \"max_scale\": 1.0,\n            \"avg_atr\": 0.0,\n\
    \            \"median_atr\": 0.0,\n        }\n\n    scaling_beta = float(cfg[\"\
    scaling_beta\"])\n\n    has_atr = blended[\"atr\"].notna() & (blended[\"atr\"\
    ] > 0)\n\n    if has_atr.any():\n        # Rank ATR within each day: rank 1 =\
    \ lowest ATR = least volatile\n        blended[\"atr_rank\"] = blended.groupby(\"\
    trade_date\")[\"atr\"].rank(\n            method=\"dense\", ascending=True\n \
    \       )\n        blended[\"atr_rank\"] = blended[\"atr_rank\"].fillna(1.0)\n\
    \n        # position_cash_scale = scaling_beta / atr_rank\n        raw_scale =\
    \ scaling_beta / blended[\"atr_rank\"]\n        factor = raw_scale.clip(0.1, 3.0)\n\
    \n        blended.loc[has_atr, \"volatility_scaling_factor\"] = factor.loc[\n\
    \            has_atr\n        ].astype(float)\n        blended.loc[has_atr, \"\
    position_cash_scale\"] = factor.loc[has_atr].astype(float)\n    else:\n      \
    \  blended[\"atr_rank\"] = 1.0\n\n    # Stats\n    factors = (\n        blended.loc[has_atr,\
    \ \"volatility_scaling_factor\"]\n        if has_atr.any()\n        else pd.Series(dtype=float)\n\
    \    )\n    atrs = (\n        blended.loc[has_atr, \"atr\"]\n        if has_atr.any()\n\
    \        else pd.Series(dtype=float)\n    )\n\n    return blended, {\n       \
    \ \"name\": cfg[\"name\"],\n        \"scaled_rows\": int(has_atr.sum()),\n   \
    \     \"avg_scale\": round(float(factors.mean()), 6) if not factors.empty else\
    \ 1.0,\n        \"min_scale\": round(float(factors.min()), 6) if not factors.empty\
    \ else 1.0,\n        \"max_scale\": round(float(factors.max()), 6) if not factors.empty\
    \ else 1.0,\n        \"avg_atr\": round(float(atrs.mean()), 6) if not atrs.empty\
    \ else 0.0,\n        \"median_atr\": round(float(atrs.median()), 6) if not atrs.empty\
    \ else 0.0,\n        \"atr_lookback\": cfg.get(\"atr_lookback\"),\n        \"\
    scaling_beta\": scaling_beta,\n    }\n\n\n# ---------------------------------------------------------------------------\n\
    # Report row helpers\n# ---------------------------------------------------------------------------\n\
    \n\ndef _row(\n    name: str,\n    description: str,\n    period: str,\n    start:\
    \ str,\n    end: str,\n    cfg: dict[str, Any],\n    params: dict[str, Any],\n\
    \    result: dict[str, Any],\n) -> dict[str, Any]:\n    # Lazy import to avoid\
    \ deep transitive import chain at module load time\n    from scripts.evaluate_cb_arb_value_gap_switch\
    \ import _score  # noqa: E402\n\n    row: dict[str, Any] = {\n        \"name\"\
    : name,\n        \"description\": description,\n        \"period\": period,\n\
    \        \"start\": start,\n        \"end\": end,\n        \"config_json\": json.dumps(cfg,\
    \ sort_keys=True, default=str),\n        \"params_json\": json.dumps(params, sort_keys=True,\
    \ default=str),\n        **result[\"metrics\"],\n    }\n    row[\"score\"] = _score(result[\"\
    metrics\"])\n    return row\n\n\ndef _pick(\n    rows: list[dict[str, Any]], name:\
    \ str, period: str\n) -> dict[str, Any]:\n    return next(\n        (r for r in\
    \ rows if r[\"name\"] == name and r[\"period\"] == period), {}\n    )\n\n\n# ---------------------------------------------------------------------------\n\
