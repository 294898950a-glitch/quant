test_design:
  description: 'Grid search over ATR lookback [10, 20, 40, 60] and scaling strength
    [0.25, 0.5, 0.75, 1.0, 1.5]. Sort value_gap_amount ASCENDING (reverse direction,
    >0 filter unchanged). Compute ATR from stk_daily_qfq close. Apply inverse scaling:
    position_weight = baseline * (strength / ATR_rank). Exit: standard reverse-probe
    grid (max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct 0.0,
    switch_hurdle_pct [0.0, 0.01]). Cost-on (slippage 0.0015, impact 0.001). Train
    2018-2022, test 2023-2026. Compare best candidate vs reverse-probe-coston.

    '
