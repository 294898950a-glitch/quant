hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on) is the only
  proven alpha direction. Position scaling via inverse ATR is a noise-reduction overlay
  that does not remove candidates — it only adjusts allocation weights. Unlike entry
  filters (moneyness, bond floor) which culled the reverse candidate pool and killed
  the signal, position scaling preserves all candidates, making it strictly less destructive.
  Hypothesis: inverse-ATR weighting applied to the ASCENDING-sort base reduces drawdowns
  while preserving at least 80% of the +30.3% test excess.

  Repeated-reject-family check (moneyness_stock_to_conv_threshold, 3 rejections):
  This proposal belongs to a DIFFERENT family (reverse_volatility_position_scaling,
  not moneyness). The moneyness family failed because entry filters remove candidates
  from an already-thin reverse pool. Position scaling does the opposite — it keeps
  all candidates and adjusts weights. The underlying signal question has been answered
  by the critical insight (value_gap is anti-informative under current monotonicity;
  reverse direction works). The execution-condition question is orthogonal: entry
  filters = wrong execution for reverse; position scaling = untested execution for
  reverse. Direction is correct (reverse/ASCENDING).

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 (critical, priority 4): reverse-direction
  variants applied to families that previously failed in forward. The forward pnl-feedback-scaling_v1
  failed adoption (adoption_pass=false). Position scaling has NOT been tested in reverse.
  The reverse baseline (reverse-probe-coston) is +30.3% test excess cost-on — a working
  alpha base to build on.

  '
expected_improvement: 'Reduce test max drawdown from -11.3% (reverse baseline) toward
  -8% while keeping test excess return above +24% (80% of baseline). Improve Sharpe
  and Calmar ratios without destroying the core reverse alpha signal.

  '
