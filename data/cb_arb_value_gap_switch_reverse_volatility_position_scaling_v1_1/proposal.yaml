proposal_id: cb_arb_value_gap_switch_reverse_volatility_position_scaling_v1_1
strategy_id: cb_arb_value_gap_switch
family: reverse_volatility_position_scaling
hypothesis: 'Inverse-ATR position weighting applied to the reverse-sorted (ASCENDING
  value_gap_amount) base will reduce drawdowns while preserving at least 80% of the
  +30.3% test excess from the reverse-probe-coston baseline. High-volatility CBs carry
  wider effective spreads and higher market-impact costs; allocating less to high-ATR
  candidates reduces cost drag without removing anyone from the candidate pool. Unlike
  moneyness and bond-floor entry filters — which culled the reverse candidate pool
  and killed the signal — position scaling preserves all entries and only adjusts
  allocation weights. This is the reverse-direction variant of position scaling that
  active_critical_insight value_gap_rank_is_anti_alpha_2026_05_24 priority 4 calls
  for.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: The reverse-direction probe
  (ASCENDING sort) produced +30.3% test excess cost-on vs -10.5% forward — a 41pp
  swing from sort direction alone. The proven reverse base is the correct foundation
  for testing overlays. Priority 4 of this insight explicitly directs: "reverse-direction
  variants applied to families that previously failed in forward (e.g. position sizing)."
  The forward pnl-feedback-scaling_v1 failed (adoption_pass false), but it was stacked
  on the anti-alpha forward base. Testing position scaling on the reverse base isolates
  whether position sizing genuinely adds value or was rejected only because of the
  base signal''s anti-alpha property.

  '
expected_improvement: 'Reduce max drawdown by 3-5pp vs reverse-probe-coston baseline
  (-23.6% train, -11.3% test) while preserving at least 80% of the +30.3% test excess.
  Position scaling does not remove candidates, so it cannot kill the signal the way
  entry filters did.

  '
