    '
  expected_improvement: 'Reduce max drawdown by 3-5pp vs reverse-probe-coston baseline
    (-23.6% train, -11.3% test) while preserving at least 80% of the +30.3% test excess.
    Position scaling does not remove candidates, so it cannot kill the signal the
    way entry filters did.

    '
  capability_ids:
  - C001
  required_executor: evaluate_cb_arb_volatility_position_scaling_reverse
  required_data: []
  required_data_fields: {}
  test_design:
    description: 'Sort value_gap_amount ASCENDING (>0 filter unchanged). Compute ATR
      from stk_daily_qfq close per CB per day. Apply inverse scaling: position_weight
      = baseline * (scaling_beta / ATR_rank). Grid search over ATR lookback [10, 20,
      40, 60] and scaling_beta [0.25, 0.5, 0.75, 1.0, 1.5]. Exit: reverse-probe grid
      with max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct
      0.0, switch_hurdle_pct [0.0, 0.01]. Cost-on (slippage 0.0015, impact 0.001).
      Train 2018-2022, test 2023-2026. Best grid result compared against reverse-probe-coston
      baseline (+30.3% test excess).

      '
  success_criteria:
    criteria:
    - Test cumulative excess return >= 0.20 (preserves >= 66% of +30.3% baseline)
    - Test max drawdown improved (less negative) vs reverse-probe-coston baseline
      (-11.3%)
    - Test Sharpe >= 1.0
    - Train cumulative excess > 0
  falsifiers:
    train:
    - Test cumulative excess return < 0.15 (less than 50% of baseline preserved)
    - Test max drawdown worse (more negative) than reverse-probe-coston baseline
    - Test Sharpe < 0.5
    - Best grid params at boundary of search range (suggests misspecified search space)
    validate:
    - Test cumulative excess return < 0.15 (less than 50% of baseline preserved)
    - Test max drawdown worse (more negative) than reverse-probe-coston baseline
    - Test Sharpe < 0.5
    - Best grid params at boundary of search range (suggests misspecified search space)
    test:
    - Test cumulative excess return < 0.15 (less than 50% of baseline preserved)
    - Test max drawdown worse (more negative) than reverse-probe-coston baseline
    - Test Sharpe < 0.5
    - Best grid params at boundary of search range (suggests misspecified search space)
  risk: 'Low-to-medium. Position scaling is a proven technique in multi-asset portfolios
    and cannot destroy the underlying alpha — at worst it dilutes it. The main risk
    is that ATR in CB space is dominated by equity volatility rather than CB-specific
    liquidity costs, making the scaling factor noisy rather than harmful. The reverse
    entry filter failures are NOT a risk here because position scaling does not remove
    candidates.

    '
  why_not_repeated_failure: 'This proposal uses C001 (position scaling), not C002/C003
    (entry filters). The moneyness_stock_to_conv_threshold repeated-reject family
    is about C003 — entry filters that remove candidates from the pool. Both forward
    and reverse moneyness filters failed mechanical thresholds, as did reverse bond-floor.
    The pattern is clear: any filter that culls the reverse candidate pool kills the
    signal because the reverse strategy works by taking ALL small-positive-gap candidates.
    Position scaling (C001) is fundamentally different: it preserves every candidate
    and only adjusts allocation weights. The forward pnl-feedback-scaling_v1 also
    failed, but it was stacked on the anti-alpha forward base. Testing position scaling
    on the proven reverse base is not a renamed repeat — it tests whether a family
    (position sizing) was rejected because of the base signal''s anti-alpha property,
    not because position scaling is useless. This directly addresses active_critical_insight
    value_gap_rank_is_anti_alpha_2026_05_24 priority 4.

    '
