  source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: The reverse-direction
    probe (ASCENDING sort) produced +30.3% test excess cost-on vs -10.5% forward —
    a 41pp swing from sort direction alone. The proven reverse base is the correct
    foundation for testing overlays. Priority 4 of this insight explicitly directs:
    "reverse-direction variants applied to families that previously failed in forward
    (e.g. position sizing)." The forward pnl-feedback-scaling_v1 failed (adoption_pass
