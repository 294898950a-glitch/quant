strategy_id: cb_arb_value_gap_switch
family: cb_arb_switch
hypothesis: Switching behavior based on a dynamic market regime classification improves
  risk-adjusted returns in CB arbitrage by adapting entry and position sizing to favorable
  conditions.
success_criteria:
  description: Out-of-sample Sharpe ratio improvement of at least 0.2 over a static
    baseline, with no increase in max drawdown.
expected_improvement: Sharpe ratio improvement by 0.2-0.4, reduced downside volatility.
falsifiers:
  train:
    description: In‑sample regime classification lacks statistical significance or
      fails to identify distinct value‑gap dynamics, leading to unstable model fit.
  validate:
    description: Validation Sharpe ratio shows no improvement over baseline; regime
      switch yields no risk‑adjusted benefit or increased tail risk during validation.
  test:
    description: Out‑of‑sample test fails to replicate improvement; Sharpe ratio not
      significantly higher, and/or beta sensitivity or max drawdown worsens.
implementation_assumption: A reliable daily regime-classification model can be constructed
  using historical data and applied without look-ahead bias.
risk: Regime overfitting; latency in regime detection causing adverse entry; model
  complexity leading to brittle behavior.
source_insight: Value gaps in CB arbitrage exhibit different mean-reversion dynamics
  across volatility and credit regimes.
related_prior_runs: []
why_not_repeated_failure: This strategy explores a new combination of regime-switching
  and CB value-gap execution that has not been tested before.
test_design:
  description: Walk-forward cross-validation over 2018-2025 using daily data; benchmark
    against static value-gap entry with uniform position sizing. Use the dataset from
    cb_arb_value_gap_switch_regime-option-entry-gate for daily value gaps.
