  risk: 'Low-to-medium. The regime classifier adds one parameterized moving part and
    one potential source of look-ahead bias (must use strictly rolling windows with
    no future information). The primary risk is overfitting a two-regime split on
    limited data. Mitigated by testing on held-out years 2022-2025 and comparing against
    a simpler single-schedule baseline that already passed review. Regime misclassification
    at boundary dates is a secondary risk; the grid search should test whether a buffer
    zone between regimes helps.

    '
  why_not_repeated_failure: 'This is not a repeat of any closed or failed direction.
    The closed tag regime_classifier_variant refers to a regime-conditioned option
    entry gate — a different mechanic (entry gating via CSI 300 drawdown thresholds,
    not exit scheduling). The proposed idea conditions exit decay parameters on observable
    market volatility, which is a new combination of two independently validated mechanics
    (duration-adaptive exit accepted + gap-speed-adaptive exit adopted). No prior
    run has tested regime-conditional exit decay schedules. The bond-floor and market-drawdown
    entry filter failures are entry-side mechanics unrelated to exit scheduling.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
  - cb_arb_value_gap_switch_gap-speed-adaptive-exit_2
  implementation_assumption: The executor computes CSI 300 rolling N-day realized
    volatility, ranks it into a percentile over a longer lookback, and classifies
    each day as high-vol or low-vol regime. High-vol regime uses a more aggressive
    decay (lower initial_threshold_fraction, higher decay_period_factor so the exit
    threshold drops faster); low-vol regime uses more patient decay (higher initial_threshold_fraction,
    lower decay_period_factor). Regime is determined daily before any exit decision.
    All other mechanics (entry eligibility, position sizing, ranking) are held constant
    from the baseline. The executor should inherit the duration-adaptive exit framework
    and add a regime-to-params lookup table as its only new component.
