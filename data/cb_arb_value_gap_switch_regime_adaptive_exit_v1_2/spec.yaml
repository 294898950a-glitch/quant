hypothesis: 'The duration-adaptive exit accepted on 2026-05-22 uses a single fixed
  decay schedule (initial_threshold_fraction=0.7, decay_period_factor=0.5) for all
  market conditions. In high-volatility regimes, value gaps close faster; in low-volatility
  regimes, they close slower. Conditioning the decay parameters on a daily CSI 300
  volatility regime classifier will produce regime-specific exit schedules that better
  match gap-closing behavior, improving cumulative excess return by reducing premature
  exits in calm markets and late exits in turbulent markets.

  '
source_insight: 'Two independently validated pieces of evidence converge. (1) Duration-adaptive
  exit was accepted with best params min_hold_days=5, initial_threshold_fraction=0.7,
  decay_period_factor=0.5, effective_max_hold_days=45 — proving the time-decaying
  threshold concept works. (2) Gap-speed-adaptive-exit_2 passed adoption, confirming
  that gap-closing behavior varies systematically with market conditions and that
  adapting exit timing to these conditions improves results. The natural next step
  is to condition the duration-adaptive decay parameters on an observable market regime
  rather than using a one-size-fits-all schedule.

  '
