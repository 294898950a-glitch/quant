    noise, leading to higher cumulative excess and lower drawdown relative to baseline.
  source_insight: Deep OTM CB option values are dominated by time premium and IV assumptions,
    making theoretical-value gaps least reliable and most likely to represent model
    noise rather than tradable mispricing. The accepted duration-adaptive exit (2026-05-22)
    improved exit timing but entry-side signal quality remains unaddressed. Prior
    bond-floor entry filter (C002) failed mechanical thresholds — moneyness attacks
    signal quality from a different dimension (model noise vs downside protection).
  expected_improvement: Reduce max drawdown by 3-5pp while preserving or improving
    cumulative excess returns, by eliminating noise-dominated signals from deep OTM
    candidates.
