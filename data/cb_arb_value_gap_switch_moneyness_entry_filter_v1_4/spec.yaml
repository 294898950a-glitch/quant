  test_design:
    description: Grid search over moneyness thresholds stock_close/conv_price >= [0.5,
      0.6, 0.7, 0.8, 0.9, 1.0] using baseline duration-adaptive exit parameters (min_hold_days=5,
      initial_threshold_fraction=0.7, decay_period_factor=0.5, effective_max_hold_days=45).
      Compare each grid point against baseline on cumulative excess compound, max
      drawdown, and yearly Sharpe. Standard train/test split with cost-on evaluation.
  success_criteria:
    criteria:
    - cumulative_excess_compound > baseline_cost_on_cumulative_excess
    - max_drawdown < baseline_cost_on_max_drawdown
    - at_least_one_holdout_year_sharpe >= 0.5
  falsifiers:
    train:
    - cumulative_excess_compound <= baseline_cost_on_cumulative_excess
    - max_drawdown >= baseline_cost_on_max_drawdown
    - all_holdout_years_sharpe < 0.5
    validate:
    - cumulative_excess_compound <= baseline_cost_on_cumulative_excess
    - max_drawdown >= baseline_cost_on_max_drawdown
    - all_holdout_years_sharpe < 0.5
    test:
    - cumulative_excess_compound <= baseline_cost_on_cumulative_excess
    - max_drawdown >= baseline_cost_on_max_drawdown
    - all_holdout_years_sharpe < 0.5
  risk: Overly aggressive thresholds (>= 0.9) may reduce trade count below statistical
    reliability. Grid includes lenient thresholds (0.5, 0.6) to test this. Deep OTM
    CBs are also the ones with highest potential gap closure — filtering them may
    cap upside in bull regimes.
  why_not_repeated_failure: Moneyness filtering (C003) is fundamentally different
    from bond-floor filtering (C002, failed_mechanical_thresholds). Bond-floor uses
    CB_price / bond_floor as a downside protection gate; moneyness uses stock_close
    / conv_price to screen out deep OTM candidates whose theoretical values are unreliable
    due to IV/time-premium dominance. Bond floor failure mode was likely filtering
    genuine mispricing opportunities; moneyness targets a distinct failure mode —
    model noise in theoretical value calculation for deep OTM CBs. Also distinct from
    market_drawdown_entry_filter and contrarian_drawdown_entry which filter on market-level
    conditions rather than individual candidate signal quality.
  related_prior_runs:
  - cb_arb_value_gap_switch_bond-floor-entry-filter_1
  - cb_arb_value_gap_switch_market_drawdown_entry_filter
  - cb_arb_value_gap_switch_contrarian_drawdown_entry_20260522
  - cb_arb_value_gap_switch_duration-adaptive-exit_2026-05-22
  implementation_assumption: Executor computes stock_close / conv_price for each candidate
    on each trade date using stk_daily_qfq.close and cb_basic.conv_price, applies
    boolean mask to exclude candidates below threshold, and passes filtered candidates
    to the existing backtest pipeline with duration-adaptive exit. Uses cb_call.parquet
    to exclude called/expired CBs. Grid search wrapper runs multiple thresholds and
    reports per-threshold metrics.
