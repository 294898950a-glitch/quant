    \ / f'yearly_{prefix}.csv', index=False)\n    entry_source_2020.to_csv(output_dir\
    \ / f'entry_source_2020_{prefix}.csv', index=False)\n    entry_source_test.to_csv(output_dir\
    \ / f'entry_source_test_{prefix}.csv', index=False)\n    adjustment.to_csv(output_dir\
    \ / f'adjustment_{prefix}.csv', index=False)\n\n    # Save JSON and YAML reports\n\
    \    report = {\n        'summary': summary.to_dict(orient='records'),\n     \
    \   'yearly': yearly.to_dict(orient='records'),\n        'entry_source_2020':\
    \ entry_source_2020.to_dict(orient='records'),\n        'entry_source_test': entry_source_test.to_dict(orient='records'),\n\
    \        'config': vars(args),\n    }\n    with open(output_dir / 'summary.json',\
