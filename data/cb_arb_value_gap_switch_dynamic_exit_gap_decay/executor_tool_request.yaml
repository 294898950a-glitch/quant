tool_request_id: dynamic_exit_gap_decay_executor_v1
why_existing_tools_insufficient: Existing executors 'option_position_sizing' and 'option_source_pnl_feedback_scaler'
  cannot test new exit rules; they only modify position sizing or apply PnL feedback
  scaling without altering the exit logic. The proposed mechanism requires an executor
  that tracks entry gap per position and applies a conditional sell when current gap
  falls below a fraction of entry gap, which is not within the capabilities of existing
  tools.
