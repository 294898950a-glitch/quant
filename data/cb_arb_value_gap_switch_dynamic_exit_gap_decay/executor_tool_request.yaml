tool_request_id: dynamic_exit_gap_decay_executor_v1
why_existing_tools_insufficient: option_position_sizing cannot test exit rules (cannot_test
  includes new_exit_rule, capability C007 missing). It is limited to static position
  sizing and scaling. option_source_pnl_feedback_scaler also cannot test exit rules
  (cannot_test includes new_exit_rule, capability C007 missing). It focuses on rolling
  PnL feedback. Both executors lack the ability to track per-position entry gaps and
  apply a decay-factor-based exit condition required by the proposal.
reviewed_existing_executor_ids:
- option_position_sizing
- option_source_pnl_feedback_scaler
