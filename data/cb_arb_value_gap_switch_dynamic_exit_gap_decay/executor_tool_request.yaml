    \   with open(output_dir / 'diagnostic.yaml', 'w') as f:\n        yaml.dump({'diagnostic':\
    \ 'empty'}, f)\n\n    print(f\"Evaluation complete. Results in {output_dir}\"\
    )\n\nif __name__ == '__main__':\n    main()\n"
validation_plan:
- Check that the executor script runs without errors for a minimal parameter set (e.g.,
  gap_decay_factor=0.5, min_hold_days=1) on a small subset of data.
- Verify that with gap_decay_factor=2.0 and min_hold_days=999, the exit rule never
  triggers early; the resulting trade list should match the baseline option_position_sizing
  strategy (no early exits) for at least the 2020 period. Compare summary statistics
  (total trades, return) to baseline within 0.1% tolerance.
- Verify that with gap_decay_factor=0.1 and min_hold_days=1, the exit rule triggers
  extremely early, leading to fewer trades and different PnL; ensure no negative holding
  days or errors.
- Confirm that all required output artifacts (CSVs, JSON, YAML) are created and contain
  non-empty data (except possibly adjustment if no trades).
- Check that the executor handles periods with no eligible entries or zero trades
  gracefully without crash.
- Validate that exit_reason column correctly labels exits as 'gap_decay' or 'other'.
- Ensure that the number of early exits in 2020 period is higher than in test period
  for aggressive gap_decay_factor, indicating the mechanism is working as intended.
