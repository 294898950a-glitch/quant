    description: Base daily value-gap ranks with theoretical value, bond floor, option
      value, position cash, and tradable gap amount.
    schema_hash: null
  - path: data/cb_warehouse/cb_basic.parquet
    description: CB basic table with stock code and conversion price.
    schema_hash: null
  - path: data/cb_warehouse/stk_daily_qfq.parquet
    description: Forward-adjusted stock prices for compatibility with shared rank
      loader.
    schema_hash: null
  required_config_fields:
  - data_root
  - train_start
  - train_end
  - test_start
  - test_end
  - output_dir
  - gap_decay_factor
  - min_hold_days
  command_template:
  - .venv/bin/python
  - scripts/evaluate_cb_arb_dynamic_exit_gap_decay.py
  - --data-root
  - '{data_root}'
  - --train-start
  - '{train_start}'
  - --train-end
  - '{train_end}'
  - --test-start
  - '{test_start}'
  - --test-end
  - '{test_end}'
  - --output-dir
  - '{output_dir}'
  - --gap-decay-factor
  - '{gap_decay_factor}'
  - --min-hold-days
  - '{min_hold_days}'
  default_config:
    data_root: data/cb_arb_concurrent_supervised_20260511_094500
    train_start: '20190101'
    train_end: '20241231'
    test_start: '20250101'
    test_end: '20260508'
    gap_decay_factor: '0.5'
    min_hold_days: '5'
  artifacts_produced:
  - summary.json
  - report.yaml
  - l4_ack.yaml
  - diagnostic.yaml
  budget_estimate:
    sig_minutes: 0
    spot_minutes: 90
    local_minutes: 0
