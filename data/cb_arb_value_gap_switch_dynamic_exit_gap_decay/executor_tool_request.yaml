    \        \"summary\": reason,\n        \"learnings\": [\n            f\"Gap decay\
    \ factor={params['gap_decay_factor']}, \"\n            f\"min_hold_days={params['min_hold_days']}:\
    \ {reason}\",\n        ],\n        \"follow_up_actions\": (\n            [\"Review\
    \ adoption_pass before promotion.\"]\n            if adoption_pass\n         \
    \   else [\"Do not promote.\"]\n        ),\n    }\n    (output_dir / \"report.yaml\"\
