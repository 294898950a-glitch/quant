  - merge with cb_basic and stk_daily_qfq for position tracking
  - determine entry gaps for each position (first occurrence of non-zero weight)
  - apply exit rule: if current_gap < entry_gap * gap_decay_factor and days held >=
      min_hold_days, close position
  - compute portfolio returns, drawdowns, win rates per period (train/2020/test)
  - write summary.json (including adoption_pass), report.yaml, l4_ack.yaml, diagnostic.yaml
