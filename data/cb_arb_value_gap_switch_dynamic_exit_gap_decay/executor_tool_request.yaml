  vm_local_limits:
    vm_required: true
    local_allowed: false
  obsolescence_date: null
implementation_outline:
  script_path: scripts/evaluate_cb_arb_dynamic_exit_gap_decay.py
  main_inputs:
  - data_root
  - output_dir
  - gap_decay_factor
  - min_hold_days
  core_steps:
  - load base value-gap ranks from daily_value_gap_amounts.parquet
  - merge with cb_basic and stk_daily_qfq for position tracking
  - determine entry gaps for each position (first occurrence of non-zero weight)
  - apply exit rule: if current_gap < entry_gap * gap_decay_factor and days held >=
      min_hold_days, close position
  - compute portfolio returns, drawdowns, win rates per period (train/2020/test)
  - write summary.json (including adoption_pass), report.yaml, l4_ack.yaml, diagnostic.yaml
  code_constraints:
  - use existing project data files only; do not overwrite raw warehouse data
  - do not change current strategy truth
  - declare_data_requirements(command, spec) must be called
  - main() must be defined and produce all required artifacts
validation_plan:
- python3 -m py_compile scripts/evaluate_cb_arb_dynamic_exit_gap_decay.py
- run a small data smoke test (e.g., a single parameter set over a short interval)
- verify that summary.json contains adoption_pass, and that all four required artifacts
  exist
