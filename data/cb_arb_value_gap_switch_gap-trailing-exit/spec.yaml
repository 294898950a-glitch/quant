  proposal_id: cb_arb_value_gap_switch_gap-trailing-exit
  strategy_id: cb_arb_value_gap_switch
  family: exit_rule_trailing_gap
  hypothesis: 'A trailing gap-based exit — exiting when the current gap falls below
    entry_gap multiplied by a decay factor, subject to a minimum holding period —
    will outperform fixed-duration exits by adapting each position''s exit timing
    to the actual path of value convergence. This directly tracks the core alpha signal
    (gap closure) rather than relying on calendar time or fixed gap targets.

    '
  source_insight: 'The duration-adaptive-exit was accepted (best params: min_hold_days=5,
    initial_threshold_fraction=0.7, decay_period_factor=0.5), confirming exit timing
    is a high-leverage improvement area. But it uses a time-decaying threshold on
    the ratio current_gap/entry_gap — the exit decision is time-driven, not gap-driven.
    The profit-taking-exit failed (adoption_pass=False), but that was a fixed target
    exit (exit when gap <= (1-target_fraction)*entry_gap). A trailing stop on gap
    is different: it follows the gap down as it closes and only triggers when the
    gap reverses and expands back above the trailing threshold. This should capture
    more of the convergence move while protecting against gap re-expansion.

    '
  expected_improvement: 'Improved cumulative excess return over the baseline by 2-5pp
    through better capture of gap convergence moves, without increasing max drawdown
    by more than 3pp relative to the baseline cost-on result.

    '
  capability_ids:
  - C007
  required_executor: dynamic_exit_gap_decay_executor
  required_data:
  - path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - path: data/cb_warehouse/cb_basic.parquet
  - path: data/cb_warehouse/stk_daily_qfq.parquet
  required_data_fields:
    data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet:
    - ts_code
    - trade_date
