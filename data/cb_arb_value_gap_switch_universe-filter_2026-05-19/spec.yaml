notes: Hermes选择的第2个新方向（第1个是low-freq-concentrated-v2，正在运行）。universe filter不同于entry gate：前者是永久性排除某些CB类型，后者是交易时的条件判断。这个方向直接回应了option_false_undervalue_attribution中的发现——远离债底和深度价内是损失的主要来源。使用现有的evaluate_cb_arb_universe_filter.py，无需新建脚本。不改current.yaml，不改baseline_registry。
ideation:
  source: hermes
  proposal_id: universe_filter_v1
  family: universe_filter
  executor: evaluate_cb_arb_universe_filter
  why_not_rejected_repeat: 不是option-source过滤/估值打折/仓位缩放/盈亏反馈/恐慌检测。是全新的universe construction方向——永久性改变候选池，而非交易时的条件过滤。直接针对option_false_undervalue_attribution中发现的远离债底+深度价内高亏损率问题。
  risk: 核心风险：排除远离债底/深度价内的转债会大幅减少可交易标的（这些CB约占93%交易量），可能导致剩余bond-type CBs交易机会不足、信号不够分散。但这是测试这个三年来一直存在的假设的最直接方式——如果连永久性排除都不能改善，那说明option-source问题在当前的value-gap框架里是无解的。
