schema_version: 1
run_id: cb_arb_value_gap_switch_universe-filter_2026-05-19
date: '2026-05-19'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: 'Hermes quant cron tick 2026-05-19 — all option-source filtering/exiting/positioning families exhausted. Chose
  universe-level restriction as genuinely new direction: permanently exclude structurally problematic CB types rather than
  filtering at entry time.'
hypothesis: 永久性排除远离债底(close/bond_floor > 1.5)、深度价内(moneyness > 1.6)、短剩余期限(<1年)或小规模(<10亿)的转债，可以从根本上减少期权型错误低估的来源，而不需要在每次交易时做条件判断。与已拒绝的entry-gate家族不同，universe
  filter是永久性的、在样本外保持一致的，不会在不同市场状态下反复横跳。代价是减少可交易标的数量，但如果剩余标的的价值差额信号更可靠，净效果可能是正的。
source_insight: 'research_insights id=option_false_undervalue_attribution_2026_05_17: far-from-bond-floor (>1.5) CBs capture
  31% of losses but only 13% of profits; high-moneyness (>1.6) CBs capture 49% of losses but only 20% of profits. research_insights
  id=option_source_value_gap_structural_tradeoff_2026_05_17: all entry-time filters have been rejected because they trade
  off 2020 vs 2025-2026. Universe filtering is permanently applied and avoids the regime-dependent tradeoff. research_insights
  id=single_filter_dead_end: 2020 weakness is broad — universe filtering addresses this by removing the structural source
  of bad trades.'
