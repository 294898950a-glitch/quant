hypothesis: 'The 2026-05-24 reverse-rank probe (cost off) showed +148% train / +38%

  test excess by ASCENDING the sort over the same > 0 candidate set. That

  rules out "universe drifts negative" and "signal real but costs eat

  alpha", and supports "value_gap formula is anti-informative".

  But the > 0 filter was unchanged, so the probe actually picked

  near-fair-value bonds (smallest positive gap), not over-priced bonds.

  This probe closes that gap: negate value_gap_amount, so the same > 0

  filter and the same descending sort instead select MOST OVER-PRICED

  bonds (originally value_gap_amount < 0). If forward loses, reverse-sort

  wins, AND this full-flip wins, the formula is fully inverted relative

  to the exploitable structure in the data.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 (research_insights.yaml).
