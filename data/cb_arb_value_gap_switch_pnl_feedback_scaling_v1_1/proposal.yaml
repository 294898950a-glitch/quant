test_design:
  description: 'Grid search over lookback_window in [10, 20, 40, 60] trading days
    and scaling_beta in [0.25, 0.5, 0.75]. Position weight = baseline_weight * max(0.25,
    1 - scaling_beta * trailing_drawdown_from_peak), where trailing_drawdown_from_peak
    is the rolling PnL drawdown computed over the lookback window. All candidates
    with value_gap_amount > 0 remain eligible (no entry filter). Exit uses existing
    baseline logic (duration-adaptive exit from 2026-05-22 acceptance: min_hold_days=5,
    initial_threshold_fraction=0.7, decay_period_factor=0.5). Train 2018-2022, test
    2023-2026. Cost-on evaluation with standard slippage 0.0015 and market impact
    0.001. Compare best grid point against baseline cb_arb-value-gap-switch-medium-signal-cost-on-20260516.

    '
success_criteria:
  criteria:
  - cost_on_max_drawdown <= 0.25
  - cost_degradation_pp <= 0.04
  - test_period_sharpe > baseline_test_sharpe
falsifiers:
  train: &id001
  - cost_on_max_drawdown > 0.30
  - cost_degradation_pp > 0.06
  - test_period_cumulative_excess <= baseline_test_cumulative_excess
  validate: *id001
  test: *id001
risk: 'Low risk. PnL feedback is a non-destructive overlay — it does not remove candidates
  or change entry/exit rules. Worst case: scaling parameters have no effect and results
  match baseline exactly. The structural risk is that anti-alpha signal is fundamentally
  unsalvageable by sizing alone, in which case this confirms that forward-direction
  research should be abandoned in favor of reviving the reverse direction (which would
  require user approval to reopen closed families).

  '
why_not_repeated_failure: 'This is the first proposal in the pnl_feedback_scaling_grid
  family. It is structurally distinct from the five failed moneyness-entry-filter
  runs and the one failed bond-floor- entry-filter run, all of which culled candidates
  via boolean masks and destroyed signal quality. PnL feedback scaling preserves every
  candidate and only adjusts allocation weights, making it strictly less destructive.
  It also differs from the reverse-probe family (3 runs, all no_adoption_decision_unusable)
  which tested sort-direction flips rather than sizing adjustments within the forward
  direction.

  '
