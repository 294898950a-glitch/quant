proposal_id: cb_arb_value_gap_switch_pnl_feedback_scaling_v1_1
strategy_id: cb_arb_value_gap_switch
family: pnl_feedback_scaling_grid
hypothesis: 'The forward value-gap signal is anti-alpha (cumulative excess negative),
  but PnL drawdowns are not uniformly distributed — losing streaks cluster in identifiable
  cold periods where the model''s gap estimates systematically fail. Scaling position
  sizes inversely with rolling realized PnL (reduce exposure after drawdowns, restore
  after recovery) will cut cost drag during cold periods without culling candidates
  or changing entry eligibility. This is a damage-control overlay: it won''t turn
  a negative signal positive, but it can reduce max drawdown and improve risk-adjusted
  metrics by suppressing the worst trades. Unlike entry filters (moneyness, bond floor)
  that removed candidates and killed the reverse signal''s +30.3% excess, PnL feedback
  preserves the full candidate pool — it only adjusts allocation weights.

  Repeated-reject-family check: the repeated_reject_families list contains only `moneyness_stock_to_conv_threshold`.
  This proposal targets `pnl_feedback_scaling_grid`, which has zero prior runs and
  is not in any repeated-reject or closed-family list. The three required questions
  (signal invalid? direction reversed? execution wrong?) do not apply to a never-tested
  family. That said, the underlying forward-direction signal is known anti-alpha —
  this proposal acknowledges that and targets cost-drag reduction rather than sign
  flipping.

  '
source_insight: 'Active critical insights list is empty. The driving evidence comes
  from the cost-realism wall finding: cost-on degradation of -7.47pp for the forward
  direction, vs. -6.76pp for legacy cb_arb. Cost drag is a structural problem across
  both forward and reverse directions. PnL feedback scaling directly attacks this
  mechanism by reducing position sizes during losing streaks, when the strategy is
  most likely to be trading into noise. The reverse-probe +30.3% test excess proves
  the signal has directional information; PnL feedback tests whether sizing discipline
  can reduce the forward direction''s largest losses without requiring a sort flip
  (which has been exhausted across 5 closed reverse families).

  '
expected_improvement: 'Reduce cost-on max drawdown from -35.16% toward -25% or better,
  reduce cost degradation from -7.47pp toward -4pp or better, and improve test-period
  Sharpe relative to baseline cb_arb-value-gap-switch-medium-signal-cost-on-20260516.
  Cumulative excess is expected to remain negative but less negative.

  '
