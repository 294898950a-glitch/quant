  strategy_id: cb_arb_value_gap_switch
  family: valuation_formula_credit_adjust
  hypothesis: 'The critical insight value_gap_rank_is_anti_alpha_2026_05_24 established
    that the current value_gap formula is anti-informative under its monotonicity
    assumption — sorting DESCENDING (most-positive first) destroys alpha while ASCENDING
    (least-positive first) produces +30.3% test excess cost-on. One of the supported
    confounders is issuer credit distress masquerading as undervaluation. I hypothesize
    that incorporating a time-varying credit spread into the theoretical valuation
    formula will correct this anti-informativeness. Specifically: when a CB trades
    at a discount because the issuer''s credit quality has deteriorated, the current
    formula sees a "value gap" where the true explanation is higher default risk.
    By discounting the bond floor component at a dynamic credit spread rather than
    a static risk-free rate, the corrected value_gap will penalize credit-distressed
    names, restoring monotonicity so that DESCENDING-sorted candidates become genuinely
    undervalued rather than secretly distressed. This addresses the root cause (broken
    formula) rather than layering filters on a broken signal.

    Re the repeated_reject_families (moneyness_stock_to_conv_threshold, 3 rejections):
    I choose explanation (1) — the underlying signal is invalid. The moneyness filter
    failed because it was applied to an anti-informative base signal. Filtering noise
    yields noise. Fixing the formula at the root makes the forward-direction signal
    testable, after which moneyness filtering could be revisited on clean ground.
    But this proposal is formula-level, not filter-level.

    '
  source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 — reverse-rank probe shows
    ASCENDING sort wins large where DESCENDING loses; three competing hypotheses collapsed
    to one: the value_gap formula is anti-informative. One supported confounder is
    "issuer credit distress masquerading as undervaluation." This proposal directly
    addresses that confounder by adjusting the valuation formula.

    '
  expected_improvement: 'Forward-direction (DESCENDING) test excess should move from
    the current ~-10.5% cost-on toward positive territory. The reverse-probe-coston
    baseline (+30.3% test excess cost-on) provides a ceiling for what a correctly-sorted
    signal can achieve. A credit-adjusted formula that partially corrects the anti-alpha
    should produce forward-direction test excess > 0%, with the ideal outcome approaching
    the reverse-probe magnitude if credit distortion is the dominant confounder. Even
    a modest improvement (forward test excess 0-10%) would validate the diagnosis
    and justify further formula refinements (call protection, liquidity adjustments).

    '
  capability_ids:
  - C006
  required_executor: evaluate_cb_arb_valuation_formula
  required_data: []
  required_data_fields: {}
  test_design:
    description: 'Replace the static risk-free discount rate in the theoretical valuation
      formula with a time-varying credit spread per CB-day. Compute each CB''s yield-to-maturity
      from cb_daily.close and its contractual cash flows (coupon_rate, par_value,
      maturity_date from cb_basic). The spread is YTM minus a risk-free proxy (e.g.,
      matched-maturity government bond yield or SHIBOR). Apply this spread to discount
      the bond-floor component. Recompute value_gap_amount with the credit-adjusted
      formula. Run the standard DESCENDING-sort backtest (forward direction, same
      exit logic as the accepted duration-adaptive exit: min_hold_days=5, initial_threshold_fraction=0.7,
      decay_period_factor=0.5). Grid-search over credit-spread cap/multiplier if the
      executor supports parameterization. Compare against the forward-direction baseline
      (test excess ~-10.5% cost-on) and, for context, the reverse-probe-coston ceiling
      (+30.3% test excess cost-on).

      '
  success_criteria:
    criteria:
    - forward_test_excess_cost_on_gt_0pct: true
    - forward_test_excess_improvement_vs_baseline_pp_gt_5: true
    - any_holdout_year_sharpe_gt_0.5: true
  falsifiers:
    train:
    - forward_test_excess_cost_on_lt_neg_5pct
    - forward_test_max_drawdown_gt_25pct
    - forward_test_win_rate_lt_0.5
    validate:
    - forward_test_excess_cost_on_lt_neg_5pct
    - forward_test_max_drawdown_gt_25pct
    - forward_test_win_rate_lt_0.5
    test:
    - forward_test_excess_cost_on_lt_neg_5pct
    - forward_test_max_drawdown_gt_25pct
    - forward_test_win_rate_lt_0.5
  risk: 'Medium. Credit spread estimation from CB prices has circularity risk — if
    the CB is mispriced, the derived credit spread inherits the mispricing. A cleaner
    approach would use issuer-level bond/CDS data, but that requires a new data source
    (C008). The YTM-from-CB approach is pragmatic but the executor must handle edge
    cases (zero/negative YTM, near-maturity CBs with small remaining coupons). The
    executor exists (evaluate_cb_arb_valuation_formula) and should already handle
    these cases. If credit adjustment alone is insufficient, the falsifiers will trigger,
    and the next step would be to investigate other confounders (call protection,
    liquidity) or switch to the reverse-direction path permanently.

    '
  why_not_repeated_failure: 'This is not a moneyness or bond-floor entry filter variant.
    The moneyness family (moneyness_stock_to_conv_threshold, 3 rejections) and bond-floor
    family all failed because they stacked filters on top of an anti-informative base
    signal. Those were execution-side band-aids on a signal-side problem. This proposal
    attacks the root cause: the theoretical valuation formula itself. C006 (new_valuation_formula)
    is a different mechanic from C002 (bond floor threshold) and C003 (moneyness threshold).
    The family tag is valuation_formula_credit_adjust, which has zero prior runs.
    The repeated_reject_families rule requires answering three questions for moneyness_stock_to_conv_threshold;
    I answered them (signal is invalid, not execution or direction) to justify why
    this formula-level proposal is orthogonal, not a rephrasing.

    '
  related_prior_runs:
  - cb_arb_value_gap_switch_reverse-probe_20260524
  - cb_arb_value_gap_switch_reverse-probe-coston_20260524
