hypothesis: 'The critical insight value_gap_rank_is_anti_alpha_2026_05_24 established
  that the current value_gap formula is anti-informative under its monotonicity assumption
  — sorting DESCENDING (most-positive first) destroys alpha while ASCENDING (least-positive
  first) produces +30.3% test excess cost-on. One of the supported confounders is
  issuer credit distress masquerading as undervaluation. I hypothesize that incorporating
  a time-varying credit spread into the theoretical valuation formula will correct
  this anti-informativeness. Specifically: when a CB trades at a discount because
  the issuer''s credit quality has deteriorated, the current formula sees a "value
  gap" where the true explanation is higher default risk. By discounting the bond
  floor component at a dynamic credit spread rather than a static risk-free rate,
  the corrected value_gap will penalize credit-distressed names, restoring monotonicity
  so that DESCENDING-sorted candidates become genuinely undervalued rather than secretly
  distressed. This addresses the root cause (broken formula) rather than layering
  filters on a broken signal.

  Re the repeated_reject_families (moneyness_stock_to_conv_threshold, 3 rejections):
  I choose explanation (1) — the underlying signal is invalid. The moneyness filter
  failed because it was applied to an anti-informative base signal. Filtering noise
  yields noise. Fixing the formula at the root makes the forward-direction signal
  testable, after which moneyness filtering could be revisited on clean ground. But
  this proposal is formula-level, not filter-level.

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24 — reverse-rank probe shows
  ASCENDING sort wins large where DESCENDING loses; three competing hypotheses collapsed
  to one: the value_gap formula is anti-informative. One supported confounder is "issuer
  credit distress masquerading as undervaluation." This proposal directly addresses
  that confounder by adjusting the valuation formula.

  '
