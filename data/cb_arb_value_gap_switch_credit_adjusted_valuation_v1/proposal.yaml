test_design:
  description: 'Replace the static risk-free discount rate in the theoretical valuation
    formula with a time-varying credit spread per CB-day. Compute each CB''s yield-to-maturity
    from cb_daily.close and its contractual cash flows (coupon_rate, par_value, maturity_date
    from cb_basic). The spread is YTM minus a risk-free proxy (e.g., matched-maturity
    government bond yield or SHIBOR). Apply this spread to discount the bond-floor
    component. Recompute value_gap_amount with the credit-adjusted formula. Run the
    standard DESCENDING-sort backtest (forward direction, same exit logic as the accepted
    duration-adaptive exit: min_hold_days=5, initial_threshold_fraction=0.7, decay_period_factor=0.5).
    Grid-search over credit-spread cap/multiplier if the executor supports parameterization.
    Compare against the forward-direction baseline (test excess ~-10.5% cost-on) and,
    for context, the reverse-probe-coston ceiling (+30.3% test excess cost-on).

    '
