implementation_assumption: The executor evaluate_cb_arb_valuation_formula can accept
  a credit_spread_method parameter (e.g., "ytm_based" vs "none") and apply it to the
  bond-floor discount rate. It should compute YTM per CB-day from cb_daily.close and
  contractual cash flows, derive a spread vs a matched-maturity risk-free rate, and
  pass the adjusted discount rate into the theoretical value computation. If the executor
  supports a grid over spread multipliers or caps, those become the tunable space.
  If it only supports a binary credit_adjust on/off flag, then the grid is a single
  comparison run. The proposal remains testable either way.
