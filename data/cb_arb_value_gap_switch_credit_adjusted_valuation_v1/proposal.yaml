falsifiers:
  train: &id001
  - forward_test_excess_cost_on_lt_neg_5pct
  - forward_test_max_drawdown_gt_25pct
  - forward_test_win_rate_lt_0.5
  validate: *id001
  test: *id001
risk: 'Medium. Credit spread estimation from CB prices has circularity risk — if the
  CB is mispriced, the derived credit spread inherits the mispricing. A cleaner approach
  would use issuer-level bond/CDS data, but that requires a new data source (C008).
  The YTM-from-CB approach is pragmatic but the executor must handle edge cases (zero/negative
  YTM, near-maturity CBs with small remaining coupons). The executor exists (evaluate_cb_arb_valuation_formula)
  and should already handle these cases. If credit adjustment alone is insufficient,
  the falsifiers will trigger, and the next step would be to investigate other confounders
  (call protection, liquidity) or switch to the reverse-direction path permanently.

  '
why_not_repeated_failure: 'This is not a moneyness or bond-floor entry filter variant.
  The moneyness family (moneyness_stock_to_conv_threshold, 3 rejections) and bond-floor
  family all failed because they stacked filters on top of an anti-informative base
  signal. Those were execution-side band-aids on a signal-side problem. This proposal
  attacks the root cause: the theoretical valuation formula itself. C006 (new_valuation_formula)
  is a different mechanic from C002 (bond floor threshold) and C003 (moneyness threshold).
  The family tag is valuation_formula_credit_adjust, which has zero prior runs. The
  repeated_reject_families rule requires answering three questions for moneyness_stock_to_conv_threshold;
  I answered them (signal is invalid, not execution or direction) to justify why this
  formula-level proposal is orthogonal, not a rephrasing.

  '
