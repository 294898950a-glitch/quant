schema_version: 1
run_id: cb_arb_value_gap_switch_option-position-sizing_2026-05-18_122946
date: '2026-05-18'
strategy_id: cb_arb_value_gap_switch
l0_entry_id: 1
l0_source: option_value_loop Claude prompt injection from current.yaml, research_insights.yaml,
  experiments.yaml, baseline_registry.yaml, strategies.yaml, and protocol_rules.yaml
hypothesis: 'run_090016 证明渐进式期权仓位折减（progressive模式）在训练期具有结构性有效性 （train_excess +25pp），失败原因是折减底限过低导致测试期头寸被同等力度削减；
  将 progressive 模式的 scale_floor 约束至 0.70–0.80 区间， 有望在保留训练期方向性保护的同时将测试期损伤压缩至可接受范围。

  '
source_insight: 'run_090016（2026-05-18）：progressive_stocklike 变体 train_excess=0.385756
  vs baseline 0.131363（+25.4pp），train 2020 total_return=-0.046826 vs baseline -0.090593（修复
  +4.4pp）；但 test_excess=0.118782 vs baseline 0.379760（-26.1pp）。train 胜出说明"期权型越类股票越折减"方向在
  2019-2024 有效；test 崩溃说明默认梯度底限过低（估计 ≤0.50），在 2025-2026 期权来源盈利 期间等比削减了有利头寸。固定阈值方向（>1.4/1.5/1.8，scale
  0.3–0.5）已被 confirmed_invalid_directions 全部关闭。pnl_feedback 五轮（084139/091627/ 094700/100838/102839）均以
  baseline_no_feedback 赢训练期告终，参数空间趋于 枯竭；115655（240d/8-12 trades）为最后一轮严格触发尝试，结果尚未产出，但同一
  模式继续推进的边际信息量极低。

  '
parameter_space:
- name: position_scale_variant
  range:
  - 0
  - 16
  type: int
  description: 17 个固定候选仓位调整方案，包括 baseline、价格/债底触发、正股/转股价触发、任一触发、同时触发和渐进调整。
- name: close_to_bond_floor_threshold
  range:
  - 1.5
  - 1.7
  type: float
  description: 期权型候选中，转债价格相对债底过高的触发线。
- name: moneyness_stock_to_conv_threshold
  range:
  - 1.6
  - 2.0
  type: float
  description: 期权型候选中，正股价格相对转股价过高的触发线。
- name: position_cash_scale
  range:
  - 0.25
  - 1.0
  type: float
  description: 触发后实际买入金额和排序金额保留比例。
new_data_sources:
- path: data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  description: 已有 value-gap 估值与可交易金额，避免重复计算基础基准。
- path: data/cb_warehouse/cb_basic.parquet
  description: 转股价和正股代码，用于计算正股/转股价。
- path: data/cb_warehouse/stk_daily_qfq.parquet
  description: 前复权正股价格，用于计算正股/转股价。
grid:
  dimensions:
  - position_scale_variant
  candidates_count: 17
  description: 固定 17 组候选仓位调整方案，全量跑 train/test/2019-2024 yearly，并输出 2020 和 test 的入口来源拆解。
hard_floors:
  train_excess_return: 0.0
  train_max_drawdown: -0.3
  test_excess_return: 0.0
  test_max_drawdown: -0.3
  replay_2020_total_return: -0.090593
hard_floors_baseline_source: current cb_arb_value_gap_switch cost-aware branch and
  option-value-haircut rejection evidence
auxiliary_metrics:
- train_excess_return
- test_excess_return
- yearly_2020_total_return
- yearly_2020_excess_return
- max_drawdown
- total_trades
- win_rate
- entry_source_2020_option_loss
- entry_source_test_option_profit
- average_position_scale
cv_design: single-window
cv_holdout_years:
- 2025
- 2026
cv_adoption_threshold: 必须同时优于 baseline 的训练段、2020 修复和 2025-2026 测试段；否则只作为诊断资产。
compute_estimate:
  sig_minutes: 0
  spot_minutes: 60
  local_minutes: 0
  estimated_cost_yuan: 0.0
budget_cap_yuan: 100
spot_decision: 本轮使用已有 daily_value_gap_amounts，不重复计算基础基准；必须在 VM/spot host 执行。
stop_conditions:
- 脚本退出非 0
- 缺少 summary_option_position_sizing.csv
- 缺少 yearly_option_position_sizing.csv
- 缺少 entry_source_2020_option_position_sizing.csv
- 所有非 baseline 方案无法同时优于 train、2020 和 test baseline
artifacts_required:
- summary_option_position_sizing.csv
- yearly_option_position_sizing.csv
- entry_source_2020_option_position_sizing.csv
- entry_source_test_option_position_sizing.csv
- adjustment_option_position_sizing.csv
- summary.json
- report.yaml
- l4_ack.yaml
- diagnostic.yaml
automation:
  output_dir: data/cb_arb_value_gap_switch_option-position-sizing_2026-05-18_122946
  gatekeeper_after_run: false
  sync_paths:
  - scripts/evaluate_cb_arb_option_position_sizing.py
  - scripts/evaluate_cb_arb_value_gap_switch.py
  - data/research_framework/runtime_entrypoints.yaml
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - data/cb_warehouse/cb_basic.parquet
  - data/cb_warehouse/stk_daily_qfq.parquet
  command:
  - .venv/bin/python
  - scripts/evaluate_cb_arb_option_position_sizing.py
  - --data-root
  - data/cb_arb_concurrent_supervised_20260511_094500
  - --train-start
  - '20190101'
  - --train-end
  - '20241231'
  - --test-start
  - '20250101'
  - --test-end
  - '20260508'
  - --fixed-source
  - '2'
  - --rule
  - score_4state
  - --output-dir
  - '{output_dir}'
  - --base-ranks-path
  - data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/daily_value_gap_amounts.parquet
  - --reuse-ranks
  - --cost-model-enabled
  verdict:
    table_path: summary_option_position_sizing.csv
    yearly_table_path: yearly_option_position_sizing.csv
    filters:
      period: train
    rank_by: score
    rank_desc: true
    thresholds:
      excess_return:
        min: 0.0
      max_drawdown:
        min: -0.3
    train_single_year_dd_ceiling: -0.15
status: COMPLETE
escalation:
- 训练段过关但 2020 仍显著跑输
- 2020 改善但 2025-2026 测试段被明显伤害
- 运行时间超过 60 分钟
notes: 这是循环根据既有复盘自动注入上下文后生成的新方向，不改 current.yaml，不改 baseline_registry。关键区别：不禁止买入，不整体折价期权价值，只降低可疑期权型候选的实际暴露。
ideation:
  source: claude
  proposal_id: mild_progressive_position_scale_floor
  family: option_position_sizing
  why_not_rejected_repeat: '禁止方向：global_option_entry_gate（禁买）、global_option_value_haircut
    （改理论价格）、regime_conditioned_option_entry_gate——本方案三条均不触碰； 仅调整排序金额和实际买入金额，不修改理论价值计算，不设置买入禁门。
    run_090016 测试的 progressive 模式使用执行器内置默认梯度（scale_floor 未受限）， 本轮明确要求 scale_floor
    ∈ [0.70, 0.80]（受限渐进梯度），属于 17 个历史候选 均未覆盖的中间参数子空间（历史候选集中在"极端阈值 >1.8 + 深折扣 0.3–0.5"
    与"无限制 progressive"两端）。

    '
  risk: '核心风险：若 2025–2026 期权来源盈利恰好集中于"类股票度最高"的子集（即 progressive 折减最重的那批候选），则即使 scale_floor=0.80
    仍会切掉高价值头寸， 测试期损伤不可避免——该结构性对冲（option_source_value_gap_structural_tradeoff） 已在 research_insights
    中记录为已知死结，本轮无法在理论上排除。 次要风险：若执行器 scripts/evaluate_cb_arb_option_position_sizing.py
    不支持 独立的 scale_floor 参数，则测试等同于重跑已有 progressive 变体，算力浪费； 建议 Codex 在生成候选网格前先确认脚本支持该参数，若不支持应终止并上报，
    不得自行添加新参数逻辑。

    '
  fallback_reason: null
