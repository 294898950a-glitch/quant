proposal_id: cb_arb_value_gap_switch_volatility_position_scaling_reverse_v1_2
strategy_id: cb_arb_value_gap_switch
family: volatility_position_scaling_reverse
hypothesis: 'The reverse-sort value-gap base (+30.3% test excess cost-on) is the only
  proven alpha direction. Previous attempts to improve it through entry filters (moneyness,
  bond floor) failed because those filters removed candidates from an already-sparse
  reverse candidate pool, causing candidate starvation. Position scaling via inverse
  ATR preserves all candidates — it only adjusts allocation weights downward for high-volatility
  names and upward for stable ones. This noise-reduction overlay should reduce drawdowns
  (currently -11.3% test max DD) and improve risk-adjusted returns without destroying
  the underlying reverse signal. Unlike entry filters, position scaling cannot accidentally
  eliminate alpha-producing candidates because no candidate is excluded; the worst
  case is neutral weighting (1.0) which recovers the baseline. The forward PnL-feedback
  scaling variant (adoption_pass false) was never tested in the reverse direction,
  leaving an open question: does position scaling work when applied to a genuine alpha
  base rather than an anti-alpha one?

  '
source_insight: 'value_gap_rank_is_anti_alpha_2026_05_24: reverse sort is tradeable
  (+30.3% test excess cost-on, cost bleed only 8pp). Priority #4 from the insight
  calls for "reverse-direction variants applied to families that previously failed
  in forward (e.g. exit rule sweeps, position sizing) — to see if those families were
  rejected only because they were stacked on an anti-alpha base." Position scaling
  is one such family. The forward pnl-feedback-scaling_v1 run (adoption_pass false)
  was tested on the forward anti-alpha base. This proposal tests position scaling
  on the proven reverse base using inverse-ATR, which is strictly less destructive
  than PnL-feedback scaling because it uses market-observable volatility rather than
  realized strategy PnL.

  '
expected_improvement: 'Reduce test max drawdown from -11.3% toward -8% while preserving
  at least 80% of the +30.3% test excess (i.e., test excess >= +24%). Improve Sharpe
  ratio through volatility-aware allocation. Even if improvement is marginal, this
  closes the open question of whether the position scaling family was rejected because
  of the anti-alpha base rather than the scaling mechanic itself.

  '
