test_design:
  description: 'Grid search over ATR lookback [10, 20, 40, 60] and scaling_beta [0.25,
    0.5, 0.75, 1.0, 1.5] = 20 combinations. For each: compute daily ATR from stk_daily_qfq.close
    per CB per day over the lookback window. Rank candidates cross-sectionally by
    ATR descending (highest vol = rank 1). Position weight = baseline * min(scaling_beta
    / ATR_rank, 2.0) capped to prevent extreme concentration. Normalize weights so
    total daily allocation sums to the baseline N-position budget. Exit grid (reverse-probe
    standard): max_hold_days [120, 150, 180], min_gap_pct [0.005, 0.01], sell_gap_pct
    0.0, switch_hurdle_pct [0.0, 0.01] = 12 combinations. Total 240 parameter tuples.
    Cost-on (slippage 0.0015, market impact 0.001). Train 2018-2022, test 2023-2026.
    Sort direction: value_gap_amount ASCENDING. Entry filter: value_gap_amount > 0
    (unchanged). Compare best candidate against reverse-probe-coston baseline.

    '
success_criteria:
  criteria:
  - test_cumulative_excess >= 0.24
  - test_max_drawdown <= -0.10
  - test_sharpe >= 0.5
  - adoption_pass is True
falsifiers:
  train: &id001
  - test_cumulative_excess < 0.24 (fails to preserve 80% of reverse probe excess)
  - test_max_drawdown worse than reverse-probe-coston baseline of -0.113
  - any_holdout_year_sharpe < 0.0
  - best candidate test excess negative (position scaling destroyed the signal)
  validate: *id001
  test: *id001
risk: 'Low signal risk — position scaling does not alter entry eligibility or sort
  direction. Primary risk is concentration: inverse-ATR may overweight low-vol names
  that offer smaller gap-closing upside, reducing total return even if risk metrics
  improve. Secondary risk: ATR from stock prices may not capture CB-specific volatility
  for deeply OTM names where equity sensitivity (delta) is low. Mitigation: the scaling_beta
  cap (2.0) prevents extreme concentration; neutral fallback (1.0) for missing ATR
  preserves baseline behavior.

  '
why_not_repeated_failure: 'This is NOT a moneyness entry filter variant. The repeated-reject
  family moneyness_stock_to_conv_threshold (C003, 3 rejections) filters candidates
  by stock_close/conv_price ratio, which removes entries from the pool. Both forward
  and reverse moneyness filters failed because candidate starvation destroyed the
  signal. Position scaling (C001) is a fundamentally different mechanic: it preserves
  all candidates and only adjusts capital allocation weights. The failure mode of
  entry filters (candidate pool collapse) cannot occur here because no candidate is
  excluded. This is the first volatility-based position scaling test on the reverse
  base, and the first position scaling variant not stacked on the forward anti-alpha
  base.

  '
