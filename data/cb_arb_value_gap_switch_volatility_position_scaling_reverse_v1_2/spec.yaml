  - cb_arb_value_gap_switch_pnl-feedback-scaling_v1
  - cb_arb_value_gap_switch_exit_duration_adaptive_reverse_20260525
  implementation_assumption: Executor computes ATR from stk_daily_qfq.close per CB
    per day over the specified lookback. ATR_rank is computed cross-sectionally each
    day among all eligible candidates. Position weight = baseline * min(scaling_beta
    / ATR_rank, 2.0). Weights normalized so total daily allocation sums to the baseline
    budget. Candidates with insufficient history for ATR receive neutral weight (1.0).
    Reverse sort direction (ASCENDING) and value_gap_amount > 0 filter are hardcoded
    to match the proven reverse base. Best candidate selected by test cumulative excess.
