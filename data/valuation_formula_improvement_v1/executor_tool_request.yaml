why_existing_tools_insufficient: Each existing executor explicitly lists new_valuation_formula
  in its cannot_test capability set. option_position_sizing only handles static position
  scaling, option_source_pnl_feedback_scaler only handles rolling PnL feedback, dynamic_exit_gap_decay_executor
  only handles exit rule modifications, and dynamic_regime_switch_executor only handles
  regime switching. None can replace the core theoretical value computation, which
  is the central change of this proposal requiring capability C006.
