tool_request_id: pnl_adaptive_exit_executor_v1
why_existing_tools_insufficient: The proposal requires an executor that tests exit
  rules (C007) driven by both gap closing speed and rolling realized PnL feedback.  Existing
  C007‑capable executors (dynamic_exit_gap_decay_executor, profit_take_exit_executor,
  exit_rule_duration_adaptive_executor)  only apply static gap‑ratio thresholds and
  do not incorporate PnL feedback to dynamically adjust exit conditions.  The option_source_pnl_feedback_scaler
  handles PnL feedback but is limited to position sizing (C004) and explicitly cannot
  test new exit rules (C007).  No existing tool combines new exit logic with rolling
  PnL feedback as required by this adaptive exit proposal.
reviewed_existing_executor_ids:
- option_position_sizing
- option_source_pnl_feedback_scaler
- dynamic_exit_gap_decay_executor
- dynamic_regime_switch_executor
- profit_take_exit_executor
- exit_rule_duration_adaptive_executor
