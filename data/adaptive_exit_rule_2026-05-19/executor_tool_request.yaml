tool_code_response:
  status: draft_tool_code
  handoff_id: adaptive_exit_rule_2026-05-19_executor_code
  generated_executor: generated_executor/evaluate_cb_arb_pnl_adaptive_exit.py
  completion_receipt: data/adaptive_exit_rule_2026-05-19/generated_executor/executor_completion.yaml
  finalized_by: hermes_complete
  finalized_at: '2026-06-28T14:04:08'
  validation: passed
files:
- path: generated_executor/evaluate_cb_arb_pnl_adaptive_exit.py
  purpose: Complete evaluator implementation.
  content: "#!/usr/bin/env python3\n\"\"\"Evaluate adaptive take-profit and stop-loss\
    \ exit rules for cb_arb value-gap switch.\n\nAdaptive exit uses two dynamic signals:\n\
    \  1. Gap closing speed – how fast the value gap is narrowing over a lookback\
    \ window.\n     Fast closing → lower take-profit threshold (exit earlier, lock\
    \ in gains).\n     Slow/negative closing → higher take-profit threshold (give\
    \ position more room).\n  2. Rolling realised PnL feedback – average PnL from\
    \ recently closed trades.\n     Negative recent PnL → tighter stop-loss (cut losses\
    \ sooner).\n     Positive recent PnL → looser stop-loss (let winners run).\n\n\
    The executor runs three periods: train (2019-2024), sealed test (2025-202605),\n\
    and 2020 repair stress.  It compares against a simulated baseline (gap>0 enter,\n\
    gap<=0 exit only) and computes excess returns.\n\nEntry logic and candidate generation\
    \ are identical to the baseline\nregime-option-entry-gate run.  Only the exit\
    \ rule is replaced.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport argparse\n\
    import json\nimport sys\nfrom pathlib import Path\nfrom typing import Any\n\n\
    # ── Repo root & sys.path ────────────────────────────────────────────────\n#\
    \ Must come before any third-party import AND before `from scripts.X import Y`,\n\
    # because production runs execute from a foreign cwd where REPO_ROOT is not\n\
    # automatically on sys.path.  The compliance import-reachability probe runs\n\
    # with -I in /tmp, so all non-stdlib imports that follow this block must\n# resolve\
    \ from the venv site-packages or from REPO_ROOT (scripts.*).\n\n\ndef _find_repo_root(start:\
    \ Path) -> Path:\n    for candidate in (start, *start.parents):\n        if (candidate\
    \ / \"scripts\" / \"gatekeeper.py\").exists():\n            return candidate\n\
    \    return start.parent\n\n\n_REPO_ROOT = _find_repo_root(Path(__file__).resolve())\n\
    if str(_REPO_ROOT) not in sys.path:\n    sys.path.insert(0, str(_REPO_ROOT))\n\
    \nfrom scripts.gatekeeper import GateKeeper  # noqa: E402\n\n# ── Lazy-loaded\
    \ heavy deps (imported on first use to keep module import fast) ──\n_np: Any =\
    \ None\n_pd: Any = None\n_yaml: Any = None\n\n\ndef _lazy_imports() -> None:\n\
    \    \"\"\"Import numpy, pandas, yaml and register numpy representers with yaml.\"\
    \"\"\n    global _np, _pd, _yaml\n    if _np is not None:\n        return  # already\
    \ loaded\n\n    import numpy as _np_module\n    import pandas as _pd_module\n\
    \    import yaml as _yaml_module\n\n    _np = _np_module\n    _pd = _pd_module\n\
    \    _yaml = _yaml_module\n\n    # yaml.safe_dump cannot represent numpy scalars;\
    \ register fallbacks once.\n    def _yaml_repr_np_float(dumper, data):\n     \
    \   return dumper.represent_float(float(data))\n\n    def _yaml_repr_np_int(dumper,\
    \ data):\n        return dumper.represent_int(int(data))\n\n    _yaml.SafeDumper.add_representer(_np.floating,\
    \ _yaml_repr_np_float)\n    _yaml.SafeDumper.add_representer(_np.integer, _yaml_repr_np_int)\n\
    \    _yaml.SafeDumper.add_multi_representer(_np.floating, _yaml_repr_np_float)\n\
    \    _yaml.SafeDumper.add_multi_representer(_np.integer, _yaml_repr_np_int)\n\n\
    \n# ---------------------------------------------------------------------------\n\
    # Data paths\n# ---------------------------------------------------------------------------\n\
    \n_PREVIOUS_RUN_DATA = (\n    \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
    \n    \"daily_value_gap_amounts.parquet\"\n)\n_BASELINE_TRADE_PNL = (\n    \"\
    data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\n    \"baseline_trade_pnl.parquet\"\
    \n)\n\n\n# ---------------------------------------------------------------------------\n\
    # Required entrypoints\n# ---------------------------------------------------------------------------\n\
    \ndef declare_data_requirements(command: list[Any], spec: dict[str, Any] | None\
    \ = None) -> dict[str, Any]:  # noqa: ARG001\n    return {\n        \"required_files\"\
    : [\n            {\n                \"path\": _PREVIOUS_RUN_DATA,\n          \
    \      \"description\": \"Daily value-gap amounts from regime-option-entry-gate\
    \ run.\",\n            },\n            {\n                \"path\": _BASELINE_TRADE_PNL,\n\
    \                \"description\": \"Baseline trade-level PnL (optional; computed\
    \ on the fly if missing).\",\n            },\n        ]\n    }\n\n\ndef _gatekeeper_before_run(output_dir:\
    \ Path) -> None:\n    spec_path = output_dir / \"spec.yaml\"\n    if spec_path.exists():\n\
    \        gatekeeper = GateKeeper(quiet=True)\n        gatekeeper.before_run_grid(spec_path)\n\
    \n\ndef _gatekeeper_after_run(output_dir: Path) -> None:\n    gatekeeper = GateKeeper(quiet=True)\n\
    \    gatekeeper.after_run_grid(output_dir)\n\n\n# ---------------------------------------------------------------------------\n\
    # Data loading\n# ---------------------------------------------------------------------------\n\
    \ndef _resolve_data_path(data_root_str: str, relative: str) -> Path:\n    _lazy_imports()\n\
    \    data_root_p = Path(data_root_str)\n    rel = Path(relative)\n    candidates\
    \ = [\n        data_root_p / rel,\n        _REPO_ROOT / rel,\n        Path.cwd()\
    \ / rel,\n    ]\n    for c in candidates:\n        if c.exists():\n          \
    \  return c\n    searched = \", \".join(str(c) for c in candidates)\n    raise\
    \ FileNotFoundError(f\"Cannot find {relative} under data_root={data_root_str};\
    \ searched: {searched}\")\n\n\ndef _load_data(data_root_str: str) -> Any:  # returns\
    \ pd.DataFrame\n    _lazy_imports()\n    path = _resolve_data_path(data_root_str,\
    \ _PREVIOUS_RUN_DATA)\n    df = _pd.read_parquet(path)\n    df[\"trade_date\"\
    ] = _pd.to_datetime(df[\"trade_date\"])\n    df = df.sort_values([\"ts_code\"\
    , \"trade_date\"]).reset_index(drop=True)\n    return df\n\n\ndef _try_load_baseline_pnl(data_root_str:\
    \ str) -> Any:  # returns pd.DataFrame | None\n    _lazy_imports()\n    try:\n\
    \        path = _resolve_data_path(data_root_str, _BASELINE_TRADE_PNL)\n    except\
    \ FileNotFoundError:\n        return None\n    df = _pd.read_parquet(path)\n \
    \   if \"exit_date\" in df.columns:\n        df[\"exit_date\"] = _pd.to_datetime(df[\"\
    exit_date\"])\n    if \"pnl\" in df.columns:\n        df[\"pnl\"] = df[\"pnl\"\
    ].astype(float)\n    return df\n\n\n# ---------------------------------------------------------------------------\n\
    # Adaptive signal computation\n# ---------------------------------------------------------------------------\n\
    \ndef _compute_gap_closing_speed(\n    df: Any,  # pd.DataFrame\n    ts_code:\
    \ str,\n    trade_date: Any,  # pd.Timestamp\n    lookback: int,\n) -> float:\n\
    \    \"\"\"Compute gap closing speed as a normalised rate over the lookback window.\n\
    \n    Returns a value in [-1, 1]:\n      -1  → gap is closing very fast (declining\
    \ sharply)\n       0  → gap is stable\n      +1  → gap is widening\n\n    Uses\
    \ the slope of the gap_amount scaled by the trailing maximum gap\n    to avoid\
    \ over-weighting moves at near-zero gaps.\n    \"\"\"\n    _lazy_imports()\n \
    \   mask = (df[\"ts_code\"] == ts_code) & (df[\"trade_date\"] <= trade_date)\n\
    \    hist = df.loc[mask, [\"trade_date\", \"value_gap_amount\"]].sort_values(\"\
    trade_date\").tail(lookback)\n    if len(hist) < max(10, lookback // 2):\n   \
    \     return 0.0\n\n    gaps = hist[\"value_gap_amount\"].values.astype(float)\n\
    \    if len(gaps) < 2:\n        return 0.0\n\n    trailing_max = float(_np.max(gaps))\n\
    \    if trailing_max <= 0.0:\n        return 0.0\n\n    first = gaps[0]\n    last\
    \ = gaps[-1]\n    raw_change = (last - first) / trailing_max\n    clamped = float(_np.clip(raw_change,\
    \ -1.0, 1.0))\n    return -clamped\n\n\ndef _compute_rolling_pnl_factor(\n   \
    \ trade_pnl_history: Any,  # pd.DataFrame | None\n    trade_date: Any,  # pd.Timestamp\n\
    \    lookback_days: int,\n) -> float:\n    \"\"\"Compute rolling PnL feedback\
    \ factor from recently closed trades.\n\n    Returns a value in [-0.3, 0.3]:\n\
    \      Negative → recent losses → tighter exits\n      Positive → recent gains\
    \  → looser exits\n    \"\"\"\n    _lazy_imports()\n    if trade_pnl_history is\
    \ None or len(trade_pnl_history) == 0:\n        return 0.0\n\n    if \"exit_date\"\
    \ not in trade_pnl_history.columns:\n        return 0.0\n\n    cutoff = trade_date\
    \ - _pd.Timedelta(days=lookback_days)\n    recent = trade_pnl_history[\n     \
    \   (trade_pnl_history[\"exit_date\"] >= cutoff) & (trade_pnl_history[\"exit_date\"\
    ] <= trade_date)\n    ]\n\n    if len(recent) < 3:\n        return 0.0\n\n   \
    \ mean_pnl = float(recent[\"pnl\"].mean())\n    abs_pnl = float(recent[\"pnl\"\
    ].abs().mean())\n    if abs_pnl < 0.01:\n        return 0.0\n\n    raw = mean_pnl\
    \ / abs_pnl\n    return float(_np.clip(raw * 0.3, -0.3, 0.3))\n\n\n# ---------------------------------------------------------------------------\n\
    # Simulation engines\n# ---------------------------------------------------------------------------\n\
    \ndef _simulate_adaptive(\n    df: Any,  # pd.DataFrame\n    tp_gap_fraction:\
    \ float,\n    sl_gap_fraction: float,\n    gap_speed_lookback: int,\n    pnl_lookback:\
    \ int,\n    min_hold_days: int,\n    trade_pnl_history: Any = None,  # pd.DataFrame\
    \ | None\n) -> dict[str, Any]:\n    \"\"\"Simulate adaptive exit with gap closing\
    \ speed and PnL feedback.\n\n    Entry: gap > 0 and flat → enter, record entry_gap.\n\
    \    Exit:\n      - gap <= 0 → exit (\"gap_closed\"), always enforced\n      -\
    \ dynamic TP:  current_gap / entry_gap < dynamic_tp_gate → exit (\"tp\")\n   \
    \   - dynamic SL:  current_gap / entry_gap > dynamic_sl_gate → exit (\"sl\")\n\
    \n    Dynamic TP = tp_gap_fraction * (1 + speed_signal)\n      speed_signal ∈\
    \ [-0.5, 0.5]: fast closing → lower TP\n\n    Dynamic SL = sl_gap_fraction * (1\
    \ - pnl_factor)\n      pnl_factor ∈ [-0.3, 0.3]: negative PnL → lower SL → tighter\
    \ stop\n\n    TP/SL exits only apply after min_hold_days.\n    \"\"\"\n    _lazy_imports()\n\
    \    df = df.copy()\n    df[\"position\"] = 0\n    df[\"entry_gap\"] = 0.0\n\n\
    \    total_pnl = 0.0\n    trades: list[dict[str, Any]] = []\n    live_trade_pnl:\
    \ list[dict[str, Any]] = []\n\n    for stock, grp in df.groupby(\"ts_code\"):\n\
    \        grp = grp.sort_values(\"trade_date\")\n        idx_list = grp.index.tolist()\n\
    \        in_position = False\n        entry_gap_val = 0.0\n        entry_date:\
    \ Any = None  # pd.Timestamp | None\n\n        for idx in idx_list:\n        \
    \    row = grp.loc[idx]\n            gap = float(row[\"value_gap_amount\"])\n\
    \            trade_date = row[\"trade_date\"]\n\n            if not in_position\
    \ and gap > 0:\n                in_position = True\n                entry_gap_val\
    \ = gap\n                entry_date = trade_date\n                df.at[idx, \"\
    position\"] = 1\n                df.at[idx, \"entry_gap\"] = entry_gap_val\n \
    \               continue\n\n            if in_position:\n                df.at[idx,\
    \ \"position\"] = 1\n                df.at[idx, \"entry_gap\"] = entry_gap_val\n\
    \n                assert entry_date is not None\n                hold_days = (trade_date\
