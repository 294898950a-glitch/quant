implementation_outline:
  script_path: scripts/evaluate_cb_arb_pnl_adaptive_exit.py
  main_inputs:
  - data_root
  - output_dir
  - gap_speed_lookback
  - pnl_lookback
  - tp_gap_fraction
  - sl_gap_fraction
  - min_hold_days
  core_steps:
  - Load daily value‑gap ranks and (optionally) baseline trade PnL data; if absent,
    compute rolling PnL from simulated positions using entry‑gap tracking.
  - For each calendar day, compute gap closing speed over the lookback window and
    rolling average realised PnL over the pnl_lookback window.
  - Dynamically adjust take‑profit threshold (tp_gap_fraction scaled by closing speed)
    and stop‑loss threshold (sl_gap_fraction adjusted by recent PnL).
  - Apply adaptive exit logic: exit a position if current gap fraction falls below
      the dynamic TP threshold or exceeds the dynamic SL threshold, respecting min_hold_days.
  - Run full backtest on train (2019‑2024), sealed test (2025‑202605), and 2020 repair
    stress; aggregate trades and compute performance metrics.
  - Produce summary.json (with adoption_pass), report.yaml, l4_ack.yaml, and diagnostic.yaml.
  code_constraints:
  - Use only data files from the existing project; do not overwrite raw warehouse
    data.
  - Keep entry logic and candidate generation identical to baseline; only replace
    exit rule.
  - Never alter current strategy truth or mark improvements as live.
validation_plan:
- python3 -m py_compile scripts/evaluate_cb_arb_pnl_adaptive_exit.py
- Run a small data smoke test (first 200 days) to verify exit logic and absence of
  crashes.
- Verify that all required artifacts (summary.json, report.yaml, l4_ack.yaml, diagnostic.yaml)
  are produced and contain valid adoption_pass flag.
