# HDRF L1 实验设计 spec.yaml 模板 (替代旧 spec.md)
#
# 每次新研究开始, Claude 必须先在 data/<run-id>/spec.yaml 写一份, 才能发 DIRECT
# 给 Codex. 必填字段由 scripts/validate_spec.py 强制校验, 缺字段 commit 被拦.
#
# 这是 yaml 结构化格式 (旧 md 的替代). 选择 yaml 因为:
# - validator 能真严格检查 (md 只能 grep 段标题, 软软)
# - 跟 run_manifest.yaml 一致, 整套 framework 结构化对齐
# - 字段 explicit, 不靠"段落标题"约定
#
# 下面是模板, 复制后填实际值, 删 # 注释行.

schema_version: 1

# === 元信息 ===
run_id: cb_arb_csi_market_filter_2026-05-14  # data 目录名 / 引用 ID
date: '2026-05-14'  # YYYY-MM-DD
strategy_id: cb_arb  # 跟 strategies.yaml 一致
l0_entry_id: 1  # L0 来源 ID (1=用户驱动 / 2=AI 内省 / 3=arxiv)
l0_source: experience_ledger open-thread "exogenous panic signal"  # 简短来源

# === 假设 + 来源 ===
hypothesis: "X 信号能改善 Y 年表现, 同时不伤 Z 年"  # 一句话
source_insight: |
  用户的领域洞察: 暴跌一定是多市场的, A 股大盘必然同步大跌.
  从 reports/cb_arb_xxx.md 复盘看 panic detector 失败的根因是 ...

# === 参数空间 ===
parameter_space:
  - name: panic_market_filter_csi_threshold
    range: [-0.02, -0.005]
    type: float
    description: CSI500 同日跌幅门槛
  - name: panic_market_filter_lookback
    range: [1, 5]
    type: int
    description: 累计观察天数

new_data_sources:
  - path: data/csi500_grid/raw/510500_daily.parquet
    description: CSI500 ETF daily (新加进 baseline)

# === Grid 设计 ===
grid:
  dimensions: [panic_market_filter_csi_threshold, panic_market_filter_lookback]
  candidates_count: 162  # 总 grid 组合数
  description: 2 维 grid, 网格搜索

# === 评估指标 + 硬底线 ===
hard_floors:  # 主指标硬底线 (kill 条件)
  replay_2019: 0.161312
  replay_2020: -0.130604
  replay_2021: -0.050441
  replay_2022: 0.014425
  replay_2023: -0.031027
  replay_2024: 0.030085
hard_floors_baseline_source: spec v1.1 normal-state baseline  # floor 怎么来的

auxiliary_metrics:
  - selection_avg_excess
  - max_drawdown
  - total_trades
  - win_rate

# === 真 CV 设计 ===
cv_design: leave-one-year-out  # 选: leave-one-year-out / sealed-pool-N / walk-forward / 等
cv_holdout_years: [2019, 2020, 2021, 2022, 2023, 2024]
cv_adoption_threshold: ≥ 5/6 holdout 改善或不退化 vs 当前 baseline

# === 算力 + 预算 ===
compute_estimate:
  sig_minutes: 30
  spot_minutes: 10
  estimated_cost_yuan: 3.0
budget_cap_yuan: 30  # ¥ 上限
spot_decision: "spot 估 10 分钟, 协议 ≥ 30min 才必起 spot, 但 spot 已 stopped 可起一次. 建议起 spot."

# === 停止条件 ===
stop_conditions:
  - "0 候选过 4 floor → 停研究"
  - "≥ 50% 候选过 floor → 必跑 5 项质疑"
  - "真 CV < 5/6 → 已确认无效, 入经验账本"
  - "总算力 ≥ 30 → 暂停"

# === 必出 artifact ===
artifacts_required:
  - ranked.csv          # 候选排名
  - trades.csv           # 完整 trade 记录
  - daily_equity.csv     # daily equity curve
  - trigger_dates.csv    # 信号触发日
  - summary.csv          # baseline + 候选汇总
  - run_summary.json     # 跑批元数据

# === 状态 ===
status: DRAFT  # DRAFT / READY / RUNNING / COMPLETE / ARCHIVED
# DRAFT: 起草, 等用户确认
# READY: 用户/Codex 已认可, 可起 batch
# RUNNING: 跑批中
# COMPLETE: 跑完 + L6 复盘
# ARCHIVED: 不再用

# === 升级条件 (可选) ===
escalation:
  - 算力 > budget_cap → ESCALATE 用户
  - 数据 schema 异常 → stop + RESPONSE
  - 跑出 fatal (cb_arb 任一变体 cost-on 退化 ≥ 5pp) → ESCALATE

# === 备注 ===
notes: |
  自由文本段, 任何 markdown 表格能写的细节都放这里.
  validator 不检查 notes 内容, 只检查上面字段齐全 + 类型正确.
