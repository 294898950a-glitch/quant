proposal_id: tiered_or_option_position_sizing
executor: option_position_sizing
family: option_position_sizing
hypothesis: '在"债底比率 > 1.4 OR 正股溢价率 > 1.6"的较宽风险集上施加温和折扣（scale≈0.6）， 同时对"债底比率 > 1.5
  AND 正股溢价率 > 1.6"的极端交集施加深度折扣（scale≈0.3）； 双层分级比单一固定门槛更能保留训练期中等风险期权收益，同时对历史净亏最集中的极端子集实施强压缩，
  有望同时避免单条件 position_sizing 因覆盖面过宽而损伤训练期 score 的失败模式。

  '
source_insight: '归因分析（data/cb_arb_option_false_undervalue_attribution_2026-05-17/）显示：
  "债底比率>1.5 OR 正股溢价率>1.6"子集净亏-286K（亏损捕获率56.4%，盈利捕获率仅26.6%，约240/921笔）； AND 交集(债底比率>1.4
  AND 正股溢价率>1.6)已作为单一固定 scale 方案提交为 READY run 060047； 6 轮 pnl_feedback 测试（共114个候选）训练期均以
  baseline_no_feedback 胜出，说明路径敏感的滚动盈亏信号在 训练期无法区分好坏期权时段，该方向参数空间已实质性耗尽；单条件 position_sizing（151411）已按
  close_to_bond_floor_threshold / moneyness_stock_to_conv_threshold 各自测试并被拒； 双层 OR+AND
  分级 scale 在已有记录中未曾运行。

  '
why_not_rejected_repeat: '禁止方向（global_option_entry_gate / regime_conditioned_option_entry_gate
  / global_option_value_haircut / panic_family_reruns）均属于"禁买"或"改理论价格"机制； 本测试仅在进场时对高风险子集降低排序金额和买入金额，不禁买、不改理论价格，属于
  position_sizing 路径。 已测方案均为单门槛+单一固定 scale；双层（温和宽集+深度极端交集）在本路径中未见记录。 pnl_feedback
  不重复：本提案不依赖已平仓盈亏历史，不属于 rolling_option_source_pnl_feedback 方向。

  '
risk: 主要风险（数据缺口）：scripts/evaluate_cb_arb_option_position_sizing.py 当前是否支持 双层/分级参数配置未在现有运行记录中确认；若执行器不支持多层
  scale，需先修改脚本或降级为 单层 OR+固定 scale（后者可能与 run 212511 重复，该 run 详情暂缺）。 次要风险（机制失效）：OR 并集（约240笔）在训练期同时涵盖部分盈利期权，
  分层折扣仍可能损伤训练期 score，重蹈单条件 position_sizing 被拒模式； 如 READY run 060047（AND 交集）先完成且结果为
  reject， 则本提案的深度层（极端 AND 交集）的假设依据将进一步削弱，应在 060047 结果出来后再决定是否启动。
