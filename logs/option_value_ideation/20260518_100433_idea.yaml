proposal_id: feedback_standalone_sum_pnl_threshold
executor: option_source_pnl_feedback_scaler
family: option_source_pnl_feedback
hypothesis: '将 trigger_avg_pnl_pct 设为极小值（如 -0.99，实质禁用），仅以 trigger_sum_pnl 绝对累计亏损额为唯一触发条件，候选门槛区间
  [-20000, -40000, -80000, -150000] CNY（60d 窗口）。 训练期（2019-2024）单笔期权亏损均值约 -1117 元，60
  天内累计亏损估算约 13K， 远低于高门槛，信号静默；测试期若存在结构性集中大额亏损，则 sum_pnl 单独触发缩减保护， 保留 lookback=60 /
  min_trades=2 / scale=0.5 的测试期最优参数组合。

  '
source_insight: '历次 pnl_feedback 轮次（084139 / 070407 / 091627 / 094700）均以 avg_pnl_pct
  为主控触发 或与 sum_pnl 形成 AND 双条件；AND 双条件（094700）进一步压缩触发频次， 但规律表明测试期激活同样受限，且 4 轮训练分均不敌
  baseline。 归因数据（option_false_undervalue_attribution_2026_05_17）显示训练期单笔平均亏损约 -1117
  元； 以此推算 60d 内 sum_pnl 超过 30K+ 的概率低，这是唯一尚未单独测试的参数轴。

  '
why_not_rejected_repeat: '已确认无效方向（rolling_option_source_pnl_feedback）测试的是 avg_pnl_pct
  主导触发（含单条件和 AND 组合）； 本轮将 trigger_avg_pnl_pct 设为极小值（实质禁用）， 使 trigger_sum_pnl 成为唯一激活变量，属于
  pnl_feedback executor 内独立参数维度首次单独测试， 不重复 avg_pnl_pct 主导的已拒绝变体，且不触碰 forbidden_families
  中任何方向。

  '
risk: 训练期（2019-2024）60d 窗口内期权来源累计亏损的实际分布未在现有 summary.json 或归因文件中直接披露； 若训练期存在多个窗口 sum_pnl
  超过 40K 以上门槛，触发频次仍会压低训练分，方向将再次被拒绝。 此风险目前无法从现有数据预验证，需待 VM 回测后才可确认。 另一风险：executor 对
  trigger_avg_pnl_pct 极小值（-0.99）的解释行为未在历史 params_json 中出现， 若 executor 对超出正常范围的参数值有未知处理，候选结果可能与预期不符。
