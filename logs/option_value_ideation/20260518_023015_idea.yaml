proposal_id: option_pnl_feedback_nonzero_trigger_v1
executor: option_source_pnl_feedback_scaler
script: scripts/evaluate_cb_arb_option_pnl_feedback.py
family: option_source_pnl_feedback
hypothesis: 零触发门槛（trigger_avg_pnl_pct=0）在训练期把正常小幅亏损也计入触发， 频繁误砍好的期权来源交易；将门槛收紧至 -5%/-10%，只在已平仓期权来源
  平均亏损真正超过该值时才缩减后续期权买入金额，可望保留训练期正常期权 收益，同时在 2020 式深度崩盘中自动降低暴露。
source_insight: 直接来自 _004259（19 个变体，全部 trigger_avg_pnl_pct=0）：测试期最优为 feedback_60d_min2_scale_0p5（test_excess=0.458，score=0.434），
  但训练期最优是 baseline（无反馈，score=0.050）；pipeline 判定 reject， 原因是零门槛在训练期正常波动期间频繁触发缩减，使三段联合检验
  （train + 2020 + sealed_test）整体不通过。 _022212 已提出相同假设并处于 READY 状态，本提案与其一致。
why_not_rejected_repeat: _004259 的所有 19 个变体均以 trigger_avg_pnl_pct=0 运行，本质是"任意亏损 即触发"的无条件
  PnL 反馈，属于已测试但被拒绝的无门槛子集； 本轮引入非零负门槛（-5%、-10%）作为激活条件，不禁止期权买入、不改变 理论价格、不依赖市场状态门槛，与 forbidden_families
  中的 global_option_entry_gate、regime_conditioned_option_entry_gate、 global_option_value_haircut、panic_family_reruns
  均无重叠。
candidate_grid:
  lookback_days:
  - 30
  - 60
  - 90
  min_trades:
  - 2
  - 3
  scale:
  - 0.25
  - 0.5
  trigger_avg_pnl_pct:
  - -0.05
  - -0.1
  baseline_included: true
  note: 优先测试 60d/min2/scale=0.5 搭配 -5%/-10% 两档（_004259 测试期最优参数组合 加门槛），其余组合用于验证门槛效果在不同回望窗口下的稳定性。
adoption_gate:
  required_periods:
  - train_20190101_20241231
  - stress_2020
  - sealed_test_20250101_20260508
  logic: all_three_must_not_regress_vs_baseline
  hard_floor_train_excess: 0.131363
  hard_floor_train_max_drawdown: -0.324048
test_period: 20250101-20260508
train_period: 20190101-20241231
backtest_host: root@100.91.245.108
remote_repo: /root/projects/quant
max_auto_budget_yuan: 100
risk: （1）若 2020 期权来源每笔亏损幅度集中在 <5% 区间，非零门槛根本不触发， 本轮效果等同于 baseline（无修改），仍会 reject； （2）若门槛设置偏高（如
  -10%），训练期本就少见的深度亏损触发次数极少， 测试段偶发大亏才触发，训练/测试分布不一致可能导致过拟合测试窗口； （3）缺乏 2020 期权来源亏损幅度的分桶统计——无法事先确认
  -5%/-10% 门槛 在 2020 崩盘段有足够的覆盖率，存在门槛设计空转的风险。 建议在跑回测前先用本地脚本统计 2020 期权来源平均亏损分布，确认 trigger_avg_pnl_pct=-0.05
  能覆盖至少 30% 的 2020 亏损交易，否则调高门槛无意义。
