proposal_id: mild_scale_option_pnl_feedback
executor: option_source_pnl_feedback_scaler
family: option_source_pnl_feedback
script: scripts/evaluate_cb_arb_option_pnl_feedback.py
strategy_id: cb_arb_value_gap_switch
hypothesis: 所有 pnl_feedback 轮次使用 scale=0.5，对训练期期权来源正收益段误伤过重导致训练分持续低于 baseline； 将 scale
  提升至 0.70–0.90（极温和缩减），在信号触发时对训练期收益的拖累可忽略不计， 同时保留 60d/min2 这一在测试期持续领先的参数组合的方向性保护效果，
  有望在不改变训练期选胜结果的前提下验证"信号有效但力度过大"假说。
source_insight: 8 轮 option_source_pnl_feedback 实验（022212/023149/033712/035352/041315/070407
  等） 中训练期最优者始终为 baseline_no_feedback（score=0.050351）， 测试期最优者始终为 feedback_60d_min2_scale_0p5（score=0.433669）——方向稳定，
  但 scale=0.5 在训练期造成系统性误触；所有轮次均未测试 scale 区间 0.70–0.90， 这是唯一尚未被参数网格覆盖的空白区域。
why_not_rejected_repeat: 不是全局期权买入封锁（global_option_entry_gate），不是整体期权估值打折（global_option_value_haircut），
  不是状态条件过滤（regime_conditioned_option_entry_gate），也不是重新运行 panic 系列； 属于 option_source_pnl_feedback
  family 内部 scale 参数精细化扫描， 覆盖之前所有轮次从未测试过的极温和缩减区间（0.70–0.90）。
risk: 训练期期权来源整体净正收益（+75K，2019-2024），即使 scale=0.90 也会在信号触发时轻微降低训练分， 若训练期 baseline 优势（score=0.050）足以压制所有温和变体，
  则此方向将第 9 次确认 option_source_pnl_feedback family 结构性失败， 届时需停止该 family 并上报用户做策略层决策。
