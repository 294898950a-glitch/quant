proposal_id: option_sizing_and_threshold
executor: option_position_sizing
family: option_position_sizing
hypothesis: '仅当债底比率 > 1.4 且正股溢价率 > 1.6 两个条件同时成立时才降低期权来源候选买入金额； AND 交集比任一单条件覆盖更少训练期正常交易，预期对训练期超额损伤更小，
  同时精准锁定归因分析中净亏最集中的高风险子集，有望在 train/2020/test 三段联合门槛上 好于此前单一条件测试。

  '
source_insight: '归因分析（data/cb_arb_option_false_undervalue_attribution_2026-05-17）显示：
  单独用债底比率 > 1.4（226笔，净 -255K，亏损捕获率 45.5%）和单独用正股溢价率 > 1.6 （184笔，净 -281K，亏损捕获率 49.3%）已分别在
  option-position-sizing_2026-05-17_151411 和 _212511 两轮中被标为 close_to_bond_floor_threshold
  / moneyness_stock_to_conv_threshold 关闭方向；OR 合集（ratio > 1.5 OR moneyness > 1.6，240笔，净
  -287K）也未通过。 AND 交集（双条件同时满足）理论上覆盖笔数低于任一单条件，训练期误触比例更低， 但尚未作为独立变体完整回测，静态分析也未直接报告该交集的
  PnL 拆分。

  '
why_not_rejected_repeat: 'forbidden_families 中的 global_option_entry_gate、regime_conditioned_option_entry_gate、
  global_option_value_haircut 均属于禁买或修改理论价格的硬过滤；本方案使用 option_position_sizing，不禁买、不改理论价，仅降低排序金额和买入金额，机制不同。
  关闭方向标签 close_to_bond_floor_threshold / moneyness_stock_to_conv_threshold 对应的 是各自单一条件的测试结果；AND
  逻辑要求两个特征同时超阈值，是更严格的交集条件， 逻辑假设与单条件测试不同，属于现有证据中未被单独验证的空白点。

  '
risk: 最大风险一：executor 脚本（scripts/evaluate_cb_arb_option_position_sizing.py） 是否原生支持双参数
  AND 逻辑未经验证；若只支持单一阈值，需先改代码才能运行，本提案 在未确认脚本接口前无法直接提交执行。 最大风险二：AND 交集样本数极可能低于 150 笔（2019-2024
  六年），统计功效过低， 信号不稳定，train/2020/test 联合门槛仍可能无法通过。 最大风险三：静态归因结论是截面统计，不等于时序动态回测中的实际贡献；
  AND 子集的真实 PnL 贡献未经静态分析直接确认，存在高估实际效果的风险。 最大风险四：conditional_option_position_sizing
  作为关闭标签语义宽泛， AND 变体是否已被隐含覆盖存在歧义，需在提交前与 Codex 确认该标签的原始覆盖范围。
