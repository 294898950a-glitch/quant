proposal_id: pnl_feedback_min_avg_loss_threshold
executor: option_source_pnl_feedback_scaler
family: option_source_pnl_feedback
hypothesis: 保留测试期已验证的 60d/min2/scale_0.5 参数组合，将 trigger_avg_pnl_pct 从 0（任意平均亏损即触发）提升至
  -0.010 至 -0.020（平均每笔亏损率需超 1–2% 才触发），目的是过滤训练期因小额噪声亏损导致的误触发，使训练期反馈信号激活频次降低，从而让 feedback
  变体在训练期不再显著拖累 score，同时测试期若存在集中性较大的单笔亏损段仍能触发保护。
source_insight: 全部 5 轮 pnl_feedback 运行（033712/035352/041315/070407/084139）训练期始终选 baseline_no_feedback（score=0.050351），测试期最优始终是
  feedback_60d_min2_scale_0p5（test_score=0.433669）；5 轮 params_json 中 option_source_pnl_feedback_trigger_avg_pnl_pct
  全部固定为 0.0，从未测试非零门槛——这是参数空间内唯一完全空白的维度。已测的 trigger_sum_pnl 绝对门槛（-50K/-100K/-200K）也全部失败，说明绝对金额门槛方向无效，但平均每笔亏损率门槛尚未验证。
why_not_rejected_repeat: 已拒绝的禁用方向为 global_option_entry_gate / regime_conditioned_option_entry_gate
  / global_option_value_haircut / panic_family_reruns；本测试不改理论价格、不禁买、不加 regime 门控，仅在
  option_source_pnl_feedback 框架内调整 trigger_avg_pnl_pct 这一从未被穷举的参数，不属于任何已拒绝 family
  的重复。trigger_sum_pnl 测试的是绝对累计金额门槛，trigger_avg_pnl_pct 测试的是每笔平均亏损率门槛，两者机制不同。
risk: 若训练期 60d 滚动窗口内期权来源交易的平均每笔亏损率本身也在 1–2% 以上（而非小额噪声），提高门槛不会减少训练期误触发次数，训练期仍会选 baseline；若测试期平均每笔亏损率恰好低于设定门槛，测试期保护效果同样消失，两段同时失效；该参数在回测中无法事前计算触发频次分布，存在门槛设定盲目性风险。
_ideation_source: claude
_contract_attempt: 1
