proposal_id: pnl_feedback_dual_and_trigger_v1
executor: option_source_pnl_feedback_scaler
family: option_source_pnl_feedback
hypothesis: 同时设置 trigger_sum_pnl（60d 窗口累计亏损绝对值超门槛）与 trigger_avg_pnl_pct（每笔平均亏损率超门槛）
  形成 AND 双条件触发；双条件同时成立的概率远低于任一单条件，可大幅压缩训练期 2019-2024 偶发噪声误触发，同时在 2025-2026 存在结构性持续亏损时两项指标同时达标，
  仍能激活排序/买入金额缩减保护，有望让某个 feedback 变体在训练期不再被 baseline 拉开， 同时保留测试期 feedback_60d_min2_scale_0p5
  方向的保护效果。
source_insight: 五轮 pnl_feedback 回测（033712/041315/070407/084139/091627）全部以同一模式拒绝： 训练期选胜始终为
  baseline_no_feedback（score 0.050351），测试期最佳变体始终为 feedback_60d_min2_scale_0p5（score
  0.433669）。单参数空间已被系统穷举： lookback 60-180d、min_trades 2-6、scale 0.5-0.9、sum_pnl 门槛
  -50K/-100K/-200K、 avg_pnl_pct 门槛 -0.01/-0.02，均未能让任何 feedback 变体在训练期超越 baseline。
  唯一尚未覆盖的角度：同时激活 trigger_sum_pnl 与 trigger_avg_pnl_pct 两个参数， 形成 AND 复合触发条件——训练期单项条件偶发触发但双项同时触发的频率显著更低。
why_not_rejected_repeat: global_option_entry_gate 以硬性禁买期权来源候选为手段； global_option_value_haircut
  以修改理论价格为手段；两者均已明确列为 forbidden_families。 本方案不禁买、不修改任何估值参数，仅在两个历史 PnL 数量条件同时满足时压低排序/买入金额，
  机制为 pnl_feedback 信号的强度过滤而非入场拦截或估值修正，逻辑层面根本不同。
risk: 最大风险：脚本 evaluate_cb_arb_option_pnl_feedback.py 对两个触发参数的内部实现逻辑未知—— 若 trigger_sum_pnl
  与 trigger_avg_pnl_pct 以 OR 而非 AND 组合， 本轮行为等同于已失败的单条件测试，将再次被拒且方向已无可用子空间。 次要风险：即使
  AND 逻辑正确，2020 年 option_source 累计亏损 -92K 仍可能同时满足两个条件， 导致 2020 保护年训练分仍拖累整体 score；
  此方向已接近可挖掘空间上限，若本轮仍被拒应视为 pnl_feedback 家族证伪，切换执行器。
_ideation_source: claude
_contract_attempt: 1
