  research_insights:
    path: data/research_framework/research_insights.yaml
    role: machine-readable cross-experiment lessons and open threads
    content: "schema_version: 1\nupdated_at: \"2026-05-17T13:59:00+08:00\"\nauthority:\
      \ machine\nsource_migration:\n  from_git_paths:\n    - docs/research_framework/experience_ledger.md\n\
      \    - reports/cb_arb_research_complete_retro_2026-05-17.md\n  reason: \"Markdown\
      \ runtime and report files removed; durable research memory moved to YAML.\"\
      \n\ncb_arb_hard_floors_v1_1:\n  source: \"spec v1.1 normal-state baseline, medium_opportunity,\
      \ recovery=4, hurdle=0.15\"\n  adoption_rule: \"candidate must improve or not\
      \ degrade in at least 5 of 6 holdout years versus current baseline\"\n  yearly_excess:\n\
      \    \"2019\": 0.161312\n    \"2020\": -0.130604\n    \"2021\": -0.050441\n\
      \    \"2022\": 0.014425\n    \"2023\": -0.031027\n    \"2024\": 0.030085\n \
      \ note: \"Do not use the older mixed-source four-floor rule.\"\n\nkey_insights:\n\
      \  - id: main_vs_value_gap_distinction\n    summary: \"Main cb_arb and value-gap\
      \ switch are distinct; rejection of panic-detector internals does not reject\
      \ absolute value-gap ranking.\"\n    facts:\n      main_strategy_logic: \"market\
      \ price / theoretical value percentage deviation ranking\"\n      value_gap_logic:\
      \ \"absolute theoretical-minus-market value gap ranking, plus optional panic\
      \ detector\"\n      main_2019_excess: -0.0985\n      value_gap_2019_excess:\
      \ 0.161\n      gap_pp: 25.95\n      main_6y_excess_compound: -0.127\n      value_gap_6y_excess_compound:\
      \ -0.030\n    decision_use: \"Value-gap ranking remains a legitimate research\
      \ direction even though full value-gap switch is not deployable.\"\n\n  - id:\
      \ cost_realism_wall\n    summary: \"Cost-on tests materially worsen both main\
      \ cb_arb and value-gap switch.\"\n    facts:\n      main_cost_degradation_pp:\
      \ -0.0676\n      value_gap_cost_degradation_pp: -0.0747\n      fatal_threshold_pp:\
      \ -0.0500\n    decision_use: \"Any future cb_arb variant must be checked cost-on\
      \ before promotion.\"\n\n  - id: panic_detector_dead_end\n    summary: \"Panic\
      \ detector overlay is rejected as a family under current action mapping.\"\n\
      \    facts:\n      true_panic_post_30d_baseline_excess_vs_benchmark: -0.038\n\
      \      false_panic_cross_section_can_be_more_extreme_than_true_panic: true\n\
      \      overlay_hurts_false_panic_paths: true\n    decision_use: \"Do not restart\
      \ panic overlay without a new action family and explicit evidence that action\
      \ adds alpha.\"\n\n  - id: single_filter_dead_end\n    summary: \"2020 weakness\
      \ was broad across trades; single trade filters do not address the failure mode.\"\
      \n    facts:\n      negative_trade_share_2020: 0.74\n      median_excess_2020_pp:\
      \ -4.32\n      worst10_loss_share: 0.23\n    decision_use: \"Avoid one-dimensional\
      \ entry/exit/holding filters as a rescue path.\"\n\n  - id: hdrf_beats_self_loop_for_cb_arb\n\
      \    summary: \"HDRF/value-gap route beat self-loop LLM tuning in cross-route\
      \ validation.\"\n    facts:\n      hdrf_2019_excess: 0.161\n      self_loop_2019_excess:\
      \ -0.101\n      gap_pp: 26.2\n    decision_use: \"Do not restart sealed-pool\
      \ LLM tuning over the same 13-dimension yaml space.\"\n\n  - id: cb_arb_value_gap_panic_reruns_2026_05_17\n\
      \    summary: \"3 panic-family rerun (stop_revaluation / panic_option_weight\
      \ / panic_bond_anchor) all show good test_excess but uniformly bad train_excess\
      \ — false positive from short test window.\"\n    source: \"data/cb_arb_value_gap_rerun_8_stop_revaluation_2026-05-17/,\
      \ rerun_9_panic_option_weight, rerun_11_panic_bond_anchor (committed VM batch\
      \ 2026-05-17)\"\n    facts:\n      test_period: \"2025-01-01 to 2026-05-08,\
      \ ~1.5 years\"\n      train_period: \"2019-01-01 to 2024-12-31, 6 years\"\n\
      \      rerun_8_stop_revaluation:\n        best_test_excess_variant: vol_50\n\
      \        test_excess: 0.4566\n        test_max_dd: -0.0978\n        train_excess:\
      \ -0.0839\n        train_max_dd: -0.3347\n      rerun_9_panic_option_weight:\n\
      \        best_test_excess_variant: weight_soft_100_80_60_30\n        test_excess:\
      \ 0.3868\n        test_max_dd: -0.0978\n        train_excess: -0.0668\n    \
      \    train_max_dd: -0.3389\n      rerun_11_panic_bond_anchor:\n        best_test_excess_variant:\
      \ buy_anchor_15\n        test_excess: 0.3482\n        test_max_dd: -0.1271\n\
      \        train_excess: -0.0727\n        train_max_dd: -0.3572\n      all_variants_train_dd_breach_15pp_falsifier:\
      \ true\n      all_variants_train_excess_negative_or_marginal: true\n      false_positive_pattern:\
      \ \"test 1.5y window aggregate looks positive but train 6y aggregate fails decision_contract\
      \ falsifiers (any_single_year_dd > 15%; cumulative_excess_cross_year < 0)\"\n\
      \    decision_use: \"All 3 panic family reruns are mechanical-pass but falsifier-fail.\
      \ Do NOT promote any variant to baseline_registry. Reinforces panic_detector_dead_end\
      \ (this is the 4th time panic family has been rejected). Use as evidence that\
      \ test-only mechanical thresholds (excess>0, dd>-30%) are insufficient — must\
      \ also enforce train-period falsifiers (cross-year cumulative excess sign, single-year\
      \ dd ceiling).\"\n\n  - id: mechanical_threshold_insufficient_for_promotion\n\
      \    summary: \"passed_mechanical_thresholds_not_promoted is the correct call\
      \ when train-period falsifiers fail despite test mechanical pass.\"\n    facts:\n\
      \      example_runs: [\"cb_arb_value_gap_rerun_8/9/11_2026-05-17\"]\n      mechanical_thresholds:\
      \ [\"test_excess_return >= 0\", \"max_drawdown >= -0.3\"]\n      falsifier_checks_needed:\
      \ [\"cumulative_excess_compound_cross_year_lt_0 over full train\", \"any_single_year_drawdown_vs_benchmark_gt_15pct\
      \ over full train\", \"any_holdout_year_sharpe_lt_0_5\"]\n      gap_caught:\
      \ \"test 1.5y can swing positive on lookback, but train 6y exposes consistent\
      \ underperformance\"\n    decision_use: \"auto_research_pipeline.update_experiments\
      \ should ideally compute falsifier flags too, not just adoption_pass. Until\
      \ that's added, AI must manually flag in retro that mechanical-pass != promotion-eligible.\"\
      \n\n  - id: option_entry_gate_tradeoff_2026_05_17\n    summary: \"Global option-source\
      \ entry gates improve 2020 in some variants but remove the 2025-2026 upside;\
      \ do not adopt as a global filter.\"\n    source: \"data/cb_arb_value_gap_switch_option-entry-gate_2026-05-17/\"\
      \n    facts:\n      candidates: 19\n      baseline:\n        train_excess: 0.131363\n\
      \        test_excess: 0.37976\n        total_return_2020: -0.090593\n      \
      \  option_source_pnl_2020: -92630.91\n        option_source_pnl_test: 729505.32\n\
      \      best_train:\n        name: ratio_1p15\n        train_excess: 0.666909\n\
      \        test_excess: -0.230402\n        total_return_2020: 0.028808\n     \
      \ best_2020:\n        name: option_share_max_0p95\n        total_return_2020:\
      \ 0.066778\n        test_excess: -0.348735\n      best_test:\n        name:\
      \ baseline_no_entry_gate\n        test_excess: 0.37976\n      adoption_verdict:\
      \ reject\n    decision_use: \"Option-source entry is a real risk source, but\
      \ global hard filters are rejected. Future work, if any, must condition option-source\
      \ entry restrictions on market/credit state instead of applying them all the\
      \ time.\"\n\n  - id: regime_option_entry_gate_reject_2026_05_17\n    summary:\
      \ \"Regime-conditioned option-entry gates did not fix the option-source tradeoff;\
      \ best test gains were marginal, train metrics degraded, and 2020 was not repaired.\"\
      \n    source: \"data/cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17/\"\
      \n    facts:\n      candidates: 15\n      cost_model_enabled: true\n      pipeline_decision:\
      \ failed_mechanical_thresholds\n      baseline:\n        train_excess: 0.131363\n\
      \        train_max_dd: -0.324048\n        test_excess: 0.37976\n        total_return_2020:\
      \ -0.090593\n        excess_2020: -0.19476\n      best_test:\n        name:\
      \ weak_mild_flat_signal\n        test_excess: 0.388471\n        train_excess:\
      \ 0.019776\n        train_max_dd: -0.344744\n        total_return_2020: -0.091111\n\
      \        excess_2020: -0.195278\n      best_train:\n        name: baseline_no_regime_entry_gate\n\
      \        reason: \"All gated variants either reduce train excess or keep the\
      \ 2020 loss essentially unchanged; baseline itself fails the train max-drawdown\
      \ floor.\"\n    decision_use: \"Reject this regime-conditioned entry-gate branch.\
      \ Do not promote any variant to current.yaml or baseline_registry; future work\
      \ should move away from entry-gate filters unless it brings a new state/action\
      \ mechanism and fixes 2020 without sacrificing train robustness.\"\n\n  - id:\
      \ option_false_undervalue_attribution_2026_05_17\n    summary: \"False option-sourced\
      \ undervaluation is better explained by far-above-bond-floor / deep-in-the-money\
      \ option exposure than by panic-day entry or high volatility alone.\"\n    source:\
      \ \"data/cb_arb_option_false_undervalue_attribution_2026-05-17/\"\n    facts:\n\
      \      scope: \"Local attribution only; no VM/spot; no strategy change.\"\n\
      \      option_trades_2019_2024: 921\n      total_option_loss_abs: 1028788.67\n\
      \      total_option_profit: 1103646.32\n      far_from_bond_floor_gt_1p5:\n\
      \        trades: 116\n        loss_capture_rate: 0.313854\n        profit_capture_rate:\
      \ 0.131557\n        net_pnl: -177697.84\n        avg_selected_pnl: -1531.88\n\
      \      far_from_bond_floor_gt_1p4:\n        trades: 226\n        loss_capture_rate:\
      \ 0.455\n        profit_capture_rate: 0.193\n        net_pnl: -255040.52\n \
      \       avg_selected_pnl: -1128.5\n      moneyness_gt_1p6:\n        trades:\
      \ 184\n        loss_capture_rate: 0.493\n        profit_capture_rate: 0.205\n\
      \        net_pnl: -280983.41\n        avg_selected_pnl: -1527.08\n      ratio_gt_1p5_or_moneyness_gt_1p6:\n\
      \        trades: 240\n        loss_capture_rate: 0.564\n        profit_capture_rate:\
      \ 0.266\n        net_pnl: -286692.23\n        avg_selected_pnl: -1194.55\n \
      \     high_vol60_alone:\n        note: \"Not useful as a negative signal; selects\
      \ 837/921 option trades and remains net positive.\"\n        selected_trades:\
      \ 837\n        loss_capture_rate: 0.908435\n        profit_capture_rate: 0.954482\n\
      \        avg_selected_pnl: 141.96\n      hot_trend_sigma_setup:\n        note:\
      \ \"The strict trend-sigma condition was too narrow and did not explain losses.\"\
      \n        selected_trades: 3\n        loss_capture_rate: 0.001442\n    decision_use:\
      \ \"Do not pursue another simple entry filter. If testing this mechanism, change\
      \ option valuation itself: cap or haircut option value when the CB is far above\
      \ bond floor or stock is deep in the money, then validate across 2019-2024 before\
      \ touching 2025-2026.\"\n\n  - id: option_source_value_gap_structural_tradeoff_2026_05_17\n\
      \    summary: \"Option-source value gap is structurally inseparable under the\
      \ current cb_arb_value_gap_switch universe and cost-on setup: simple filters\
      \ and global valuation haircuts repair 2020-style losses only by sacrificing\
      \ later option-source upside.\"\n    source: \"codex/claude outbox closeout\
      \ 2026-05-17 13:58 plus option-entry-gate, regime-entry-gate, and option-value-haircut\
      \ run artifacts\"\n    facts:\n      strategy_id: cb_arb_value_gap_switch\n\
      \      evidence_runs:\n        - cb_arb_value_gap_switch_option-entry-gate_2026-05-17\n\
      \        - cb_arb_value_gap_switch_regime-option-entry-gate_2026-05-17\n   \
      \     - cb_arb_value_gap_switch_option-value-haircut_2026-05-17\n      rejected_families:\n\
      \        - panic_family_reruns\n        - global_option_entry_gate\n       \
      \ - regime_conditioned_option_entry_gate\n        - global_option_value_haircut\n\
      \      option_entry_gate_pattern: \"Global option-source entry gates can improve\
      \ 2020 but remove 2025-2026 upside; best test remains baseline_no_entry_gate.\"\
      \n      regime_entry_gate_pattern: \"Regime-conditioned gates do not materially\
      \ improve test, degrade train metrics, and do not repair 2020.\"\n      valuation_haircut_pattern:\
      \ \"Best haircut train variant improves 2020 total_return from -0.090593 to\
      \ 0.132064 but drops sealed test_excess from baseline 0.379760 to -0.139723\
      \ and fails the 2024 single-year drawdown falsifier.\"\n      train_falsifier_status:\
      \ \"pipeline caught promotion false positives twice via passed_mechanical_but_falsifier_failed.\"\
      \n      no_truth_promotion: true\n    decision_use: \"Stop autonomous same-family\
      \ repair batches for cb_arb_value_gap_switch. Escalate to user for commit/split\
      \ and strategic direction: archive documented failure, retest universe/regime,\
      \ promote absolute ranking as a separate user-gated design, or search for a\
      \ new strategy family.\"\n\nopen_threads:\n  - id: promote_absolute_value_gap_ranking_to_core\n\
      \    priorit\n...[truncated]\n"
  protocol_rules:
    path: data/research_framework/protocol_rules.yaml
    role: machine-readable operating rules
    content: "schema_version: 1\nversion: \"1.5-machine\"\nupdated_at: \"2026-05-17T06:05:00+08:00\"\
      \nauthority: machine\n\nrules:\n  - id: R1\n    name: runtime_context\n    summary:\
      \ \"AI runtime context is loaded from data/research_framework/runtime_entrypoints.yaml,\
      \ not from docs/INDEX.md.\"\n    required_files:\n      - data/research_framework/runtime_entrypoints.yaml\n\
      \      - data/research_framework/current.yaml\n      - data/research_framework/strategies.yaml\n\
      \      - data/research_framework/baseline_registry.yaml\n      - data/research_framework/experiments.yaml\n\
      \      - data/research_framework/research_insights.yaml\n      - data/research_framework/protocol_rules.yaml\n\
      \    forbidden_runtime_entrypoints:\n      - docs/INDEX.md\n      - docs/research_framework/CURRENT.md\n\
      \      - docs/research_framework/protocol_redline.md\n\n  - id: R2\n    name:\
      \ evidence\n    summary: \"Claims must point to data, reports, run manifests,\
      \ records, git facts, or outbox/state messages.\"\n    allowed_evidence_types:\n\
      \      - data_file\n      - report\n      - run_manifest\n      - ledger_record\n\
      \      - git_fact\n      - outbox_state\n\n  - id: R3\n    name: research_design_gate\n\
      \    summary: \"New research batches must be created through scripts/new_research.py;\
      \ filled specs can run through scripts/auto_research_pipeline.py.\"\n    required_launcher:\
      \ scripts/new_research.py\n    automatic_pipeline: scripts/auto_research_pipeline.py\n\
      \    automatic_steps:\n      - load_spec\n      - estimate_budget\n      - gatekeeper_before_run\n\
      \      - execute_spec_command\n      - verify_artifacts\n      - derive_verdict\n\
      \      - write_run_manifest\n      - update_experiments_yaml\n    pre_run_gates:\n\
      \      - validate_spec.py\n      - validate_data_schema.py\n      - validate_compute_budget.py\n\
      \      - research_sanity_checker.py\n      - validate_gatekeeper_compliance.py\n\
      \n  - id: R4\n    name: budget_autonomy\n    summary: \"New data, research code,\
      \ and research parameters may proceed when estimated budget is <= 100 CNY.\"\
      \n    calculator: scripts/estimate_compute_budget.py\n    auto_continue_limit_cny:\
      \ 100\n    wait_for_user_when:\n      - budget_gt_100\n      - budget_unknown\n\
      \n  - id: R5\n    name: protected_decisions\n    summary: \"AI cannot archive\
      \ current strategy, promote to live, change protocol, or revive rejected directions\
      \ without user approval.\"\n    user_required_actions:\n      - archive_current_strategy\n\
      \      - promote_to_live\n      - change_protocol_rules\n      - revive_rejected_direction\n\
      \      - promote_prototype_to_current_truth\n\n  - id: R6\n    name: truth_sync\n\
      \    summary: \"Truth-affecting changes require CURRENT/baseline sync or a machine-readable\
      \ waiver, and are automatically appended to the protected-action audit log.\"\
      \n    validator: scripts/validate_truth_sync.py\n    truth_paths:\n      - data/research_framework/current.yaml\n\
      \      - data/research_framework/baseline_registry.yaml\n    waiver_dir: data/research_framework/truth_sync_waivers\n\
      \    audit_log: data/research_framework/protected_action_audit.jsonl\n    audit_rule:\
      \ \"Trace records are automatic and do not grant approval; they preserve evidence\
      \ even when a protected action is unauthorized.\"\n\n  - id: R7\n    name: experiment_registry_sync\n\
      \    summary: \"Completed, abandoned, rejected, or promoted experiments must\
